<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:Arial,sans-serif;background:#F2F2F2;color:#2A2A2A;font-size:12px;display:flex;flex-direction:column}
.hdr{background:#2A2A2A;padding:0;display:flex;align-items:stretch;flex-shrink:0}
.hdr-accent{background:#546E7A;width:6px;flex-shrink:0}
.hdr-body{flex:1;padding:10px 20px;display:flex;align-items:center;gap:16px}
.hdr-title{font-size:14px;font-weight:bold;color:#B0BEC5;letter-spacing:.3px}
.hdr-sub{font-size:10px;color:#78909C;margin-top:2px}
.step-bar{background:#ECEFF1;padding:8px 20px;display:flex;align-items:center;gap:0;border-bottom:2px solid #B0BEC5;flex-shrink:0}
.step{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:bold;color:#9E9E9E}
.step.done{color:#2E7D32}
.step.cur{color:#1565C0}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;background:#E0E0E0;color:#9E9E9E;flex-shrink:0}
.step.done .step-num{background:#C8E6C9;color:#2E7D32}
.step.cur .step-num{background:#1565C0;color:#fff}
.step-arr{margin:0 12px;color:#BDBDBD;font-size:14px}
.body{flex:1;overflow-y:auto;padding:16px 20px}
.footer{background:#fff;border-top:2px solid #E0E0E0;padding:9px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.status-msg{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:bold;display:none}
.status-msg.success{display:block;background:#C8E6C9;color:#2E7D32}
.status-msg.error{display:block;background:#FFCDD2;color:#C62828}
.status-msg.info{display:block;background:#E3F2FD;color:#1565C0}
.btn{padding:8px 20px;border:none;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer;font-family:Arial}
.btn-primary{background:#546E7A;color:#fff}
.btn-primary:hover{background:#455A64}
.btn-primary:disabled{background:#B0BEC5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid #D0D0D0;color:#616161}
.btn-ghost:hover{border-color:#546E7A;color:#546E7A}
.btn-archive{background:#37474F;color:#fff}
.btn-archive:hover{background:#263238}
.btn-archive:disabled{background:#B0BEC5;cursor:not-allowed}
.btn-cancel{background:transparent;border:1.5px solid #B0BEC5;color:#546E7A}

/* Step 1 — tracker grid */
.tracker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.tracker-card{border:2px solid #E0E0E0;border-radius:5px;padding:12px 14px;cursor:pointer;transition:all .15s;background:#fff}
.tracker-card:hover{border-color:#546E7A;background:#ECEFF1}
.tracker-card.sel{border-color:#1565C0;background:#E3F2FD}
.tc-name{font-size:12px;font-weight:bold;color:#263238;margin-bottom:4px}
.tc-count{font-size:10px;color:#5C6BC0;margin-bottom:4px}
.tc-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px}
.step1-note{font-size:10px;color:#78909C;background:#F5F5F5;border:1px solid #E0E0E0;border-radius:4px;padding:8px 12px;margin-top:8px}

/* Step 2 — ticket table */
.list-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lt-title{font-size:12px;font-weight:bold;color:#263238;flex:1}
.lt-link{font-size:10px;color:#1565C0;cursor:pointer;text-decoration:underline}
.lt-filter{padding:5px 8px;border:1px solid #D0D0D0;border-radius:4px;font-size:10px;font-family:Arial;color:#2A2A2A;background:#fff}
.ticket-table{width:100%;border-collapse:collapse;font-size:11px}
.ticket-table th{background:#3C3C3C;color:#FFD700;padding:6px 8px;text-align:left;font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px}
.ticket-table td{padding:6px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.ticket-table tr:nth-child(even) td{background:#FAFAFA}
.ticket-table tr.checked-row td{background:#E8F5E9}
.ticket-table tr.checked-row:nth-child(even) td{background:#C8E6C9}
.chk{width:14px;height:14px;cursor:pointer;accent-color:#1565C0}
.tn{font-family:monospace;font-size:10px;font-weight:bold;color:#1565C0}
.bdg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:bold}
.bc{background:#FFCDD2;color:#B71C1C}
.bh{background:#FFE0B2;color:#E64A19}
.bm{background:#FFF9C4;color:#F57F17}
.bl{background:#BBDEFB;color:#1565C0}
.sel-bar{background:#E3F2FD;border:1px solid #BBDEFB;border-radius:4px;padding:8px 12px;display:flex;align-items:center;gap:12px;margin-top:10px}
.sel-bar-count{font-size:12px;font-weight:bold;color:#1565C0}
.sel-bar-detail{font-size:10px;color:#5C6BC0;flex:1}

/* Step 3 — confirm */
.confirm-box{background:#ECEFF1;border:2px solid #546E7A;border-radius:6px;padding:18px 20px}
.conf-title{font-size:14px;font-weight:bold;color:#263238;margin-bottom:4px}
.conf-sub{font-size:10px;color:#546E7A;margin-bottom:14px}
.conf-summary{background:#fff;border:1px solid #CFD8DC;border-radius:4px;padding:12px 14px;margin-bottom:12px}
.conf-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F5F5F5;font-size:11px}
.conf-row:last-child{border-bottom:none;font-weight:bold;font-size:12px;padding-top:8px}
.conf-note{background:#FFF3E0;border-left:3px solid #EF6C00;padding:9px 12px;font-size:10px;color:#BF360C;margin-bottom:14px}
.loading{text-align:center;padding:30px;color:#9E9E9E;font-style:italic;font-size:12px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-accent"></div>
  <div class="hdr-body">
    <div>
      <div class="hdr-title">Archive Closed Tickets from Trackers</div>
      <div class="hdr-sub" id="hdrSub">Container Supply Co. &#8212; Garden Grove, CA</div>
    </div>
  </div>
</div>

<div class="step-bar" id="stepBar">
  <div class="step cur" id="step1"><div class="step-num">1</div>Select Tracker</div>
  <div class="step-arr">&#8250;</div>
  <div class="step" id="step2"><div class="step-num">2</div>Select Tickets</div>
  <div class="step-arr">&#8250;</div>
  <div class="step" id="step3"><div class="step-num">3</div>Confirm &amp; Archive</div>
</div>

<div class="body" id="bodyArea">
  <div class="loading">Loading tracker data&#8230;</div>
</div>

<div class="footer">
  <div class="status-msg" id="statusMsg"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost" id="btnCancel" onclick="google.script.host.close()">Cancel</button>
    <button class="btn btn-ghost" id="btnBack" onclick="goBack()" style="display:none">&#8592; Back</button>
    <button class="btn btn-primary" id="btnNext" onclick="goNext()" disabled>Continue &#8594;</button>
    <button class="btn btn-archive" id="btnArchive" onclick="executeArchive()" style="display:none" disabled>Archive Selected Tickets</button>
  </div>
</div>

<script>
var FD={}, currentStep=1, selTracker=null, selTickets=[], allTickets=[], filterMonth='', filterPriority='';

window.onload=function(){
  google.script.run
    .withSuccessHandler(function(d){
      FD=d;
      document.getElementById('hdrSub').textContent=(d.companyName||'Container Supply Co.')+' \u2014 '+(d.location||'Garden Grove, CA');
      renderStep1();
    })
    .withFailureHandler(function(e){showMsg('Error loading data: '+e.message,'error');})
    .getArchiveFormData();
};

/* ══ STEP 1 — SELECT TRACKER ══ */
function renderStep1(){
  setStep(1);
  document.getElementById('btnNext').disabled=true;
  document.getElementById('btnBack').style.display='none';
  document.getElementById('btnArchive').style.display='none';
  document.getElementById('btnNext').style.display='';
  var trackers=FD.trackers||[];
  var deptColors={'ELECTRICAL':'#1565C0','MACHINE SHOP':'#4A4A4A','FACILITIES':'#263238','PLASTICS':'#0D47A1','METALS':'#37474F','LITHO':'#1B2838'};
  var html='<div class="tracker-grid">';
  trackers.forEach(function(t,i){
    var color=deptColors[t.dept]||'#546E7A';
    html+='<div class="tracker-card" id="tc-'+i+'" onclick="selectTracker('+i+',this)">'+
      '<div class="tc-name"><span class="tc-dot" style="background:'+color+'"></span>'+esc(t.dept)+'</div>'+
      '<div class="tc-count">'+t.closedCount+' closed ticket'+(t.closedCount!==1?'s':'')+' available to archive</div>'+
    '</div>';
  });
  if(!trackers.length) html+='<div style="grid-column:span 3;color:#9E9E9E;text-align:center;padding:20px;font-style:italic">No tracker sheets found.</div>';
  html+='</div>';
  html+='<div class="step1-note">&#9432; Only closed tickets are shown. Tickets in the EMRL (FRM-030-002) are never modified or removed &mdash; the archive only removes rows from the tracker sheet.</div>';
  document.getElementById('bodyArea').innerHTML=html;
}

function selectTracker(idx,card){
  selTracker=idx;
  document.querySelectorAll('.tracker-card').forEach(function(c){c.classList.remove('sel');});
  card.classList.add('sel');
  document.getElementById('btnNext').disabled=false;
}

/* ══ STEP 2 — SELECT TICKETS ══ */
function renderStep2(){
  setStep(2);
  document.getElementById('btnBack').style.display='';
  document.getElementById('btnNext').disabled=true;
  document.getElementById('btnNext').style.display='';
  document.getElementById('btnArchive').style.display='none';
  document.getElementById('bodyArea').innerHTML='<div class="loading">Loading closed tickets&#8230;</div>';
  var t=FD.trackers[selTracker];
  google.script.run
    .withSuccessHandler(function(tickets){
      allTickets=tickets||[];
      selTickets=[];
      renderTicketTable();
    })
    .withFailureHandler(function(e){showMsg('Error: '+e.message,'error');})
    .getClosedTicketsForArchive(t.sheetName);
}

function renderTicketTable(){
  var t=FD.trackers[selTracker];
  var filtered=allTickets.filter(function(tk){
    if(filterMonth&&tk.monthKey!==filterMonth)return false;
    if(filterPriority&&(tk.priority||'').toUpperCase()!==filterPriority)return false;
    return true;
  });
  /* Build month options */
  var months={};
  allTickets.forEach(function(tk){if(tk.monthKey)months[tk.monthKey]=tk.monthLabel||tk.monthKey;});
  var monthOpts='<option value="">All dates</option>'+Object.keys(months).sort().reverse().map(function(k){return'<option value="'+esc(k)+'"'+(filterMonth===k?' selected':'')+'>'+esc(months[k])+'</option>';}).join('');
  var prioOpts='<option value="">All priorities</option>'+['CRITICAL','HIGH','MEDIUM','LOW'].map(function(p){return'<option value="'+p+'"'+(filterPriority===p?' selected':'')+'>'+p+'</option>';}).join('');
  var selCount=selTickets.length;
  var html=
    '<div class="list-toolbar">'+
      '<div class="lt-title">'+esc(t.dept)+' Tracker &mdash; '+filtered.length+' of '+allTickets.length+' closed tickets shown</div>'+
      '<span class="lt-link" onclick="selectAll(true)">Select all</span>'+
      '<span class="lt-link" onclick="selectAll(false)">Deselect all</span>'+
      '<select class="lt-filter" onchange="filterMonth=this.value;renderTicketTable()">'+monthOpts+'</select>'+
      '<select class="lt-filter" onchange="filterPriority=this.value;renderTicketTable()">'+prioOpts+'</select>'+
    '</div>'+
    '<table class="ticket-table">'+
      '<thead><tr>'+
        '<th style="width:28px"><input type="checkbox" class="chk" id="chkAll" onclick="selectAll(this.checked)"></th>'+
        '<th style="width:16%">Ticket #</th>'+
        '<th style="width:9%">Priority</th>'+
        '<th style="width:14%">Dept</th>'+
        '<th>Equipment</th>'+
        '<th>Description</th>'+
        '<th style="width:11%">Date Opened</th>'+
        '<th style="width:11%">Verified By</th>'+
      '</tr></thead><tbody>';
  if(!filtered.length){
    html+='<tr><td colspan="8" style="text-align:center;color:#9E9E9E;padding:16px;font-style:italic">No closed tickets match the current filters.</td></tr>';
  }
  filtered.forEach(function(tk){
    var isChecked=selTickets.indexOf(tk.ticketNo)>=0;
    var p=(tk.priority||'').toUpperCase();
    var pbdg=p==='CRITICAL'?'bc':p==='HIGH'?'bh':p==='MEDIUM'?'bm':p==='LOW'?'bl':'';
    html+='<tr class="'+(isChecked?'checked-row':'')+'" id="row-'+esc(tk.ticketNo)+'">'+
      '<td><input type="checkbox" class="chk" '+(isChecked?'checked':'')+' onchange="toggleTicket(\''+esc(tk.ticketNo)+'\',this.checked,this)"></td>'+
      '<td class="tn">'+esc(tk.ticketNo)+'</td>'+
      '<td>'+(pbdg?'<span class="bdg '+pbdg+'">'+esc(p)+'</span>':'\u2014')+'</td>'+
      '<td>'+esc(tk.dept||'\u2014')+'</td>'+
      '<td>'+esc(tk.specificEquip||tk.equipType||'\u2014')+'</td>'+
      '<td style="color:#5C6BC0;font-size:10px">'+esc((tk.description||'').substring(0,55))+'</td>'+
      '<td>'+esc(tk.dateOpened||'\u2014')+'</td>'+
      '<td>'+esc(tk.verifiedBy||'\u2014')+'</td>'+
    '</tr>';
  });
  html+='</tbody></table>';
  /* Selection summary */
  if(selCount>0){
    html+='<div class="sel-bar">'+
      '<div class="sel-bar-count">'+selCount+' ticket'+(selCount!==1?'s':'')+' selected</div>'+
      '<div class="sel-bar-detail">'+selTickets.slice(0,5).map(esc).join(' &middot; ')+(selCount>5?' &middot; and '+(selCount-5)+' more':'')+' &middot; EMRL records are not affected</div>'+
    '</div>';
  }
  document.getElementById('bodyArea').innerHTML=html;
  document.getElementById('btnNext').disabled=selCount===0;
}

function toggleTicket(ticketNo,checked,chk){
  var idx=selTickets.indexOf(ticketNo);
  if(checked&&idx<0)selTickets.push(ticketNo);
  else if(!checked&&idx>=0)selTickets.splice(idx,1);
  var row=document.getElementById('row-'+ticketNo);
  if(row)row.className=checked?'checked-row':'';
  document.getElementById('btnNext').disabled=selTickets.length===0;
  /* Update summary without full re-render */
  renderTicketTable();
}

function selectAll(checked){
  var filtered=allTickets.filter(function(tk){
    if(filterMonth&&tk.monthKey!==filterMonth)return false;
    if(filterPriority&&(tk.priority||'').toUpperCase()!==filterPriority)return false;
    return true;
  });
  selTickets=checked?filtered.map(function(tk){return tk.ticketNo;}):[];
  renderTicketTable();
}

/* ══ STEP 3 — CONFIRM ══ */
function renderStep3(){
  setStep(3);
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnArchive').style.display='';
  document.getElementById('btnArchive').disabled=false;
  var t=FD.trackers[selTracker];
  var selected=allTickets.filter(function(tk){return selTickets.indexOf(tk.ticketNo)>=0;});
  /* Build summary */
  var dates=selected.map(function(tk){return tk.dateOpened||'';}).filter(Boolean).sort();
  var dateRange=dates.length?(dates[0]===dates[dates.length-1]?dates[0]:dates[0]+' \u2013 '+dates[dates.length-1]):'Unknown';
  var prioCounts={};
  selected.forEach(function(tk){var p=(tk.priority||'UNKNOWN').toUpperCase();prioCounts[p]=(prioCounts[p]||0)+1;});
  var prioStr=Object.keys(prioCounts).sort().map(function(p){return prioCounts[p]+' \xd7 '+p;}).join(', ');
  var verCounts={};
  selected.forEach(function(tk){var v=tk.verifiedBy||'Unknown';verCounts[v]=(verCounts[v]||0)+1;});
  var verStr=Object.keys(verCounts).map(function(v){return esc(v)+' ('+verCounts[v]+')';}).join(', ');
  var html=
    '<div class="confirm-box">'+
      '<div class="conf-title">Archive '+selected.length+' Closed Ticket'+(selected.length!==1?'s':'')+'?</div>'+
      '<div class="conf-sub">These tickets will be moved from the <strong>'+esc(t.dept)+'</strong> tracker to the Archive tab. This action can be reviewed in the Archive but cannot be automatically undone.</div>'+
      '<div class="conf-summary">'+
        '<div class="conf-row"><span>Tracker</span><span style="font-weight:bold">'+esc(t.dept)+'</span></div>'+
        '<div class="conf-row"><span>Tickets to archive</span><span>'+selected.length+'</span></div>'+
        '<div class="conf-row"><span>Date range</span><span>'+esc(dateRange)+'</span></div>'+
        '<div class="conf-row"><span>Priorities</span><span>'+esc(prioStr||'\u2014')+'</span></div>'+
        '<div class="conf-row"><span>Verified by</span><span>'+verStr+'</span></div>'+
        '<div class="conf-row"><span>Total tickets</span><span>'+selected.length+'</span></div>'+
      '</div>'+
      '<div class="conf-note">These tickets will be removed from the <strong>'+esc(t.dept)+'</strong> tracker sheet and written to the Archive tab with a timestamp. The Master Log and EMRL (FRM-030-002) are not modified.</div>'+
    '</div>';
  document.getElementById('bodyArea').innerHTML=html;
}

/* ══ EXECUTE ARCHIVE ══ */
function executeArchive(){
  if(!selTickets.length){showMsg('No tickets selected.','error');return;}
  var t=FD.trackers[selTracker];
  document.getElementById('btnArchive').disabled=true;
  document.getElementById('btnBack').disabled=true;
  showMsg('Archiving '+selTickets.length+' ticket(s)&#8230;','info');
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.success===false){
        document.getElementById('btnArchive').disabled=false;
        document.getElementById('btnBack').disabled=false;
        showMsg('Error: '+(r.error||'Archive failed.'),'error');
      }else{
        showMsg('\u2705 '+r.archived+' ticket(s) archived from '+t.dept+' tracker.','success');
        document.getElementById('btnArchive').style.display='none';
        document.getElementById('btnBack').style.display='none';
        document.getElementById('btnCancel').textContent='Close';
      }
    })
    .withFailureHandler(function(e){
      document.getElementById('btnArchive').disabled=false;
      document.getElementById('btnBack').disabled=false;
      showMsg('Error: '+e.message,'error');
    })
    .executeArchive({sheetName:t.sheetName,dept:t.dept,ticketNos:selTickets});
}

/* ══ NAVIGATION ══ */
function goNext(){
  if(currentStep===1&&selTracker!==null) renderStep2();
  else if(currentStep===2&&selTickets.length>0) renderStep3();
}
function goBack(){
  if(currentStep===2){renderStep1();selTickets=[];}
  else if(currentStep===3){renderStep2();}
}

function setStep(n){
  currentStep=n;
  [1,2,3].forEach(function(i){
    var el=document.getElementById('step'+i);
    el.className='step'+(i<n?' done':i===n?' cur':'');
    if(i<n) el.querySelector('.step-num').textContent='\u2713';
    else el.querySelector('.step-num').textContent=String(i);
  });
}

function showMsg(m,t){
  var el=document.getElementById('statusMsg');
  el.innerHTML=m; el.className='status-msg '+t;
  if(t==='success')setTimeout(function(){el.className='status-msg';},5000);
}
function esc(v){return(v||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
