<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,sans-serif;font-size:12px;color:#1a1a1a;background:#F0F2F5}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:300px;flex-shrink:0;background:#1C4D8E;display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;background:#F0F2F5;padding:20px}

/* ── SIDEBAR ── */
.sb-header{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-title{font-size:13px;font-weight:bold;color:#fff;letter-spacing:.3px}
.sb-sub{font-size:10px;color:#B5D4F4;margin-top:2px}
.sb-search{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-search input,.sb-search select{width:100%;padding:7px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;font-size:11px;background:rgba(255,255,255,.1);color:#fff;font-family:Arial;margin-bottom:6px}
.sb-search input::placeholder{color:rgba(255,255,255,.5)}
.sb-search select option{background:#1C4D8E;color:#fff}
.sb-date-row{display:flex;gap:6px}
.sb-date-row input{flex:1;margin-bottom:0}
.sb-btn{width:100%;padding:8px;background:#fff;color:#1C4D8E;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;margin-top:6px;font-family:Arial}
.sb-btn:hover{background:#E8F0FE}
.sb-results{flex:1;overflow-y:auto;padding:8px}
.sb-empty{padding:20px 12px;text-align:center;color:rgba(255,255,255,.4);font-size:11px;font-style:italic}
.sb-count{font-size:10px;color:#B5D4F4;padding:6px 4px 4px;letter-spacing:.04em}

/* ── RESULT CARDS ── */
.result-card{background:rgba(255,255,255,.08);border-radius:5px;padding:9px 10px;margin-bottom:6px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.result-card:hover{background:rgba(255,255,255,.15)}
.result-card.active{background:rgba(255,255,255,.18);border-left-color:#FFD700}
.rc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rc-ticket{font-family:monospace;font-size:11px;font-weight:bold;color:#FFD700}
.rc-prio{font-size:9px;font-weight:bold;padding:1px 6px;border-radius:3px}
.p-critical{background:#FFCDD2;color:#B71C1C}
.p-high{background:#FFE0B2;color:#E64A19}
.p-medium{background:#FFF9C4;color:#F57F17}
.p-low{background:#BBDEFB;color:#1565C0}
.rc-equip{font-size:10px;color:#B5D4F4;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-bottom{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,.45)}

/* ── NO SELECTION STATE ── */
.no-sel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:#9E9E9E;text-align:center;gap:10px}
.no-sel-icon{font-size:40px;opacity:.3}
.no-sel-text{font-size:13px;font-style:italic}

/* ── REPORT WRAPPER ── */
.report-outer{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.1);overflow:hidden;max-width:900px;margin:0 auto}

/* ── REPORT HEADER — matches FRM template ── */
.doc-header{display:grid;grid-template-columns:200px 1fr 190px;border-bottom:2px solid #1C4D8E}
.logo-cell{padding:10px 14px;border-right:1px solid #ccc;display:flex;flex-direction:column;justify-content:center}
.logo-cell img{height:40px;width:auto}
.logo-cell .city{font-size:9px;color:#555;margin-top:3px}
.title-cell{display:flex;align-items:center;justify-content:center;padding:12px 20px;border-right:1px solid #ccc}
.title-cell h1{font-size:15px;font-weight:bold;text-align:center;line-height:1.4;color:#1a1a1a}
.meta-block{display:flex;flex-direction:column;justify-content:center}
.meta-block .mrow{display:flex;align-items:center;padding:4px 10px;border-bottom:0.5px solid #ddd;font-size:10px}
.meta-block .mrow:last-child{border-bottom:none}
.meta-block .mrow .lbl{color:#666;width:85px;font-size:9px}
.meta-block .mrow .val{font-weight:bold;color:#1a1a1a}

/* ── SPACER ── */
.hspacer{height:10px;background:#f4f6fa}

/* ── SECTION HEADING ── */
.sec-head{padding:5px 14px;background:#1C4D8E;color:#fff;font-size:9.5px;font-weight:bold;letter-spacing:.07em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.sec-head span{font-size:8.5px;font-weight:normal;text-transform:none;letter-spacing:0;opacity:.85}

/* ── FIELDS ── */
.fields{padding:10px 14px 8px}
.row{display:flex;gap:0;border-bottom:0.5px solid #e8e8e8;margin-bottom:0}
.row:last-child{border-bottom:none}
.field{flex:1;padding:7px 10px 7px 0;margin-right:24px}
.field:last-child{margin-right:0}
.field .flabel{font-size:8.5px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.field .fval{font-size:11.5px;color:#1a1a1a;line-height:1.5}
.field .fval.long{font-size:11px;line-height:1.6}

/* ── CHECKLIST ── */
.checks{padding:8px 14px 10px}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f0f0;font-size:11px;color:#1a1a1a}
.check-item:last-child{border-bottom:none}
.check-icon{color:#1C4D8E;font-size:14px;font-weight:bold;flex-shrink:0;margin-top:0px}
.check-icon.empty{color:#ccc}

/* ── SIGNATURE ROW ── */
.sig-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-top:0.5px solid #ccc;padding:10px 14px}
.sig-field .flabel{font-size:8.5px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sig-field .fval{font-size:11.5px;color:#1a1a1a}
.sig-line{display:inline-block;width:110px;border-bottom:0.5px solid #999;height:18px;vertical-align:bottom;margin-left:6px}

/* ── FOOTER ── */
.confidential{font-size:8px;color:#888;text-align:center;padding:5px 14px;border-top:0.5px solid #ddd;background:#fafafa}
.doc-footer{background:#f0f3f8;padding:5px 14px;display:flex;justify-content:space-between;font-size:9px;color:#555;border-top:1px solid #ccc}

/* ── ACTION BAR ── */
.action-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;max-width:900px;margin-left:auto;margin-right:auto}
.action-btn{padding:7px 16px;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;font-family:Arial}
.btn-print{background:#1C4D8E;color:#fff}
.btn-print:hover{background:#174070}

/* ── STATUS BAR ── */
.status-bar{padding:8px 14px;font-size:11px;text-align:center;display:none;border-radius:4px;margin-bottom:12px;max-width:900px;margin-left:auto;margin-right:auto}
.status-bar.error{display:block;background:#FFCDD2;color:#B71C1C}
.status-bar.info{display:block;background:#E3F2FD;color:#1565C0}
.status-bar.loading{display:block;background:#F3F4F6;color:#555}

/* ── PRINT ── */
@media print {
  .sidebar,.action-bar,.status-bar{display:none!important}
  .main{padding:0;background:#fff}
  .report-outer{box-shadow:none;border-radius:0;max-width:100%}
  .app{display:block}
  body{background:#fff}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-title">Maintenance Repair Records</div>
      <div class="sb-sub">FRM-030-002 &middot; Search &amp; Retrieve</div>
    </div>
    <div class="sb-search">
      <input type="text" id="searchTicket" placeholder="Ticket # (e.g. MT-004-260528-007)">
      <input type="text" id="searchEquip" placeholder="Equipment code...">
      <select id="searchDept">
        <option value="">All Departments</option>
      </select>
      <div class="sb-date-row">
        <input type="date" id="dateFrom" title="Date from">
        <input type="date" id="dateTo" title="Date to">
      </div>
      <button class="sb-btn" onclick="doSearch()">Search Records</button>
    </div>
    <div id="sbResults" class="sb-results">
      <div class="sb-empty">Enter search criteria above and click Search Records</div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main" id="mainArea">
    <div class="no-sel">
      <div class="no-sel-icon">&#128203;</div>
      <div class="no-sel-text">Search for a record on the left<br>and select it to view the report</div>
    </div>
  </div>

</div>

var allRecords = [], depts = [];

window.onload = function() {
  google.script.run
    .withSuccessHandler(initForm)
    .withFailureHandler(function(e){ showStatus('Error loading form data: ' + e.message, 'error'); })
    .getEMRLFormData();
};

function initForm(data) {
  depts = data.depts || [];
  var sel = document.getElementById('searchDept');
  depts.forEach(function(d) {
    var o = document.createElement('option');
    o.value = d; o.textContent = d;
    sel.appendChild(o);
  });
}

function doSearch() {
  var ticket = document.getElementById('searchTicket').value.trim();
  var equip  = document.getElementById('searchEquip').value.trim().toUpperCase();
  var dept   = document.getElementById('searchDept').value;
  var from   = document.getElementById('dateFrom').value;
  var to     = document.getElementById('dateTo').value;

  showStatus('Searching...', 'loading');

  google.script.run
    .withSuccessHandler(function(records) {
      allRecords = records || [];
      renderResults(allRecords);
      hideStatus();
    })
    .withFailureHandler(function(e) { showStatus('Search error: ' + e.message, 'error'); })
    .searchEMRL({ ticket: ticket, equip: equip, dept: dept, from: from, to: to });
}

function renderResults(records) {
  var el = document.getElementById('sbResults');
  if (!records.length) {
    el.innerHTML = '<div class="sb-empty">No records found matching your search.</div>';
    return;
  }
  var html = '<div class="sb-count">' + records.length + ' record' + (records.length !== 1 ? 's' : '') + ' found</div>';
  records.forEach(function(r, i) {
    var p = (r.priority || '').toLowerCase();
    html += '<div class="result-card" id="rc-' + i + '" onclick="selectRecord(' + i + ')">' +
      '<div class="rc-top">' +
        '<span class="rc-ticket">' + esc(r.ticketNo) + '</span>' +
        (r.priority ? '<span class="rc-prio p-' + p + '">' + esc(r.priority) + '</span>' : '') +
      '</div>' +
      '<div class="rc-equip">' + esc(r.specificEquip || r.equipCode || '—') + '</div>' +
      '<div class="rc-bottom">' +
        '<span>' + esc(r.dept || '—') + '</span>' +
        '<span>' + esc(r.repairDate || r.dateOpened || '—') + '</span>' +
      '</div>' +
    '</div>';
  });
  el.innerHTML = html;
}

function selectRecord(i) {
  document.querySelectorAll('.result-card').forEach(function(c) { c.classList.remove('active'); });
  var card = document.getElementById('rc-' + i);
  if (card) card.classList.add('active');
  renderReport(allRecords[i]);
}

function renderReport(r) {
  var main = document.getElementById('mainArea');

  // Clearance checklist items
  var chkItems = [
    'Equipment and surrounding area cleaned — no fluid, debris, or contamination present',
    'Equipment tested at operating pressure / speed prior to return to service',
    'Declared safe to operate — no hazards identified',
    'All parts and tools accounted for — none left in or on equipment'
  ];
  var chkText = r.clearanceChk || '';
  var chkHtml = chkItems.map(function(item) {
    var checked = chkText.indexOf(item) >= 0 || chkText.indexOf('Work completed') >= 0;
    return '<div class="check-item">' +
      '<span class="check-icon' + (checked ? '' : ' empty') + '">' + (checked ? '✓' : '○') + '</span>' +
      '<span>' + esc(item) + '</span>' +
    '</div>';
  }).join('');

  // Priority badge color
  var p = (r.priority || '').toLowerCase();
  var prioHtml = r.priority
    ? '<span style="background:' + prioColors(p).bg + ';color:' + prioColors(p).fg + ';padding:2px 8px;border-radius:3px;font-size:10px;font-weight:bold;">' + esc(r.priority) + '</span>'
    : '—';

  main.innerHTML =
    '<div class="action-bar">' +
      '<button class="action-btn btn-print" onclick="window.print()">&#128424; Print / Save PDF</button>' +
    '</div>' +
    '<div id="reportDoc" class="report-outer">' +

      // HEADER
      '<div class="doc-header">' +
        '<div class="logo-cell">' +
          '<img src="data:image/png;base64,' + LOGO_B64 + '" alt="Container Supply Co.">' +
          '<span class="city">Garden Grove, CA</span>' +
        '</div>' +
        '<div class="title-cell"><h1>Maintenance Repair Record</h1></div>' +
        '<div class="meta-block">' +
          '<div class="mrow"><span class="lbl">Doc No:</span><span class="val">FRM-030-003</span></div>' +
          '<div class="mrow"><span class="lbl">Revision No:</span><span class="val">1</span></div>' +
          '<div class="mrow"><span class="lbl">Revision Date:</span><span class="val">05/29/2026</span></div>' +
        '</div>' +
      '</div>' +

      '<div class="hspacer"></div>' +

      // IDENTITY
      '<div class="sec-head">Equipment &amp; Ticket Information</div>' +
      '<div class="fields">' +
        '<div class="row">' +
          field('Work Order #', '<span style="font-family:monospace;font-weight:bold">' + esc(r.ticketNo) + '</span>') +
          field('Date Opened', r.dateOpened || '—') +
          field('Department', r.dept || '—') +
          field('Priority', prioHtml) +
          field('Ticket Type', r.downtimeType || '—') +
        '</div>' +
        '<div class="row">' +
          field('Equipment Code', '<span style="font-family:monospace">' + esc(r.equipCode || '—') + '</span>') +
          fieldWide('Equipment Description', r.specificEquip || '—', 3) +
          field('Building / Zone', r.buildingZone || '—') +
        '</div>' +
      '</div>' +

      '<div class="hspacer"></div>' +

      // FAILURE & REPAIR
      '<div class="sec-head">Failure &amp; Repair Record</div>' +
      '<div class="fields">' +
        '<div class="row">' +
          field('Downtime Type', r.downtimeType || '—') +
          field('Repair Date', r.repairDate || '—') +
          field('Hours to Complete', r.actualHours || '—') +
          field('Fix Type', r.fixType || '—') +
          field('Assigned Technician', r.assignedTo || '—') +
        '</div>' +
        '<div class="row">' +
          '<div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0">' +
            '<div class="flabel">Failure Description</div>' +
            '<div class="fval long">' + esc(r.description || '—') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="row">' +
          '<div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0">' +
            '<div class="flabel">Repair Description / Work Performed</div>' +
            '<div class="fval long">' + esc(r.workSummary || r.correctiveAction || '—') + '</div>' +
          '</div>' +
        '</div>' +
        (r.partsUsed ? '<div class="row"><div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0"><div class="flabel">Parts Used</div><div class="fval long">' + esc(r.partsUsed) + '</div></div></div>' : '') +
      '</div>' +

      '<div class="hspacer"></div>' +

      // CAPA
      (r.capaRequired === 'Y' ?
        '<div class="sec-head">Corrective &amp; Preventive Action <span>(High / Critical priority tickets)</span></div>' +
        '<div class="fields">' +
          '<div class="row">' +
            '<div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0">' +
              '<div class="flabel">Root Cause</div>' +
              '<div class="fval long">' + esc(r.rootCause || '—') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="row">' +
            '<div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0">' +
              '<div class="flabel">Corrective Action</div>' +
              '<div class="fval long">' + esc(r.correctiveAction || '—') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="row">' +
            '<div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0">' +
              '<div class="flabel">Preventive Action</div>' +
              '<div class="fval long">' + esc(r.preventiveAction || '—') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="row">' +
            field('Corrective Action Date', r.caDate || r.repairDate || '—') +
            field('CAPA Required', r.capaRequired || '—') +
            '<div class="field" style="flex:2"></div>' +
          '</div>' +
        '</div>' +
        '<div class="hspacer"></div>'
      : '') +

      // POST-REPAIR CLEARANCE
      '<div class="sec-head">Post-Repair Clearance</div>' +
      '<div class="checks">' + chkHtml + '</div>' +
      '<div class="fields" style="padding-top:4px">' +
        '<div class="row">' +
          '<div class="field" style="flex:1;padding:7px 0 7px 0;margin-right:0">' +
            '<div class="flabel">Clearance Notes</div>' +
            '<div class="fval long">' + esc(r.notes || '—') + '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="sig-row">' +
        '<div class="sig-field">' +
          '<div class="flabel">Verified By</div>' +
          '<div class="fval">' + esc(r.verifiedBy || '—') + ' <span class="sig-line"></span></div>' +
        '</div>' +
        '<div class="sig-field">' +
          '<div class="flabel">Title / Role</div>' +
          '<div class="fval">QA Manager</div>' +
        '</div>' +
        '<div class="sig-field">' +
          '<div class="flabel">Verification Date</div>' +
          '<div class="fval">' + esc(r.verifiedDate || '—') + '</div>' +
        '</div>' +
      '</div>' +

      '<div class="confidential">This document is confidential and may not be copied or disclosed to others without authorization. &nbsp;|&nbsp; Printed copies are considered uncontrolled. &nbsp;|&nbsp; Page 1 of 1</div>' +
      '<div class="doc-footer">' +
        '<span>FRM-030-003 &nbsp;&middot;&nbsp; Rev. 1 &nbsp;&middot;&nbsp; Maintenance Repair Record</span>' +
        '<span>Container Supply Co. &mdash; Garden Grove, CA</span>' +
        '<span>Generated: ' + esc(today()) + '</span>' +
      '</div>' +

    '</div>';
}

function field(label, val) {
  return '<div class="field"><div class="flabel">' + label + '</div><div class="fval">' + (val || '—') + '</div></div>';
}
function fieldWide(label, val, flex) {
  return '<div class="field" style="flex:' + (flex||2) + '"><div class="flabel">' + label + '</div><div class="fval">' + esc(val || '—') + '</div></div>';
}
function prioColors(p) {
  if (p === 'critical') return {bg:'#FFCDD2', fg:'#B71C1C'};
  if (p === 'high')     return {bg:'#FFE0B2', fg:'#E64A19'};
  if (p === 'medium')   return {bg:'#FFF9C4', fg:'#F57F17'};
  return {bg:'#BBDEFB', fg:'#1565C0'};
}
function today() {
  var d = new Date();
  var m = d.getMonth()+1, dy = d.getDate(), y = d.getFullYear();
  return (m<10?'0':'')+m+'/'+(dy<10?'0':'')+dy+'/'+y;
}
function esc(v) {
  return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showStatus(msg, type) {
  var el = document.getElementById('statusBar');
  if (!el) return;
  el.textContent = msg; el.className = 'status-bar ' + type;
}
function hideStatus() {
  var el = document.getElementById('statusBar');
  if (el) el.className = 'status-bar';
}
</script>
