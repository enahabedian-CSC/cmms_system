<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Required</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brand-navy: #001F4F;
  --bg-app: #F7F8FA;
  --border-default: #E4E7EC;
  --text-primary: #0F172A;
  --text-secondary: #64748B;
  --text-tertiary: #94A3B8;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;font-family:var(--font-sans);background:var(--bg-app);color:var(--text-primary);}
.shell{min-height:100vh;display:flex;flex-direction:column;}
.topbar{height:52px;background:#fff;border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 24px;gap:12px;}
.logomark{width:28px;height:28px;border-radius:6px;background:var(--brand-navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px;}
.wordmark{font-weight:700;font-size:13px;color:var(--brand-navy);}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{background:#fff;border:1px solid var(--border-default);border-radius:16px;padding:40px;max-width:440px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(15,23,42,.06);}
.icon{width:56px;height:56px;border-radius:50%;background:#F1F3F6;display:grid;place-items:center;margin:0 auto 20px;color:var(--text-secondary);}
h1{font-size:20px;font-weight:700;margin:0 0 8px;}
.sub{font-size:13px;color:var(--text-secondary);margin:0 0 24px;line-height:1.6;}
.email-chip{display:inline-block;padding:4px 12px;background:#F1F3F6;border-radius:20px;font-size:12px;font-family:monospace;color:var(--text-primary);margin-bottom:24px;}
.contact{font-size:12px;color:var(--text-tertiary);margin-top:20px;}
.contact a{color:var(--brand-navy);font-weight:500;}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="logomark">CSC</div>
    <span class="wordmark"><?= companyName ?> — Maintenance Console</span>
  </header>
  <main class="main">
    <div class="card">
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h1>Access Required</h1>
      <p class="sub">
        Your account is not yet authorized for the CSC Maintenance Operations Console.
        Contact your system administrator to request access.
      </p>
      <? if (userEmail) { ?>
      <div class="email-chip"><?= userEmail ?></div>
      <? } ?>
      <p class="contact">
        Contact your manager or email
        <a href="mailto:mjmarrujo@cscmfg.com">mjmarrujo@cscmfg.com</a>
        to request access.
      </p>
    </div>
  </main>
</div>
</body>
</html>
