<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSC Maintenance Console</title>
<link rel="icon" type="image/png" href="assets/csc-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ── Design tokens (match mockup) ───────────────────────────────────────── */
:root {
  --brand-navy:        #001F4F;
  --brand-navy-soft:   #1A3A6B;
  --brand-navy-deep:   #001436;
  --bg-app:            #F7F8FA;
  --bg-surface:        #FFFFFF;
  --bg-subtle:         #F1F3F6;
  --bg-hover:          #F4F6F9;
  --border-default:    #E4E7EC;
  --border-strong:     #CBD2DA;
  --text-primary:      #0F172A;
  --text-secondary:    #64748B;
  --text-tertiary:     #94A3B8;
  --text-onnavy:       #FFFFFF;
  --text-onnavy-dim:   #B6C2D8;
  --status-critical:   #DC2626;  --status-critical-bg: #FEF2F2;
  --status-high:       #EA580C;  --status-high-bg:     #FFF7ED;
  --status-medium:     #CA8A04;  --status-medium-bg:   #FEFCE8;
  --status-low:        #64748B;  --status-low-bg:      #F1F5F9;
  --status-success:    #059669;  --status-success-bg:  #ECFDF5;
  --status-info:       #0284C7;  --status-info-bg:     #F0F9FF;
  --status-warn:       #D97706;  --status-warn-bg:     #FFFBEB;
  --shadow-sm:  0 1px 2px rgba(15,23,42,.04);
  --shadow-md:  0 2px 8px rgba(15,23,42,.06);
  --shadow-lg:  0 12px 32px rgba(15,23,42,.12);
  --font-sans:  "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono:  "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  --sidebar-w:  232px;
  --sidebar-w-collapsed: 60px;
  --topbar-h:   52px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:var(--font-sans);font-size:13px;color:var(--text-primary);background:var(--bg-app);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}

/* ── App shell ───────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden;}
.app.collapsed{grid-template-columns:var(--sidebar-w-collapsed) 1fr;}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar{background:var(--brand-navy);color:var(--text-onnavy);display:flex;flex-direction:column;border-right:1px solid var(--brand-navy-deep);overflow:hidden;}
.sidebar-header{padding:14px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);}
.sidebar-logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.sidebar-logomark{width:28px;height:28px;border-radius:6px;background:#fff;color:var(--brand-navy);display:grid;place-items:center;font-weight:800;font-size:12px;letter-spacing:-.02em;flex-shrink:0;}
.sidebar-wordmark{font-weight:700;font-size:12.5px;letter-spacing:.02em;line-height:1.15;white-space:nowrap;}
.sidebar-wordmark .sub{display:block;font-weight:400;font-size:10px;color:var(--text-onnavy-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.app-ver{display:block;font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.05em;margin-top:1px;font-weight:400;}
.app.collapsed .app-ver{display:none;}
.sidebar-collapse{background:transparent;border:0;color:var(--text-onnavy-dim);padding:4px;border-radius:4px;display:grid;place-items:center;}
.sidebar-collapse:hover{background:rgba(255,255,255,.08);color:#fff;}
.app.collapsed .sidebar-wordmark{display:none;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 8px 16px;}
.sidebar-nav::-webkit-scrollbar{width:4px;}
.sidebar-nav::-webkit-scrollbar-track{background:transparent;}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px;}
.nav-section{padding:8px 0 4px;}
.nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-onnavy-dim);padding:6px 10px 4px;font-weight:600;white-space:nowrap;overflow:hidden;}
.app.collapsed .nav-section-label{visibility:hidden;}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;color:var(--text-onnavy-dim);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;position:relative;user-select:none;}
.nav-item:hover{background:var(--brand-navy-soft);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.10);color:#fff;}
.nav-item.disabled{opacity:.45;cursor:default;pointer-events:none;}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.85;}
.nav-item.active .nav-icon,.nav-item:hover .nav-icon{opacity:1;}
.nav-label{flex:1;}
.app.collapsed .nav-label{display:none;}
.nav-badge{background:rgba(255,255,255,.12);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;font-variant-numeric:tabular-nums;}
.nav-badge.danger{background:var(--status-critical);}
.app.collapsed .nav-badge{display:none;}
.nav-subitems{margin:2px 0 4px 22px;padding-left:10px;border-left:1px solid rgba(255,255,255,.10);}
.app.collapsed .nav-subitems{display:none;}
.nav-subitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 8px;border-radius:4px;font-size:12px;color:var(--text-onnavy-dim);cursor:pointer;user-select:none;}
.nav-subitem:hover{color:#fff;background:rgba(255,255,255,.05);}
.nav-subitem.active{color:#fff;background:rgba(255,255,255,.08);}
.nav-subitem .nav-badge{background:rgba(255,255,255,.10);color:#fff;font-size:10px;padding:0 5px;border-radius:8px;}
.nav-subitem .nav-badge.danger{background:var(--status-critical);}
.nav-chevron{margin-left:auto;transition:transform .2s;opacity:.55;flex-shrink:0;}
.nav-section-hdr.open .nav-chevron{transform:rotate(180deg);opacity:.85;}
.sidebar-footer{border-top:1px solid rgba(255,255,255,.06);padding:10px;display:flex;align-items:center;gap:10px;}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4D7BC9,#2D4F8A);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0;}
.user-meta{flex:1;min-width:0;}
.user-meta .name{font-size:12px;font-weight:600;color:#fff;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-meta .role-label{font-size:10.5px;color:var(--text-onnavy-dim);margin-top:1px;line-height:1.2;}
.app.collapsed .user-meta,.app.collapsed .sidebar-footer .btn-icon{display:none;}
.btn-icon{background:transparent;border:0;color:var(--text-onnavy-dim);padding:4px;border-radius:4px;display:grid;place-items:center;}
.btn-icon:hover{background:rgba(255,255,255,.08);color:#fff;}

/* ── Main area ───────────────────────────────────────────────────────────── */
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:var(--topbar-h);background:var(--bg-surface);border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 18px;gap:16px;flex-shrink:0;}
.topbar-title{font-weight:600;font-size:14px;color:var(--text-primary);}
.topbar-spacer{flex:1;}
.topbar-live{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-secondary);padding:4px 10px;background:var(--bg-app);border-radius:4px;border:1px solid var(--border-default);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--status-success);position:relative;}
.live-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--status-success);opacity:.3;animation:pulse 2.4s ease-out infinite;}
@keyframes pulse{0%{transform:scale(.5);opacity:.5;}70%{transform:scale(1.4);opacity:0;}100%{transform:scale(1.4);opacity:0;}}

/* ── Content area ────────────────────────────────────────────────────────── */
.content{flex:1;overflow:auto;background:var(--bg-app);}
.page{display:none;padding:24px;}
.page.active{display:block;}

/* ── Loading / skeleton ──────────────────────────────────────────────────── */
.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:100%;color:var(--text-secondary);}
.spinner{width:24px;height:24px;border:2.5px solid var(--border-strong);border-top-color:var(--brand-navy);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Welcome / home ──────────────────────────────────────────────────────── */
.home-welcome{padding:24px 24px 0;}
.home-greeting{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.home-sub{font-size:13px;color:var(--text-secondary);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
/* legacy card style kept for backward compat with other partials */
.kpi-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;padding:16px;box-shadow:var(--shadow-sm);}
.kpi-card .kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:8px;}
.kpi-card .kpi-value{font-size:28px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;line-height:1;}
.kpi-card .kpi-sub{font-size:11px;color:var(--text-tertiary);margin-top:4px;}
.kpi-card.critical .kpi-value{color:var(--status-critical);}
.kpi-card.warn .kpi-value{color:var(--status-warn);}
.kpi-card.success .kpi-value{color:var(--status-success);}
/* Generic button for home page (also used by submit-ticket partial) */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:32px;border-radius:6px;font-size:12.5px;font-weight:600;border:1px solid var(--border-default);background:#fff;color:var(--text-secondary);cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn:hover{background:var(--bg-hover);color:var(--text-primary);}
.btn-primary{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.btn-primary:hover{background:var(--brand-navy-soft);}

/* ── Trend chart ─────────────────────────────────────────────────────────── */
.trend-section{padding:0 24px 24px;}
.trend-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;padding:16px 20px;box-shadow:var(--shadow-sm);}
.trend-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.trend-title{font-size:13px;font-weight:600;color:var(--text-primary);}
.trend-legend{display:flex;gap:14px;font-size:11px;color:var(--text-secondary);}
.trend-legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.trend-chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding-bottom:20px;position:relative;}
.trend-chart::after{content:'';position:absolute;left:0;right:0;bottom:20px;height:1px;background:var(--border-default);}
.trend-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;}
.trend-bars{display:flex;gap:2px;align-items:flex-end;width:100%;height:80px;}
.trend-bar-opened,.trend-bar-closed{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s;}
.trend-bar-opened{background:var(--brand-navy-soft);}
.trend-bar-closed{background:var(--status-success);}
.trend-month{font-size:9px;color:var(--text-tertiary);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;margin-top:4px;}

/* ── Design-system KPI card (accent-bar style from mockup) ──────────────── */
.kpi{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);}
.kpi .kpi-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand-navy);}
.kpi.kpi-critical .kpi-accent{background:var(--status-critical);}
.kpi.kpi-warn     .kpi-accent{background:var(--status-warn);}
.kpi.kpi-success  .kpi-accent{background:var(--status-success);}
.kpi.kpi-info     .kpi-accent{background:var(--status-info);}
.kpi .kpi-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);}
.kpi .kpi-value{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums;line-height:1;}
.kpi .kpi-foot{font-size:10.5px;color:var(--text-tertiary);margin-top:5px;font-family:var(--font-mono);}
.kpi-band{display:grid;gap:10px;margin-bottom:14px;}

/* ── Dept KPI strip (tracker pages) ─────────────────────────────────────── */
.dept-strip{display:grid;gap:1px;background:var(--border-default);border:1px solid var(--border-default);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.dept-strip .ds-cell{background:var(--bg-surface);padding:9px 12px;}
.dept-strip .ds-cell .ds-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);font-weight:600;white-space:nowrap;}
.dept-strip .ds-cell .ds-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px;line-height:1;}
.dept-strip .ds-cell.ds-crit .ds-v{color:var(--status-critical);}
.dept-strip .ds-cell.ds-high .ds-v{color:var(--status-high);}
.dept-strip .ds-cell.ds-warn .ds-v{color:var(--status-warn);}

/* ── Role badge ──────────────────────────────────────────────────────────── */
.role-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.role-badge.admin{background:#EDE9FE;color:#5B21B6;}
.role-badge.manager{background:var(--status-info-bg);color:var(--status-info);}
.role-badge.tech{background:var(--status-success-bg);color:var(--status-success);}

/* ── Toast notifications ─────────────────────────────────────────────────── */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 14px;border-radius:8px;background:#1E293B;color:#fff;font-size:12.5px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;min-width:240px;max-width:360px;animation:slideIn .2s ease;}
.toast.success{background:#064E3B;border-left:3px solid var(--status-success);}
.toast.error{background:#7F1D1D;border-left:3px solid var(--status-critical);}
.toast.warn{background:#78350F;border-left:3px solid var(--status-warn);}
@keyframes slideIn{from{transform:translateX(16px);opacity:0;}to{transform:translateX(0);opacity:1;}}
</style>
</head>

// ── Build sidebar nav HTML ────────────────────────────────────────────────────
var _openNavSection_ = null;

function buildNav() {
  var navDef = getNavDef();
  var html   = '';
  navDef.forEach(function(section) {
    var secId   = section.section.toLowerCase().replace(/\s+/g, '-');
    var secIcon = ICONS[section.icon] || ICONS.home;
    var isSingle = section.items.length === 1;

    html += '<div class="nav-section" id="navsec-' + secId + '">';

    if (isSingle) {
      // Single-item section: render as flat nav-item (no accordion header needed)
      var item = section.items[0];
      var cls  = 'nav-item' + (item.disabled ? ' disabled' : '');
      var icon = item.iconHtml || (item.icon && ICONS[item.icon] ? ICONS[item.icon] : ICONS.home);
      var badge = item.badgeId
        ? '<span class="nav-badge" id="' + item.badgeId + '" style="display:none">0</span>'
        : '';
      var sub = item.sublabel
        ? '<span style="font-size:10px;opacity:.6;margin-left:4px;">' + esc(item.sublabel) + '</span>'
        : '';
      var onclick = item.disabled ? '' : 'onclick="navigate(\'' + item.id + '\')"';
      html += '<div class="' + cls + '" id="nav-' + item.id + '" ' + onclick + '>';
      html += '<span class="nav-icon">' + icon + '</span>';
      html += '<span class="nav-label">' + esc(item.label) + sub + '</span>';
      html += badge + '</div>';
    } else {
      // Multi-item section: accordion header + collapsible sub-items
      html += '<div class="nav-item nav-section-hdr" id="nav-sec-' + secId + '" onclick="toggleNavSection(\'' + secId + '\')">';
      html += '<span class="nav-icon">' + secIcon + '</span>';
      html += '<span class="nav-label">' + esc(section.section) + '</span>';
      html += '<span class="nav-chevron">' + ICONS.chevron + '</span>';
      html += '</div>';
      html += '<div class="nav-subitems" id="navsubitems-' + secId + '" style="display:none">';
      section.items.forEach(function(item) {
        var cls   = 'nav-subitem' + (item.disabled ? ' disabled' : '');
        var badge = item.badgeId
          ? '<span class="nav-badge" id="' + item.badgeId + '" style="display:none">0</span>'
          : '';
        var onclick = item.disabled ? '' : 'onclick="navigate(\'' + item.id + '\')"';
        html += '<div class="' + cls + '" id="nav-' + item.id + '" ' + onclick + '>';
        html += '<span>' + esc(item.label) + '</span>';
        html += badge + '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

// Opens a nav section, closing all others (mutual exclusion).
function toggleNavSection(sectionId) {
  var subEl = document.getElementById('navsubitems-' + sectionId);
  var hdrEl = document.getElementById('nav-sec-' + sectionId);
  if (!subEl) return;
  var isOpen = subEl.style.display !== 'none';
  _closeAllNavSections_();
  if (!isOpen) {
    subEl.style.display = 'block';
    if (hdrEl) hdrEl.classList.add('open');
    _openNavSection_ = sectionId;
  }
}

function _closeAllNavSections_() {
  document.querySelectorAll('.nav-subitems').forEach(function(el) { el.style.display = 'none'; });
  document.querySelectorAll('.nav-section-hdr').forEach(function(el) { el.classList.remove('open'); });
  _openNavSection_ = null;
}

// Ensures the section containing pageId is open (called from navigate).
function _openSectionForPage_(pageId) {
  var itemEl = document.getElementById('nav-' + pageId);
  if (!itemEl) return;
  var subitemsEl = itemEl.closest ? itemEl.closest('.nav-subitems') : null;
  if (!subitemsEl) return;
  var sectionId = subitemsEl.id.replace('navsubitems-', '');
  if (_openNavSection_ === sectionId) return;
  _closeAllNavSections_();
  subitemsEl.style.display = 'block';
  var hdrEl = document.getElementById('nav-sec-' + sectionId);
  if (hdrEl) hdrEl.classList.add('open');
  _openNavSection_ = sectionId;
}

var _currentPage = 'home';

// Global panel/modal reset — closes any open detail panel, modal, or sub-view.
// Called once at the top of navigate() so every tab change starts clean.
// Project-wide single handler (R2): never patch this per-screen.
function _closeAllPanels_() {
  // Ticket detail slide-over (defined in ticket-detail partial; guard for load order)
  try { if (typeof closeTicketDetail === 'function') closeTicketDetail(); } catch (e) {}
  var overlay = document.getElementById('td-overlay');
  if (overlay) overlay.classList.remove('open');
  // Any modal rendered into the shared modal container + its backdrop
  var modalC = document.getElementById('td-modal-container');
  if (modalC) modalC.innerHTML = '';
  var backdrops = document.querySelectorAll('.td-modal-backdrop, .modal-backdrop');
  for (var i = 0; i < backdrops.length; i++) {
    var b = backdrops[i];
    if (b && b.parentNode) b.parentNode.removeChild(b);
  }
}

function navigate(pageId) {
  // R2: close any open detail panel / modal / sub-view before switching tabs.
  _closeAllPanels_();

  // Deactivate old nav item (works for both .nav-item and .nav-subitem)
  var oldEl = document.getElementById('nav-' + _currentPage);
  if (oldEl) oldEl.classList.remove('active');

  // Ensure parent accordion section is open before activating new item
  _openSectionForPage_(pageId);

  // Activate new nav item
  var newEl = document.getElementById('nav-' + pageId);
  if (newEl) newEl.classList.add('active');

  _currentPage = pageId;

  // Show correct page container (create if doesn't exist)
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var pageEl = document.getElementById('page-' + pageId);
  if (!pageEl) {
    // Page doesn't exist in DOM — create it and load its content.
    pageEl = document.createElement('div');
    pageEl.className = 'page';
    pageEl.id = 'page-' + pageId;
    pageEl.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><span>Loading…</span></div>';
    document.getElementById('content').appendChild(pageEl);
    loadPage(pageId, pageEl);
  } else if (!pageEl.getAttribute('data-loaded')) {
    // Page was pre-inserted by a server-side partial but hasn't been initialized
    // yet (form data not fetched, dropdowns empty, etc.) — run loadPage once.
    loadPage(pageId, pageEl);
  }
  pageEl.setAttribute('data-loaded', '1');
  pageEl.classList.add('active');

  // Update topbar title from the formal display-name map — never from raw pageId.
  document.getElementById('topbar-title').textContent = PAGE_TITLES[pageId] || pageId;
}

// loadPage — each step wires up its own renderer via PAGES registry
// Partials run first (server-side include order), so preserve any entries they registered.
window.PAGES = window.PAGES || {};

function loadPage(pageId, container) {
  if (window.PAGES[pageId]) {
    window.PAGES[pageId](container);
  } else {
    container.innerHTML =
      '<div style="padding:40px 24px;color:var(--text-secondary);font-size:13px;">' +
      'This screen is not yet available.</div>';
  }
}

// ── Toast notifications ───────────────────────────────────────────────────────
function showToast(msg, type, durationMs) {
  var ct = document.getElementById('toast-container');
  var t  = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  ct.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, durationMs || 4000);
}

// ── HTML escape helper ────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Coerce a list-endpoint response into an array. The deployed Worker may return
// a bare array (main's contract) or wrap it in an object (e.g. {tickets:[...]}),
// depending on which Worker build is live. This keeps the list screens working
// across that version skew instead of throwing "x.slice/forEach is not a function".
function _asArray_(r) {
  if (Array.isArray(r)) return r;
  if (r && typeof r === 'object') {
    var keys = ['tickets', 'rows', 'data', 'items', 'results', 'records', 'list'];
    for (var i = 0; i < keys.length; i++) { if (Array.isArray(r[keys[i]])) return r[keys[i]]; }
    for (var k in r) { if (Array.isArray(r[k])) return r[k]; }
  }
  return [];
}

    headers: { 'X-User-Email': (USER && USER.email) || '' }
  }).then(function(r) { return r.json(); })
    .then(function(counts) { _homeRenderKpis_(counts); })
    .catch(function() { /* KPIs stay as '—' */ });

  if (USER.isManager) {
    // Load the three category lists from the existing dashboard panels.
    fetch(WORKER_URL + '/api/dashboard/panels', {
      headers: { 'X-User-Email': (USER && USER.email) || '' }
    }).then(function(r) { return r.json(); })
      .then(function(panels) { _homeRenderPanels_(panels); })
      .catch(function() {
        ['cat-assign','cat-verify','cat-temp'].forEach(function(id) {
          var el = document.getElementById(id + '-body');
          if (el) el.innerHTML = '<div style="padding:10px 0;color:var(--text-tertiary);font-size:12px;">Unable to load.</div>';
        });
      });
  } else {
    ['cat-assign','cat-verify','cat-temp'].forEach(function(id) {
      var el = document.getElementById(id + '-body');
      if (el) el.innerHTML = '<div style="padding:10px 0;color:var(--text-tertiary);font-size:12px;">Dashboard categories are available to managers.</div>';
    });
  }
};

// Collapsible category card for the home dashboard (Module 10).
function _homeCatCard_(id, icon, label, accent, navTarget) {
  return '<div class="trend-card" style="padding:0;overflow:hidden;">' +
    '<div onclick="_homeToggle_(\'' + id + '\')" style="display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border-default);">' +
      '<span id="' + id + '-caret" style="font-size:10px;color:var(--text-tertiary);width:10px;">▼</span>' +
      '<span style="font-size:14px;">' + icon + '</span>' +
      '<span style="font-size:13px;font-weight:700;color:var(--text-primary);flex:1;">' + esc(label) + '</span>' +
      '<span id="' + id + '-count" style="font-size:11px;font-weight:700;background:' + accent + ';color:#fff;border-radius:10px;padding:1px 9px;min-width:14px;text-align:center;">0</span>' +
      '<button onclick="event.stopPropagation();navigate(\'' + navTarget + '\')" style="font-size:11px;color:var(--text-secondary);background:transparent;border:0;cursor:pointer;">View all →</button>' +
    '</div>' +
    '<div id="' + id + '-body" style="padding:6px 16px 10px;">' +
      '<div class="loading-overlay" style="height:50px;"><div class="spinner"></div></div>' +
    '</div>' +
  '</div>';
}

function _homeToggle_(id) {
  var body  = document.getElementById(id + '-body');
  var caret = document.getElementById(id + '-caret');
  if (!body) return;
  var hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (caret) caret.textContent = hidden ? '▼' : '▶';
}

// Small section header for the weekly/monthly SQF review bands.
function _homeReviewTitle_(label, sub) {
  return '<div style="display:flex;align-items:baseline;gap:8px;margin:18px 0 8px;">' +
    '<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);">' + esc(label) + '</span>' +
    '<span style="font-size:10.5px;color:var(--text-tertiary);">' + esc(sub) + '</span>' +
  '</div>';
}

function _homeKpiCard_(label, value, foot, accent, id) {
  return '<div class="kpi' + (accent ? ' kpi-' + accent : '') + '" id="' + id + '" style="cursor:default;">' +
    '<div class="kpi-accent"></div>' +
    '<div class="kpi-label">' + esc(label) + '</div>' +
    '<div class="kpi-value" id="' + id + '-val">' + esc(value) + '</div>' +
    '<div class="kpi-foot">' + esc(foot) + '</div>' +
  '</div>';
}

function _homeRenderKpis_(counts) {
  if (!counts) return;
  var map = {
    'kpi-open-all':   counts.openAll,
    'kpi-open':       counts.open,
    'kpi-critical':   counts.critical,
    'kpi-temp':       counts.tempFixActive,
    // Weekly review
    'kpi-wk-opened':  counts.openedThisWeek,
    'kpi-wk-closed':  counts.closedThisWeek,
    'kpi-wk-temp':    counts.tempFixActive,
    'kpi-wk-parts':   counts.partsPending,
    // Monthly review
    'kpi-mo-opened':  counts.openedThisMonth,
    'kpi-mo-closed':  counts.closedThisMonth,
    'kpi-mo-critical':counts.critical,
    'kpi-mo-closed30':counts.closedRecent
  };
  Object.keys(map).forEach(function(id) {
    var el = document.getElementById(id + '-val');
    if (el && map[id] !== undefined) el.textContent = map[id];
  });

  // Update nav badges if applicable
  var wb = document.getElementById('badge-waiting');
  if (wb && counts.waiting > 0) { wb.textContent = counts.waiting; wb.style.display = ''; }
  var ob = document.getElementById('badge-open');
  if (ob && counts.open > 0) { ob.textContent = counts.open; ob.style.display = ''; }
}

function _homeRenderPanels_(panels) {
  if (!panels) return;
  var attn    = panels.attentionItems || [];
  // review → Awaiting Assignment (WAITING), complete → Awaiting Verification
  // (PENDING VERIFICATION), temp → Temp Fix Alerts (past-due temp fixes).
  _homeFillCat_('cat-assign', attn.filter(function(i){ return i.kind === 'review';   }), 'No tickets awaiting assignment.');
  _homeFillCat_('cat-verify', attn.filter(function(i){ return i.kind === 'complete'; }), 'No tickets awaiting verification.');
  _homeFillCat_('cat-temp',   attn.filter(function(i){ return i.kind === 'temp';     }), 'No past-due temp fixes.');
}

// Fills one collapsible category section (Module 10) and updates its count badge.
function _homeFillCat_(id, items, emptyMsg) {
  var cnt = document.getElementById(id + '-count');
  if (cnt) cnt.textContent = items.length;
  var body = document.getElementById(id + '-body');
  if (!body) return;
  if (items.length === 0) {
    body.innerHTML = '<div style="padding:8px 0;font-size:12px;color:var(--text-tertiary);">' + esc(emptyMsg) + '</div>';
    return;
  }
  body.innerHTML = items.map(function(item) {
    var onclickVal = item.ticketNo
      ? 'openTicketDetail(\'' + esc(item.ticketNo) + '\')'
      : 'navigate(\'' + esc(item.pageTarget || 'open') + '\')';
    return '<div onclick="' + onclickVal + '" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-default);cursor:pointer;">' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
          (item.ticketNo ? '<span style="font-family:var(--font-mono);font-size:10.5px;color:var(--brand-navy);margin-right:5px;">' + esc(item.ticketNo) + '</span>' : '') +
          esc(item.title) +
        '</div>' +
        '<div style="font-size:11px;color:var(--text-secondary);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(item.sub) + '</div>' +
      '</div>' +
      (item.action ? '<span style="font-size:11px;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0;">' + esc(item.action) + ' →</span>' : '') +
    '</div>';
  }).join('');
}

function renderTrendChart(trend) {
  var el = document.getElementById('trend-chart');
  if (!el || !trend || !trend.labels || !trend.labels.length) return;

  var maxVal = 1;
  trend.opened.concat(trend.closed).forEach(function(v) { if (v > maxVal) maxVal = v; });

  el.innerHTML = trend.labels.map(function(lbl, i) {
    var oh = Math.round((trend.opened[i] / maxVal) * 70);
    var ch = Math.round((trend.closed[i] / maxVal) * 70);
    return '<div class="trend-col">' +
      '<div class="trend-bars">' +
        '<div class="trend-bar-opened" style="height:' + Math.max(oh, 2) + 'px;" title="Opened: ' + trend.opened[i] + '"></div>' +
        '<div class="trend-bar-closed" style="height:' + Math.max(ch, 2) + 'px;" title="Closed: ' + trend.closed[i] + '"></div>' +
      '</div>' +
      '<div class="trend-month">' + esc(lbl.split(' ')[0]) + '</div>' +
    '</div>';
  }).join('');
}

// ── App init — runs after boot() resolves USER/COMPANY/DOC_CONTROL ───────────
function _runApp_(version) {
  document.getElementById('user-avatar').textContent    = USER.initials;
  document.getElementById('user-name').textContent      = USER.displayName;
  var roleLabel = { admin: 'System Admin', manager: 'Manager', tech: 'Technician' }[USER.role] || USER.role;
  document.getElementById('user-role-label').textContent = roleLabel;
  document.getElementById('topbar-company').textContent  = COMPANY;

  if (version) {
    var vBadge = document.getElementById('app-version-badge');
    if (vBadge) vBadge.textContent = 'v' + version;
  }

  buildNav();
  toggleNavSection('tickets');

  var homeEl = document.getElementById('nav-home');
  if (homeEl) homeEl.classList.add('active');

  var homePage = document.getElementById('page-home');
  if (homePage) {
    loadPage('home', homePage);
    homePage.setAttribute('data-loaded', '1');
  }
}

// ── Boot — signs the user in, fetches identity from sheet, starts the app ────
(function boot() {
  var STORAGE_KEY = 'cmms_email';

  function _accessDenied_(email) {
    document.body.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;' +
      'font-family:system-ui,sans-serif;flex-direction:column;gap:12px;color:#64748b;">' +
      '<span style="font-size:32px;">🔒</span>' +
      '<strong style="font-size:16px;color:#0f172a;">Access Denied</strong>' +
      '<span style="font-size:13px;">No access for <em>' + (email || 'this account') + '</em>. Contact your administrator.</span>' +
      '<button onclick="sessionStorage.removeItem(\'' + STORAGE_KEY + '\');location.reload()" ' +
      'style="margin-top:8px;padding:8px 16px;border:1px solid #cbd2da;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Sign in with a different account</button>' +
      '</div>';
  }

  function _loadError_(detail) {
    document.body.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;' +
      'font-family:system-ui,sans-serif;flex-direction:column;gap:12px;color:#64748b;">' +
      '<span style="font-size:32px;">⚠️</span>' +
      '<strong style="font-size:16px;color:#0f172a;">Unable to connect</strong>' +
      '<span style="font-size:13px;">Could not reach the CMMS service. Check your connection and try again.</span>' +
      (detail ? '<code style="font-size:11px;background:#f1f5f9;padding:4px 8px;border-radius:4px;color:#64748b;max-width:500px;word-break:break-all;">' + detail + '</code>' : '') +
      '<button onclick="location.reload()" ' +
      'style="margin-top:8px;padding:8px 16px;border:1px solid #cbd2da;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Retry</button>' +
      '</div>';
  }

  function startWithEmail(email) {
    fetch(WORKER_URL + '/api/me', { headers: { 'X-User-Email': email } })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) { _loadError_(data.error); return; }
        if (!data.user || data.user.role === 'noaccess') {
          sessionStorage.removeItem(STORAGE_KEY);
          _accessDenied_(email);
          return;
        }
        USER        = data.user;
        COMPANY     = data.company     || 'Container Supply Co.';
        DOC_CONTROL = data.docControl  || {};
        sessionStorage.setItem(STORAGE_KEY, email);
        _runApp_(data.version);
      })
      .catch(_loadError_);
  }

  var storedEmail = sessionStorage.getItem(STORAGE_KEY);
  if (storedEmail) { startWithEmail(storedEmail); return; }

  // No stored session — use Google Identity Services to identify the user.
  // GOOGLE_CLIENT_ID must be set at the top of this script.
  function _initGSI_() {
    google.accounts.id.initialize({
      client_id:             GOOGLE_CLIENT_ID,
      auto_select:           true,
      cancel_on_tap_outside: false,
      callback: function(response) {
        var parts   = response.credential.split('.');
        var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        startWithEmail(payload.email);
      },
    });
    google.accounts.id.prompt(function(notification) {
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        // One-tap not available — render a standard sign-in button
        document.body.innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100vh;">' +
          '<div id="_gsi_btn_"></div></div>';
        google.accounts.id.renderButton(
          document.getElementById('_gsi_btn_'),
          { theme: 'outline', size: 'large', text: 'signin_with', logo_alignment: 'left' }
        );
      }
    });
  }

  // GSI library may still be loading (async defer) — wait for it
  if (typeof google !== 'undefined' && google.accounts) {
    _initGSI_();
  } else {
    window.addEventListener('load', _initGSI_);
  }
})();
</script>
</body>
</html>
