<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Ticket List partial — queue + tracker views                    ║ -->
<!-- ║  Registers PAGES for: waiting, open, tracker-{dept}            ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Ticket list ─────────────────────────────────────────────────────── */
.tl-wrap{padding:20px 24px;}
.tl-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.tl-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;}
.tl-count{font-size:12px;color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:4px;padding:2px 8px;}
.tl-search{height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;width:200px;outline:none;color:var(--text-primary);}
.tl-search:focus{border-color:var(--brand-navy);}
.tl-filter-select{height:30px;padding:0 8px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.tl-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.tl-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.tl-table th{background:var(--bg-subtle);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.tl-table td{padding:10px 12px;border-bottom:1px solid var(--border-default);vertical-align:middle;color:var(--text-primary);}
.tl-table tr:last-child td{border-bottom:0;}
.tl-table tbody tr{cursor:pointer;transition:background .1s;}
.tl-table tbody tr:hover{background:var(--bg-hover);}
.tl-table .col-ticket{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);font-size:12px;}
.tl-table .col-equip{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-table .col-desc{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);}
.tl-empty{padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}
.pri-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.pri-CRITICAL{background:var(--status-critical-bg);color:var(--status-critical);}
.pri-HIGH    {background:var(--status-high-bg);    color:var(--status-high);}
.pri-MEDIUM  {background:var(--status-medium-bg);  color:var(--status-medium);}
.pri-LOW     {background:var(--status-low-bg);     color:var(--status-low);}
.pri-        {background:var(--bg-subtle);         color:var(--text-tertiary);}
.stat-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;}
.stat-WAITING            {background:#EDE9FE;color:#5B21B6;}
.stat-OPEN               {background:var(--status-info-bg);color:var(--status-info);}
.stat-PENDING-VERIFICATION{background:var(--status-warn-bg);color:var(--status-warn);}
.stat-PENDING-PARTS     {background:#FFF3E0;color:#E65100;}
.stat-VOIDED             {background:var(--bg-subtle);color:var(--text-tertiary);}
.flag-tf{display:inline-block;font-size:10px;background:#FFF3E0;color:#E65100;border:1px solid #FFCCBC;border-radius:3px;padding:1px 5px;margin-left:4px;}
.stat-ON-HOLD{background:var(--status-warn-bg);color:var(--status-warn);}
/* ── Tracker two-column layout ───────────────────────────────────────── */
.tl-two-col{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:960px){.tl-two-col{grid-template-columns:1.7fr 1fr;}}
.tl-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
.tl-card-header{padding:10px 14px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;gap:8px;}
.tl-card-title{font-size:13px;font-weight:700;color:var(--text-primary);flex:1;}
.tl-card-sub{font-size:11px;color:var(--text-secondary);}
.tl-watch-empty{padding:24px 16px;text-align:center;color:var(--text-secondary);font-size:12px;}
</style>

<script>
// ── Ticket list page utilities ────────────────────────────────────────────────

function _loadListPage_(queueType, deptFilter, container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading tickets…</span></div>';
  google.script.run
    .withSuccessHandler(function(tickets) { _renderList_(tickets, queueType, deptFilter, container); })
    .withFailureHandler(function(err) {
      container.innerHTML =
        '<div class="tl-empty">Error loading tickets: ' + esc(err.message || String(err)) + '</div>';
    })
    .getQueueTickets(queueType, { dept: deptFilter || null });
}

// Maps tracker dept → formal display title matching PAGE_TITLES in index.html
var _TRACKER_TITLES_ = {
  'ELECTRICAL':   'Electrical Tracker',
  'MACHINE SHOP': 'Machine Shop Tracker',
  'FACILITIES':   'Facilities Tracker',
  'PLASTICS':     'Plastics Tracker',
  'METALS':       'Metals Tracker',
  'LITHO':        'Litho Tracker'
};

function _renderList_(tickets, queueType, deptFilter, container) {
  var title = queueType === 'waiting' ? 'Waiting Queue'
            : queueType === 'open'    ? 'Open Tickets'
            : queueType === 'tracker' ? (_TRACKER_TITLES_[deptFilter] || (deptFilter ? deptFilter.charAt(0) + deptFilter.slice(1).toLowerCase() + ' Tracker' : 'Dept Tracker'))
            : (deptFilter || 'Dept Tracker');

  // For tracker: split primary-owned vs joint vs pending-joint tickets
  var myTickets      = queueType === 'tracker' ? tickets.filter(function(t) { return !t.isJoint && !t.isPendingJoint; }) : tickets;
  var jointTickets   = queueType === 'tracker' ? tickets.filter(function(t) { return  t.isJoint; }) : [];
  var pendingTickets = queueType === 'tracker' ? tickets.filter(function(t) { return  t.isPendingJoint; }) : [];

  // Build filter state
  var _filtered = tickets.slice();

  function applyFilters() {
    var q   = document.getElementById('tl-search-' + queueType);
    var pf  = document.getElementById('tl-pri-' + queueType);
    var sf  = document.getElementById('tl-sta-' + queueType);
    var qv  = q  ? q.value.toLowerCase()  : '';
    var pfv = pf ? pf.value.toUpperCase() : '';
    var sfv = sf ? sf.value.toUpperCase() : '';
    var matchFn = function(t) {
      if (pfv && t.priority !== pfv) return false;
      if (sfv && t.status   !== sfv) return false;
      if (qv) {
        var hay = (t.ticketNo + ' ' + t.specificEquip + ' ' + t.description + ' ' +
                   t.assignedTo + ' ' + t.dept + ' ' + t.equipCode + ' ' + t.addedBy).toLowerCase();
        if (hay.indexOf(qv) < 0) return false;
      }
      return true;
    };
    _filtered = tickets.filter(matchFn);
    if (queueType === 'tracker') {
      renderRows(_filtered.filter(function(t) { return !t.isJoint && !t.isPendingJoint; }), 'tl-tbody-tracker-my',      false);
      renderRows(_filtered.filter(function(t) { return  t.isJoint; }),                      'tl-tbody-tracker-joint',   true);
      renderPendingRows(_filtered.filter(function(t) { return t.isPendingJoint; }),          'tl-tbody-tracker-pending');
      var cntEl = document.getElementById('tl-cnt-' + queueType);
      if (cntEl) cntEl.textContent = _filtered.length + ' ticket' + (_filtered.length !== 1 ? 's' : '');
    } else {
      renderRows(_filtered);
    }
  }

  // tbodyId: optional override for the tbody element id.
  // showDept: optional bool to force-show/hide the Dept column (null = auto).
  function renderRows(list, tbodyId, showDept) {
    var tbody = document.getElementById(tbodyId || ('tl-tbody-' + queueType));
    if (!tbody) return;
    var deptCol = (showDept !== undefined && showDept !== null) ? showDept : (queueType !== 'tracker');
    if (!tbodyId) {
      var cntEl = document.getElementById('tl-cnt-' + queueType);
      if (cntEl) cntEl.textContent = list.length + ' ticket' + (list.length !== 1 ? 's' : '');
    }
    var colSpan = deptCol ? 8 : 7;
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="' + colSpan + '" class="tl-empty">No tickets match.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(function(t) {
      var priCls = 'pri-' + (t.priority || '');
      var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
      return '<tr onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')">' +
        '<td class="col-ticket">' + esc(t.ticketNo) + '</td>' +
        '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority || '—') + '</span></td>' +
        '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span>' +
          (t.tempFixFlag ? '<span class="flag-tf">TF</span>' : '') + '</td>' +
        (deptCol ? '<td>' + esc(t.dept) + '</td>' : '') +
        '<td class="col-equip" title="' + esc(t.equipCode ? t.equipCode + ' — ' + t.specificEquip : t.specificEquip) + '">' +
          (t.equipCode ? '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">' + esc(t.equipCode) + '</span> ' : '') +
          esc(t.specificEquip) + '</td>' +
        '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description) + '</td>' +
        '<td>' + esc(t.assignedTo || '—') + '</td>' +
        '<td style="color:var(--text-tertiary);font-size:11.5px;">' + esc(t.dateOpened) + '</td>' +
        '</tr>';
    }).join('');
  }

  // Collect unique status values for filter
  var statuses = [];
  tickets.forEach(function(t) { if (statuses.indexOf(t.status) < 0) statuses.push(t.status); });

  var showDept = queueType !== 'tracker';
  container.innerHTML =
    '<div class="tl-wrap">' +
    '<div class="tl-toolbar">' +
      '<span class="tl-title">' + esc(title) + '</span>' +
      '<span class="tl-count" id="tl-cnt-' + queueType + '">' + tickets.length + ' tickets</span>' +
      '<input class="tl-search" id="tl-search-' + queueType + '" placeholder="Search…" oninput="_tlFilter_(\'' + queueType + '\')" />' +
      '<select class="tl-filter-select" id="tl-pri-' + queueType + '" onchange="_tlFilter_(\'' + queueType + '\')">' +
        '<option value="">All priorities</option>' +
        ['CRITICAL','HIGH','MEDIUM','LOW'].map(function(p){return '<option>' + p + '</option>';}).join('') +
      '</select>' +
      (statuses.length > 1 ?
        '<select class="tl-filter-select" id="tl-sta-' + queueType + '" onchange="_tlFilter_(\'' + queueType + '\')">' +
          '<option value="">All statuses</option>' +
          statuses.map(function(s){return '<option>' + esc(s) + '</option>';}).join('') +
        '</select>' : '') +
      (queueType === 'tracker' && USER.isManager
        ? '<button onclick="_tlRollover_(\'' + esc(deptFilter||'') + '\')" style="height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);" title="Remove CLOSED and VOIDED rows from the tracker sheet">Roll Up Closed</button>'
        : '') +
      '<button onclick="_refreshQueuePage_(\'' + queueType + '\', \'' + (deptFilter||'') + '\')" style="height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);" title="Refresh">↻</button>' +
    '</div>' +
    (queueType === 'tracker' ? _tlKpiBar_(tickets) : '') +
    (queueType === 'tracker' ? _tlWatchList_(tickets) : '') +
    (queueType !== 'tracker' ?
      // ── Non-tracker: single flat table ─────────────────────────────────────
      '<div class="tl-table-wrap"><table class="tl-table">' +
        '<thead><tr>' +
          '<th>Ticket #</th><th>Priority</th><th>Status</th>' +
          (showDept ? '<th>Dept</th>' : '') +
          '<th>Equipment</th><th>Description</th><th>Assigned To</th><th>Date Opened</th>' +
        '</tr></thead>' +
        '<tbody id="tl-tbody-' + queueType + '"></tbody>' +
      '</table></div>'
    :
      // ── Tracker: "My Tickets" card ──────────────────────────────────────────
      '<div class="tl-card" style="margin-top:14px;">' +
        '<div class="tl-card-header">' +
          '<span class="tl-card-title">My Tickets</span>' +
          '<span class="tl-card-sub">' + myTickets.length + ' ticket' + (myTickets.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +
        '<div class="tl-table-wrap" style="border:0;border-radius:0;box-shadow:none;"><table class="tl-table">' +
          '<thead><tr><th>Ticket #</th><th>Priority</th><th>Status</th><th>Equipment</th><th>Description</th><th>Assigned To</th><th>Date Opened</th></tr></thead>' +
          '<tbody id="tl-tbody-tracker-my"></tbody>' +
        '</table></div>' +
      '</div>' +
      // ── Tracker: "Joint Tickets" card ──────────────────────────────────────────
      '<div class="tl-card" id="tl-joint-card" style="margin-top:14px;' + (jointTickets.length === 0 ? 'display:none;' : '') + '">' +
        '<div class="tl-card-header">' +
          '<span style="font-size:13px;margin-right:6px;">🔗</span>' +
          '<span class="tl-card-title">Joint Tickets</span>' +
          '<span class="tl-card-sub">' + jointTickets.length + ' ticket' + (jointTickets.length !== 1 ? 's' : '') + ' — primary dept shown</span>' +
        '</div>' +
        '<div class="tl-table-wrap" style="border:0;border-radius:0;box-shadow:none;"><table class="tl-table">' +
          '<thead><tr><th>Ticket #</th><th>Priority</th><th>Status</th><th>Primary Dept</th><th>Equipment</th><th>Description</th><th>Assigned To</th><th>Date Opened</th></tr></thead>' +
          '<tbody id="tl-tbody-tracker-joint"></tbody>' +
        '</table></div>' +
      '</div>' +
      // ── Tracker: "Pending Joint Requests" card (hidden when empty) ────────────
      '<div class="tl-card" id="tl-pending-joint-card" style="margin-top:14px;' + (pendingTickets.length === 0 ? 'display:none;' : '') + '">' +
        '<div class="tl-card-header" style="background:#F3E5F5;">' +
          '<span style="font-size:13px;margin-right:6px;">📩</span>' +
          '<span class="tl-card-title" style="color:#4A148C;">Pending Joint Requests</span>' +
          '<span class="tl-card-sub">' + pendingTickets.length + ' pending — accept or reject</span>' +
        '</div>' +
        '<div class="tl-table-wrap" style="border:0;border-radius:0;box-shadow:none;"><table class="tl-table">' +
          '<thead><tr><th>Ticket #</th><th>Priority</th><th>Status</th><th>Primary Dept</th><th>Equipment</th><th>Description</th><th style="text-align:center;">Action</th></tr></thead>' +
          '<tbody id="tl-tbody-tracker-pending"></tbody>' +
        '</table></div>' +
      '</div>'
    ) +
    '</div>';

  // Store filter function reference on window so oninput can call it
  window['_tlFilterData_' + queueType] = { tickets: tickets, applyFilters: applyFilters };
  if (queueType === 'tracker') {
    renderRows(myTickets,        'tl-tbody-tracker-my',      false);
    renderRows(jointTickets,     'tl-tbody-tracker-joint',   true);
    renderPendingRows(pendingTickets, 'tl-tbody-tracker-pending');
    // Show/hide cards based on content
    var jCard  = document.getElementById('tl-joint-card');
    var pjCard = document.getElementById('tl-pending-joint-card');
    if (jCard)  jCard.style.display  = jointTickets.length   > 0 ? '' : 'none';
    if (pjCard) pjCard.style.display = pendingTickets.length > 0 ? '' : 'none';
  } else {
    renderRows(tickets);
  }
}

function _tlWatchList_(tickets) {
  var watchlist = tickets.filter(function(t) {
    return (t.priority === 'CRITICAL' || t.priority === 'HIGH') && t.status !== 'CLOSED' && t.status !== 'VOIDED';
  });
  var rows = watchlist.length === 0
    ? '<tr><td colspan="6" class="tl-watch-empty">No critical or high-priority open tickets.</td></tr>'
    : watchlist.map(function(t) {
        var priCls = 'pri-' + (t.priority || '');
        var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
        return '<tr onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')" style="cursor:pointer;">' +
          '<td class="col-ticket">' + esc(t.ticketNo) + '</td>' +
          '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority) + '</span></td>' +
          '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span>' + (t.tempFixFlag ? '<span class="flag-tf">TF</span>' : '') + '</td>' +
          '<td class="col-equip" title="' + esc(t.specificEquip) + '">' + esc(t.specificEquip) + '</td>' +
          '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description) + '</td>' +
          '<td>' + esc(t.assignedTo || '—') + '</td>' +
          '</tr>';
      }).join('');
  return '<div class="tl-card">' +
    '<div class="tl-card-header">' +
      '<span style="color:var(--status-high);font-size:13px;margin-right:4px;">⚠</span>' +
      '<span class="tl-card-title">Priority Watch List</span>' +
      '<span class="tl-card-sub">Critical &amp; High · ' + watchlist.length + ' ticket' + (watchlist.length !== 1 ? 's' : '') + '</span>' +
    '</div>' +
    '<div style="overflow-x:auto;"><table class="tl-table">' +
      '<thead><tr><th>Ticket #</th><th>Priority</th><th>Status</th><th>Equipment</th><th>Description</th><th>Assigned To</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div></div>';
}

function _tlKpiBar_(tickets) {
  var total  = tickets.length;
  var open   = tickets.filter(function(t) { return t.status === 'OPEN'; }).length;
  var crit   = tickets.filter(function(t) { return t.priority === 'CRITICAL'; }).length;
  var high   = tickets.filter(function(t) { return t.priority === 'HIGH'; }).length;
  var pp     = tickets.filter(function(t) { return t.status === 'PENDING PARTS'; }).length;
  var hold   = tickets.filter(function(t) { return t.status === 'ON HOLD'; }).length;
  var pv     = tickets.filter(function(t) { return t.status === 'PENDING VERIFICATION'; }).length;
  var un     = tickets.filter(function(t) { return !t.assignedTo; }).length;
  function cell(val, label, mod) {
    return '<div class="ds-cell' + (mod ? ' ' + mod : '') + '">' +
           '<div class="ds-lbl">' + esc(label) + '</div>' +
           '<div class="ds-v">' + val + '</div></div>';
  }
  return '<div class="dept-strip" style="grid-template-columns:repeat(8,1fr);">' +
    cell(total, 'Total',         '') +
    cell(open,  'Open',          '') +
    cell(crit,  'Critical',      crit > 0 ? 'ds-crit' : '') +
    cell(high,  'High',          high > 0 ? 'ds-high' : '') +
    cell(pp,    'Pending Parts', pp   > 0 ? 'ds-warn' : '') +
    cell(hold,  'On Hold',       hold > 0 ? 'ds-warn' : '') +
    cell(pv,    'Pend. Verify',  pv   > 0 ? 'ds-warn' : '') +
    cell(un,    'Unassigned',    '') +
  '</div>';
}

function _tlFilter_(queueType) {
  var ref = window['_tlFilterData_' + queueType];
  if (ref) ref.applyFilters();
}

// Renders the pending-joint rows (with Accept / Reject buttons instead of navigation)
function renderPendingRows(list, tbodyId) {
  var tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="tl-empty">No pending requests.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(t) {
    var priCls = 'pri-' + (t.priority || '');
    var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
    return '<tr>' +
      '<td class="col-ticket" onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')" style="cursor:pointer;">' + esc(t.ticketNo) + '</td>' +
      '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority || '—') + '</span></td>' +
      '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span></td>' +
      '<td>' + esc(t.dept) + '</td>' +
      '<td class="col-equip" title="' + esc(t.specificEquip) + '">' + esc(t.specificEquip || '—') + '</td>' +
      '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description || '—') + '</td>' +
      '<td style="text-align:center;white-space:nowrap;">' +
        '<button onclick="_tlAcceptJoint_(\'' + esc(t.ticketNo) + '\')" ' +
          'style="height:26px;padding:0 10px;border:1px solid #2E7D32;border-radius:4px;font-size:11.5px;font-weight:600;background:#E8F5E9;color:#2E7D32;cursor:pointer;margin-right:4px;">✓ Accept</button>' +
        '<button onclick="_tlRejectJoint_(\'' + esc(t.ticketNo) + '\')" ' +
          'style="height:26px;padding:0 10px;border:1px solid #C62828;border-radius:4px;font-size:11.5px;font-weight:600;background:#FFEBEE;color:#C62828;cursor:pointer;">✗ Reject</button>' +
      '</td>' +
      '</tr>';
  }).join('');
}

function _tlAcceptJoint_(ticketNo) {
  if (!confirm('Accept the joint attachment request for ticket ' + ticketNo + '?\n\nYour department will be added to this ticket and you will be required to sign off before it can be closed.')) return;
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        showToast('✓ Joint request accepted for ' + ticketNo, 'success');
        // Refresh the current tracker page
        var activePageEl = document.querySelector('[id^="page-tracker-"]');
        if (activePageEl) {
          var deptMatch = activePageEl.id.replace('page-tracker-', '');
          _refreshQueuePage_('tracker-' + deptMatch, deptMatch.replace(/-/g, ' ').toUpperCase());
        }
      } else {
        showToast('Error: ' + ((r && r.error) || 'Unknown error'), 'error');
      }
    })
    .withFailureHandler(function(err) { showToast('Server error: ' + (err.message || err), 'error'); })
    .confirmJointRequest({ ticketNo: ticketNo });
}

function _tlRejectJoint_(ticketNo) {
  var reason = prompt('Reason for rejecting the joint request on ' + ticketNo + ' (optional):');
  if (reason === null) return;  // user cancelled
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        showToast('Joint request rejected for ' + ticketNo, 'info');
        var activePageEl = document.querySelector('[id^="page-tracker-"]');
        if (activePageEl) {
          var deptMatch = activePageEl.id.replace('page-tracker-', '');
          _refreshQueuePage_('tracker-' + deptMatch, deptMatch.replace(/-/g, ' ').toUpperCase());
        }
      } else {
        showToast('Error: ' + ((r && r.error) || 'Unknown error'), 'error');
      }
    })
    .withFailureHandler(function(err) { showToast('Server error: ' + (err.message || err), 'error'); })
    .rejectJointRequest({ ticketNo: ticketNo, reason: reason });
}

function _tlRollover_(dept) {
  if (!confirm('Remove all CLOSED and VOIDED tickets from the ' + (dept || 'tracker') + ' sheet?\n\nTickets remain in the Closed Tickets record — this only cleans up the physical tracker sheet view.')) return;
  var deptId = 'tracker-' + (dept || '').toLowerCase().replace(/\s+/g, '-');
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        var n = result.totalRemoved;
        showToast(
          n > 0 ? 'Removed ' + n + ' closed/voided ticket' + (n !== 1 ? 's' : '') + ' from ' + (dept || 'tracker') + ' sheet'
                : 'Nothing to remove — tracker sheet is already clean',
          n > 0 ? 'success' : 'info'
        );
      } else {
        showToast('Rollover failed: ' + ((result && result.error) || 'Unknown error'), 'error');
      }
      _refreshQueuePage_(deptId, dept);
    })
    .withFailureHandler(function(err) {
      showToast('Server error: ' + (err.message || String(err)), 'error');
      _refreshQueuePage_(deptId, dept);
    })
    .monthlyRollover({ dept: dept });
}

function _refreshQueuePage_(queueType, deptFilter) {
  var pageEl = document.getElementById('page-' + queueType);
  if (!pageEl) return;
  _loadListPage_(queueType, deptFilter || null, pageEl);
}

// ── PAGES registry ────────────────────────────────────────────────────────────
// Guard: partial scripts execute before the main script defines PAGES.
window.PAGES = window.PAGES || {};

PAGES['waiting'] = function(c) { _loadListPage_('waiting', null, c); };
PAGES['open']    = function(c) { _loadListPage_('open',    null, c); };

// Tracker pages registered for all six depts (nav only shows owned depts,
// but all are registered so deep-linking works without role checks on the client).
var _TRACKER_DEPTS_ = [
  { id: 'tracker-electrical',   dept: 'ELECTRICAL'   },
  { id: 'tracker-machine-shop', dept: 'MACHINE SHOP' },
  { id: 'tracker-facilities',   dept: 'FACILITIES'   },
  { id: 'tracker-plastics',     dept: 'PLASTICS'     },
  { id: 'tracker-metals',       dept: 'METALS'       },
  { id: 'tracker-litho',        dept: 'LITHO'        }
];
_TRACKER_DEPTS_.forEach(function(td) {
  (function(id, dept) {
    PAGES[id] = function(c) { _loadListPage_('tracker', dept, c); };
  })(td.id, td.dept);
});
</script>
