<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Ticket List partial — queue + tracker views                    ║ -->
<!-- ║  Registers PAGES for: waiting, open, verify, tracker-{dept}    ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Ticket list ─────────────────────────────────────────────────────── */
.tl-wrap{padding:20px 24px;}
.tl-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.tl-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;}
.tl-count{font-size:12px;color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:4px;padding:2px 8px;}
.tl-search{height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;width:200px;outline:none;color:var(--text-primary);}
.tl-search:focus{border-color:var(--brand-navy);}
.tl-filter-select{height:30px;padding:0 8px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.tl-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.tl-table{width:100%;border-collapse:collapse;font-size:clamp(10px,1.05vw,12.5px);}
.tl-table th{background:var(--bg-subtle);padding:clamp(5px,.55vw,9px) clamp(4px,.7vw,12px);text-align:left;font-size:clamp(9px,.82vw,11px);font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.tl-table td{padding:clamp(5px,.55vw,10px) clamp(4px,.7vw,12px);border-bottom:1px solid var(--border-default);vertical-align:middle;color:var(--text-primary);}
.tl-table tr:last-child td{border-bottom:0;}
.tl-table tbody tr{cursor:pointer;transition:background .1s;}
.tl-table tbody tr:hover{background:var(--bg-hover);}
.tl-table .col-ticket{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);}
.tl-table .col-equip{max-width:clamp(80px,11vw,180px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-table .col-desc{max-width:clamp(90px,14vw,220px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);}
.tl-empty{padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}
.pri-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.pri-CRITICAL{background:var(--status-critical-bg);color:var(--status-critical);}
.pri-HIGH    {background:var(--status-high-bg);    color:var(--status-high);}
.pri-MEDIUM  {background:var(--status-medium-bg);  color:var(--status-medium);}
.pri-LOW     {background:var(--status-low-bg);     color:var(--status-low);}
.pri-        {background:var(--bg-subtle);         color:var(--text-tertiary);}
.stat-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;}
.stat-WAITING            {background:#EDE9FE;color:#5B21B6;}
.stat-OPEN               {background:var(--status-info-bg);color:var(--status-info);}
.stat-PENDING-VERIFICATION{background:var(--status-warn-bg);color:var(--status-warn);}
.stat-PENDING-PARTS     {background:#FFF3E0;color:#E65100;}
.stat-VOIDED             {background:var(--bg-subtle);color:var(--text-tertiary);}
.flag-tf{display:inline-block;font-size:10px;background:#FFF3E0;color:#E65100;border:1px solid #FFCCBC;border-radius:3px;padding:1px 5px;margin-left:4px;}
.stat-ON-HOLD{background:var(--status-warn-bg);color:var(--status-warn);}
.tl-table .col-photo{width:clamp(28px,2.8vw,42px);text-align:center;white-space:nowrap;}
.clip-icon{font-size:13px;opacity:.55;}
.tl-table .col-action{width:clamp(52px,5vw,72px);text-align:center;white-space:nowrap;}
.tl-assign-btn{background:none;border:1px solid var(--border-default);border-radius:5px;padding:3px 6px;cursor:pointer;font-size:12px;color:var(--text-secondary);line-height:1;transition:background .1s,border-color .1s;}
.tl-assign-btn:hover{background:var(--bg-hover);border-color:var(--border-strong);color:var(--text-primary);}
.tl-quickapprove-btn{background:none;border:1px solid #BBF7D0;border-radius:5px;padding:3px 6px;cursor:pointer;font-size:12px;color:#166534;line-height:1;transition:background .1s,border-color .1s;margin-left:3px;}
.tl-quickapprove-btn:hover{background:#DCFCE7;border-color:#86EFAC;}
.tl-quickapprove-btn:disabled{opacity:.5;cursor:default;}
.tl-joint-btn{background:none;border:1px solid #FDE68A;border-radius:5px;padding:3px 6px;cursor:pointer;font-size:12px;color:#78350F;line-height:1;transition:background .1s,border-color .1s;margin-right:3px;}
.tl-joint-btn:hover{background:#FEF9C3;border-color:#F59E0B;}
.tl-assign-pop{position:fixed;z-index:9999;background:#fff;border:1px solid var(--border-strong);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.13);padding:10px;display:flex;flex-direction:column;gap:7px;min-width:200px;}
.tl-assign-pop select{height:30px;padding:0 8px;border:1px solid var(--border-default);border-radius:5px;font-size:12.5px;color:var(--text-primary);background:#fff;outline:none;width:100%;}
.tl-assign-pop select:focus{border-color:var(--brand-navy);}
.tl-assign-pop-btns{display:flex;gap:6px;}
.tl-assign-pop-btns button{flex:1;height:28px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.tl-ap-confirm{background:var(--brand-navy);color:#fff;}
.tl-ap-confirm:hover{background:var(--brand-navy-soft);}
.tl-ap-cancel{background:var(--bg-subtle);color:var(--text-secondary);}
.tl-ap-cancel:hover{background:var(--bg-hover);}
.sort-th{cursor:pointer;user-select:none;}
.sort-th:hover{color:var(--text-primary);}
.sort-th::after{content:' ⇅';opacity:.35;font-size:10px;}
.sort-th.sort-asc::after{content:' ▲';opacity:1;}
.sort-th.sort-desc::after{content:' ▼';opacity:1;}
/* ── Tracker two-column layout ───────────────────────────────────────── */
.tl-two-col{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:960px){.tl-two-col{grid-template-columns:1.7fr 1fr;}}
.tl-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
.tl-card-header{padding:10px 14px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;gap:8px;}
.tl-card-title{font-size:13px;font-weight:700;color:var(--text-primary);flex:1;}
.tl-card-sub{font-size:11px;color:var(--text-secondary);}
.tl-watch-empty{padding:24px 16px;text-align:center;color:var(--text-secondary);font-size:12px;}
/* ── Filter panel (shared across all ticket views) ───────────────────── */
.fp-toggle{height:30px;padding:0 12px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.fp-toggle.fp-active{border-color:var(--brand-navy);color:var(--brand-navy);background:rgba(0,31,79,.06);}
.fp-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:var(--brand-navy);color:#fff;font-size:9px;font-weight:700;padding:0 3px;}
.fp-bar{background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:none;}
.fp-bar.fp-open{display:block;}
.fp-row{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start;}
.fp-group{display:flex;flex-direction:column;gap:6px;}
.fp-glabel{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);}
.fp-checks{display:flex;flex-wrap:wrap;gap:4px;}
.fp-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--border-default);border-radius:4px;font-size:12px;cursor:pointer;user-select:none;background:#fff;color:var(--text-primary);transition:border-color .1s,background .1s;}
.fp-chip input[type=checkbox]{width:12px;height:12px;cursor:pointer;margin:0;accent-color:var(--brand-navy);}
.fp-chip.fp-checked{border-color:var(--brand-navy);background:rgba(0,31,79,.07);color:var(--brand-navy);font-weight:600;}
.fp-reset{font-size:11px;color:var(--brand-navy);background:none;border:none;padding:0;cursor:pointer;text-decoration:underline;align-self:flex-start;margin-top:2px;}
.fp-atsel{height:28px;padding:0 8px;border:1px solid var(--border-default);border-radius:4px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;min-width:120px;}
</style>

<script>
// ── Ticket list page utilities ────────────────────────────────────────────────

function _loadListPage_(queueType, deptFilter, container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading tickets…</span></div>';
  var _qtParam = queueType === 'tracker' ? 'tracker' : queueType;
  var _qtUrl   = WORKER_URL + '/api/tickets/queue?type=' + encodeURIComponent(_qtParam) +
                 (deptFilter ? '&dept=' + encodeURIComponent(deptFilter) : '');
  fetch(_qtUrl, { headers: { 'X-User-Email': USER ? USER.email : '' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var tickets        = Array.isArray(data) ? data : (data.tickets || []);
      var userOwnedDepts = Array.isArray(data) ? [] : (data.userOwnedDepts || []);
      if (data.error) throw new Error(data.error);
      _renderList_(tickets, queueType, deptFilter, container, userOwnedDepts);
    })
    .catch(function(err) {
      container.innerHTML = '<div class="tl-empty">Error loading tickets: ' + esc(String(err.message || err)) + '</div>';
    });
}

// Maps tracker dept → formal display title matching PAGE_TITLES in index.html
var _TRACKER_TITLES_ = {
  'METAL':        'Metal Tracker',
  'ELECTRICAL':   'Electrical Tracker',
  'PLASTIC':      'Plastic Tracker',
  'LITHO':        'Litho Tracker',
  'PLASTIC DEC':  'Plastic Dec Tracker',
  'QA':           'QA Tracker',
  'MACHINE SHOP': 'Machine Shop Tracker',
  'S/R':          'S/R Tracker',
  'SALES':        'Sales Tracker',
  'G&A':          'G&A Tracker'
};

// ── Sort utility (shared with closed-tickets + tech-work-board) ───────────────
var _tlSortState_ = {};

window._tlSorted_ = function(list, field, dir) {
  var m = dir === 'desc' ? -1 : 1;
  var PRI = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
  return list.slice().sort(function(a, b) {
    if (field === 'priority') {
      var ap = PRI[a.priority] !== undefined ? PRI[a.priority] : 99;
      var bp = PRI[b.priority] !== undefined ? PRI[b.priority] : 99;
      return (ap - bp) * m;
    }
    var av = a[field], bv = b[field];
    if (field === 'dateOpened' || field === 'dateClosed') {
      av = av ? new Date(av).getTime() : 0;
      bv = bv ? new Date(bv).getTime() : 0;
      return (av - bv) * m;
    }
    if (field === 'estHours') {
      return ((parseFloat(av) || 0) - (parseFloat(bv) || 0)) * m;
    }
    av = String(av || '').toLowerCase();
    bv = String(bv || '').toLowerCase();
    return av < bv ? -m : av > bv ? m : 0;
  });
};

function _tlTh_(group, field, label) {
  return '<th class="sort-th" data-sort-group="' + group + '" data-sort-field="' + field + '" onclick="_tlSortBy_(\'' + group + '\',\'' + field + '\')">' + label + '</th>';
}

function _tlSortBy_(group, field) {
  var cur = _tlSortState_[group] || {};
  _tlSortState_[group] = { field: field, dir: cur.field === field && cur.dir === 'asc' ? 'desc' : 'asc' };
  document.querySelectorAll('[data-sort-group="' + group + '"]').forEach(function(th) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.getAttribute('data-sort-field') === field) th.classList.add('sort-' + _tlSortState_[group].dir);
  });
  _tlFilter_(group);
}

function _renderList_(tickets, queueType, deptFilter, container, userOwnedDepts) {
  userOwnedDepts = userOwnedDepts || [];

  var title = queueType === 'waiting' ? 'Waiting Queue'
            : queueType === 'open'    ? 'Open Tickets'
            : queueType === 'verify'  ? 'Awaiting Verification'
            : queueType === 'tracker' ? (_TRACKER_TITLES_[deptFilter] || (deptFilter ? deptFilter.charAt(0) + deptFilter.slice(1).toLowerCase() + ' Tracker' : 'Dept Tracker'))
            : (deptFilter || 'Dept Tracker');

  // Build unique depts and statuses from data
  var allDepts = [], allStas = [];
  tickets.forEach(function(t) {
    if (t.dept   && allDepts.indexOf(t.dept)   < 0) allDepts.push(t.dept);
    if (t.status && allStas.indexOf(t.status) < 0) allStas.push(t.status);
  });
  allDepts.sort(); allStas.sort();

  // Normalize owned depts for comparison; fallback = all depts
  var normOwned    = userOwnedDepts.map(function(d) { return d.toUpperCase().trim(); });
  var defaultDepts = normOwned.length ? normOwned : allDepts.map(function(d) { return d.toUpperCase().trim(); });

  // Dept filter panel only when there are multiple depts and not already dept-scoped
  var showDeptFP = allDepts.length > 1 && queueType !== 'tracker';

  // For tracker: split primary-owned vs awaiting-verification vs joint vs pending-joint tickets
  var myTickets       = queueType === 'tracker' ? tickets.filter(function(t) { return !t.isJoint && !t.isPendingJoint && t.status !== 'PENDING VERIFICATION'; }) : tickets;
  var completeTickets = queueType === 'tracker' ? tickets.filter(function(t) { return !t.isJoint && !t.isPendingJoint && t.status === 'PENDING VERIFICATION'; }) : [];
  var jointTickets    = queueType === 'tracker' ? tickets.filter(function(t) { return  t.isJoint; }) : [];
  var pendingTickets  = queueType === 'tracker' ? tickets.filter(function(t) { return  t.isPendingJoint; }) : [];


  var _filtered = tickets.slice();
  var qt = queueType;

  function applyFilters() {
    var q = document.getElementById('tl-search-' + qt);
    var qv = q ? q.value.toLowerCase() : '';

    var deptCbs = document.querySelectorAll('.fp-cb-dept[data-fp="' + qt + '"]');
    var priCbs  = document.querySelectorAll('.fp-cb-pri[data-fp="'  + qt + '"]');
    var staCbs  = document.querySelectorAll('.fp-cb-sta[data-fp="'  + qt + '"]');

    var checkedDepts = [], checkedPris = [], checkedStas = [];
    deptCbs.forEach(function(cb) { if (cb.checked) checkedDepts.push(cb.value.toUpperCase().trim()); });
    priCbs.forEach(function(cb)  { if (cb.checked) checkedPris.push(cb.value); });
    staCbs.forEach(function(cb)  { if (cb.checked) checkedStas.push(cb.value); });

    _filtered = tickets.filter(function(t) {
      if (checkedDepts.length && checkedDepts.indexOf((t.dept || '').toUpperCase().trim()) < 0) return false;
      if (checkedPris.length  && checkedPris.indexOf(t.priority) < 0) return false;
      if (checkedStas.length  && checkedStas.indexOf(t.status)   < 0) return false;
      if (qv) {
        var hay = (t.ticketNo + ' ' + t.specificEquip + ' ' + t.description + ' ' +
                   t.assignedTo + ' ' + t.dept + ' ' + t.equipCode + ' ' + t.addedBy).toLowerCase();
        if (hay.indexOf(qv) < 0) return false;
      }
      return true;
    });

    var _ss     = _tlSortState_[qt];
    var _sorted = _ss && _ss.field ? _tlSorted_(_filtered, _ss.field, _ss.dir) : _filtered;

    if (qt === 'tracker') {
      var myF       = _sorted.filter(function(t) { return !t.isJoint && !t.isPendingJoint && t.status !== 'PENDING VERIFICATION'; });
      var completeF = _sorted.filter(function(t) { return !t.isJoint && !t.isPendingJoint && t.status === 'PENDING VERIFICATION'; });
      var jointF    = _sorted.filter(function(t) { return  t.isJoint; });
      var pendingF  = _sorted.filter(function(t) { return  t.isPendingJoint; });
      renderRows(myF,       'tl-tbody-tracker-my',       false);
      renderRows(completeF, 'tl-tbody-tracker-complete',  false);
      renderRows(jointF,    'tl-tbody-tracker-joint',    true);
      renderPendingRows(pendingF, 'tl-tbody-tracker-pending');
      var cntEl = document.getElementById('tl-cnt-' + qt);
      if (cntEl) cntEl.textContent = _sorted.length + ' ticket' + (_sorted.length !== 1 ? 's' : '');
      var avCard = document.getElementById('tl-complete-card');
      var jCard  = document.getElementById('tl-joint-card');
      var pjCard = document.getElementById('tl-pending-joint-card');
      if (avCard) avCard.style.display  = completeF.length  > 0 ? '' : 'none';
      if (jCard)  jCard.style.display   = jointF.length     > 0 ? '' : 'none';
      if (pjCard) pjCard.style.display  = pendingF.length   > 0 ? '' : 'none';
    } else {
      renderRows(_sorted);
    }

    // Update filter toggle badge
    var nActive = 0;
    if (deptCbs.length && checkedDepts.length < deptCbs.length)              nActive++;
    if (checkedPris.length > 0 && checkedPris.length < 4)                   nActive++;
    if (staCbs.length && checkedStas.length < staCbs.length)                nActive++;
    if (qv)                                                       nActive++;
    var btn   = document.getElementById('fp-toggle-' + qt);
    var badge = document.getElementById('fp-badge-'  + qt);
    if (btn)   btn.classList.toggle('fp-active', nActive > 0);
    if (badge) { badge.textContent = nActive; badge.style.display = nActive > 0 ? '' : 'none'; }
  }

  function renderRows(list, tbodyId, showDept) {
    var tbody = document.getElementById(tbodyId || ('tl-tbody-' + qt));
    if (!tbody) return;
    var deptCol = (showDept !== undefined && showDept !== null) ? showDept : (qt !== 'tracker');
    if (!tbodyId) {
      var cntEl = document.getElementById('tl-cnt-' + qt);
      if (cntEl) cntEl.textContent = list.length + ' ticket' + (list.length !== 1 ? 's' : '');
    }
    var colSpan = deptCol ? 13 : 12;
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="' + colSpan + '" class="tl-empty">No tickets match.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(function(t) {
      var priCls = 'pri-' + (t.priority || '');
      var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
      return '<tr onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')">' +
        '<td class="col-ticket">' + esc(t.ticketNo) + '</td>' +
        '<td style="color:var(--text-tertiary);font-size:11.5px;">' + esc(t.dateOpened) + '</td>' +
        '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority || '—') + '</span></td>' +
        '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span>' +
          (t.tempFixFlag ? '<span class="flag-tf">TF</span>' : '') + '</td>' +
        (deptCol ? '<td>' + esc(t.dept) + '</td>' : '') +
        '<td style="font-size:11.5px;color:var(--text-secondary);">' + esc(t.jointDepts || '') + '</td>' +
        '<td class="col-equip" title="' + esc(t.equipCode ? t.equipCode + ' — ' + t.specificEquip : t.specificEquip) + '">' +
          (t.equipCode ? '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">' + esc(t.equipCode) + '</span> ' : '') +
          esc(t.specificEquip) + '</td>' +
        '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description) + '</td>' +
        '<td class="col-photo">' + (t.photoUrl ? '<span class="clip-icon" title="Has photo">&#128206;</span>' : '') + '</td>' +
        '<td>' + esc(t.addedBy || '—') + '</td>' +
        (qt !== 'waiting' ? '<td class="tl-assignee-cell" data-ticket="' + esc(t.ticketNo) + '">' + esc(t.assignedTo || '—') + '</td>' : '') +
        '<td class="col-action" onclick="event.stopPropagation()">' +
          (t.isJoint ? '<button class="tl-joint-btn" onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')" title="Joint ticket&#58; ' + esc(t.jointDepts || '') + '">&#128279;</button>' : '') +
          '<button class="tl-assign-btn" onclick="_tlShowAssignPop_(this,\'' + esc(t.ticketNo) + '\')" title="Assign technician">&#128100;</button>' +
          (qt === 'waiting' && USER && USER.isManager ? '<button class="tl-quickapprove-btn" onclick="_tlQuickApprove_(this,\'' + esc(t.ticketNo) + '\')" title="Approve ticket">&#10003;</button>' : '') +
        '</td>' +
        '</tr>';
    }).join('');
  }

  var showDept = qt !== 'tracker';

  // Build filter panel HTML
  function buildDeptChips() {
    return allDepts.map(function(d) {
      var checked = defaultDepts.indexOf(d.toUpperCase().trim()) >= 0;
      return '<label class="fp-chip' + (checked ? ' fp-checked' : '') + '">' +
        '<input type="checkbox" value="' + esc(d) + '" data-fp="' + qt + '" class="fp-cb-dept"' +
        (checked ? ' checked' : '') + ' onchange="_fpChip_(this);_tlFilter_(\'' + qt + '\')">' +
        esc(d) + '</label>';
    }).join('');
  }

  function buildPriChips() {
    return ['CRITICAL','HIGH','MEDIUM','LOW'].map(function(p) {
      return '<label class="fp-chip">' +
        '<input type="checkbox" value="' + p + '" data-fp="' + qt + '" class="fp-cb-pri"' +
        ' onchange="_fpChip_(this);_tlFilter_(\'' + qt + '\')">' +
        p + '</label>';
    }).join('');
  }

  function buildStaChips() {
    return allStas.map(function(s) {
      return '<label class="fp-chip fp-checked">' +
        '<input type="checkbox" value="' + esc(s) + '" data-fp="' + qt + '" class="fp-cb-sta" checked' +
        ' onchange="_fpChip_(this);_tlFilter_(\'' + qt + '\')">' +
        esc(s) + '</label>';
    }).join('');
  }

  var fpHtml =
    '<div class="fp-bar fp-open" id="fp-bar-' + qt + '">' +
      '<div class="fp-row">' +
        (showDeptFP
          ? '<div class="fp-group">' +
              '<div class="fp-glabel">Department</div>' +
              '<div class="fp-checks">' + buildDeptChips() + '</div>' +
              '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;">' +
                (normOwned.length

function _tlWatchList_(tickets) {
  var watchlist = tickets.filter(function(t) {
    return (t.priority === 'CRITICAL' || t.priority === 'HIGH') && t.status !== 'CLOSED' && t.status !== 'VOIDED';
  });
  var rows = watchlist.length === 0
    ? '<tr><td colspan="6" class="tl-watch-empty">No critical or high-priority open tickets.</td></tr>'
    : watchlist.map(function(t) {
        var priCls = 'pri-' + (t.priority || '');
        var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
        return '<tr onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')" style="cursor:pointer;">' +
          '<td class="col-ticket">' + esc(t.ticketNo) + '</td>' +
          '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority) + '</span></td>' +
          '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span>' + (t.tempFixFlag ? '<span class="flag-tf">TF</span>' : '') + '</td>' +
          '<td class="col-equip" title="' + esc(t.specificEquip) + '">' + esc(t.specificEquip) + '</td>' +
          '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description) + '</td>' +
          '<td>' + esc(t.assignedTo || '—') + '</td>' +
          '</tr>';
      }).join('');
  return '<div class="tl-card">' +
    '<div class="tl-card-header">' +
      '<span style="color:var(--status-high);font-size:13px;margin-right:4px;">&#9888;</span>' +
      '<span class="tl-card-title">Priority Watch List</span>' +
      '<span class="tl-card-sub">Critical &amp; High &middot; ' + watchlist.length + ' ticket' + (watchlist.length !== 1 ? 's' : '') + '</span>' +
    '</div>' +
    '<div style="overflow-x:auto;"><table class="tl-table">' +
      '<thead><tr><th>Ticket #</th><th>Priority</th><th>Status</th><th>Equipment</th><th>Description</th><th>Assigned To</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div></div>';
}

function _tlKpiBar_(tickets) {
  var total  = tickets.length;
  var open   = tickets.filter(function(t) { return t.status === 'OPEN'; }).length;
  var crit   = tickets.filter(function(t) { return t.priority === 'CRITICAL'; }).length;
  var high   = tickets.filter(function(t) { return t.priority === 'HIGH'; }).length;
  var pp     = tickets.filter(function(t) { return t.status === 'PENDING PARTS'; }).length;
  var hold   = tickets.filter(function(t) { return t.status === 'ON HOLD'; }).length;
  var pv     = tickets.filter(function(t) { return t.status === 'PENDING VERIFICATION'; }).length;
  var un     = tickets.filter(function(t) { return !t.assignedTo; }).length;
  function cell(val, label, mod) {
    return '<div class="ds-cell' + (mod ? ' ' + mod : '') + '">' +
           '<div class="ds-lbl">' + esc(label) + '</div>' +
           '<div class="ds-v">' + val + '</div></div>';
  }
  return '<div class="dept-strip" style="grid-template-columns:repeat(8,1fr);">' +
    cell(total, 'Total',         '') +
    cell(open,  'Open',          '') +
    cell(crit,  'Critical',      crit > 0 ? 'ds-crit' : '') +
    cell(high,  'High',          high > 0 ? 'ds-high' : '') +
    cell(pp,    'Pending Parts', pp   > 0 ? 'ds-warn' : '') +
    cell(hold,  'On Hold',       hold > 0 ? 'ds-warn' : '') +
    cell(pv,    'Pend. Verify',  pv   > 0 ? 'ds-warn' : '') +
    cell(un,    'Unassigned',    '') +
  '</div>';
}

function _tlFilter_(queueType) {
  var ref = window['_tlFilterData_' + queueType];
  if (ref) ref.applyFilters();
}

// Renders the pending-joint rows (with Accept / Reject buttons instead of navigation)
function renderPendingRows(list, tbodyId) {
  var tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="tl-empty">No pending requests.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(t) {
    var priCls = 'pri-' + (t.priority || '');
    var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
    return '<tr>' +
      '<td class="col-ticket" onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')" style="cursor:pointer;">' + esc(t.ticketNo) + '</td>' +
      '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority || '—') + '</span></td>' +
      '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span></td>' +
      '<td>' + esc(t.dept) + '</td>' +
      '<td class="col-equip" title="' + esc(t.specificEquip) + '">' + esc(t.specificEquip || '—') + '</td>' +
      '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description || '—') + '</td>' +
      '<td style="text-align:center;white-space:nowrap;">' +
        '<button onclick="_tlAcceptJoint_(\'' + esc(t.ticketNo) + '\')" ' +
          'style="height:26px;padding:0 10px;border:1px solid #2E7D32;border-radius:4px;font-size:11.5px;font-weight:600;background:#E8F5E9;color:#2E7D32;cursor:pointer;margin-right:4px;">&#10003; Accept</button>' +
        '<button onclick="_tlRejectJoint_(\'' + esc(t.ticketNo) + '\')" ' +
          'style="height:26px;padding:0 10px;border:1px solid #C62828;border-radius:4px;font-size:11.5px;font-weight:600;background:#FFEBEE;color:#C62828;cursor:pointer;">&#10007; Reject</button>' +
      '</td>' +
      '</tr>';
  }).join('');
}

function _tlAcceptJoint_(ticketNo) {
  if (!confirm('Accept the joint attachment request for ticket ' + ticketNo + '?\n\nYour department will be added to this ticket and you will be required to sign off before it can be closed.')) return;
  fetch(WORKER_URL + '/api/tickets/confirm-joint', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({ ticketNo: ticketNo })
  })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (r && r.success) {
        showToast('&#10003; Joint request accepted for ' + ticketNo, 'success');
        var activePageEl = document.querySelector('[id^="page-tracker-"]');
        if (activePageEl) {
          var deptMatch = activePageEl.id.replace('page-tracker-', '');
          _refreshQueuePage_('tracker-' + deptMatch, deptMatch.replace(/-/g, ' ').toUpperCase());
        }
      } else {
        showToast('Error: ' + ((r && r.error) || 'Unknown error'), 'error');
      }
    })
    .catch(function(err) { showToast('Server error: ' + String(err.message || err), 'error'); });
}

function _tlRejectJoint_(ticketNo) {
  var reason = prompt('Reason for rejecting the joint request on ' + ticketNo + ' (optional):');
  if (reason === null) return;  // user cancelled
  fetch(WORKER_URL + '/api/tickets/reject-joint', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({ ticketNo: ticketNo, reason: reason })
  })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (r && r.success) {
        showToast('Joint request rejected for ' + ticketNo, 'info');
        var activePageEl = document.querySelector('[id^="page-tracker-"]');
        if (activePageEl) {
          var deptMatch = activePageEl.id.replace('page-tracker-', '');
          _refreshQueuePage_('tracker-' + deptMatch, deptMatch.replace(/-/g, ' ').toUpperCase());
        }
      } else {
        showToast('Error: ' + ((r && r.error) || 'Unknown error'), 'error');
      }
    })
    .catch(function(err) { showToast('Server error: ' + String(err.message || err), 'error'); });
}

function _tlRollover_(dept) {
  if (!confirm('Remove all CLOSED and VOIDED tickets from the ' + (dept || 'tracker') + ' sheet?\n\nTickets remain in the Closed Tickets record — this only cleans up the physical tracker sheet view.')) return;
  var deptId = 'tracker-' + (dept || '').toLowerCase().replace(/\s+/g, '-');
  fetch(WORKER_URL + '/api/tickets/rollover', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({ dept: dept })
  })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result && result.success) {
        var n = result.totalRemoved;
        showToast(
          result.message || (n > 0
            ? 'Removed ' + n + ' closed/voided ticket' + (n !== 1 ? 's' : '') + ' from ' + (dept || 'tracker') + ' sheet'
            : 'Nothing to remove — tracker sheet is already clean'),
          n > 0 ? 'success' : 'info'
        );
      } else {
        showToast('Rollover failed: ' + ((result && result.error) || 'Unknown error'), 'error');
      }
      _refreshQueuePage_(deptId, dept);
    })
    .catch(function(err) {
      showToast('Server error: ' + String(err.message || err), 'error');
      _refreshQueuePage_(deptId, dept);
    });
}

function _refreshQueuePage_(queueType, deptFilter) {
  var pageEl = document.getElementById('page-' + queueType);
  if (!pageEl) return;
  _loadListPage_(queueType, deptFilter || null, pageEl);
}

// ── Filter panel helpers (global — used by all ticket views) ─────────────────

window._fpChip_ = function(cb) {
  var l = cb.parentNode;
  if (l) l.classList.toggle('fp-checked', cb.checked);
};

function _tlToggleFP_(queueType) {
  var bar = document.getElementById('fp-bar-' + queueType);
  var btn = document.getElementById('fp-toggle-' + queueType);
  if (!bar) return;
  bar.classList.toggle('fp-open');
  if (btn) btn.classList.toggle('fp-active', bar.classList.contains('fp-open'));
}

function _fpResetDepts_(queueType) {
  var ref   = window['_tlFilterData_' + queueType];
  var owned = (ref && ref.userOwnedDepts) || [];
  document.querySelectorAll('.fp-cb-dept[data-fp="' + queueType + '"]').forEach(function(cb) {
    var shouldCheck = !owned.length || owned.indexOf(cb.value.toUpperCase().trim()) >= 0;
    cb.checked = shouldCheck;
    window._fpChip_(cb);
  });
  _tlFilter_(queueType);
}

function _fpSelectAllDepts_(queueType) {
  document.querySelectorAll('.fp-cb-dept[data-fp="' + queueType + '"]').forEach(function(cb) {
    cb.checked = true; window._fpChip_(cb);
  });
  _tlFilter_(queueType);
}

function _fpDeselectAllDepts_(queueType) {
  document.querySelectorAll('.fp-cb-dept[data-fp="' + queueType + '"]').forEach(function(cb) {
    cb.checked = false; window._fpChip_(cb);
  });
  _tlFilter_(queueType);
}

// ── Quick-assign popover ──────────────────────────────────────────────────────
var _tlTechs_   = null;   // cached people list
var _tlActivePop_ = null; // currently open popover element

function _tlClosePop_() {
  if (_tlActivePop_) { _tlActivePop_.remove(); _tlActivePop_ = null; }
}

document.addEventListener('click', function(e) {
  if (_tlActivePop_ && !_tlActivePop_.contains(e.target)) _tlClosePop_();
});

function _tlShowAssignPop_(btn, ticketNo) {
  _tlClosePop_();

  function _renderPop_(techs) {
    var pop = document.createElement('div');
    pop.className = 'tl-assign-pop';
    var opts = '<option value="">— Unassign —</option>' +
      techs.map(function(n) { return '<option>' + esc(n) + '</option>'; }).join('');
    pop.innerHTML =
      '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:2px;">Assign: ' + esc(ticketNo) + '</div>' +
      '<select id="tl-pop-sel">' + opts + '</select>' +
      '<div class="tl-assign-pop-btns">' +
        '<button class="tl-ap-confirm" onclick="_tlConfirmAssign_(\'' + esc(ticketNo) + '\')">Assign</button>' +
        '<button class="tl-ap-cancel" onclick="_tlClosePop_()">Cancel</button>' +
      '</div>';

    var rect = btn.getBoundingClientRect();
    pop.style.top  = (rect.bottom + 4) + 'px';
    pop.style.left = Math.max(4, rect.right - 210) + 'px';
    document.body.appendChild(pop);
    _tlActivePop_ = pop;
    pop.querySelector('select').focus();
  }

  if (_tlTechs_) { _renderPop_(_tlTechs_); return; }

  fetch(WORKER_URL + '/api/submit/form-data', { headers: { 'X-User-Email': USER ? USER.email : '' } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      _tlTechs_ = Array.isArray(d.peopleList) ? d.peopleList : [];
      _renderPop_(_tlTechs_);
    })
    .catch(function() { _tlTechs_ = []; _renderPop_([]); });
}

function _tlConfirmAssign_(ticketNo) {
  var sel = document.getElementById('tl-pop-sel');
  if (!sel) return;
  var tech = sel.value.trim();
  var btn  = _tlActivePop_ ? _tlActivePop_.querySelector('.tl-ap-confirm') : null;
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  fetch(WORKER_URL + '/api/tickets/assign', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({ ticketNo: ticketNo, assignedTo: tech, updatedBy: USER ? (USER.name || USER.email) : '' })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) throw new Error(d.error);
    // update the assignee cell in the row without a full reload
    var cell = document.querySelector('.tl-assignee-cell[data-ticket="' + ticketNo + '"]');
    if (cell) cell.textContent = tech || '—';
    _tlClosePop_();
  })
  .catch(function(err) {
    alert('Assignment failed: ' + (err.message || err));
    if (btn) { btn.disabled = false; btn.textContent = 'Assign'; }
  });
}

// ── Quick-approve (Waiting → Open, assign to manager's dept) ─────────────────
function _tlQuickApprove_(btn, ticketNo) {
  btn.disabled = true;
  btn.textContent = '…';

  fetch(WORKER_URL + '/api/tickets/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({ ticketNo: ticketNo, updatedBy: USER ? (USER.name || USER.email) : '' })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) throw new Error(d.error);
    var row = btn.closest('tr');
    if (row) {
      row.style.transition = 'opacity .25s';
      row.style.opacity = '0';
      setTimeout(function() { row.remove(); }, 260);
    }
    showToast('✓ ' + ticketNo + ' approved', 'success');
    var bd = document.getElementById('badge-waiting');
    if (bd) { var n = parseInt(bd.textContent, 10) - 1; if (n <= 0) bd.style.display = 'none'; else bd.textContent = n; }
    var cntEl = document.getElementById('tl-cnt-waiting');
    if (cntEl) { var m = cntEl.textContent.match(/(\d+)/); if (m) { var c = Math.max(0, parseInt(m[1], 10) - 1); cntEl.textContent = c + ' ticket' + (c !== 1 ? 's' : ''); } }
  })
  .catch(function(err) {
    alert('Approval failed: ' + (err.message || err));
    btn.disabled = false;
    btn.textContent = '✓';
  });
}
</script>
