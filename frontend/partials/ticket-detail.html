<!-- ║  actions.  openTicketDetail(ticketNo) is the public API.       ║ -->

<style>
/* ── Ticket Detail overlay ───────────────────────────────────────────── */
#td-overlay{
  position:fixed;top:var(--topbar-h);right:0;
  width:calc(100% - var(--sidebar-w));
  height:calc(100vh - var(--topbar-h));
  background:var(--bg-app);z-index:50;
  transform:translateX(100%);transition:transform .22s ease;
  overflow-y:auto;display:flex;flex-direction:column;
}
#td-overlay.open{transform:translateX(0);}
.app.collapsed #td-overlay{width:calc(100% - var(--sidebar-w-collapsed));}

.td-header{
  background:var(--bg-surface);border-bottom:1px solid var(--border-default);
  padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.td-back{background:transparent;border:1px solid var(--border-default);border-radius:6px;
  padding:5px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:5px;}
.td-back:hover{background:var(--bg-hover);color:var(--text-primary);}
.td-tn{font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--brand-navy);}
.td-body{padding:20px 24px;flex:1;}
.td-section{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.td-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:12px;}
.td-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px 18px;}
.td-field label{font-size:10.5px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px;}
.td-field .val{font-size:13px;color:var(--text-primary);}
.td-field .val.mono{font-family:var(--font-mono);font-size:12px;}
.td-field .val.desc{white-space:pre-wrap;word-break:break-word;}
.td-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.btn-action{height:34px;padding:0 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:0;display:flex;align-items:center;gap:6px;}
.btn-approve   {background:var(--status-info);color:#fff;}
.btn-complete  {background:var(--status-success);color:#fff;}
.btn-verify    {background:var(--status-success);color:#fff;}
.btn-void      {background:var(--status-low-bg);color:var(--text-secondary);border:1px solid var(--border-strong);}
.btn-danger    {background:#DC2626;color:#fff;border:1px solid #B91C1C;}
.btn-assign    {background:var(--bg-subtle);color:var(--text-primary);border:1px solid var(--border-default);}
.btn-tempfix   {background:var(--status-warn-bg);color:var(--status-warn);border:1px solid #FDE68A;}
.btn-transfer  {background:var(--status-warn-bg);color:#92400E;border:1px solid #FDE68A;}
.btn-update    {background:var(--bg-surface);color:var(--brand-navy);border:1px solid var(--brand-navy);font-weight:600;}
.td-pending-close{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;background:var(--status-warn-bg);border:1px solid #FDE68A;color:#92400E;font-size:12px;font-weight:600;}
.joint-banner{border-radius:8px;padding:11px 16px;margin-bottom:14px;font-size:12.5px;font-weight:600;display:flex;align-items:flex-start;gap:10px;line-height:1.4;}
.joint-banner.role-fixer{background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8;}
.joint-banner.role-fixer-done{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;}
.joint-banner.role-owner-waiting{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;}
.joint-banner.role-owner-ready{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;}

.joint-banner-body{flex:1;}
.joint-banner-body .jb-sub{font-weight:400;font-size:11.5px;margin-top:3px;opacity:.85;}

.jd-complete{background:#22C55E;}.jd-pending{background:#F59E0B;}
.btn-parts     {background:#F5F3FF;color:#5B21B6;border:1px solid #C4B5FD;}
.btn-action:hover{filter:brightness(.93);}
.btn-action:disabled{opacity:.45;cursor:default;}

/* Photo link (kept for backwards compat) */

  background:var(--status-info-bg);border:1px solid var(--status-info);color:var(--status-info);
  font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;margin-right:6px;}

.btn-add-photo:hover{background:#DBEAFE;}
.btn-add-photo:disabled{opacity:.45;cursor:default;}

/* Photo thumbnail grid */
.photo-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;}
.photo-card{display:inline-flex;flex-direction:column;align-items:center;border:1px solid var(--border-default);border-radius:8px;overflow:hidden;text-decoration:none;background:var(--bg-subtle);transition:box-shadow .15s,border-color .15s;}

.photo-card--err img{display:none !important;}
.photo-card--err{width:160px;min-height:96px;justify-content:center;}

/* History timeline */
.th-list{list-style:none;margin:0;padding:0;}
.th-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-default);}
.th-item:last-child{border-bottom:0;}
.th-dot{width:8px;height:8px;border-radius:50%;background:var(--brand-navy);flex-shrink:0;margin-top:4px;}
.th-ts{font-size:11px;color:var(--text-tertiary);white-space:nowrap;min-width:130px;}
.th-event{font-size:12.5px;font-weight:600;color:var(--text-primary);}
.th-by{font-size:11.5px;color:var(--text-secondary);}
.th-notes{font-size:11.5px;color:var(--text-tertiary);margin-top:2px;}

/* Action modals */
.td-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;}
.td-modal{background:#fff;border-radius:12px;padding:24px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.td-modal h3{font-size:14px;font-weight:700;color:var(--text-primary);margin:0 0 14px 0;}
.td-modal .form-group{margin-bottom:12px;}
.td-modal label{font-size:11.5px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:4px;}
.td-modal input,.td-modal select,.td-modal textarea{width:100%;padding:7px 10px;border:1px solid var(--border-default);border-radius:6px;font-size:13px;font-family:inherit;}
.td-modal textarea{height:72px;resize:vertical;}
.td-modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.td-modal .btn-cancel{height:32px;padding:0 14px;border-radius:6px;border:1px solid var(--border-default);background:#fff;font-size:12.5px;cursor:pointer;}
.td-modal .btn-confirm{height:32px;padding:0 16px;border-radius:6px;border:0;background:var(--brand-navy);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;}
.td-modal .btn-confirm:hover{background:var(--brand-navy-soft);}
/* Service-report print isolation: print only the report, not the whole dashboard. */
@media print {
  body.printing-sr *{visibility:hidden !important;}

  body.printing-sr #td-modal-container *{visibility:visible !important;}
  body.printing-sr .td-modal-backdrop{position:static;background:#fff;display:block;inset:auto;}
  body.printing-sr .td-modal{box-shadow:none;width:auto;max-width:100%;max-height:none;overflow:visible;}
  body.printing-sr .td-modal .modal-actions{display:none !important;}
}

/* ── Section edit button ─────────────────────────────────────────────────── */

<script>
window.PAGES = window.PAGES || {};

var _tdTicketNo = null;
var _tdTicket   = null;

// ── Joint-ticket role helpers (two-step workflow) ──────────────────────────────
// Owner dept = the dept that opened the ticket (t.dept) — verifies & closes.
// Fixer dept = a dept added to t.jointDepts — performs the repair + CAPA.
function _isOwnerDept_(t) {
  return USER.isAdmin || (USER.ownedDepts || []).indexOf(t.dept) >= 0;
}
function _isJoint_(t) {
  return !!(t.jointDepts && String(t.jointDepts).trim());
}
function _isFixerDept_(t) {
  if (USER.isAdmin) return true;
  var jd   = String(t.jointDepts || '').split(',').map(function(d) { return d.trim(); }).filter(Boolean);
  var mine = USER.ownedDepts || [];
  return jd.some(function(d) { return mine.indexOf(d) >= 0; });
}
function _isPendingJointDept_(t) {
  var pd   = String(t.pendingJointDepts || '').split(',').map(function(d) { return d.trim(); }).filter(Boolean);
  var mine = USER.ownedDepts || [];
  return pd.some(function(d) { return mine.indexOf(d) >= 0; });
}

// ── Public API ────────────────────────────────────────────────────────────────

function openTicketDetail(ticketNo) {
  _tdTicketNo = ticketNo;
  _tdTicket   = null;
  var overlay = document.getElementById('td-overlay');
  overlay.classList.add('open');
  overlay.scrollTop = 0;
  document.getElementById('td-tn').textContent = ticketNo;
  document.getElementById('td-status-badge').innerHTML = '';
  document.getElementById('td-pri-badge').innerHTML    = '';
  document.getElementById('td-dept-label').textContent = '';
  document.getElementById('td-body').innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading ticket…</span></div>';

  fetch(WORKER_URL + '/api/tickets/detail?ticketNo=' + encodeURIComponent(ticketNo), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result && result.error) {
      document.getElementById('td-body').innerHTML =
        '<div style="padding:40px 24px;color:var(--text-secondary);">Error: ' + esc(result.error) + '</div>';
      return;
    }
    _renderDetail_(result);
  })
  .catch(function(err) {
    document.getElementById('td-body').innerHTML =
      '<div style="padding:40px 24px;color:var(--text-secondary);">Error: ' + esc(err.message || String(err)) + '</div>';
  });
}

function closeTicketDetail() {
  document.getElementById('td-overlay').classList.remove('open');
}

// ── Renderer ──────────────────────────────────────────────────────────────────

function _renderDetail_(result) {
  if (!result || !result.ticket) {
    document.getElementById('td-body').innerHTML =
      '<div style="padding:40px 24px;color:var(--text-secondary);">Ticket not found.</div>';
    return;
  }
  _tdTicket = result.ticket;
  var t      = result.ticket;
  var hist   = result.history   || [];
  var techs  = result.techs     || [];
  var isManager = USER.isManager;

  // Section edit button helper (manager-only pencil icon)
  var _editBtn_ = function(s) {
    return !isManager ? '' :
      '<button class="td-sec-edit-btn" onclick="_tdEditSection_(\'' + s + '\')" title="Edit this section">' +
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
      '<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>' +
      '<path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>';
  };

  // Update header badges
  document.getElementById('td-status-badge').innerHTML =
    '<span class="stat-badge stat-' + esc(t.status.replace(/\s+/g, '-')) + '">' + esc(t.status) + '</span>';
  document.getElementById('td-pri-badge').innerHTML = t.priority
    ? '<span class="pri-badge pri-' + esc(t.priority) + '">' + esc(t.priority) + '</span>' : '';
  document.getElementById('td-dept-label').textContent = t.dept;

  // ── Joint role banner ─────────────────────────────────────────────────────
  var isOwner        = _isOwnerDept_(t);
  var isFixer        = _isFixerDept_(t);
  var isJoint        = _isJoint_(t);
  var isPendingJoint = _isPendingJointDept_(t);
  var jointBanner    = '';

  // Banner for pending-joint dept viewing a WAITING ticket — invite them to approve
  if (!isJoint && isPendingJoint && isManager && t.status === 'WAITING') {
    var _pjMyDepts = (USER.ownedDepts || []).filter(function(d) {
      return (t.pendingJointDepts || '').split(',').map(function(x){return x.trim();}).indexOf(d) >= 0;
    });
    jointBanner = '<div class="joint-banner role-fixer">' +
      '<span>🔗</span><div class="joint-banner-body">Your department (' + esc(_pjMyDepts.join(', ') || '—') + ') has been invited as a joint fixer on this ticket.' +
      '<div class="jb-sub">Click <strong>Approve → Open</strong> to open the ticket and confirm your joint attachment in one step.</div>' +
      '</div></div>';
  }

  // Compute my signoff status before the banner block so the button section can use it too.
  var _jbMyDone = true; // defaults to true (no action needed from me)
  if (isJoint && isManager) {
    var _jbSignoffs = {};
    try { _jbSignoffs = JSON.parse(t.jointSignoffs || '{}'); } catch(e) {}
    var _jbDepts = (t.jointDepts || '').split(',').map(function(d){return d.trim();}).filter(Boolean);
    var _jbDone  = _jbDepts.filter(function(d){ return _jbSignoffs[d] && _jbSignoffs[d].complete; });
    var _jbLeft  = _jbDepts.filter(function(d){ return !(_jbSignoffs[d] && _jbSignoffs[d].complete); });
    var _jbMyDepts = (USER.ownedDepts || []).filter(function(d){ return _jbDepts.indexOf(d) >= 0; });
    _jbMyDone  = _jbMyDepts.every(function(d){ return _jbSignoffs[d] && _jbSignoffs[d].complete; });
    var _jbAssignments = {};
    try { _jbAssignments = JSON.parse(t.jointAssignedTo || '{}'); } catch(e) {}
    var _jbDeptRows = function(list, done) {
      return list.map(function(d) {
        var tech = _jbAssignments[d] || '';
        var techStr = tech
          ? '<span style="font-size:11px;color:#6B7280;margin-left:8px;">→ ' + esc(tech) + '</span>'
          : '';
        var canAssign = isManager && (USER.isAdmin || (USER.ownedDepts || []).indexOf(d) >= 0) && !done;
        var assignBtn = canAssign
          ? '<button onclick="_jdAssignTech_(\'' + d.replace(/'/g,"\\'") + '\')" style="margin-left:8px;font-size:10px;padding:1px 7px;border:1px solid #D1D5DB;border-radius:3px;background:#F9FAFB;color:#374151;cursor:pointer;">'
            + (tech ? 'Reassign' : 'Assign Tech') + '</button>'
          : '';
        return '<div class="joint-dept-row"><div class="joint-dept-dot ' + (done ? 'jd-complete' : 'jd-pending') + '"></div>'
          + esc(d) + techStr + assignBtn + '</div>';
      }).join('');
    };

    if (t.status === 'PENDING VERIFICATION') {
      if (isOwner) {
        jointBanner = '<div class="joint-banner role-owner-ready">' +
          '<span>✅</span><div class="joint-banner-body">All joint departments have completed their work.' +
          '<div class="jb-sub">You can now verify and close this ticket.</div></div></div>';
      } else if (isFixer && _jbMyDone) {
        // My signoff is recorded — just waiting for the owner to close.
        jointBanner = '<div class="joint-banner role-pending-close">' +
          '<span>⏳</span><div class="joint-banner-body">Your department\'s work is recorded.' +
          '<div class="jb-sub">' + esc(t.dept) + ' is now reviewing and will close this ticket.</div></div></div>';
      } else if (isFixer && !_jbMyDone) {
        // My signoff is MISSING — the ticket moved to Pending Verification without it.
        // Show a warning and surface Mark Work Complete so they can unblock the close.
        jointBanner = '<div class="joint-banner role-fixer" style="border-color:#FCA5A5;background:#FEF2F2;color:#991B1B;">' +
          '<span>⚠️</span><div class="joint-banner-body">Your department\'s signoff is still required.' +
          '<div class="jb-sub">Click <strong>Mark Work Complete</strong> below to submit your CAPA and unblock ' + esc(t.dept) + '\'s close.</div></div></div>';
      }
    } else if (t.status === 'OPEN' || t.status === 'PENDING PARTS') {
      if (isFixer && _jbMyDone && _jbLeft.length) {
        jointBanner = '<div class="joint-banner role-fixer-done">' +
          '<span>✓</span><div class="joint-banner-body">Your work has been recorded.' +
          '<div class="jb-sub">Waiting on: ' + _jbLeft.map(function(d){return esc(d);}).join(', ') + ' to complete their work.</div>' +
          _jbDeptRows(_jbDone, true) + _jbDeptRows(_jbLeft, false) + '</div></div>';
      } else if (isFixer && !_jbMyDone) {
        jointBanner = '<div class="joint-banner role-fixer">' +
          '<span>🔗</span><div class="joint-banner-body">Your department (' + esc(_jbMyDepts.join(', ') || '—') + ') is a joint fixer on this ticket.' +
          '<div class="jb-sub">Complete your repair, then click <strong>Mark Work Complete</strong>.</div></div></div>';
      } else if (isOwner) {
        jointBanner = '<div class="joint-banner role-owner-waiting">' +
          '<span>⏳</span><div class="joint-banner-body">Waiting on joint departments to complete their work.' +
          (_jbDone.length  ? '<div class="jb-sub">Done: ' + _jbDone.map(function(d){return esc(d);}).join(', ') + '</div>' : '') +
          (_jbLeft.length  ? '<div class="jb-sub">Still working: ' + _jbLeft.map(function(d){return esc(d);}).join(', ') + '</div>' : '') +
          _jbDeptRows(_jbDone, true) + _jbDeptRows(_jbLeft, false) + '</div></div>';
      }
    }
  }

  // ── Action buttons ─────────────────────────────────────────────────────────
  var actions = '';
  // Two-step segmentation: the work-doer (fixer on joint tickets, owner on
  // single-dept tickets) performs the repair + CAPA; the owner verifies & closes.
  var canWork   = isManager && (isJoint ? isFixer : isOwner);
  var canVerify = isManager && isOwner;
  // Pending-joint dept managers can approve WAITING tickets — doing so opens the
  // ticket and auto-confirms their joint attachment in one step.
  var canManage = isManager && (isOwner || isPendingJoint);

  if (t.status === 'WAITING' && canManage) {
    var approveLabel = isPendingJoint && !isOwner
      ? '✓ Approve → Open (confirm joint)'
      : '✓ Approve → Open';
    actions += '<button class="btn-action btn-approve" onclick="_tdApprove_()">' + approveLabel + '</button>';
  }
  // A joint fixer who hasn't yet signed off needs Mark Work Complete even when
  // the ticket is already in Pending Verification (e.g. ticket moved there before
  // their joint dept was added, or they missed the normal submission window).
  var _needsMyComplete = canWork && isJoint && isFixer && !_jbMyDone;
  if ((t.status === 'OPEN' || t.status === 'PENDING PARTS' || (t.status === 'PENDING VERIFICATION' && _needsMyComplete)) && canWork) {
    actions += '<button class="btn-action btn-complete" onclick="_tdComplete_()">✓ Mark Work Complete</button>';
    if (t.status !== 'PENDING VERIFICATION') {
      if (!t.tempFixFlag) {
        actions += '<button class="btn-action btn-tempfix" onclick="_tdFlagTF_()">Flag Temp Fix</button>';
      }
      actions += '<button class="btn-action btn-void" onclick="_tdIssueTag_()">🏷 Issue Hold Tag</button>';
    }
  }
  if (t.status === 'PENDING VERIFICATION' && canVerify) {
    actions += '<button class="btn-action btn-verify" onclick="_tdVerifyClose_()">✓ Verify &amp; Close</button>';
  } else if (t.status === 'PENDING VERIFICATION' && !_needsMyComplete) {
    // Only show the "owner must close" notice when the viewer isn't a fixer who
    // still needs to submit their own signoff — otherwise the banner above covers it.
    actions += '<span class="td-pending-close">⏳ ' + esc(t.dept) + ' Manager must close this ticket</span>';
  }
  if (t.status !== 'CLOSED' && t.status !== 'VOIDED' && canManage) {
    actions += '<button class="btn-action btn-transfer" onclick="_tdTransfer_()">🔗 Add Joint Department</button>';
  }

  // Service Report is a record/print output available for ANY closed ticket a
  // manager can view — not restricted to owned departments.
  if (isManager && t.status === 'CLOSED') {
    actions += '<button class="btn-action btn-update" onclick="_tdServiceReport_()">📝 Service Report</button>';
  }

  // Pending joint request: receiving (fixer) dept manager can Accept or Decline
  if (isManager && t.pendingJointDepts) {
    var pjList  = t.pendingJointDepts.split(',').map(function(d) { return d.trim(); }).filter(Boolean);
    var myDepts = USER.ownedDepts || [];
    var inPend  = false;
    for (var pji = 0; pji < pjList.length; pji++) {
      if (myDepts.indexOf(pjList[pji]) >= 0) { inPend = true; break; }
    }
    if (inPend) {
      actions +=
        '<button class="btn-action btn-verify" onclick="_tdAcceptJoint_()">🔗 Accept Joint Request</button>' +
        '<button class="btn-action btn-void"   onclick="_tdRejectJoint_()">✗ Reject Joint Request</button>';
    }
  }
  // Parts request + photo: all roles, any non-terminal status
  if (t.status !== 'CLOSED' && t.status !== 'VOIDED') {
    actions += '<button class="btn-action btn-parts" onclick="_tdRequestParts_()">🔩 Request Parts</button>';
    actions += '<button class="btn-action btn-update" onclick="_tdAddPhoto_()">📷 Add Photo</button>';
  }
  // Refresh button — always shown, reloads ticket data from server.
  actions += '<button class="btn-action btn-update" onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')" title="Reload ticket from server">&#8635; Refresh</button>';
  // Void sits on the far right of the action row (margin-left:auto pushes it there).
  if (t.status !== 'CLOSED' && t.status !== 'VOIDED' && canManage) {
    actions += '<button class="btn-action btn-danger" style="margin-left:auto;" onclick="_tdVoid_()">Void Ticket</button>';
  }

  // ── Info grid ──────────────────────────────────────────────────────────────
  function field(lbl, val, cls) {
    return '<div class="td-field"><label>' + esc(lbl) + '</label>' +
      '<div class="val ' + (cls||'') + '">' + esc(val || '—') + '</div></div>';
  }

  var html =
    jointBanner +
    (actions ? '<div class="td-actions">' + actions + '</div>' : '') +

    '<div class="td-section">' +
      '<div class="td-section-title" style="display:flex;align-items:center;justify-content:space-between;">Ticket Overview' + _editBtn_('overview') + '</div>' +
      '<div class="td-grid">' +
        field('Ticket #',      t.ticketNo,    'mono') +
        field('Status',        t.status) +
        field('Priority',      t.priority) +
        field('Department',    t.dept) +
        field('Date Opened',   t.dateOpened) +
        field('Added By',      t.addedBy) +
        field('Assigned To',   t.assignedTo) +
        field('Est Hours',     t.estHours) +
        field('Actual Hours',  t.actualHours) +
        field('Downtime Type', t.downtimeType) +
        (t.jointDepts || t.pendingJointDepts ? _renderJointStatus_(t) : '') +
      '</div>' +
    '</div>' +

    '<div class="td-section">' +
      '<div class="td-section-title" style="display:flex;align-items:center;justify-content:space-between;">Equipment' + _editBtn_('equipment') + '</div>' +
      '<div class="td-grid">' +
        field('Type',          t.equipType) +
        field('Equipment Code',t.equipCode,   'mono') +
        field('Equipment',     t.specificEquip) +
        field('Building / Zone',t.buildingZone) +
        field('Line #',        t.lineNo) +
      '</div>' +
    '</div>' +

    '<div class="td-section">' +
      '<div class="td-section-title" style="display:flex;align-items:center;justify-content:space-between;">Problem' + _editBtn_('problem') + '</div>' +
      '<div class="td-grid" style="grid-template-columns:1fr;">' +
        field('Problem Type',  t.problemType) +
        '<div class="td-field"><label>Description</label><div class="val desc">' + esc(t.description || '—') + '</div></div>' +
        _renderNotes_(t.notes) +
      '</div>' +
    '</div>' +

    (function() {
      var canAddPhoto = t.status !== 'CLOSED' && t.status !== 'VOIDED';
      var urls = t.photoUrl ? t.photoUrl.split(/[\n,]/).map(function(u){return u.trim();}).filter(Boolean) : [];
      return '<div class="td-section">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
          '<div class="td-section-title" style="margin-bottom:0;">' + (urls.length > 1 ? 'Photos (' + urls.length + ')' : 'Photo') + '</div>' +
          (canAddPhoto ? '<button class="btn-add-photo" id="td-add-photo-btn" onclick="_tdAddPhoto_()">+ Add Photo</button>' : '') +
        '</div>' +
        (urls.length ? _renderPhotoGrid_(urls) : '<div style="font-size:12px;color:var(--text-tertiary);">No photos attached.</div>') +
      '</div>';
    })() +

    (t.sqfChecklist ? (
    '<div class="td-section">' +
      '<div class="td-section-title">SQF Verification Checklist</div>' +
      '<div style="font-size:12.5px;color:var(--text-primary);">' +
        t.sqfChecklist.split(' | ').map(function(item) {
          return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--status-success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +
            esc(item) + '</div>';
        }).join('') +
      '</div>' +
    '</div>') : '') +

    (t.status !== 'CLOSED' && t.status !== 'VOIDED' || t.workSummary || t.correctiveAct || t.rootCause || t.preventiveAct ? (
    '<div class="td-section">' +
      '<div class="td-section-title" style="display:flex;align-items:center;justify-content:space-between;">CAPA / Work Summary' + _editBtn_('capa') + '</div>' +
      '<div class="td-grid" style="grid-template-columns:1fr;">' +
        '<div class="td-field"><label>Corrective Action</label><div class="val desc">' + esc(t.correctiveAct || '—') + '</div></div>' +
        '<div class="td-field"><label>Root Cause</label><div class="val desc">'        + esc(t.rootCause     || '—') + '</div></div>' +
        '<div class="td-field"><label>Preventive Action</label><div class="val desc">' + esc(t.preventiveAct || t.workSummary || '—') + '</div></div>' +
        field('Fix Type',           t.fixType) +
        field('Temp Fix Flag',      t.tempFixFlag ? 'YES' : 'NO') +
        (t.permFixPlan  ? '<div class="td-field"><label>Permanent Fix Plan</label><div class="val desc">' + esc(t.permFixPlan) + '</div></div>' : '') +
        (t.permFixDate  ? field('Target Fix Date', t.permFixDate) : '') +
        (t.downtimeDuration ? field('Downtime Duration', t.downtimeDuration + ' min') : '') +
      '</div>' +
    '</div>') : '') +

    (t.verifiedBy ? (
    '<div class="td-section">' +
      '<div class="td-section-title">Verification</div>' +
      '<div class="td-grid">' +
        field('Verified By',   t.verifiedBy) +
        field('Verified Date', t.verifiedDate) +
        field('Date Closed',   t.dateClosed) +
      '</div>' +
    '</div>') : '') +

    (isJoint ? (function() {
      var _jaSignoffs = {};
      try { _jaSignoffs = JSON.parse(t.jointSignoffs || '{}'); } catch(e) {}
      var _jaDepts = (t.jointDepts || '').split(',').map(function(d){return d.trim();}).filter(Boolean);
      var _jaJointEvents = ['JOINT DEPT ADDED','JOINT REQUEST CONFIRMED','JOINT REQUEST REJECTED',
        'DEPT WORK COMPLETE','WORK COMPLETE','DEPT SIGN-OFF'];
      var _jaHistItems = hist.filter(function(h){ return _jaJointEvents.indexOf(h.eventType) >= 0; });

      var deptCards = _jaDepts.map(function(d) {
        var s = _jaSignoffs[d] || null;
        var isComplete = s && s.complete;
        var hasSigned  = s && !s.complete;
        var statusTxt  = isComplete ? 'Work Complete ✓' : (hasSigned ? 'Signed Off' : 'Pending');
        var statusClr  = isComplete ? '#166534' : (hasSigned ? '#1D4ED8' : '#92400E');
        var statusBg   = isComplete ? '#DCFCE7' : (hasSigned ? '#DBEAFE' : '#FEF3C7');
        var card = '<div style="border:1px solid var(--border-default);border-radius:8px;padding:12px 14px;margin-bottom:8px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:' + (s ? '6' : '0') + 'px;">' +
            '<strong style="font-size:13px;color:var(--text-primary);">' + esc(d) + '</strong>' +
            '<span style="font-size:11px;font-weight:700;color:' + statusClr + ';background:' + statusBg + ';padding:2px 8px;border-radius:4px;">' + esc(statusTxt) + '</span>' +
          '</div>';
        if (s) {
          card += '<div style="font-size:11.5px;color:var(--text-secondary);">By ' + esc(s.by) + ' · ' + esc(s.at) + '</div>';
          if (s.notes) card += '<div style="font-size:11.5px;color:var(--text-tertiary);margin-top:3px;white-space:pre-wrap;">' + esc(s.notes) + '</div>';
          if (s.correctiveAct) card += '<div style="margin-top:8px;"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);margin-bottom:2px;">Corrective Action</div><div style="font-size:12px;white-space:pre-wrap;">' + esc(s.correctiveAct) + '</div></div>';
          if (s.rootCause)     card += '<div style="margin-top:6px;"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);margin-bottom:2px;">Root Cause</div><div style="font-size:12px;white-space:pre-wrap;">' + esc(s.rootCause) + '</div></div>';
          if (s.preventiveAct) card += '<div style="margin-top:6px;"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);margin-bottom:2px;">Preventive Action</div><div style="font-size:12px;white-space:pre-wrap;">' + esc(s.preventiveAct) + '</div></div>';
          if (s.fixType)       card += '<div style="margin-top:6px;font-size:11.5px;"><span style="color:var(--text-tertiary);">Fix Type: </span>' + esc(s.fixType) + (s.actualHours ? ' · <span style="color:var(--text-tertiary);">Hours: </span>' + esc(String(s.actualHours)) : '') + '</div>';
        }
        card += '</div>';
        return card;
      }).join('');

      var eventList = _jaHistItems.length === 0 ? '' :
        '<ul class="th-list" style="margin-top:10px;">' +
        _jaHistItems.map(function(h) {
          return '<li class="th-item">' +
            '<div class="th-dot" style="background:#6366F1;"></div>' +
            '<div style="flex:1;">' +
              '<div style="display:flex;gap:12px;align-items:baseline;">' +
                '<span class="th-event">' + esc(h.eventType) + '</span>' +
                '<span class="th-by">' + esc(h.performedBy) + '</span>' +
              '</div>' +
              (h.notes ? '<div class="th-notes">' + esc(h.notes) + '</div>' : '') +
            '</div>' +
            '<div class="th-ts">' + esc(h.timestamp) + '</div>' +
          '</li>';
        }).join('') +
        '</ul>';

      return '<div class="td-section">' +
        '<div class="td-section-title">Joint Department Activity</div>' +
        deptCards +
        (eventList ? '<div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-tertiary);margin:10px 0 4px;">Event Log</div>' + eventList : '') +
      '</div>';
    })() : '') +

    '<div class="td-section">' +
      '<div class="td-section-title">Ticket History</div>' +
      (hist.length === 0 ? '<div style="color:var(--text-tertiary);font-size:12.5px;">No history entries.</div>' :
        '<ul class="th-list">' +
        hist.map(function(h) {
          return '<li class="th-item">' +
            '<div class="th-dot"></div>' +
            '<div style="flex:1;">' +
              '<div style="display:flex;gap:12px;align-items:baseline;">' +
                '<span class="th-event">' + esc(h.eventType) + '</span>' +
                '<span class="th-by">' + esc(h.performedBy) + '</span>' +
              '</div>' +
              (h.statusFrom || h.statusTo ? '<div class="th-notes">' +
                (h.statusFrom ? esc(h.statusFrom) + ' → ' : '') + esc(h.statusTo) + '</div>' : '') +
              (h.notes ? '<div class="th-notes">' + esc(h.notes) + '</div>' : '') +
            '</div>' +
            '<div class="th-ts">' + esc(h.timestamp) + '</div>' +
          '</li>';
        }).join('') +
        '</ul>') +
    '</div>';

  document.getElementById('td-body').innerHTML = html;
}

// ── Action handlers ───────────────────────────────────────────────────────────

function _tdApprove_() {
  var t = _tdTicket;
  if (!t) return;
  _tdEnsureTechs_(function() {
  _showModal_('Approve Ticket — ' + esc(t.ticketNo),
    '<div class="form-group"><label>Priority</label>' +
    '<select id="ma-priority"><option value="LOW">LOW</option><option value="MEDIUM" selected>MEDIUM</option><option value="HIGH">HIGH</option><option value="CRITICAL">CRITICAL</option></select></div>' +
    '<div class="form-group"><label>Assign To (optional)</label>' +
    '<select id="ma-assign"><option value="">— Unassigned —</option>' + _techOptions_() + '</select></div>' +
    '<div class="form-group"><label>Est. Hours (optional)</label><input id="ma-hours" type="number" min="0" step="0.5" /></div>' +
    '<div class="form-group"><label>Notes (optional)</label><textarea id="ma-notes"></textarea></div>',
    function() {
      var data = {
        ticketNo:   t.ticketNo,
        priority:   document.getElementById('ma-priority').value,
        assignedTo: document.getElementById('ma-assign').value,
        estHours:   document.getElementById('ma-hours').value,
        notes:      document.getElementById('ma-notes').value,
        updatedBy:  USER.displayName
      };
      _tdRunAction_(approveTicket, data, 'Approved');
    });
  });
}

function _tdComplete_() {
  var t = _tdTicket;
  if (!t) return;

  // Pre-fill from existing CAPA data so partially-saved work isn't lost.
  // On joint tickets, the current dept's own signoff entry takes priority over
  // the global merged columns (which may contain another dept's values).
  var _pf = {
    correctiveAct:    t.correctiveAct    || '',
    rootCause:        t.rootCause        || '',
    preventiveAct:    t.preventiveAct    || '',
    fixType:          t.fixType          || '',
    actualHours:      t.actualHours      || '',
    downtimeDuration: t.downtimeDuration || '',
  };
  if (_isJoint_(t) && _isFixerDept_(t)) {
    var _so = {};
    try { _so = JSON.parse(t.jointSignoffs || '{}'); } catch(e) {}
    var _jdList = (t.jointDepts || '').split(',').map(function(d){ return d.trim(); }).filter(Boolean);
    var _myDept = (USER.ownedDepts || []).find(function(d){ return _jdList.indexOf(d) >= 0; });
    var _myEntry = _myDept ? (_so[_myDept] || null) : null;
    if (_myEntry) {
      if (_myEntry.correctiveAct) _pf.correctiveAct = _myEntry.correctiveAct;
      if (_myEntry.rootCause)     _pf.rootCause     = _myEntry.rootCause;
      if (_myEntry.preventiveAct) _pf.preventiveAct = _myEntry.preventiveAct;
      if (_myEntry.actualHours)   _pf.actualHours   = _myEntry.actualHours;
    }
  }

  // C05: all three CAPA fields are required on every ticket (SQF 13.2.8)
  // C16: downtime duration captured for monthly reporting (data only this round)
  _showModal_('Mark Work Complete — ' + esc(t.ticketNo),
    '<div style="background:#FFF3E0;border:1px solid #FFB74D;border-radius:6px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#E65100;">' +
      '<strong>SQF 13.2.8:</strong> All three CAPA fields below are required on every ticket.' +
    '</div>' +
    '<div class="form-group"><label>Corrective Action *</label><textarea id="mc-corrective" placeholder="What action was taken to fix the immediate problem?">' + esc(_pf.correctiveAct) + '</textarea></div>' +
    '<div class="form-group"><label>Root Cause *</label><input id="mc-root" value="' + esc(_pf.rootCause) + '" placeholder="Why did the problem occur?" /></div>' +
    '<div class="form-group"><label>Preventive Action *</label><textarea id="mc-summary" placeholder="What will prevent this from recurring?">' + esc(_pf.preventiveAct) + '</textarea></div>' +
    '<div class="form-group"><label>Fix Type</label>' +
    '<select id="mc-fix"><option value="">—</option><option' + (_pf.fixType === 'Permanent' ? ' selected' : '') + '>Permanent</option><option' + (_pf.fixType === 'Temporary' ? ' selected' : '') + '>Temporary</option></select></div>' +
    '<div class="form-group"><label>Actual Hours</label><input id="mc-hours" type="number" min="0" step="0.5" value="' + esc(_pf.actualHours) + '" /></div>' +
    '<div class="form-group"><label>Downtime Duration (minutes)</label><input id="mc-downtime" type="number" min="0" step="1" placeholder="How long was the equipment down?" value="' + esc(_pf.downtimeDuration) + '" /></div>' +
    '<div style="background:#E8F5E9;border:1px solid #A5D6A7;border-radius:6px;padding:9px 12px;margin:6px 0 4px;font-size:11.5px;color:#1B5E20;">' +
      '<strong>Post-Repair Clearance (SQF 2.14.3):</strong> confirm you removed all of your tools. The owning department verifies cleaning &amp; sanitation at close.</div>' +
    '<div class="form-group"><label>All tools removed? *</label><select id="mc-clr-tools"><option value=""></option><option>Yes</option><option>No</option></select></div>' +
    '<div class="form-group" style="display:flex;align-items:center;gap:8px;">' +
    '<input type="checkbox" id="mc-tf" style="width:auto;" /><label for="mc-tf" style="margin:0;cursor:pointer;">Flag as Temp Fix (requires follow-up inspection)</label></div>',
    function() {
      var correctiveAct = document.getElementById('mc-corrective').value.trim();
      var rootCause     = document.getElementById('mc-root').value.trim();
      var preventiveAct = document.getElementById('mc-summary').value.trim();
      var clrTools      = document.getElementById('mc-clr-tools').value;
      if (!correctiveAct) { alert('Corrective Action is required (SQF 13.2.8).'); return; }
      if (!rootCause)     { alert('Root Cause is required (SQF 13.2.8).'); return; }
      if (!preventiveAct) { alert('Preventive Action is required (SQF 13.2.8).'); return; }
      if (!clrTools)      { alert('Post-Repair Clearance: confirm whether all tools were removed (SQF 2.14.3).'); return; }
      var data = {
        ticketNo:         t.ticketNo,
        correctiveAct:    correctiveAct,
        rootCause:        rootCause,
        preventiveAct:    preventiveAct,
        fixType:          document.getElementById('mc-fix').value,
        actualHours:      document.getElementById('mc-hours').value,
        downtimeDuration: document.getElementById('mc-downtime').value,
        clrToolsRemoved:  clrTools,
        tempFixFlag:      document.getElementById('mc-tf').checked,
        updatedBy:        USER.displayName
      };
      _tdRunAction_(completeTicket, data, 'Marked Work Complete');
    });
}

function _tdVerifyClose_() {
  var t = _tdTicket;
  if (!t) return;

  var tempFixSection = '';
  if (t.tempFixFlag) {
    tempFixSection =

    '<select id="tag-type">' + tagTypes.map(function(tt) {
      return '<option value="' + esc(tt) + '">' + esc(tt) + '</option>';
    }).join('') + '</select></div>' +
    '<div class="form-group"><label>Reason / Identified Risk *</label><textarea id="tag-reason" placeholder="Why is this equipment being tagged? What is the identified risk?"></textarea></div>' +
    '<div class="form-group"><label>CAPA Reference # (optional)</label><input id="tag-capa" placeholder="FRM-017-001 CAPA # if a CAPA was raised" /></div>',
    function() {
      var tagType = document.getElementById('tag-type').value;
      if (!tagType) { alert('Select a tag type.'); return; }
      var reason = document.getElementById('tag-reason').value.trim();
      if (!reason) { alert('Reason / identified risk is required (SQF 2.6.2).'); return; }
      var data = {
        ticketNo:      t.ticketNo,
        equipCode:     t.equipCode     || '',
        specificEquip: t.specificEquip || '',
        dept:          t.dept,
        buildingZone:  t.buildingZone  || '',
        tagType:       tagType,
        reason:        reason,
        capaRef:       document.getElementById('tag-capa').value.trim(),
        taggedBy:      USER.displayName
      };
      _closeModal_();
      document.getElementById('td-body').innerHTML = '<div class="loading-overlay"><div class="spinner"></div><span>Saving…</span></div>';
      var _tagDate = new Date().toLocaleDateString();
      fetch(WORKER_URL + '/api/monitoring/hold-tags/issue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
        body: JSON.stringify(data)
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result && result.success) {
          showToast('Hold Tag Issued: ' + data.ticketNo, 'success');
          openTicketDetail(data.ticketNo);
          // Show tag preview in a modal with an explicit Print button.
          // window.print() must be triggered by a direct user gesture — calling it
          // inside a fetch callback causes browsers to silently block the dialog.
          var _tagId = result.tagId || '';
          _showModal_('Hold Tag Issued — ' + _tagId,
            _htBuildPrintDoc_(data, _tagId, _tagDate),
            function() { _htPrint_(data, _tagId, _tagDate); _closeModal_(); },
            'Print Tag'
          );
        } else {
          showToast('Error: ' + ((result && result.error) || 'Unknown error'), 'error');
          openTicketDetail(data.ticketNo);
        }
      })
      .catch(function(err) {
        showToast('Error: ' + (err.message || String(err)), 'error');
        openTicketDetail(data.ticketNo);
      });
    }, 'Issue Tag');
}

function _tdRenderServiceReport_(prev) {
  var t = _tdTicket;

  function v(key, fallback) {

    return (fallback === undefined || fallback === null) ? '' : fallback;

  // verification work already done isn't re-keyed; reviewer can still change it.

// Coerce a stored date string into the yyyy-mm-dd a <input type=date> expects.
function _srDateVal_(s) {
  s = String(s || '').trim();
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  var d = new Date(s);
  if (isNaN(d.getTime())) return '';
  var m = String(d.getMonth() + 1), day = String(d.getDate());
  return d.getFullYear() + '-' + (m.length < 2 ? '0' + m : m) + '-' + (day.length < 2 ? '0' + day : day);
}

// Render the formatted record into a print-only area and print just that.
function _srPrint_() {
  var area = document.getElementById('sr-print-area');
  if (!area) {
    area = document.createElement('div');
    area.id = 'sr-print-area';
    area.className = 'sr-print-area';
    document.body.appendChild(area);
  }
  area.innerHTML = _srBuildPrintDoc_();
  document.body.classList.add('printing-srdoc');
  function _done_() {
    document.body.classList.remove('printing-srdoc');
    area.innerHTML = '';
    window.removeEventListener('afterprint', _done_);
  }
  window.addEventListener('afterprint', _done_);
  window.print();
  // Fallback for browsers that don't fire afterprint.
  setTimeout(_done_, 1500);
}

  var apiUrl = _tdActionUrls_[serverFn.name];

    showToast('Unknown action: ' + serverFn.name, 'error');
    openTicketDetail(data.ticketNo);
    return;
  }

  fetch(WORKER_URL + apiUrl, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body:    JSON.stringify(data)
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result && result.success) {
      showToast(successLabel + ': ' + data.ticketNo, 'success');
      openTicketDetail(data.ticketNo);
      var activePage = document.querySelector('.page.active');
      if (activePage && activePage.id && activePage.id.startsWith('page-')) {
        var pid = activePage.id.replace('page-', '');
        if (pid.startsWith('tracker-')) {
          var dept = pid.replace('tracker-', '').replace(/-/g, ' ').toUpperCase();
          _refreshQueuePage_(pid, dept);
        } else if (pid === 'waiting' || pid === 'open') {
          _refreshQueuePage_(pid, null);
        } else if (window.PAGES && window.PAGES[pid]) {
          window.PAGES[pid](activePage);
        }
      }
    } else {
      showToast('Error: ' + ((result && result.error) || 'Unknown error'), 'error');
      openTicketDetail(data.ticketNo);
    }
  })
  .catch(function(err) {
    showToast('Error: ' + (err.message || String(err)), 'error');
    openTicketDetail(data.ticketNo);
  });
}

// ── Photo helpers ─────────────────────────────────────────────────────────────
// Photo URLs arrive in t.notes as "Photos: url1, url2" (set by ExternalSync).
// Single config point: the prefix string and Drive folder are documented here.
// DRIVE FOLDER: https://drive.google.com/drive/folders/1gGGBggOwhc90HNTOXIpApbE24xieMq0l
var PHOTO_NOTES_PREFIX = 'Photos: ';

function _parsePhotoLinks_(raw) {
  if (!raw) return { text: '', urls: [] };
  if (raw.indexOf(PHOTO_NOTES_PREFIX) === 0) {
    var urls = raw.substring(PHOTO_NOTES_PREFIX.length)
      .split(',')
      .map(function(u) { return u.trim(); })
      .filter(Boolean);
    return { text: '', urls: urls };
  }
  return { text: raw, urls: [] };
}

function _driveThumbUrl_(url, sz) {
  sz = sz || 'w300';
  var m = (url || '').match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) m = (url || '').match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=' + sz;
  return url;
}

function _renderPhotoGrid_(urls) {
  return '<div class="photo-grid">' +
    urls.map(function(url, i) {
      var label = urls.length > 1 ? 'Photo ' + (i + 1) : 'View Photo';
      var thumb = _driveThumbUrl_(url);
      return '<a href="' + esc(url) + '" target="_blank" rel="noopener" class="photo-card" title="' + esc(label) + '">' +
        '<img src="' + esc(thumb) + '" alt="' + esc(label) + '" loading="lazy" ' +
        'onerror="this.parentNode.classList.add(\'photo-card--err\')" />' +
        '<span class="photo-card-lbl">' + esc(label) + '</span>' +
      '</a>';
    }).join('') +
  '</div>';
}

function _tdAddPhoto_() {
  var input = document.getElementById('td-photo-input');
  if (input) { input.value = ''; input.click(); }
}

function _tdHandlePhotoFile_(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var btn = document.getElementById('td-add-photo-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Uploading…'; }

  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl  = e.target.result;
    var mimeType = file.type || 'image/jpeg';
    var ext      = (file.name.match(/\.(\w+)$/) || ['','jpg'])[1].toLowerCase();
    var existing = (_tdTicket && _tdTicket.photoUrl)
      ? _tdTicket.photoUrl.split(/[\n,]/).map(function(u){return u.trim();}).filter(Boolean)
      : [];
    var photoIndex = existing.length + 1;

    fetch(WORKER_URL + '/api/submit/upload-photo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
      body: JSON.stringify({ ticketNo: _tdTicketNo, dataUrl: dataUrl, mimeType: mimeType, ext: ext, photoIndex: photoIndex })
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.ok || !res.url) throw new Error(res.error || 'Upload failed');
      var combined = existing.concat([res.url]).join('\n');
      return fetch(WORKER_URL + '/api/tickets/add-photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
        body: JSON.stringify({ ticketNo: _tdTicketNo, photoUrl: combined, updatedBy: USER ? (USER.name || USER.email) : '' })
      });
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.success) throw new Error(res.error || 'Failed to save photo');
      showToast('Photo added', 'success');
      openTicketDetail(_tdTicketNo);
    })
    .catch(function(err) {
      showToast('Upload failed: ' + (err.message || String(err)), 'error');
      if (btn) { btn.disabled = false; btn.textContent = '+ Add Photo'; }
    });
  };
  reader.readAsDataURL(file);
}

// ── Equipment Edit Cascade ────────────────────────────────────────────────────
var _eeRows  = null;
var _eeSel   = { dept: '', level2: '', level3: '', level4: '' };
var _eeCode  = '';
var _eeSpec  = '';
var _eeType  = '';

function _eeGetUnique_(col, selOverride) {
  var sel = selOverride || _eeSel;
  return ((_eeRows || []).filter(function(r) {
    if (col === 'dept')   return true;
    if (col === 'level2') return sel.dept   && r.dept   === sel.dept;
    if (col === 'level3') return sel.dept   && r.dept   === sel.dept   && sel.level2 && r.level2 === sel.level2;
    if (col === 'level4') return sel.dept   && r.dept   === sel.dept   && sel.level2 && r.level2 === sel.level2 && sel.level3 && r.level3 === sel.level3;
    return false;
  }).map(function(r) { return r[col]; }).filter(function(v) { return v && v.trim(); })
    .filter(function(v, i, a) { return a.indexOf(v) === i; }).sort());
}

function _eeNextCol_(prevCol) {
  var order = ['dept','level2','level3','level4'];
  var i = order.indexOf(prevCol);
  for (var j = i + 1; j < order.length; j++) {
    if (_eeGetUnique_(order[j]).length) return order[j];
  }
  return null;
}

function _eeRenderLevel_(col) {
  var vals = _eeGetUnique_(col);
  var labels = { dept: 'Department', level2: 'Section', level3: 'Equipment', level4: 'Sub-Item' };
  var gridId = col === 'dept' ? 'ee-dept-grid' : 'ee-' + col + '-grid';
  var secId  = col === 'dept' ? null : 'ee-sec-' + col;
  if (secId) {
    var sec = document.getElementById(secId);
    if (sec) sec.style.display = vals.length ? '' : 'none';
  }
  var grid = document.getElementById(gridId);
  if (!grid) return;
  grid.innerHTML = vals.map(function(v) {
    var active = _eeSel[col] === v ? ' active' : '';
    return '<button class="sel-btn' + active + '" onclick="_eeSelectLevel_(\'' + col + '\',this,\'' + v.replace(/'/g, "\\'") + '\')">' + v + '</button>';
  }).join('');
}

function _eeSelectDept_(btn, dept) {
  _eeSel = { dept: dept, level2: '', level3: '', level4: '' };
  _eeCode = ''; _eeSpec = ''; _eeType = '';
  document.querySelectorAll('#ee-dept-grid .sel-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  ['level2','level3','level4'].forEach(function(col) {
    var sec = document.getElementById('ee-sec-' + col);
    if (sec) { sec.style.display = 'none'; document.getElementById('ee-' + col + '-grid').innerHTML = ''; }
  });
  var next = _eeNextCol_('dept');
  if (next) _eeRenderLevel_(next); else { _eeResolveCode_(); _eeUpdateResolved_(); }
}

function _eeSelectLevel_(col, btn, value) {
  _eeSel[col] = value;
  var order = ['dept','level2','level3','level4'];
  var idx = order.indexOf(col);
  for (var k = idx + 1; k < order.length; k++) {
    _eeSel[order[k]] = '';
    var sec = document.getElementById('ee-sec-' + order[k]);
    if (sec) { sec.style.display = 'none'; document.getElementById('ee-' + order[k] + '-grid').innerHTML = ''; }
  }
  _eeCode = ''; _eeSpec = ''; _eeType = '';
  var gridId = col === 'dept' ? 'ee-dept-grid' : 'ee-' + col + '-grid';
  document.querySelectorAll('#' + gridId + ' .sel-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var next = _eeNextCol_(col);
  if (next) { _eeRenderLevel_(next); } else { _eeResolveCode_(); _eeUpdateResolved_(); }
}

function _eeResolveCode_() {
  var match = (_eeRows || []).filter(function(r) {
    return r.dept === _eeSel.dept &&
      (!_eeSel.level2 || r.level2 === _eeSel.level2) &&
      (!_eeSel.level3 || r.level3 === _eeSel.level3) &&
      (!_eeSel.level4 || r.level4 === _eeSel.level4);
  });
  if (match.length) {
    _eeCode = match[0].code  || '';
    _eeSpec = match[0].level3 || match[0].level2 || match[0].dept || '';
    _eeType = match[0].level2 || match[0].dept || '';
  } else {
    _eeCode = ''; _eeSpec = ''; _eeType = '';
  }
}

function _eeUpdateResolved_() {
  var bar = document.getElementById('ee-resolved-bar');
  var val = document.getElementById('ee-resolved-val');
  if (!bar || !val) return;
  if (_eeCode) {
    val.textContent = _eeCode + (_eeSpec ? ' — ' + _eeSpec : '');
    bar.style.display = '';
  } else {
    bar.style.display = 'none';
  }
}

function _eeLoadData_(preDept) {
  if (_eeRows) { _eePopulate_(preDept); return; }
  fetch(WORKER_URL + '/api/submit/form-data', {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    _eeRows = (d && d.equipRows) ? d.equipRows : [];
    _eePopulate_(preDept);
  })
  .catch(function() {
    _eeRows = [];
    var g = document.getElementById('ee-dept-grid');
    if (g) g.innerHTML = '<div style="color:var(--error);font-size:12px;grid-column:1/-1;">Failed to load equipment list.</div>';
  });
}

function _eePopulate_(preDept) {
  var depts = _eeGetUnique_('dept');
  var grid  = document.getElementById('ee-dept-grid');
  if (!grid) return;
  grid.innerHTML = depts.map(function(d) {
    return '<button class="sel-btn" onclick="_eeSelectDept_(this,\'' + d.replace(/'/g, "\\'") + '\')">' + d + '</button>';
  }).join('');
  if (preDept && depts.indexOf(preDept) !== -1) {
    var btn = Array.prototype.slice.call(grid.querySelectorAll('.sel-btn')).find(function(b) { return b.textContent === preDept; });
    if (btn) _eeSelectDept_(btn, preDept);
  }
}

function _renderNotes_(raw) {
  var parsed = _parsePhotoLinks_(raw);
  var out = '';
  if (parsed.urls.length > 0) {
    var photoLbl = parsed.urls.length > 1 ? 'Photos (' + parsed.urls.length + ')' : 'Photo';
    out += '<div class="td-field"><label>' + photoLbl + '</label>' + _renderPhotoGrid_(parsed.urls) + '</div>';
  }
  if (parsed.text) {
    out += '<div class="td-field"><label>Notes / Observations</label>' +
      '<div class="val desc">' + esc(parsed.text) + '</div></div>';
  }
  return out;
}

// Renders joint department sign-off chips + pending request chips in the overview.
function _renderJointStatus_(t) {
  var jd = (t.jointDepts || '').split(',').map(function(d) { return d.trim(); }).filter(Boolean);
  var pd = (t.pendingJointDepts || '').split(',').map(function(d) { return d.trim(); }).filter(Boolean);
  if (!jd.length && !pd.length) return '';
  var signs = {};
  if (t.jointSignoffs) { try { signs = JSON.parse(t.jointSignoffs); } catch(e) {} }
  var chips = jd.map(function(d) {
    var s = signs[d];
    if (s && s.complete) {
      var tip = s.by + ' · ' + s.at + (s.notes ? ': ' + s.notes : '');
      return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;background:#D1FAE5;color:#065F46;font-size:11.5px;font-weight:600;margin:2px 4px 2px 0;" title="' + esc(tip) + '">' +
        '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' +
        esc(d) + ' · Work Complete <span style="font-weight:400;font-size:10.5px;">' + esc(s.by) + '</span>' +
        '</span>';
    } else if (s) {
      var tip2 = s.by + ' · ' + s.at + (s.notes ? ': ' + s.notes : '');
      var overBtn2 = USER.isAdmin
        ? '<button onclick="_adminForceSignoff_(\'' + d.replace(/'/g,"\\'") + '\')" style="margin-left:5px;font-size:10px;padding:1px 6px;border:1px solid #93C5FD;border-radius:3px;background:#EFF6FF;color:#1D4ED8;cursor:pointer;font-weight:500;">Override</button>'
        : '';
      return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;background:#DBEAFE;color:#1D4ED8;font-size:11.5px;font-weight:600;margin:2px 4px 2px 0;" title="' + esc(tip2) + '">' +
        esc(d) + ' · Signed Off <span style="font-weight:400;font-size:10.5px;">' + esc(s.by) + '</span>' + overBtn2 +
        '</span>';
    } else {
      var overBtn = USER.isAdmin
        ? '<button onclick="_adminForceSignoff_(\'' + d.replace(/'/g,"\\'") + '\')" style="margin-left:5px;font-size:10px;padding:1px 6px;border:1px solid #F59E0B;border-radius:3px;background:#FEF9C3;color:#92400E;cursor:pointer;font-weight:500;">Override</button>'
        : '';
      return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;background:#FEF3C7;color:#92400E;font-size:11.5px;font-weight:600;margin:2px 4px 2px 0;">' +
        esc(d) + ' · Pending' + overBtn +
        '</span>';
    }
  });
  // Pending attachment requests shown as purple "awaiting" chips
  pd.forEach(function(d) {
    chips.push(
      '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;background:#F3E5F5;color:#6A1B9A;font-size:11.5px;font-weight:600;margin:2px 4px 2px 0;" title="Joint attachment request pending — awaiting response from ' + esc(d) + '">' +
        '📩 ' + esc(d) + ' · Pending acceptance' +
      '</span>'
    );
  });
  return '<div class="td-field" style="grid-column:1/-1;margin-top:8px;">' +
    '<label>Joint Departments</label>' +
    '<div class="val" style="margin-top:4px;">' + chips.join('') + '</div>' +
  '</div>';
}

  _tdRunAction_(confirmJointRequest, { ticketNo: t.ticketNo, updatedBy: USER.displayName }, 'Joint Request Accepted');

}
