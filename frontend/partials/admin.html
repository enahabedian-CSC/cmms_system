<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Admin partial — read-only views for config/access/deptmap      ║ -->
<!-- ║  Registers PAGES for: admin-config, admin-access, admin-deptmap ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Admin views ─────────────────────────────────────────────────────── */
.adm-wrap{padding:20px 24px;max-width:800px;}
.adm-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.adm-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;}
.adm-edit-btn{height:30px;padding:0 14px;border:1px solid var(--brand-navy);border-radius:6px;background:#fff;color:var(--brand-navy);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.adm-edit-btn:hover{background:var(--brand-navy);color:#fff;}
.adm-notice{background:var(--status-info-bg);border:1px solid #BFDBFE;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--status-info);margin-bottom:16px;}
.adm-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
.adm-table{width:100%;border-collapse:collapse;font-size:13px;}
.adm-table th{background:var(--bg-subtle);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);}
.adm-table td{padding:10px 14px;border-bottom:1px solid var(--border-default);vertical-align:top;color:var(--text-primary);}
.adm-table tr:last-child td{border-bottom:0;}
.adm-table .key-col{font-family:var(--font-mono);font-size:12px;color:var(--brand-navy);white-space:nowrap;width:220px;}
.adm-table .val-col{color:var(--text-secondary);word-break:break-word;}
.adm-table .val-col.mono{font-family:var(--font-mono);font-size:12px;}
.adm-empty{padding:40px;text-align:center;color:var(--text-secondary);font-size:13px;}
.adm-role-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10.5px;font-weight:600;background:var(--status-info-bg);color:var(--status-info);}
.adm-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:var(--bg-subtle);color:var(--text-secondary);margin:1px 2px;}
.adm-unauthorized{padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}
</style>

<script>
// ── Admin page utilities ──────────────────────────────────────────────────────
window.PAGES = window.PAGES || {};

function _loadAdminPage_(view, title, container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading ' + esc(title) + '…</span></div>';
  fetch(WORKER_URL + '/api/admin/view?view=' + encodeURIComponent(view), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.error) {
      var msg = data.error;
      container.innerHTML = (msg.indexOf('Admin') >= 0 || msg.indexOf('required') >= 0)
        ? '<div class="adm-unauthorized">This view requires system admin access.</div>'
        : '<div class="adm-unauthorized">Error: ' + esc(msg) + '</div>';
      return;
    }
    _renderAdminView_(data, container);
  })
  .catch(function(err) {
    container.innerHTML = '<div class="adm-unauthorized">Error: ' + esc(err.message || String(err)) + '</div>';
  });
}

function _renderAdminView_(data, container) {
  var sheetLink = '<a href="' + esc(data.sheetUrl) + '" target="_blank" class="adm-edit-btn">' +
    '✏ Edit in Sheet</a>';

  var html = '<div class="adm-wrap">';

  if (data.view === 'config') {
    html +=
      '<div class="adm-header"><span class="adm-title">⚙️ System Configuration</span>' + sheetLink + '</div>' +
      '<div class="adm-notice">This is a read-only view. Click "Edit in Sheet" to make changes. Changes take effect on the next page load.</div>' +
      '<div class="adm-table-wrap"><table class="adm-table">' +
        '<thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>';
    if (data.rows && data.rows.length > 0) {
      data.rows.forEach(function(r) {
        html +=
          '<tr><td class="key-col">' + esc(r.key) + '</td>' +
          '<td class="val-col">' + esc(r.value || '—') + '</td></tr>';
      });
    } else {
      html += '<tr><td colspan="2" class="adm-empty">No configuration entries found.</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  else if (data.view === 'access') {
    html +=
      '<div class="adm-header"><span class="adm-title">👔 Manager Access</span>' + sheetLink + '</div>' +
      '<div class="adm-notice">Role permissions are sourced exclusively from this sheet. Changes take effect immediately on the next API call.</div>' +
      '<div class="adm-table-wrap"><table class="adm-table">' +
        '<thead><tr><th>Name</th><th>Email</th><th>Owned Departments</th></tr></thead><tbody>';
    if (data.managers && data.managers.length > 0) {
      data.managers.forEach(function(m) {
        var deptHtml = (m.ownedDepts || []).map(function(d) {
          return '<span class="adm-tag">' + esc(d) + '</span>';
        }).join('') || '<span style="color:var(--text-tertiary);font-size:11px;">none assigned</span>';
        html +=
          '<tr>' +
          '<td style="font-weight:600;">' + esc(m.managerName || '—') + '</td>' +
          '<td class="val-col mono">' + esc(m.managerEmail || '—') + '</td>' +
          '<td>' + deptHtml + '</td>' +
          '</tr>';
      });
    } else {
      html += '<tr><td colspan="3" class="adm-empty">No managers configured.</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  else if (data.view === 'deptmap') {
    html +=
      '<div class="adm-header"><span class="adm-title">📋 Department Map</span>' + sheetLink + '</div>' +
      '<div class="adm-notice">Maps raw department strings (from external sources, typos, abbreviations) to canonical dept names. Applied on every inbound ticket.</div>' +
      '<div class="adm-table-wrap"><table class="adm-table">' +
        '<thead><tr><th>Source String</th><th>Maps To (Canonical)</th></tr></thead><tbody>';
    if (data.rows && data.rows.length > 0) {
      data.rows.forEach(function(r) {
        html +=
          '<tr>' +
          '<td class="key-col">' + esc(r.src) + '</td>' +
          '<td class="val-col"><span class="adm-role-badge">' + esc(r.dest) + '</span></td>' +
          '</tr>';
      });
    } else {
      html += '<tr><td colspan="2" class="adm-empty">No department mappings found.</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  else {
    html += '<div class="adm-empty">Unknown view: ' + esc(data.view) + '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

PAGES['admin-config']  = function(c) { _loadAdminPage_('config',  'Configuration',  c); };
PAGES['admin-access']  = function(c) { _loadAdminPage_('access',  'Manager Access', c); };
PAGES['admin-deptmap'] = function(c) { _loadAdminPage_('deptmap', 'Dept Map',       c); };

// ── Equipment Cache admin page ─────────────────────────────────────────────────

PAGES['admin-equip'] = function(c) { _loadEquipCachePage_(c); };

function _loadEquipCachePage_(container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Checking equipment cache…</span></div>';
  fetch(WORKER_URL + '/api/admin/equip-cache', {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d && d.error) { container.innerHTML = '<div class="adm-unauthorized">Error: ' + esc(d.error) + '</div>'; return; }
    _renderEquipCachePage_(d, container);
  })
  .catch(function(err) {
    container.innerHTML = '<div class="adm-unauthorized">Error: ' + esc(err.message || String(err)) + '</div>';
  });
}

function _renderEquipCachePage_(d, container) {
  var noUrl  = !d.configSheetUrl;
  var noTab  = !d.configTabName;
  var noData = d.cacheRows === 0;

  // Config status row
  function cfgRow(label, val, ok) {
    var dot = ok
      ? '<span style="color:var(--status-success);font-weight:700;">●</span>'
      : '<span style="color:var(--status-critical);font-weight:700;">●</span>';
    return '<tr><td class="key-col">' + esc(label) + '</td>' +
      '<td class="val-col">' + dot + ' &nbsp;' + esc(val || '—') + '</td></tr>';
  }

  var configWarning = '';
  if (noUrl) {
    configWarning +=
      '<div class="adm-notice" style="background:var(--status-critical-bg);border-color:var(--status-critical);color:var(--status-critical);">' +
      '<strong>⚠ Equipment Register URL not configured.</strong> ' +
      'In the ⚙️ Configuration sheet, add a row with key <code>Equipment Register Sheet URL</code> ' +
      'and paste the full URL (or just the sheet ID) of your Equipment Register spreadsheet. ' +
      'Without this, the cache refresh uses a fallback ID that may not match your register.' +
      '</div>';
  }
  if (noTab) {
    configWarning +=
      '<div class="adm-notice" style="background:var(--status-critical-bg);border-color:var(--status-critical);color:var(--status-critical);">' +
      '<strong>⚠ Equipment Inventory Tab Name not set.</strong> ' +
      'Add a row in ⚙️ Configuration with key <code>Equipment Inventory Tab Name</code> ' +
      'and the exact tab name inside the Equipment Register (case-sensitive).' +
      '</div>';
  }
  if (!noUrl && !noTab && noData) {
    configWarning +=
      '<div class="adm-notice">' +
      '<strong>Cache is empty.</strong> ' +
      'Config keys look set — click <strong>Refresh Cache Now</strong> to populate it. ' +
      'If it fails, check the Master Log for the error.' +
      '</div>';
  }

  // Dept matching table
  var deptByKey = {};
  (d.deptSummary || []).forEach(function(s) { deptByKey[s.dept] = s; });

  var deptRows = (d.canonicalDepts || []).map(function(dept) {
    var s = deptByKey[dept];
    if (s) {
      return '<tr>' +
        '<td style="font-weight:600;">' + esc(dept) + '</td>' +
        '<td><span style="color:var(--status-success);font-weight:700;">●</span> Found</td>' +
        '<td>' + s.types + ' types</td>' +
        '<td>' + s.items + ' items</td>' +
      '</tr>';
    }
    return '<tr>' +
      '<td style="font-weight:600;color:var(--text-tertiary);">' + esc(dept) + '</td>' +
      '<td><span style="color:var(--status-critical);font-weight:700;">●</span> <span style="color:var(--status-critical);">Not in cache</span></td>' +
      '<td style="color:var(--text-tertiary);">—</td>' +
      '<td style="color:var(--text-tertiary);">—</td>' +
    '</tr>';
  });
  // Also show any extra depts in cache that don't match canonical names
  (d.deptSummary || []).forEach(function(s) {
    if ((d.canonicalDepts || []).indexOf(s.dept) < 0) {
      deptRows.push('<tr style="background:var(--status-high-bg);">' +
        '<td style="font-weight:600;color:var(--status-high);">' + esc(s.dept) + '</td>' +
        '<td><span style="color:var(--status-high);font-weight:700;">●</span> <span style="color:var(--status-high);">Name mismatch</span></td>' +
        '<td>' + s.types + ' types</td>' +
        '<td>' + s.items + ' items — <em>add to Dept Map to route correctly</em></td>' +
      '</tr>');
    }
  });

  var html =
    '<div class="adm-wrap" style="max-width:900px;">' +
    '<div class="adm-header">' +
      '<span class="adm-title">⚙️ Equipment Cache</span>' +
      '<button id="equip-refresh-btn" class="adm-edit-btn" onclick="_runEquipCacheRefresh_()" style="background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);">↻ Refresh Cache Now</button>' +
      '<button onclick="_loadEquipCachePage_(document.getElementById(\'page-admin-equip\'))" class="adm-edit-btn">↺ Reload Status</button>' +
    '</div>' +
    '<div id="equip-refresh-result"></div>' +
    configWarning +

    '<div class="adm-table-wrap" style="margin-bottom:16px;"><table class="adm-table">' +
      '<thead><tr><th colspan="2">Cache Configuration</th></tr></thead><tbody>' +
      cfgRow('Equipment Register Sheet URL', d.configSheetUrl || '(not set — using fallback ID)', !!d.configSheetUrl) +
      cfgRow('Resolved Sheet ID', d.resolvedSheetId, !!d.resolvedSheetId) +
      cfgRow('Equipment Inventory Tab Name', d.configTabName || '(not set)', !!d.configTabName) +
      cfgRow('Last Refreshed', d.lastRefreshed, d.lastRefreshed !== 'Never') +
      cfgRow('Rows in Cache Tab', d.cacheRows + ' physical rows', d.cacheRows > 0) +
      cfgRow('Rows After Parsing', d.parsedItemCount + ' items passed column filter', d.parsedItemCount > 0) +
    '</tbody></table></div>' +

    // Column mapping diagnostic
    (function() {
      var FIELDS = ['dept','eType','code','specific','status','group','deptCode'];
      var FIELD_LABELS = { dept:'Department', eType:'Equipment Type', code:'Equipment Code',
        specific:'Equipment Name', status:'Status', group:'Group/Line', deptCode:'Dept Code' };
      var rows = FIELDS.map(function(f) {
        var mapped = d.mappedCols && d.mappedCols[f];
        return '<tr>' +
          '<td class="key-col">' + esc(FIELD_LABELS[f] || f) + '</td>' +
          (mapped
            ? '<td><span style="color:var(--status-success);font-weight:700;">●</span> &nbsp;Mapped to column <strong>"' + esc(mapped) + '"</strong></td>'
            : '<td><span style="color:var(--status-critical);font-weight:700;">●</span> &nbsp;<span style="color:var(--status-critical);">Not recognised</span></td>') +
        '</tr>';
      });
      var unmapped = (d.unmappedHdrs || []);
      var unmappedRow = unmapped.length > 0
        ? '<tr><td class="key-col" style="color:var(--text-tertiary);">Unrecognised headers</td>' +
          '<td style="color:var(--status-high);">' + unmapped.map(function(h){ return '"' + esc(h) + '"'; }).join(', ') + '<br>' +
          '<span style="font-size:11px;color:var(--text-tertiary);">Report these to your developer to add to the mapping.</span></td></tr>'
        : '';
      return '<div class="adm-table-wrap" style="margin-bottom:16px;"><table class="adm-table">' +
        '<thead><tr><th colspan="2">Column Header Mapping (row 4 of cache tab)</th></tr></thead><tbody>' +
        rows.join('') + unmappedRow +
        '</tbody></table></div>';
    })() +

    // Raw headers from cache
    (d.rawHeaders && d.rawHeaders.length > 0
      ? '<div class="adm-notice" style="margin-bottom:12px;"><strong>Raw headers detected in cache (row 4):</strong><br>' +
        '<span style="font-family:monospace;font-size:12px;">' +
        d.rawHeaders.map(function(h, i) { return (i+1) + '. ' + esc(h); }).join(' &nbsp;|&nbsp; ') +
        '</span></div>'
      : '') +

    '<div class="adm-table-wrap"><table class="adm-table">' +
      '<thead><tr><th>Canonical Dept</th><th>Cache Status</th><th>Types</th><th>Equipment Items</th></tr></thead>' +
      '<tbody>' + deptRows.join('') + '</tbody>' +
    '</table></div>' +

    '<div class="adm-notice" style="margin-top:12px;">' +
      '<strong>Orange rows</strong> = dept names in the cache that don\'t match canonical dept names — ' +
      'add a mapping in the <strong>Dept Map</strong> sheet (raw name → canonical name) to route tickets correctly.' +
    '</div>' +
    '</div>';

  container.innerHTML = html;
}

function _runEquipCacheRefresh_() {
  var btn = document.getElementById('equip-refresh-btn');
  var res = document.getElementById('equip-refresh-result');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Refreshing…'; }
  if (res) res.innerHTML = '';
  fetch(WORKER_URL + '/api/admin/equip-cache/refresh', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: '{}'
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh Cache Now'; }
    if (res) {
      if (result.success) {
        res.innerHTML =
          '<div class="adm-notice" style="background:var(--status-success-bg);border-color:var(--status-success);color:var(--status-success);margin-bottom:10px;">' +
          '✓ Cache refreshed — <strong>' + result.rows + ' rows</strong> cached. Reloading status…</div>';
        setTimeout(function() { _loadEquipCachePage_(document.getElementById('page-admin-equip')); }, 1500);
      } else {
        res.innerHTML =
          '<div class="adm-notice" style="background:var(--status-critical-bg);border-color:var(--status-critical);color:var(--status-critical);margin-bottom:10px;">' +
          '✗ Refresh failed: ' + esc(result.error || 'Unknown error') + '</div>';
      }
    }
  })
  .catch(function(err) {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh Cache Now'; }
    if (res) {
      res.innerHTML =
        '<div class="adm-notice" style="background:var(--status-critical-bg);border-color:var(--status-critical);color:var(--status-critical);margin-bottom:10px;">' +
        '✗ ' + esc(err.message || String(err)) + '</div>';
    }
  });
}
</script>
