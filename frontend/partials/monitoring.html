<!-- ║  Monitoring partial — Temp Fix / Equipment Hold / Parts Needed  ║ -->
<!-- ║  Registers PAGES for: tempfix, equipment-hold, parts            ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Monitoring shared ───────────────────────────────────────────────── */
.mon-wrap{padding:20px 24px;}
.mon-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.mon-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;}
.mon-count{font-size:12px;color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:4px;padding:2px 8px;}
.mon-search{height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;width:180px;outline:none;color:var(--text-primary);}
.mon-search:focus{border-color:var(--brand-navy);}
.mon-filter-select{height:30px;padding:0 8px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.mon-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.mon-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.mon-table th{background:var(--bg-subtle);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.mon-table td{padding:9px 12px;border-bottom:1px solid var(--border-default);vertical-align:middle;}
.mon-table tr:last-child td{border-bottom:0;}
.mon-table tbody tr:hover{background:var(--bg-hover);}
.mon-empty{padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}
.mon-id{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);}
.mon-desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);}
.mon-equip{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Status badges reuse pri-badge / stat-badge; extra monitoring statuses: */
.stat-ACTIVE    {background:#FFF3E0;color:#E65100;}
.stat-PAST-DUE  {background:var(--status-critical-bg);color:var(--status-critical);}
.stat-CLEARED   {background:var(--status-success-bg);color:var(--status-success);}
.stat-PENDING   {background:#EDE9FE;color:#5B21B6;}
.stat-ORDERED   {background:var(--status-info-bg);color:var(--status-info);}
.stat-RECEIVED  {background:var(--status-success-bg);color:var(--status-success);}
.stat-CANCELLED {background:var(--bg-subtle);color:var(--text-tertiary);}
.stat-TAGGED    {background:var(--status-critical-bg);color:var(--status-critical);}

/* Action buttons */
.mon-btn{padding:3px 10px;border:1px solid var(--border-default);border-radius:4px;font-size:11.5px;cursor:pointer;background:#fff;color:var(--text-secondary);white-space:nowrap;}
.mon-btn:hover{background:var(--bg-hover);}
.mon-btn.primary{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.mon-btn.primary:hover{background:var(--brand-navy-soft);}
.mon-btn.danger{background:var(--status-critical-bg);color:var(--status-critical);border-color:var(--status-critical);}

/* ── Parts Kanban ────────────────────────────────────────────────────── */
.pn-kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;overflow-x:auto;align-items:start;}
.pn-col{background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:8px;min-height:60px;}
.pn-col-h{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border-default);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);}
.pn-col-h .ct{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;font-size:10px;padding:1px 6px;font-weight:600;color:var(--text-primary);}
.pn-col-list{display:flex;flex-direction:column;gap:8px;padding:10px;}
.pn-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:6px;padding:10px 12px;cursor:pointer;transition:box-shadow .1s;}
.pn-card:hover{box-shadow:var(--shadow-sm);}
.pn-card-id{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);}
.pn-card-desc{font-size:12.5px;font-weight:600;color:var(--text-primary);margin:3px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pn-card-ticket{font-family:var(--font-mono);font-size:11px;color:var(--brand-navy);font-weight:600;}
.pn-card-equip{font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pn-card-meta{font-size:10.5px;color:var(--text-tertiary);margin-top:4px;display:flex;align-items:center;justify-content:space-between;}
.pn-card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.pn-col-empty{padding:16px;text-align:center;font-size:11px;color:var(--text-tertiary);}

/* Monitor action modal */
.mon-modal-back{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:5000;display:none;align-items:center;justify-content:center;}
.mon-modal-back.open{display:flex;}
.mon-modal{background:#fff;border-radius:10px;padding:22px 24px;width:360px;max-width:95vw;box-shadow:var(--shadow-lg);}
.mon-modal-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.mon-modal-sub{font-size:12px;color:var(--text-secondary);margin-bottom:16px;}
.mon-modal-notes{width:100%;padding:8px 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;font-family:inherit;resize:vertical;height:60px;outline:none;}
.mon-modal-notes:focus{border-color:var(--brand-navy);}
.mon-modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}

/* ── Equipment Quality Hold Tag — printable (FRM-029-002) ────────────────── */
/* Auditor-approved field set ported from Izzy's EquipmentHoldTag.html.        */
/* Fields are auditor-approved — only the doc-control triplet was added.       */
#ehl-print-area{display:none;}
.eht-tag{width:340px;margin:0 auto;border:3px solid #000;border-radius:10px;font-family:Arial,Helvetica,sans-serif;background:#fff;overflow:hidden;}
.eht-hero{padding:12px 14px;text-align:center;background:#C62828;color:#fff;}
.eht-hero .l{font-size:10px;letter-spacing:.06em;text-transform:uppercase;opacity:.92;}
.eht-hero .n{font-size:22px;font-weight:800;font-family:var(--font-mono),monospace;margin-top:2px;}
.eht-cobar{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#111;color:#fff;font-size:10px;font-weight:600;}
.eht-title{text-align:center;padding:10px;border-bottom:2px solid #000;}
.eht-title .m{font-size:17px;font-weight:800;letter-spacing:.02em;}
.eht-title .s{font-size:10.5px;color:#444;margin-top:2px;}
.eht-status{text-align:center;padding:12px;background:#C62828;color:#fff;}
.eht-status .t{font-size:16px;font-weight:800;}
.eht-status .onhold{font-size:12px;font-weight:800;margin-top:5px;text-transform:uppercase;letter-spacing:.02em;}
.eht-seclbl{background:#000;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 12px;}
.eht-grid{display:grid;grid-template-columns:1fr 1fr;}
.eht-grid .f{padding:6px 12px;border-bottom:1px solid #ccc;border-right:1px solid #ccc;}
.eht-grid .f .fl{font-size:8.5px;text-transform:uppercase;color:#666;letter-spacing:.04em;}
.eht-grid .f .fv{font-size:12px;font-weight:600;color:#000;margin-top:1px;word-break:break-word;}
.eht-reason{padding:8px 12px;border-bottom:1px solid #000;}
.eht-reason .fl{font-size:9px;text-transform:uppercase;color:#666;font-weight:700;}
.eht-reason .fv{font-size:12.5px;color:#000;margin-top:2px;word-break:break-word;}
.eht-warn{background:#000;color:#fff;text-align:center;font-weight:800;font-size:12px;padding:8px;letter-spacing:.04em;}
.eht-sign{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #000;}
.eht-sign .sg{padding:18px 10px 6px;border-right:1px solid #ccc;}
.eht-sign .sg .sl{font-size:8.5px;text-transform:uppercase;color:#666;border-top:1px solid #000;padding-top:3px;}
.eht-foot{display:flex;justify-content:space-between;padding:6px 12px;font-size:9px;color:#444;}
.eht-yellow .eht-hero,.eht-yellow .eht-status{background:#F9A825;color:#000;}
.eht-orange .eht-hero,.eht-orange .eht-status{background:#EF6C00;color:#fff;}
@media print{
  body.printing-tag *{visibility:hidden !important;}
  body.printing-tag #ehl-print-area,body.printing-tag #ehl-print-area *{visibility:visible !important;}
  body.printing-tag #ehl-print-area{display:block !important;position:absolute;left:0;top:0;width:100%;}
}
</style>

<div id="mon-modal-back" class="mon-modal-back">
  <div class="mon-modal">
    <div class="mon-modal-title" id="mon-modal-title">Confirm Action</div>
    <div class="mon-modal-sub"  id="mon-modal-sub"></div>
    <textarea class="mon-modal-notes" id="mon-modal-notes" placeholder="Notes (optional)"></textarea>
    <div class="mon-modal-footer">

<!-- Printable Equipment Quality Hold Tag (FRM-029-002) target; populated by _ehlPrintTag_ -->
<div id="ehl-print-area"></div>

<script>
// ── Monitoring page utilities ─────────────────────────────────────────────────
window.PAGES = window.PAGES || {};

// ─── Temp Fix Monitor ─────────────────────────────────────────────────────────

var _tfData_ = [];

PAGES['tempfix'] = function(c) { _loadTfPage_(c); };

function _loadTfPage_(container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading temp fixes…</span></div>';
  google.script.run
    .withSuccessHandler(function(items) { _renderTf_(items, container); })
    .withFailureHandler(function(err) {
      container.innerHTML =
        '<div class="mon-empty">Error: ' + esc(err.message || String(err)) + '</div>';
    })
    .getTempFixItems({ includeCleared: false });
}

function _renderTf_(items, container) {
  _tfData_ = items || [];
  container.innerHTML =
    '<div class="mon-wrap">' +
    '<div class="mon-toolbar">' +
      '<span class="mon-title">Temp Fix Monitor</span>' +
      '<span class="mon-count" id="tf-cnt">' + _tfData_.length + ' active</span>' +
      '<input class="mon-search" id="tf-search" placeholder="Search…" oninput="_tfApply_()" />' +
      '<select class="mon-filter-select" id="tf-stat" onchange="_tfApply_()">' +
        '<option value="">All statuses</option>' +
        '<option>ACTIVE</option><option>PAST DUE</option>' +
      '</select>' +
      '<button onclick="_loadTfPage_(document.getElementById(\'page-tempfix\'))" ' +
        'style="height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);" title="Refresh">↻</button>' +
    '</div>' +
    _tfKpiBar_(_tfData_) +
    '<div class="mon-table-wrap"><table class="mon-table">' +
      '<thead><tr>' +
        '<th>ID</th><th>Ticket #</th><th>Equipment</th><th>Dept</th>' +
        '<th>Description</th><th>Status</th><th>Date Flagged</th>' +
        '<th>Days to Re-Inspect</th><th>Freq (days)</th><th></th>' +
      '</tr></thead>' +
      '<tbody id="tf-tbody"></tbody>' +
    '</table></div></div>';
  _tfRenderRows_(_tfData_);
}

function _tfApply_() {
  var q  = document.getElementById('tf-search');
  var sf = document.getElementById('tf-stat');
  var qv = q  ? q.value.toLowerCase()  : '';
  var sv = sf ? sf.value.toUpperCase() : '';
  _tfRenderRows_(_tfData_.filter(function(t) {
    if (sv && t.status !== sv) return false;
    if (qv) {
      var hay = (t.tempId + ' ' + t.ticketNo + ' ' + t.equipCode + ' ' +
                 t.specificEquip + ' ' + t.dept + ' ' + t.description).toLowerCase();
      if (hay.indexOf(qv) < 0) return false;
    }
    return true;
  }));
}

function _tfRenderRows_(list) {
  var tbody = document.getElementById('tf-tbody');
  if (!tbody) return;
  var cntEl = document.getElementById('tf-cnt');
  if (cntEl) cntEl.textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="mon-empty">No active temp fixes.</td></tr>';
    return;
  }
  var today = new Date(); today.setHours(0,0,0,0);
  tbody.innerHTML = list.map(function(t) {
    var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
    var isPastDue = t.status === 'PAST DUE';
    // Compute days to re-inspect from nextDue
    var daysCell = '—';
    var daysCellStyle = 'font-size:11.5px;color:var(--text-secondary);font-family:var(--font-mono);font-variant-numeric:tabular-nums;';
    if (t.nextDue) {
      var nd = new Date(t.nextDue); nd.setHours(0,0,0,0);
      if (!isNaN(nd)) {
        var diff = Math.round((nd - today) / (1000 * 60 * 60 * 24));
        if (diff < 0) {
          daysCell = Math.abs(diff) + 'd overdue';
          daysCellStyle += 'color:var(--status-critical);font-weight:700;';
        } else if (diff <= 3) {
          daysCell = diff + 'd';
          daysCellStyle += 'color:var(--status-warn);font-weight:600;';
        } else {
          daysCell = diff + 'd';
        }
      }
    }
    var rowStyle = isPastDue ? 'background:var(--status-critical-bg);' : '';
    return '<tr style="' + rowStyle + '">' +
      '<td class="mon-id">' + esc(t.tempId) + '</td>' +
      '<td style="font-family:var(--font-mono);font-size:11.5px;color:var(--brand-navy);">' + esc(t.ticketNo) + '</td>' +
      '<td class="mon-equip" title="' + esc(t.equipCode ? t.equipCode + ' — ' + t.specificEquip : t.specificEquip) + '">' +
        (t.equipCode ? '<span style="font-family:var(--font-mono);font-size:10.5px;color:var(--text-secondary);">' + esc(t.equipCode) + '</span> ' : '') +
        esc(t.specificEquip) + '</td>' +
      '<td>' + esc(t.dept) + '</td>' +
      '<td class="mon-desc" title="' + esc(t.tempFixDesc || t.description) + '">' + esc(t.tempFixDesc || t.description) + '</td>' +
      '<td><span class="stat-badge ' + esc('stat-' + t.status.replace(/\s+/g, '-')) + '">' + esc(t.status) + '</span></td>' +
      '<td style="font-size:11.5px;color:var(--text-tertiary);">' + esc(t.dateFlagged) + '</td>' +
      '<td style="' + daysCellStyle + '">' + daysCell + '</td>' +
      '<td style="font-size:11.5px;color:var(--text-secondary);">' + esc(String(t.freqDays)) + '</td>' +
      '<td style="white-space:nowrap;">' +
        '<button class="mon-btn" onclick="_tfInspect_(\'' + esc(t.tempId) + '\')" style="margin-right:4px;">Inspect</button>' +
        '<button class="mon-btn danger" onclick="_tfClear_(\'' + esc(t.tempId) + '\')">Clear</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function _tfInspect_(tempId) {
  _monModalOpen_('Record Inspection', 'Update last inspected date and recalculate next due.', function(notes) {
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) { showToast('Inspection recorded', 'success'); _loadTfPage_(document.getElementById('page-tempfix')); }
        else showToast(r.error || 'Error', 'error');
      })
      .withFailureHandler(function(e) { showToast(e.message || String(e), 'error'); })
      .inspectTempFix({ tempId: tempId, notes: notes });
  });
}

function _tfClear_(tempId) {
  _monModalOpen_('Clear Temp Fix', 'Mark this temp fix as cleared. The parent ticket will not be closed.', function(notes) {
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) { showToast('Temp fix cleared', 'success'); _loadTfPage_(document.getElementById('page-tempfix')); }
        else showToast(r.error || 'Error', 'error');
      })
      .withFailureHandler(function(e) { showToast(e.message || String(e), 'error'); })
      .clearTempFix({ tempId: tempId, notes: notes });
  });
}

// ─── Equipment Hold Log ───────────────────────────────────────────────────────

var _ehlData_ = [];

PAGES['equipment-hold'] = function(c) { _loadEhlPage_(c); };

function _loadEhlPage_(container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading equipment holds…</span></div>';
  google.script.run
    .withSuccessHandler(function(items) { _renderEhl_(items, container); })
    .withFailureHandler(function(err) {
      container.innerHTML =
        '<div class="mon-empty">Error: ' + esc(err.message || String(err)) + '</div>';
    })
    .getEquipHoldItems({ includeCleared: false });
}

function _renderEhl_(items, container) {
  _ehlData_ = items || [];
  container.innerHTML =
    '<div class="mon-wrap">' +
    '<div class="mon-toolbar">' +
      '<span class="mon-title">Equipment Hold Log ' +
        '<span style="font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:.04em;">' +
        'Non-Conforming Equipment Register · FRM-029-001</span></span>' +
      '<span class="mon-count" id="ehl-cnt">' + _ehlData_.length + ' tagged</span>' +
      '<input class="mon-search" id="ehl-search" placeholder="Search…" oninput="_ehlApply_()" />' +
      '<button onclick="_loadEhlPage_(document.getElementById(\'page-equipment-hold\'))" ' +
        'style="height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);" title="Refresh">↻</button>' +
    '</div>' +
    _ehlKpiBar_(_ehlData_) +
    '<div class="mon-table-wrap"><table class="mon-table">' +
      '<thead><tr>' +
        '<th>Tag ID</th><th>Ticket #</th><th>Equipment</th><th>Dept</th>' +
        '<th>Tag Type</th><th>Date Tagged</th><th>Reason</th><th>Tagged By</th><th></th>' +
      '</tr></thead>' +
      '<tbody id="ehl-tbody"></tbody>' +
    '</table></div></div>';
  _ehlRenderRows_(_ehlData_);
}

function _ehlApply_() {
  var q  = document.getElementById('ehl-search');
  var qv = q ? q.value.toLowerCase() : '';
  _ehlRenderRows_(_ehlData_.filter(function(t) {
    if (!qv) return true;
    var hay = (t.tagId + ' ' + t.ticketNo + ' ' + t.equipCode + ' ' +
               t.specificEquip + ' ' + t.dept + ' ' + t.reason).toLowerCase();
    return hay.indexOf(qv) >= 0;
  }));
}

function _ehlRenderRows_(list) {
  var tbody = document.getElementById('ehl-tbody');
  if (!tbody) return;
  var cntEl = document.getElementById('ehl-cnt');
  if (cntEl) cntEl.textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="mon-empty">No active equipment holds.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(t) {
    return '<tr>' +
      '<td class="mon-id">' + esc(t.tagId) + '</td>' +
      '<td style="font-family:var(--font-mono);font-size:11.5px;color:var(--brand-navy);">' + esc(t.ticketNo) + '</td>' +
      '<td class="mon-equip" title="' + esc(t.equipCode ? t.equipCode + ' — ' + t.specificEquip : t.specificEquip) + '">' +
        (t.equipCode ? '<span style="font-family:var(--font-mono);font-size:10.5px;color:var(--text-secondary);">' + esc(t.equipCode) + '</span> ' : '') +
        esc(t.specificEquip) + '</td>' +
      '<td>' + esc(t.dept) + '</td>' +
      '<td><span style="background:var(--status-critical-bg);color:var(--status-critical);font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:4px;">' + esc(t.tagType || 'HOLD') + '</span></td>' +
      '<td style="font-size:11.5px;color:var(--text-tertiary);">' + esc(t.dateTagged) + '</td>' +
      '<td class="mon-desc" title="' + esc(t.reason) + '">' + esc(t.reason) + '</td>' +
      '<td>' + esc(t.taggedBy) + '</td>' +
      '<td style="white-space:nowrap;">' +
        '<button class="mon-btn" onclick="_ehlPrintTag_(\'' + esc(t.tagId) + '\')">🖨 Print Tag</button> ' +
        '<button class="mon-btn danger" onclick="_ehlClear_(\'' + esc(t.tagId) + '\')">Clear Tag</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

// Render Izzy's auditor-approved Equipment Quality Hold Tag (FRM-029-002) for a
// hold-log row and send it to the browser print dialog. Fields are auditor-
// approved — only the doc-control triplet (FRM-029-002 / Rev 0 / 6/15/26) is added.
function _ehlPrintTag_(tagId) {
  var t = null;
  for (var i = 0; i < _ehlData_.length; i++) {
    if (_ehlData_[i].tagId === tagId) { t = _ehlData_[i]; break; }
  }
  if (!t) { showToast('Tag not found', 'error'); return; }

  var ty = (t.tagType || '').toLowerCase();
  var variant = ty.indexOf('yellow') >= 0 ? 'eht-yellow'
              : ty.indexOf('orange') >= 0 ? 'eht-orange' : 'eht-red';
  var statusTxt = ty.indexOf('yellow') >= 0 ? '⚠️ USE WITH CAUTION'
                : ty.indexOf('orange') >= 0 ? '🔧 TEMPORARY FIX IN PLACE'
                : '⛔ OUT OF SERVICE';
  var ref = t.ticketNo || t.tagId;

  function f(label, val) {
    return '<div class="f"><div class="fl">' + label + '</div><div class="fv">' + esc(val || '—') + '</div></div>';
  }

  var html =
    '<div class="eht-tag ' + variant + '">' +
      '<div class="eht-hero"><div class="l">Maintenance Ticket # / Hold Tag ID</div><div class="n">' + esc(ref) + '</div></div>' +
      '<div class="eht-cobar"><span>Container Supply Co.</span><span>FRM-029-002 &nbsp;|&nbsp; Rev 0 &nbsp;|&nbsp; 6/15/26</span></div>' +
      '<div class="eht-title"><div class="m">Equipment Quality Hold Tag</div><div class="s">Place in Tag Holder — Do Not Remove</div></div>' +
      '<div class="eht-status"><div class="t">' + statusTxt + '</div>' +
        '<div class="onhold">ON HOLD — not to be used until further notice</div></div>' +
      '<div class="eht-seclbl">Equipment Information</div>' +
      '<div class="eht-grid">' +
        f('Department', t.dept) + f('Equipment Code', t.equipCode) +
        f('Equipment Description', t.specificEquip) + f('Building / Zone', t.buildingZone) +
        f('Equipment Type', t.equipType) + f('Problem Type', t.problemType) +
      '</div>' +
      '<div class="eht-seclbl">Tag Details</div>' +
      '<div class="eht-grid">' +
        f('Hold Tag #', t.tagId) + f('Tag Type / Color', t.tagType) +
        f('Date Placed on Hold', t.dateTagged) + f('Hold Authority (Tagged By)', t.taggedBy) +
      '</div>' +
      '<div class="eht-reason"><div class="fl">Issue / Reason for Equipment Hold (Identified Risk)</div>' +
        '<div class="fv">' + esc(t.reason || '—') + '</div></div>' +
      '<div class="eht-warn">DO NOT OPERATE — AUTHORIZED PERSONNEL ONLY</div>' +
      '<div class="eht-sign">' +
        '<div class="sg"><div style="height:20px;"></div><div class="sl">Tagged By — Signature / Date</div></div>' +
        '<div class="sg"><div style="height:20px;"></div><div class="sl">Cleared By — Manager Signature / Date</div></div>' +
      '</div>' +
      '<div class="eht-foot"><span>' + esc(ref) + '</span><span>CSC Maintenance · FRM-029-002</span></div>' +
    '</div>';

  var area = document.getElementById('ehl-print-area');
  if (!area) { showToast('Print area missing', 'error'); return; }
  area.innerHTML = html;
  document.body.classList.add('printing-tag');
  function _cleanup_() {
    document.body.classList.remove('printing-tag');
    window.removeEventListener('afterprint', _cleanup_);
  }
  window.addEventListener('afterprint', _cleanup_);
  window.print();
  setTimeout(_cleanup_, 2000); // fallback if afterprint doesn't fire
}

function _ehlClear_(tagId) {
  _monModalOpen_('Clear Equipment Tag', 'Confirm equipment is cleared and safe to return to service.', function(notes) {
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) { showToast('Equipment tag cleared', 'success'); _loadEhlPage_(document.getElementById('page-equipment-hold')); }
        else showToast(r.error || 'Error', 'error');
      })
      .withFailureHandler(function(e) { showToast(e.message || String(e), 'error'); })
      .clearEquipTag({ tagId: tagId, notes: notes });
  });
}

// ─── Parts Needed ─────────────────────────────────────────────────────────────

var _pnData_ = [];

PAGES['parts'] = function(c) { _loadPnPage_(c); };

function _loadPnPage_(container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading parts…</span></div>';
  google.script.run
    .withSuccessHandler(function(items) { _renderPn_(items, container); })
    .withFailureHandler(function(err) {
      container.innerHTML =
        '<div class="mon-empty">Error: ' + esc(err.message || String(err)) + '</div>';
    })
    .getPartsItems({});
}

function _renderPn_(items, container) {
  _pnData_ = items || [];

  container.innerHTML =
    '<div class="mon-wrap">' +
    '<div class="mon-toolbar">' +
      '<span class="mon-title">Parts & Inventory</span>' +
      '<span class="mon-count" id="pn-cnt">' + _pnData_.length + ' parts</span>' +
      '<input class="mon-search" id="pn-search" placeholder="Search…" oninput="_pnApply_()" />' +
      '<button onclick="_loadPnPage_(document.getElementById(\'page-parts\'))" ' +
        'style="height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);" title="Refresh">↻</button>' +
    '</div>' +
    '<div id="pn-kanban" class="pn-kanban"></div>' +
    '</div>';
  _pnApply_();
}

var _PN_STAGES_ = ['PENDING', 'ORDERED', 'RECEIVED', 'CANCELLED'];
var _PN_STAGE_LABELS_ = { 'PENDING': 'Requested / Pending', 'ORDERED': 'Ordered', 'RECEIVED': 'Received', 'CANCELLED': 'Cancelled' };

function _pnApply_() {
  var q  = document.getElementById('pn-search');
  var qv = q ? q.value.toLowerCase() : '';
  var filtered = _pnData_.filter(function(p) {
    if (!qv) return true;
    var hay = (p.partId + ' ' + p.partDesc + ' ' + p.ticketNo + ' ' +
               p.equipCode + ' ' + p.specificEquip + ' ' + p.dept).toLowerCase();
    return hay.indexOf(qv) >= 0;
  });
  var kanban = document.getElementById('pn-kanban');
  if (!kanban) return;
  var cntEl = document.getElementById('pn-cnt');
  if (cntEl) cntEl.textContent = filtered.length + ' part' + (filtered.length !== 1 ? 's' : '');
  var isManager = typeof USER !== 'undefined' && USER.isManager;

  kanban.innerHTML = _PN_STAGES_.map(function(stage) {
    var cards = filtered.filter(function(p) { return p.partsStatus === stage; });
    var cardHtml = cards.length === 0
      ? '<div class="pn-col-empty">No parts</div>'
      : cards.map(function(p) {
          var nextStatus = { 'PENDING': 'ORDERED', 'ORDERED': 'RECEIVED' }[stage];
          var actions = '';
          if (isManager && nextStatus) {
            actions += '<button class="mon-btn primary" onclick="event.stopPropagation();_pnAdvance_(\'' + esc(p.partId) + '\',\'' + esc(nextStatus) + '\')">→ ' + esc(nextStatus) + '</button>';
          }
          if (isManager && stage !== 'CANCELLED' && stage !== 'RECEIVED') {
            actions += '<button class="mon-btn" onclick="event.stopPropagation();_pnAdvance_(\'' + esc(p.partId) + '\',\'CANCELLED\')">Cancel</button>';
          }
          return '<div class="pn-card">' +
            '<div class="pn-card-id">' + esc(p.partId) + '</div>' +
            '<div class="pn-card-desc" title="' + esc(p.partDesc) + '">' + esc(p.partDesc) + '</div>' +
            '<div class="pn-card-ticket">' + esc(p.ticketNo) + '</div>' +
            '<div class="pn-card-equip" title="' + esc(p.specificEquip) + '">' +
              (p.equipCode ? '<span style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">' + esc(p.equipCode) + '</span> ' : '') + esc(p.specificEquip) +
            '</div>' +
            '<div class="pn-card-meta">' +
              '<span>' + esc(p.dept) + '</span>' +
              '<span>' + esc(p.dateRequested || '') + '</span>' +
            '</div>' +
            (actions ? '<div class="pn-card-actions">' + actions + '</div>' : '') +
          '</div>';
        }).join('');
    return '<div class="pn-col">' +
      '<div class="pn-col-h">' +
        '<span>' + esc(_PN_STAGE_LABELS_[stage] || stage) + '</span>' +
        '<span class="ct">' + cards.length + '</span>' +
      '</div>' +
      '<div class="pn-col-list">' + cardHtml + '</div>' +
    '</div>';
  }).join('');
}

function _pnAdvance_(partId, newStatus) {
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { showToast('Status → ' + newStatus, 'success'); _loadPnPage_(document.getElementById('page-parts')); }
      else showToast(r.error || 'Error', 'error');
    })
    .withFailureHandler(function(e) { showToast(e.message || String(e), 'error'); })
    .updatePartsStatus({ partId: partId, status: newStatus });
}

// ─── KPI helpers ─────────────────────────────────────────────────────────────

function _monKpiCard_(val, label, accent, foot) {
  return '<div class="kpi' + (accent ? ' kpi-' + accent : '') + '">' +
    '<div class="kpi-accent"></div>' +
    '<div class="kpi-label">' + esc(label) + '</div>' +
    '<div class="kpi-value">' + val + '</div>' +
    (foot ? '<div class="kpi-foot">' + esc(foot) + '</div>' : '') +
  '</div>';
}

function _tfKpiBar_(items) {
  var total   = items.length;
  var pastDue = items.filter(function(t) { return t.status === 'PAST DUE'; }).length;
  var active  = items.filter(function(t) { return t.status === 'ACTIVE';   }).length;
  var pdFoot  = pastDue > 0 ? pastDue + ' need immediate attention' : 'all inspected on schedule';
  // "Converted to permanent" requires historical data not yet available — shown as pending
  var convertCard = _monKpiCard_(
    '<span style="color:var(--text-tertiary);font-size:16px;">—</span>',
    'Converted to Permanent',
    'success',
    'this quarter · data pending'
  );
  return '<div class="kpi-band" style="grid-template-columns:repeat(4,1fr);">' +
    _monKpiCard_(total,   'Active Temp Fixes', '',         total + ' temp fix' + (total !== 1 ? 'es' : '') + ' on the floor') +
    _monKpiCard_(pastDue, 'Past Due',          pastDue > 0 ? 'critical' : 'success', pdFoot) +
    _monKpiCard_('<span style="color:var(--text-tertiary);font-size:16px;">—</span>', 'Inspected On Schedule', '', 'rolling 90d · data pending') +
    convertCard +
  '</div>';
}

function _ehlKpiBar_(items) {
  var total  = items.length;
  // Tag type matching: case-insensitive, partial match on leading color word
  function tagMatch(t, color) {
    return t.tagType && t.tagType.toLowerCase().indexOf(color.toLowerCase()) >= 0;
  }
  var red    = items.filter(function(t) { return tagMatch(t, 'red');    }).length;
  var yellow = items.filter(function(t) { return tagMatch(t, 'yellow'); }).length;
  var orange = items.filter(function(t) { return tagMatch(t, 'orange'); }).length;
  return '<div class="kpi-band" style="grid-template-columns:repeat(4,1fr);">' +
    _monKpiCard_(total,  'Active Tags',         total  > 0 ? 'critical' : '', 'across all depts') +
    _monKpiCard_(red,    'Out of Service',   red    > 0 ? 'critical' : '', 'Red tag — production blocked') +
    _monKpiCard_(yellow, 'Use with Caution', yellow > 0 ? 'warn'     : '', 'Yellow tag — limited operation') +
    _monKpiCard_(orange, 'Temp Fix Tagged',  orange > 0 ? 'warn'     : '', 'Orange tag — temp fix in place') +
  '</div>';
}

// ─── Shared monitor modal ─────────────────────────────────────────────────────

var _monModalCallback_ = null;

function _monModalOpen_(title, sub, onConfirm) {
  document.getElementById('mon-modal-title').textContent = title;
  document.getElementById('mon-modal-sub').textContent   = sub;
  document.getElementById('mon-modal-notes').value       = '';
  _monModalCallback_ = onConfirm;
  document.getElementById('mon-modal-back').classList.add('open');
  document.getElementById('mon-modal-confirm').onclick = function() {
    var notes = document.getElementById('mon-modal-notes').value.trim();
    _monModalClose_();
    if (_monModalCallback_) _monModalCallback_(notes);
  };
}

function _monModalClose_() {
  document.getElementById('mon-modal-back').classList.remove('open');
  _monModalCallback_ = null;
}

document.getElementById('mon-modal-back').addEventListener('click', function(e) {
  if (e.target === this) _monModalClose_();
});
</script>
