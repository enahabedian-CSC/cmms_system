<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Closed Tickets partial — closed + complete archive view         ║ -->
<!-- ║  Registers PAGE: closed                                          ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Closed tickets ──────────────────────────────────────────────────── */
.ct-wrap{padding:20px 24px;}
.ct-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.ct-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;}
.ct-count{font-size:12px;color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:4px;padding:2px 8px;}
.ct-search{height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;width:200px;outline:none;color:var(--text-primary);}
.ct-search:focus{border-color:var(--brand-navy);}
.ct-filter-select{height:30px;padding:0 8px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.ct-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.ct-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.ct-table th{background:var(--bg-subtle);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.ct-table td{padding:10px 12px;border-bottom:1px solid var(--border-default);vertical-align:middle;color:var(--text-primary);}
.ct-table tr:last-child td{border-bottom:0;}
.ct-table tbody tr{cursor:pointer;transition:background .1s;}
.ct-table tbody tr:hover{background:var(--bg-hover);}
.ct-table .col-ticket{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);font-size:12px;}
.ct-table .col-equip{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ct-table .col-desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);}
.ct-empty{padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}
.stat-CLOSED  {background:var(--status-success-bg);color:var(--status-success);}
.stat-COMPLETE{background:var(--status-success-bg);color:var(--status-success);}
.ct-load-more{margin:12px 0;text-align:center;}
.ct-load-more button{padding:6px 18px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);}
.ct-load-more button:hover{background:var(--bg-hover);}
</style>

<script>
// ── Closed tickets page ───────────────────────────────────────────────────────
window.PAGES = window.PAGES || {};

var _ctData_     = [];
var _ctSortState_ = {};

function _ctTh_(field, label) {
  return '<th class="sort-th" data-sort-group="ct" data-sort-field="' + field + '" onclick="_ctSortBy_(\'' + field + '\')">' + label + '</th>';
}

function _ctSortBy_(field) {
  var cur = _ctSortState_;
  _ctSortState_ = { field: field, dir: cur.field === field && cur.dir === 'asc' ? 'desc' : 'asc' };
  document.querySelectorAll('[data-sort-group="ct"]').forEach(function(th) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.getAttribute('data-sort-field') === field) th.classList.add('sort-' + _ctSortState_.dir);
  });
  _ctApply_();
}

function _loadClosedPage_(container) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Loading closed tickets…</span></div>';
  fetch(WORKER_URL + '/api/tickets/closed', {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(tickets) {
    if (tickets && tickets.error) {
      var msg = tickets.error;
      container.innerHTML = (msg.indexOf('Manager') >= 0 || msg.indexOf('required') >= 0)
        ? '<div class="ct-empty">Closed ticket history is only available to managers.</div>'
        : '<div class="ct-empty">Error loading closed tickets: ' + esc(msg) + '</div>';
      return;
    }
    _renderClosed_(tickets, container);
  })
  .catch(function(err) {
    container.innerHTML = '<div class="ct-empty">Error loading closed tickets: ' + esc(err.message || String(err)) + '</div>';
  });
}

function _renderClosed_(tickets, container) {
  _ctData_ = _asArray_(tickets);

  var statuses = [];
  var depts = [];
  _ctData_.forEach(function(t) {
    if (statuses.indexOf(t.status) < 0) statuses.push(t.status);
    if (t.dept && depts.indexOf(t.dept) < 0) depts.push(t.dept);
  });
  statuses.sort();
  depts.sort();

  container.innerHTML =
    // C12: SQF maintenance repair log form header (FRM-030-002)
    '<div style="background:var(--brand-navy-deep,#001436);padding:8px 24px;display:flex;align-items:center;gap:14px;">' +
      '<span style="font-family:var(--font-mono,monospace);font-size:11px;font-weight:700;color:#ffffff;letter-spacing:.06em;text-transform:uppercase;">&#128449; Maintenance Repair Log</span>' +
      '<span style="width:1px;height:14px;background:rgba(255,255,255,.18);display:inline-block;"></span>' +
      '<span style="font-size:10.5px;color:rgba(255,255,255,.50);letter-spacing:.04em;">' + esc(docLabel('repairLog')) + '</span>' +
    '</div>' +
    '<div class="ct-wrap">' +
    '<div class="ct-toolbar">' +
      '<span class="ct-title">Closed Tickets</span>' +
      '<span class="ct-count" id="ct-cnt">' + _ctData_.length + ' ticket' + (_ctData_.length !== 1 ? 's' : '') + '</span>' +
      '<input class="ct-search" id="ct-search" placeholder="Search…" oninput="_ctApply_()" />' +
      (depts.length > 1
        ? '<select class="ct-filter-select" id="ct-dept" onchange="_ctApply_()"><option value="">All depts</option>' +
          depts.map(function(d) { return '<option>' + esc(d) + '</option>'; }).join('') +
          '</select>'
        : '') +
      (statuses.length > 1
        ? '<select class="ct-filter-select" id="ct-stat" onchange="_ctApply_()"><option value="">All statuses</option>' +
          statuses.map(function(s) { return '<option>' + esc(s) + '</option>'; }).join('') +
          '</select>'
        : '') +
      '<button onclick="_refreshClosed_()" style="height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:var(--text-secondary);" title="Refresh">↻</button>' +
    '</div>' +
    '<div class="ct-table-wrap"><table class="ct-table">' +
      '<thead><tr>' +
        _ctTh_('ticketNo','Ticket #') +
        _ctTh_('priority','Priority') +
        _ctTh_('status','Status') +
        _ctTh_('dept','Dept') +
        _ctTh_('specificEquip','Equipment') +
        _ctTh_('description','Description') +
        _ctTh_('assignedTo','Assigned To') +
        _ctTh_('dateOpened','Date Opened') +
        _ctTh_('dateClosed','Date Closed') +
      '</tr></thead>' +
      '<tbody id="ct-tbody"></tbody>' +
    '</table></div>' +
    '</div>';

  var _initCt = _ctSortState_.field ? _tlSorted_(_ctData_, _ctSortState_.field, _ctSortState_.dir) : _ctData_;
  _ctRenderRows_(_initCt);
}

function _ctApply_() {
  var q   = document.getElementById('ct-search');
  var df  = document.getElementById('ct-dept');
  var sf  = document.getElementById('ct-stat');
  var qv  = q  ? q.value.toLowerCase()  : '';
  var dfv = df ? df.value.toUpperCase() : '';
  var sfv = sf ? sf.value.toUpperCase() : '';

  var filtered = _ctData_.filter(function(t) {
    if (dfv && t.dept   !== dfv) return false;
    if (sfv && t.status !== sfv) return false;
    if (qv) {
      var hay = (t.ticketNo + ' ' + t.specificEquip + ' ' + t.description + ' ' +
                 t.assignedTo + ' ' + t.dept + ' ' + t.equipCode + ' ' + t.addedBy).toLowerCase();
      if (hay.indexOf(qv) < 0) return false;
    }
    return true;
  });
  if (_ctSortState_.field) filtered = _tlSorted_(filtered, _ctSortState_.field, _ctSortState_.dir);
  _ctRenderRows_(filtered);
}

function _ctRenderRows_(list) {
  var tbody = document.getElementById('ct-tbody');
  if (!tbody) return;
  var cntEl = document.getElementById('ct-cnt');
  if (cntEl) cntEl.textContent = list.length + ' ticket' + (list.length !== 1 ? 's' : '');

  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="ct-empty">No tickets match.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(t) {
    var priCls = 'pri-' + (t.priority || '');
    var staCls = 'stat-' + t.status;
    return '<tr onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')">' +
      '<td class="col-ticket">' + esc(t.ticketNo) + '</td>' +
      '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority || '—') + '</span></td>' +
      '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span></td>' +
      '<td>' + esc(t.dept) + '</td>' +
      '<td class="col-equip" title="' + esc(t.equipCode ? t.equipCode + ' — ' + t.specificEquip : t.specificEquip) + '">' +
        (t.equipCode ? '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">' + esc(t.equipCode) + '</span> ' : '') +
        esc(t.specificEquip) + '</td>' +
      '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description) + '</td>' +
      '<td>' + esc(t.assignedTo || '—') + '</td>' +
      '<td style="color:var(--text-tertiary);font-size:11.5px;">' + esc(t.dateOpened) + '</td>' +
      '<td style="color:var(--status-success);font-size:11.5px;font-weight:600;">' + esc(t.dateClosed || '—') + '</td>' +
      '</tr>';
  }).join('');
}

function _refreshClosed_() {
  var pageEl = document.getElementById('page-closed');
  if (pageEl) _loadClosedPage_(pageEl);
}

PAGES['closed'] = function(c) { _loadClosedPage_(c); };
</script>
