<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Submit Ticket — cascading button-grid form (csc-hub pattern)   ║ -->
<!-- ║  Registers PAGE: submit                                          ║ -->
<!-- ║  No static <div class="page"> — rendered dynamically            ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Submit Ticket page chrome ──────────────────────────────────────── */
.submit-page-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.submit-page-title{font-size:18px;font-weight:700;color:var(--text-primary);line-height:1.2;}
.submit-page-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}

/* Two-column grid — form left, preview right */
.submit-layout{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start;}
@media(max-width:920px){
  .submit-layout{grid-template-columns:1fr;}
  .submit-right{order:-1;}
}
.submit-right{display:flex;flex-direction:column;gap:12px;position:sticky;top:24px;}

/* Section cards */
.sf-section{background:#fff;border:1px solid var(--border-default);border-radius:10px;padding:16px 20px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.sf-section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sf-step-num{width:24px;height:24px;border-radius:50%;background:var(--brand-navy);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0;}
.sf-section-title{font-size:13px;font-weight:700;color:var(--text-primary);}
.sf-section-sel{font-size:12px;color:var(--brand-navy);font-weight:600;margin-left:auto;max-width:60%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Cascading button grids (matches csc-hub sel-btn pattern) */
.sel-btn-grid{display:grid;gap:8px;}
.sel-btn-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
.sel-btn-grid.cols-2{grid-template-columns:1fr 1fr;}
@media(max-width:600px){.sel-btn-grid.cols-3{grid-template-columns:1fr 1fr;}}
.sel-btn{border:2px solid var(--border-default);border-radius:10px;padding:14px 12px;min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-primary);background:#fff;transition:all .15s;user-select:none;width:100%;box-sizing:border-box;line-height:1.3;}
.sel-btn:hover{border-color:var(--brand-navy);color:var(--brand-navy);}
.sel-btn.active{border-color:var(--brand-navy);background:var(--brand-navy);color:#fff;}
.sf-no-equip-note{margin-top:8px;padding:8px 12px;background:var(--status-info-bg);border:1px solid var(--status-info);border-radius:6px;font-size:12px;color:var(--status-info);line-height:1.4;}

/* Priority cards */
.priority-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.priority-card{border:2px solid var(--border-default);border-radius:8px;padding:9px 6px;text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
.priority-card:hover{border-color:var(--text-secondary);}
.priority-card.selected{border-color:var(--brand-navy);background:var(--status-info-bg);}
.priority-card .p-label{font-size:11px;font-weight:700;letter-spacing:.03em;}
.priority-card.p-low    .p-label{color:var(--status-low);}
.priority-card.p-medium .p-label{color:var(--status-medium);}
.priority-card.p-high   .p-label{color:var(--status-high);}
.priority-card.p-critical .p-label{color:var(--status-critical);}
.priority-card.p-critical.selected{border-color:var(--status-critical);background:var(--status-critical-bg);}
.priority-card.p-high.selected   {border-color:var(--status-high);background:var(--status-high-bg);}
.priority-card.p-medium.selected {border-color:var(--status-medium);background:var(--status-medium-bg);}
.priority-card .p-sub{font-size:10px;color:var(--text-tertiary);margin-top:2px;}

/* Form fields */
.form-row{display:grid;gap:12px;margin-bottom:12px;}
.form-row.cols-2{grid-template-columns:1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-primary);}
.form-label .req{color:var(--status-critical);margin-left:2px;}
.form-input,.form-select,.form-textarea{height:34px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:13px;color:var(--text-primary);background:#fff;outline:none;width:100%;box-sizing:border-box;transition:border-color .15s,box-shadow .15s;}
.form-textarea{height:78px;padding:8px 10px;resize:vertical;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand-navy);box-shadow:0 0 0 3px rgba(0,31,79,.07);}
.form-hint{font-size:11px;color:var(--text-tertiary);margin-top:1px;}

/* Est. hours stepper */
.sf-hrs-wrap{display:flex;align-items:center;gap:10px;}
.sf-hrs-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border-default);background:#fff;cursor:pointer;font-size:18px;font-weight:700;display:grid;place-items:center;color:var(--text-primary);flex-shrink:0;line-height:1;}
.sf-hrs-btn:hover{border-color:var(--brand-navy);color:var(--brand-navy);}
.sf-hrs-val{font-size:20px;font-weight:700;color:var(--text-primary);min-width:40px;text-align:center;}
.sf-hrs-unit{font-size:13px;color:var(--text-secondary);}

/* Photo capture */
.sf-photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sf-photo-btn{padding:12px 10px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s;-webkit-tap-highlight-color:transparent;}
.sf-photo-btn:active{opacity:.8;}
.sf-camera-btn{background:var(--brand-navy);}
.sf-upload-btn{background:#5a6a7a;}
.sf-photo-previews{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.sf-photo-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border-default);}
.sf-photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.sf-photo-remove{position:absolute;top:3px;right:3px;background:rgba(214,60,60,.85);border:none;border-radius:50%;width:20px;height:20px;color:#fff;cursor:pointer;font-size:.65rem;font-weight:700;display:grid;place-items:center;}
.sf-file-thumb{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f4f8;gap:4px;padding:6px;box-sizing:border-box;font-size:0.5rem;text-align:center;color:#555;word-break:break-all;overflow:hidden;}

/* Live preview card */
.submit-card{background:#fff;border:1px solid var(--border-default);border-radius:10px;padding:22px;box-shadow:var(--shadow-sm);}
.submit-preview-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
.preview-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border-default);}
.preview-hdr-title{font-size:13px;font-weight:700;color:var(--text-primary);}
.preview-hdr-sub{font-size:11px;color:var(--text-tertiary);}
.preview-body{padding:14px;}

/* Heads-up panel */
.submit-headsup{background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:8px;padding:12px 14px;}
.headsup-tag{display:inline-block;background:var(--brand-navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-bottom:7px;}
.headsup-body{font-size:12.5px;color:var(--text-secondary);line-height:1.5;}

/* Shared btn classes */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:34px;border-radius:6px;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.btn-primary:hover{background:var(--brand-navy-soft);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:var(--border-default);}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary);}

/* Success state */
.submit-success{text-align:center;padding:28px 0;}
.submit-success .success-icon{width:48px;height:48px;border-radius:50%;background:var(--status-success-bg);display:grid;place-items:center;margin:0 auto 14px;color:var(--status-success);}
.submit-success h3{font-size:18px;font-weight:700;margin:0 0 8px;}
.submit-success .ticket-no{display:inline-block;padding:6px 16px;background:var(--bg-subtle);border-radius:6px;font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--brand-navy);margin-bottom:14px;cursor:pointer;}
.submit-success .s-sub{font-size:13px;color:var(--text-secondary);}
</style>

<script>
// ── Module state ──────────────────────────────────────────────────────────────
var _sfData         = null;
var _sfPriority     = 'MEDIUM';
var _sfEquipCode    = '';
var _sfEquipSpec    = '';
var _sfPhotos_      = [];
var _sfSel          = { dept: '', level2: '', level3: '', level4: '' };
var _sfRows         = [];
var _sfResolvedCode = '';
var _sfEstHours     = 1;

window.PAGES = window.PAGES || {};

PAGES['submit'] = function(container) {
  _sfPriority = 'MEDIUM'; _sfEquipCode = ''; _sfEquipSpec = ''; _sfPhotos_ = [];
  _sfSel = { dept: '', level2: '', level3: '', level4: '' };
  _sfRows = []; _sfResolvedCode = ''; _sfEstHours = 1;
  container.innerHTML = _buildSubmitHTML_();
  if (_sfData) {
    _sfPopulate_(_sfData);
  } else {
    fetch(WORKER_URL + '/api/submit/form-data', {
      headers: { 'X-User-Email': USER ? USER.email : '' }
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        _sfData = d;
        _sfPopulate_(d);
        _sfUpdatePreview_();
      })
      .catch(function(e) {
        container.innerHTML =
          '<div style="padding:32px;color:var(--status-critical);">Failed to load form: ' +
          esc(String(e.message || e)) + '</div>';
      });
  }
  _sfUpdatePreview_();
};

// ── HTML builder ──────────────────────────────────────────────────────────────

function _buildSubmitHTML_() {
  var header =
    '<div class="submit-page-hdr">' +
      '<div>' +
        '<div class="submit-page-title">New Maintenance Ticket</div>' +
        '<div class="submit-page-sub" id="sf-step-sub">FRM-030-001</div>' +
      '</div>' +
    '</div>';

  var leftCol =
    // § 1 — Submitted By
    '<div class="sf-section">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">1</div>' +
        '<div class="sf-section-title">Submitted By</div>' +
      '</div>' +
      '<select class="form-select" id="sf-addedby" onchange="_sfUpdatePreview_()"></select>' +
    '</div>' +

    // § 2 — Priority
    '<div class="sf-section">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">2</div>' +
        '<div class="sf-section-title">Priority</div>' +
        '<div class="sf-section-sel" id="sf-sel-priority">MEDIUM</div>' +
      '</div>' +
      '<div class="priority-grid" id="sf-priority-grid">' +
        '<div class="priority-card p-low"      id="pcard-LOW"      onclick="selectPriority(\'LOW\')"><div class="p-label">LOW</div><div class="p-sub">Scheduled</div></div>' +
        '<div class="priority-card p-medium selected" id="pcard-MEDIUM" onclick="selectPriority(\'MEDIUM\')"><div class="p-label">MEDIUM</div><div class="p-sub">Soon</div></div>' +
        '<div class="priority-card p-high"     id="pcard-HIGH"     onclick="selectPriority(\'HIGH\')"><div class="p-label">HIGH</div><div class="p-sub">Urgent</div></div>' +
        '<div class="priority-card p-critical" id="pcard-CRITICAL" onclick="selectPriority(\'CRITICAL\')"><div class="p-label">CRITICAL</div><div class="p-sub">Immediate</div></div>' +
      '</div>' +
      '<div class="form-hint" id="critical-hint" style="display:none;color:var(--status-critical);font-weight:600;margin-top:6px;">&#9888; Critical tickets bypass the waiting queue and go directly to Open.</div>' +
    '</div>' +

    // § 3 — Department
    '<div class="sf-section">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">3</div>' +
        '<div class="sf-section-title">Department</div>' +
        '<div class="sf-section-sel" id="sf-sel-dept"></div>' +
      '</div>' +
      '<div class="sel-btn-grid cols-3" id="sf-dept-grid">' +
        '<div style="color:var(--text-tertiary);font-size:12px;grid-column:1/-1;">Loading equipment data…</div>' +
      '</div>' +
      '<div id="sf-no-equip-note" style="display:none;" class="sf-no-equip-note"></div>' +
    '</div>' +

    // § 4 — Section (hidden until dept selected)
    '<div class="sf-section" id="sf-sec-level2" style="display:none;">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">4</div>' +
        '<div class="sf-section-title">Section</div>' +
        '<div class="sf-section-sel" id="sf-sel-level2"></div>' +
      '</div>' +
      '<div class="sel-btn-grid cols-3" id="sf-level2-grid"></div>' +
    '</div>' +

    // § 5 — Equipment (hidden until section selected)
    '<div class="sf-section" id="sf-sec-level3" style="display:none;">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">5</div>' +
        '<div class="sf-section-title">Equipment</div>' +
        '<div class="sf-section-sel" id="sf-sel-level3"></div>' +
      '</div>' +
      '<div class="sel-btn-grid cols-3" id="sf-level3-grid"></div>' +
    '</div>' +

    // § 6 — Sub-Item (hidden, only shown when level4 data exists)
    '<div class="sf-section" id="sf-sec-level4" style="display:none;">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">6</div>' +
        '<div class="sf-section-title">Sub-Item</div>' +
        '<div class="sf-section-sel" id="sf-sel-level4"></div>' +
      '</div>' +
      '<div class="sel-btn-grid cols-3" id="sf-level4-grid"></div>' +
    '</div>' +

    // § 7 — Location
    '<div class="sf-section">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">7</div>' +
        '<div class="sf-section-title">Location</div>' +
      '</div>' +
      '<div class="form-row cols-2">' +
        '<div class="form-group">' +
          '<label class="form-label">Building / Zone</label>' +
          '<select class="form-select" id="sf-zone" onchange="_sfUpdatePreview_()"><option value="">— Select zone —</option></select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Line #</label>' +
          '<input type="text" class="form-input" id="sf-line" placeholder="e.g. L-04" oninput="_sfUpdatePreview_()">' +
        '</div>' +
      '</div>' +
    '</div>' +

    // § 8 — Problem Details
    '<div class="sf-section">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">8</div>' +
        '<div class="sf-section-title">Problem Details</div>' +
      '</div>' +
      '<div class="form-row cols-2">' +
        '<div class="form-group">' +
          '<label class="form-label">Problem Type <span class="req">*</span></label>' +
          '<select class="form-select" id="sf-probtype" onchange="_sfUpdateRoutingBanner_();_sfUpdatePreview_()"><option value="">— Select type —</option></select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Downtime Type</label>' +
          '<select class="form-select" id="sf-downtime" onchange="_sfUpdatePreview_()">' +
            '<option value="UNPLANNED">UNPLANNED</option><option value="PLANNED">PLANNED</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group">' +
          '<label class="form-label">Problem Description <span class="req">*</span></label>' +
          '<textarea class="form-textarea" id="sf-desc" placeholder="Describe the problem in detail…" rows="3" oninput="_sfUpdatePreview_()"></textarea>' +
        '</div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group">' +
          '<label class="form-label">Observations <span style="font-weight:400;color:var(--text-tertiary)">(optional)</span></label>' +
          '<textarea class="form-textarea" id="sf-obs" placeholder="Any additional observations or context…" rows="2"></textarea>' +
        '</div>' +
      '</div>' +
      '<div id="sf-routing-banner" style="display:none;margin-top:4px;padding:7px 12px;background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:6px;font-size:11.5px;color:var(--text-secondary);"></div>' +
    '</div>' +

    // § 9 — Photos
    '<div class="sf-section">' +
      '<div class="sf-section-hdr">' +
        '<div class="sf-step-num">9</div>' +
        '<div class="sf-section-title">Photos</div>' +
        '<div style="font-size:11px;color:var(--text-tertiary);margin-left:auto;">(optional — up to 6)</div>' +
      '</div>' +
      '<div class="sf-photo-btns">' +
        '<button type="button" class="sf-photo-btn sf-camera-btn" onclick="_sfOpenCamera_()">' +
          '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>' +
          ' Take Photo' +
        '</button>' +
        '<button type="button" class="sf-photo-btn sf-upload-btn" onclick="_sfOpenUpload_()">' +
          '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>' +
          ' Upload File' +
        '</button>' +
      '</div>' +
      '<input type="file" accept="image/*" capture="environment" id="sf-fileInput" style="display:none" onchange="_sfHandleFileCapture_(this)"/>' +
      '<input type="file" accept="image/*,application/pdf" multiple id="sf-uploadInput" style="display:none" onchange="_sfHandleFileCapture_(this)"/>' +
      '<div class="sf-photo-previews" id="sf-photoPreviews"></div>' +
    '</div>' +

    // Submit
    '<div class="sf-section">' +
      '<div class="form-row cols-2" style="margin-bottom:16px;align-items:center;">' +
        '<div class="form-group">' +
          '<label class="form-label">Estimated Hours</label>' +
          '<div class="sf-hrs-wrap">' +
            '<button type="button" class="sf-hrs-btn" onclick="_sfAdjHours_(-0.5)">−</button>' +
            '<div class="sf-hrs-val" id="sf-hrs-val">1</div>' +
            '<span class="sf-hrs-unit">hrs</span>' +
            '<button type="button" class="sf-hrs-btn" onclick="_sfAdjHours_(0.5)">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="form-group" style="justify-content:flex-end;padding-top:18px;">' +
          '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:500;">' +
            '<input type="checkbox" id="sf-parts" style="width:15px;height:15px;cursor:pointer;"> Parts Required' +
          '</label>' +
        '</div>' +
      '</div>' +
      '<button class="btn btn-primary" id="submit-btn" onclick="submitTicket()" style="width:100%;height:44px;font-size:14px;justify-content:center;">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Submit Ticket' +
      '</button>' +
    '</div>';

  var preview =
    '<div class="submit-preview-card">' +
      '<div class="preview-hdr">' +
        '<span class="preview-hdr-title">Live Preview</span>' +
        '<span class="preview-hdr-sub">as it will appear in queue</span>' +
      '</div>' +
      '<div class="preview-body" id="sf-preview-body">' +
        '<div style="color:var(--text-tertiary);font-size:12px;">Fill in the form to see a preview of this ticket.</div>' +
      '</div>' +
    '</div>';

  var headsup =
    '<div class="submit-headsup">' +
      '<div class="headsup-tag">Heads Up</div>' +
      '<div class="headsup-body" id="sf-headsup-text">Select specific equipment above to see recent ticket context.</div>' +
    '</div>';

  return (
    header +
    '<div class="submit-layout">' +
      '<div class="submit-left">' + leftCol + '</div>' +
      '<div class="submit-right">' + preview + headsup + '</div>' +
    '</div>'
  );
}

// ── Form population ───────────────────────────────────────────────────────────

function _sfPopulate_(d) {
  _sfRows = d.equipRows || [];
  _sfRenderDeptGrid_();

  var zoneSel = document.getElementById('sf-zone');
  if (zoneSel) {
    zoneSel.innerHTML = '<option value="">— Select zone —</option>';
    (d.buildingZones || []).forEach(function(z) {
      var opt = document.createElement('option'); opt.value = z; opt.textContent = z;
      zoneSel.appendChild(opt);
    });
  }

  var ptSel = document.getElementById('sf-probtype');
  if (ptSel) {
    ptSel.innerHTML = '<option value="">— Select type —</option>';
    (d.problemTypes || []).forEach(function(pt) {
      var opt = document.createElement('option'); opt.value = pt; opt.textContent = pt;
      ptSel.appendChild(opt);
    });
  }

  var abSel = document.getElementById('sf-addedby');
  if (abSel) {
    abSel.innerHTML = '';
    var currentUser = d.userDisplayName || (typeof USER !== 'undefined' ? USER.displayName : '');
    var people = currentUser
      ? [currentUser].concat((d.peopleList || []).filter(function(p) {
          return p.toLowerCase().trim() !== currentUser.toLowerCase().trim();
        }))
      : (d.peopleList || []);
    people.forEach(function(p) {
      var opt = document.createElement('option'); opt.value = p; opt.textContent = p;
      abSel.appendChild(opt);
    });
  }

  if (!d.userIsManager) {
    var grid = document.getElementById('sf-priority-grid');
    if (grid) {
      var cards = grid.querySelectorAll('.priority-card');
      for (var ci = 0; ci < cards.length; ci++) {
        cards[ci].style.cursor        = 'default';
        cards[ci].style.pointerEvents = 'none';
        cards[ci].style.opacity       = '0.65';
      }
      var lockNote = document.createElement('div');
      lockNote.className = 'form-hint';
      lockNote.style.marginTop = '6px';
      lockNote.textContent = 'Priority is assigned by your manager. Default: MEDIUM.';
      grid.parentNode.appendChild(lockNote);
    }
  }

  // Auto-select first owned dept
  if (d.userOwnedDepts && d.userOwnedDepts.length > 0) {
    var firstDept = d.userOwnedDepts[0];
    var dg = document.getElementById('sf-dept-grid');
    if (dg) {
      var btns = dg.querySelectorAll('.sel-btn');
      for (var bi = 0; bi < btns.length; bi++) {
        if (btns[bi].getAttribute('data-val') === firstDept) {
          _sfSelectDept_(btns[bi], firstDept);
          break;
        }
      }
    }
  }
}

function _sfRenderDeptGrid_() {

// ── Cascade helpers ───────────────────────────────────────────────────────────

// Returns unique non-empty values for `col`, filtered by the given selections.
// Pass {} as selOverride to bypass all filters (get all unique depts).
// Pass undefined / omit to use current _sfSel.
function _sfGetUnique_(col, selOverride) {
  var sel = selOverride !== undefined ? selOverride : _sfSel;
  var seen = {}, result = [];
  for (var i = 0; i < _sfRows.length; i++) {
    var row = _sfRows[i];
    if (sel.dept   !== undefined && sel.dept   && row.dept   !== sel.dept)   continue;
    if (sel.level2 !== undefined && sel.level2 && row.level2 !== sel.level2) continue;
    if (sel.level3 !== undefined && sel.level3 && row.level3 !== sel.level3) continue;
    if (sel.level4 !== undefined && sel.level4 && row.level4 !== sel.level4) continue;
    var v = row[col];
    if (v && !seen[v]) { seen[v] = true; result.push(v); }
  }
  return result.sort();
}

// Find next cascade column after `prevCol` that has unique options.
function _sfNextCol_(prevCol) {
  var order = ['level2', 'level3', 'level4'];
  var start = prevCol === 'dept' ? 0 : prevCol === 'level2' ? 1 : prevCol === 'level3' ? 2 : 3;
  for (var i = start; i < order.length; i++) {
    if (_sfGetUnique_(order[i]).length > 0) return order[i];
  }
  return null;
}

// Dept button click — resets entire cascade, then advances.
function _sfSelectDept_(btn, dept) {
  _sfSel = { dept: dept, level2: '', level3: '', level4: '' };
  _sfResolvedCode = ''; _sfEquipCode = ''; _sfEquipSpec = '';

  var dg = document.getElementById('sf-dept-grid');
  if (dg) {
    var bs = dg.querySelectorAll('.sel-btn');
    for (var i = 0; i < bs.length; i++) bs[i].classList.toggle('active', bs[i] === btn);
  }
  var selEl = document.getElementById('sf-sel-dept');
  if (selEl) selEl.textContent = dept;

  ['sf-sec-level2','sf-sec-level3','sf-sec-level4'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  ['sf-sel-level2','sf-sel-level3','sf-sel-level4'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.textContent = '';
  });

  var noteEl  = document.getElementById('sf-no-equip-note');
  var nextCol = _sfNextCol_('dept');
  if (nextCol) {
    if (noteEl) noteEl.style.display = 'none';
    _sfRenderLevel_(nextCol);
  } else {
    if (noteEl) {
      var hasData = _sfRows.some(function(r) { return r.dept === dept; });
      if (hasData) {
        noteEl.style.display = 'none';
      } else {
        noteEl.innerHTML = 'No equipment registered for <strong>' + esc(dept) + '</strong>. You can still submit — describe the equipment in the Problem Description. Ask your administrator to refresh the equipment cache if equipment is missing.';
        noteEl.style.display = '';
      }
    }
    _sfResolveCode_();
  }

  _sfUpdateRoutingBanner_();
  _sfUpdatePreview_();
}

// Level button click (level2, level3, level4).
function _sfSelectLevel_(col, btn, value) {
  _sfSel[col] = value;

  // Clear selections below this level
  var order = ['level2','level3','level4'];
  var idx   = order.indexOf(col);
  for (var i = idx + 1; i < order.length; i++) {
    _sfSel[order[i]] = '';
    var badge = document.getElementById('sf-sel-' + order[i]);
    if (badge) badge.textContent = '';
    var sec = document.getElementById('sf-sec-' + order[i]);
    if (sec) sec.style.display = 'none';
  }
  _sfResolvedCode = ''; _sfEquipCode = ''; _sfEquipSpec = '';

  var grid = document.getElementById('sf-' + col + '-grid');
  if (grid) {
    var bs = grid.querySelectorAll('.sel-btn');
    for (var i = 0; i < bs.length; i++) bs[i].classList.toggle('active', bs[i] === btn);
  }
  var selEl = document.getElementById('sf-sel-' + col);
  if (selEl) selEl.textContent = value;

  var nextCol = _sfNextCol_(col);
  if (nextCol) {
    _sfRenderLevel_(nextCol);
  } else {
    _sfResolveCode_();
  }
  _sfUpdatePreview_();
  _sfUpdateHeadsUp_();
}

// Render a button grid for a cascade level and reveal its section.
function _sfRenderLevel_(col) {
  var opts = _sfGetUnique_(col);
  if (!opts.length) return;
  var sec  = document.getElementById('sf-sec-' + col);
  var grid = document.getElementById('sf-' + col + '-grid');
  if (!sec || !grid) return;
  sec.style.display = '';
  grid.innerHTML = opts.map(function(opt) {
    var safe = opt.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return '<button type="button" class="sel-btn" data-val="' + esc(opt) + '" onclick="_sfSelectLevel_(\'' + col + '\',this,\'' + safe + '\')">' + esc(opt) + '</button>';
  }).join('');
}

// Resolve equipment code from current cascade selections.
function _sfResolveCode_() {
  var matches = _sfRows.filter(function(row) {
    if (_sfSel.dept   && row.dept   !== _sfSel.dept)   return false;
    if (_sfSel.level2 && row.level2 !== _sfSel.level2) return false;
    if (_sfSel.level3 && row.level3 !== _sfSel.level3) return false;
    if (_sfSel.level4 && row.level4 !== _sfSel.level4) return false;
    return true;
  });
  if (matches.length >= 1) {
    _sfResolvedCode = matches[0].code;
    _sfEquipCode    = matches[0].code;
    _sfEquipSpec    = [_sfSel.level4, _sfSel.level3, _sfSel.level2].filter(Boolean)[0] || matches[0].code;
  }
}

// ── Priority selection ────────────────────────────────────────────────────────

function selectPriority(p) {
  _sfPriority = p;
  ['LOW','MEDIUM','HIGH','CRITICAL'].forEach(function(pr) {
    var el = document.getElementById('pcard-' + pr);
    if (el) el.classList.toggle('selected', pr === p);
  });
  var selEl = document.getElementById('sf-sel-priority');
  if (selEl) selEl.textContent = p;
  var hint = document.getElementById('critical-hint');
  if (hint) hint.style.display = p === 'CRITICAL' ? 'block' : 'none';
  _sfUpdatePreview_();
}

// ── Est. hours stepper ────────────────────────────────────────────────────────

function _sfAdjHours_(delta) {
  _sfEstHours = Math.round(Math.max(0.5, Math.min(16, _sfEstHours + delta)) * 2) / 2;
  var el = document.getElementById('sf-hrs-val');
  if (el) el.textContent = _sfEstHours % 1 === 0 ? String(_sfEstHours) : _sfEstHours.toFixed(1);
}

// ── Routing banner ────────────────────────────────────────────────────────────

function _sfUpdateRoutingBanner_() {
  var banner = document.getElementById('sf-routing-banner');
  if (!banner || !_sfData) return;
  var dept = _sfSel.dept || '';
  if (!dept) { banner.style.display = 'none'; return; }
  var pt      = (document.getElementById('sf-probtype') || {}).value || '';
  var tracker = _sfComputeTracker_(dept, pt);
  banner.innerHTML = 'Routing: ticket will be sent to <strong>' + esc(tracker) + '</strong>';
  banner.style.display = '';
}

function _sfComputeTracker_(dept, problemType) {
  if (!_sfData) return dept;
  var rules   = _sfData.routingRules  || [];
  var deptMap = _sfData.deptMapping   || {};
  var d  = String(dept        || '').toUpperCase().trim();
  var dg = deptMap[d] || d;
  var pt = String(problemType || '').toUpperCase().trim();
  for (var i = 0; i < rules.length; i++) {
    var rule = rules[i];
    var kw   = String(rule.keyword || '').toUpperCase().trim();
    if (!kw) continue;
    var matchOn  = String(rule.matchOn || '').toUpperCase();
    var haystack = matchOn === 'EQUIP_DESC' ? '' : pt;
    if (haystack.indexOf(kw) > -1) return String(rule.routeTo || dg);
  }
  return dg;
}

// ── Photo capture ─────────────────────────────────────────────────────────────

function _sfOpenCamera_() {
  if (_sfPhotos_.length >= 6) { showToast('Maximum 6 photos allowed.', 'error'); return; }
  document.getElementById('sf-fileInput').click();
}
function _sfOpenUpload_() {
  if (_sfPhotos_.length >= 6) { showToast('Maximum 6 photos allowed.', 'error'); return; }
  document.getElementById('sf-uploadInput').click();
}
function _sfHandleFileCapture_(input) {
  if (!input.files || !input.files.length) return;
  var files = Array.from(input.files);
  var remaining = 6 - _sfPhotos_.length;
  if (files.length > remaining) showToast('Max 6 photos — only ' + remaining + ' added.', 'error');
  files.slice(0, remaining).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var fileExt = (file.name.split('.').pop() || 'jpg').toLowerCase();
      if (file.type.startsWith('image/') && file.type !== 'image/svg+xml') {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var MAX = 1600;
          var scale = Math.min(1, MAX / Math.max(img.width, img.height));
          canvas.width  = Math.round(img.width  * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          var mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
          var ext  = mime === 'image/png' ? 'png' : 'jpg';
          _sfPhotos_.push({ data: canvas.toDataURL(mime, 0.82), mimeType: mime, ext: ext, name: file.name });
          _sfRenderPhotoPreviews_();
        };
        img.onerror = function() {
          _sfPhotos_.push({ data: e.target.result, mimeType: file.type, ext: fileExt, name: file.name });
          _sfRenderPhotoPreviews_();
        };
        img.src = e.target.result;
      } else {
        _sfPhotos_.push({ data: e.target.result, mimeType: file.type, ext: fileExt, name: file.name });
        _sfRenderPhotoPreviews_();
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}
function _sfRemovePhoto_(idx) {
  _sfPhotos_.splice(idx, 1);
  _sfRenderPhotoPreviews_();
}
function _sfRenderPhotoPreviews_() {
  var el = document.getElementById('sf-photoPreviews');
  if (!el) return;
  el.innerHTML = _sfPhotos_.map(function(p, i) {
    var isImage = p.mimeType && p.mimeType.startsWith('image/');
    var inner = isImage
      ? '<img src="' + p.data + '" alt="photo ' + (i+1) + '">'
      : '<div class="sf-file-thumb"><span>📄</span><span>' + esc(p.name || 'file') + '</span></div>';
    return '<div class="sf-photo-thumb">' + inner +
      '<button type="button" class="sf-photo-remove" onclick="_sfRemovePhoto_(' + i + ')">✕</button></div>';
  }).join('');
}

// ── Live preview ──────────────────────────────────────────────────────────────

function _sfUpdatePreview_() {
  var body = document.getElementById('sf-preview-body');
  if (!body) return;
  function val(id) { var e = document.getElementById(id); return e ? e.value : ''; }

  var priority    = _sfPriority || 'MEDIUM';

  var equipName   = _sfEquipSpec || _sfSel.level3 || _sfSel.level2 || null;
  var equipCode   = _sfResolvedCode || _sfEquipCode || null;
  var zone        = val('sf-zone');
  var probType    = val('sf-probtype');
  var desc        = (val('sf-desc') || '').trim();
  var descPreview = desc.length > 130 ? desc.substring(0, 130) + '…' : desc;
  var downtime    = val('sf-downtime') || 'UNPLANNED';
  var addedBy     = val('sf-addedby') || (typeof USER !== 'undefined' ? USER.displayName : '—');
  var dept        = _sfSel.dept || '';

  var hasContent = dept || equipName || probType || desc;
  if (!hasContent) {
    body.innerHTML = '<div style="color:var(--text-tertiary);font-size:12px;">Fill in the form to see a preview of this ticket.</div>';
    return;
  }

  body.innerHTML =
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">' +
      '<span class="pri-badge pri-' + esc(priority) + '">' + esc(priority) + '</span>' +
      '<span class="stat-badge stat-' + esc(status) + '">' + esc(status) + '</span>' +
      '<span style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);margin-left:auto;align-self:center;">auto-numbered</span>' +
    '</div>' +
    (dept ? '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:3px;">' + esc(dept) + '</div>' : '') +
    '<div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:2px;">' + esc(equipName || '—') + '</div>' +
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;">' +
      (equipCode ? '<span style="font-family:var(--font-mono);">' + esc(equipCode) + '</span>' : '') +
      (equipCode && zone ? ' · ' : '') +
      esc(zone) +
    '</div>' +
    '<div style="height:1px;background:var(--border-default);margin:8px 0;"></div>' +
    (probType ?
      '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:4px;">Problem</div>' +
      '<div style="font-size:12.5px;font-weight:500;color:var(--text-primary);margin-bottom:3px;">' + esc(probType) + '</div>' : '') +
    (descPreview ? '<div style="font-size:12px;color:var(--text-secondary);line-height:1.45;margin-bottom:8px;">' + esc(descPreview) + '</div>' : '') +
    '<div style="height:1px;background:var(--border-default);margin:8px 0;"></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">' +
      '<div><div style="font-size:10.5px;color:var(--text-secondary);">Downtime</div><div>' + esc(downtime) + '</div></div>' +
      '<div><div style="font-size:10.5px;color:var(--text-secondary);">Submitted by</div><div>' + esc(addedBy) + '</div></div>' +
    '</div>';
}

// ── Heads-up panel ────────────────────────────────────────────────────────────

function _sfUpdateHeadsUp_() {
  var el = document.getElementById('sf-headsup-text');
  if (!el) return;
  var code = _sfResolvedCode || _sfEquipCode;
  if (!code) {
    el.innerHTML = 'Select specific equipment above to see recent ticket context.';
    return;
  }
  el.innerHTML = '<span style="color:var(--text-tertiary);">Loading history for ' + esc(code) + '…</span>';
  fetch(WORKER_URL + '/api/submit/equip-stats?equipCode=' + encodeURIComponent(code), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
    .then(function(r) { return r.json(); })
    .then(function(stats) {
      var el2 = document.getElementById('sf-headsup-text');
      if (!el2) return;
      if (!stats || stats.count60d === 0) {
        el2.innerHTML = 'No tickets found for <strong>' + esc(code) + '</strong> in the last 60 days.';
        return;
      }
      var msg = 'Equipment <strong>' + esc(code) + '</strong> has had <strong>' +
        stats.count60d + ' ticket' + (stats.count60d !== 1 ? 's' : '') + '</strong> in the past 60 days.';
      if (stats.topProbType) msg += ' Most common issue: <strong>' + esc(stats.topProbType) + '</strong>.';
      if (stats.count60d >= 3) msg += ' Consider a parallel preventive ticket if the root cause is unresolved.';
      el2.innerHTML = msg;
    })
    .catch(function() {
      var el2 = document.getElementById('sf-headsup-text');
      if (el2) el2.innerHTML = 'Could not load equipment ticket history.';
    });
}

// ── Submission ────────────────────────────────────────────────────────────────

function submitTicket() {
  if (!_sfSel.dept) {
    showToast('Please select a department.', 'error');
    var s = document.getElementById('sf-sec-dept') || document.querySelector('.sel-btn-grid');
    if (s) s.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  var probType = ((document.getElementById('sf-probtype') || {}).value || '');
  if (!probType) { showToast('Please select a problem type.', 'error'); return; }
  var desc = ((document.getElementById('sf-desc') || {}).value || '').trim();
  if (!desc) { showToast('Problem description is required.', 'error'); return; }
  if (desc.length < 10) { showToast('Description must be at least 10 characters.', 'error'); return; }
  var addedBy = ((document.getElementById('sf-addedby') || {}).value || '');
  if (!addedBy) { showToast('Please select who is submitting this ticket.', 'error'); return; }

  var btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

  function val(id) { return ((document.getElementById(id) || {}).value || ''); }

  var equipDesc = [_sfSel.level2, _sfSel.level3, _sfSel.level4].filter(Boolean).join(' / ');

  var payload = {
    dept:          _sfSel.dept,
    equipType:     _sfSel.level2 || '',
    equipCode:     _sfResolvedCode || _sfEquipCode || '',
    specificEquip: _sfEquipSpec || equipDesc || _sfSel.level2 || '',
    equipDesc:     equipDesc || _sfSel.level2 || '',
    level2:        _sfSel.level2 || '',
    level3:        _sfSel.level3 || '',
    level4:        _sfSel.level4 || '',
    buildingZone:  val('sf-zone'),
    lineNo:        val('sf-line').trim(),
    priority:      _sfPriority,
    problemType:   probType,
    downtimeType:  val('sf-downtime') || 'UNPLANNED',
    description:   desc,
    problemDesc:   desc,
    observations:  val('sf-obs').trim(),
    addedBy:       addedBy,
    partsNeeded:   !!((document.getElementById('sf-parts') || {}).checked),
    estHours:      _sfEstHours || 1,
  };

  if (_sfPhotos_.length === 0) {
    _sfDoSubmit_(payload, btn);
    return;
  }

  if (btn) btn.textContent = 'Preparing…';
  fetch(WORKER_URL + '/api/submit/reserve-id?dept=' + encodeURIComponent(payload.dept), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (!r.ticketNo) throw new Error(r.error || 'Failed to reserve ticket ID');
      payload.ticketNo = r.ticketNo;
      _sfUploadPhotos_(payload, _sfPhotos_.slice(), 0, [], btn);
    })
    .catch(function(err) {
      showToast('Could not prepare ticket: ' + esc(String(err.message || err)), 'error', 7000);
      if (btn) { btn.disabled = false; btn.textContent = 'Submit Ticket'; }
    });
}

function _sfUploadPhotos_(payload, photoList, index, links, btn) {
  if (index >= photoList.length) {
    payload.photoLinks = links;
    _sfDoSubmit_(payload, btn);
    return;
  }
  if (btn) btn.textContent = 'Uploading ' + (index + 1) + ' of ' + photoList.length + '…';
  var photo = photoList[index];
  fetch(WORKER_URL + '/api/submit/upload-photo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({
      ticketNo:   payload.ticketNo,
      photoIndex: index + 1,
      dataUrl:    photo.data,
      mimeType:   photo.mimeType,
      ext:        photo.ext
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (r && r.ok && r.url) {
        links.push(r.url);
      } else {
        showToast('Photo ' + (index + 1) + ' upload error: ' + (r && r.error ? r.error : 'unknown'), 'error', 5000);
        links.push('UPLOAD_FAILED');
      }
      _sfUploadPhotos_(payload, photoList, index + 1, links, btn);
    })
    .catch(function(err) {
      showToast('Photo ' + (index + 1) + ' network error: ' + esc(String(err.message || err)), 'error', 5000);
      links.push('NETWORK_ERROR');
      _sfUploadPhotos_(payload, photoList, index + 1, links, btn);
    });
}

function _sfDoSubmit_(payload, btn) {
  if (btn) btn.textContent = 'Saving ticket…';
  fetch(WORKER_URL + '/api/submit/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) {
        showSuccessScreen(result.ticketNo, result.status, result.tracker);
      } else {
        showToast('Error: ' + (result.error || 'Unknown error'), 'error', 7000);
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Ticket'; }
      }
    })
    .catch(function(err) {
      showToast('Submission failed: ' + esc(String(err.message || err)), 'error', 7000);
      if (btn) { btn.disabled = false; btn.textContent = 'Submit Ticket'; }
    });
}

function showSuccessScreen(ticketNo, status, tracker) {
  var container = document.getElementById('page-submit');
  if (!container) return;
  var statusMsg = status === 'OPEN'
    ? 'Ticket is <strong>OPEN</strong> and added to the ' + esc(tracker || '') + ' tracker.'
    : 'Ticket is in the <strong>Waiting Queue</strong> pending manager review.';

  container.innerHTML =
    '<div style="max-width:520px;margin:40px auto;">' +
      '<div class="submit-card">' +
        '<div class="submit-success">' +
          '<div class="success-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>' +
          '<h3>Ticket Submitted</h3>' +
          '<div class="ticket-no" onclick="copyTicketNo(\'' + esc(ticketNo) + '\')" title="Click to copy">' + esc(ticketNo) + '</div>' +
          '<p class="s-sub">' + statusMsg + '</p>' +
          '<div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">' +
            '<button class="btn btn-primary" onclick="navigate(\'waiting\')">View Waiting Queue</button>' +
            '<button class="btn btn-ghost" onclick="submitAnotherTicket()">Submit Another</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  showToast(ticketNo + ' submitted', 'success');
}

function copyTicketNo(tn) {
  if (navigator.clipboard) navigator.clipboard.writeText(tn).then(function() { showToast('Copied: ' + tn); });
}

function submitAnotherTicket() {
  _sfPriority = 'MEDIUM'; _sfEquipCode = ''; _sfEquipSpec = ''; _sfPhotos_ = [];
  _sfSel = { dept: '', level2: '', level3: '', level4: '' };
  _sfRows = []; _sfResolvedCode = ''; _sfEstHours = 1;
  var container = document.getElementById('page-submit');
  if (!container) { navigate('submit'); return; }
  container.innerHTML = _buildSubmitHTML_();
  if (_sfData) {
    _sfPopulate_(_sfData);
  } else {
    fetch(WORKER_URL + '/api/submit/form-data', {
      headers: { 'X-User-Email': USER ? USER.email : '' }
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        _sfData = d;
        _sfPopulate_(d);
        _sfUpdatePreview_();
      })
      .catch(function(e) { showToast('Error reloading form: ' + esc(String(e.message || e)), 'error'); });
  }
}
</script>
