<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Submit Ticket — three-step form partial                        ║ -->
<!-- ║  Registers PAGE: submit                                         ║ -->
<!-- ║  No static <div class="page"> — rendered dynamically so the    ║ -->
<!-- ║  form is always inside #content (the scroll container).        ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Submit Ticket page chrome ──────────────────────────────────────── */
.submit-page-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.submit-page-title{font-size:18px;font-weight:700;color:var(--text-primary);line-height:1.2;}
.submit-page-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}

/* Step indicator dots (in page header) */
.submit-steps{display:flex;align-items:center;gap:0;}
.step-item{display:flex;align-items:center;}
.step-circle{
  width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s;
}
.step-circle.pending{background:var(--bg-subtle);color:var(--text-tertiary);border:2px solid var(--border-default);}
.step-circle.active{background:var(--brand-navy);color:#fff;border:2px solid var(--brand-navy);box-shadow:0 0 0 3px rgba(0,31,79,.15);}
.step-circle.done{background:var(--status-success);color:#fff;border:2px solid var(--status-success);}
.step-label{font-size:11.5px;font-weight:500;margin-left:7px;color:var(--text-secondary);white-space:nowrap;}
.step-label.active{color:var(--brand-navy);font-weight:600;}
.step-label.done{color:var(--status-success);}
.step-connector{width:32px;height:2px;background:var(--border-default);margin:0 6px;flex-shrink:0;}
.step-connector.done{background:var(--status-success);}

/* Two-column grid — form left, preview right */
.submit-layout{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start;}
@media(max-width:920px){
  .submit-layout{grid-template-columns:1fr;}
  .submit-right{order:-1;}  /* preview above form on narrow screens */
}
.submit-right{display:flex;flex-direction:column;gap:12px;position:sticky;top:24px;}

/* Form card */
.submit-card{background:#fff;border:1px solid var(--border-default);border-radius:10px;padding:22px;box-shadow:var(--shadow-sm);}
.submit-card-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px;}
.submit-card-sub{font-size:12px;color:var(--text-secondary);margin-bottom:18px;}

.form-row{display:grid;gap:12px;margin-bottom:12px;}
.form-row.cols-2{grid-template-columns:1fr 1fr;}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-primary);}
.form-label .req{color:var(--status-critical);margin-left:2px;}
.form-input,.form-select,.form-textarea{
  height:34px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;
  font-size:13px;color:var(--text-primary);background:#fff;outline:none;width:100%;
  box-sizing:border-box;transition:border-color .15s,box-shadow .15s;
}
.form-textarea{height:78px;padding:8px 10px;resize:vertical;}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--brand-navy);box-shadow:0 0 0 3px rgba(0,31,79,.07);}
.form-input:disabled,.form-select:disabled{background:var(--bg-subtle);color:var(--text-tertiary);cursor:not-allowed;}
.form-hint{font-size:11px;color:var(--text-tertiary);margin-top:1px;}

/* Priority cards */
.priority-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.priority-card{
  border:2px solid var(--border-default);border-radius:8px;padding:9px 6px;
  text-align:center;cursor:pointer;transition:all .15s;user-select:none;
}
.priority-card:hover{border-color:var(--text-secondary);}
.priority-card.selected{border-color:var(--brand-navy);background:var(--status-info-bg);}
.priority-card .p-label{font-size:11px;font-weight:700;letter-spacing:.03em;}
.priority-card.p-low    .p-label{color:var(--status-low);}
.priority-card.p-medium .p-label{color:var(--status-medium);}
.priority-card.p-high   .p-label{color:var(--status-high);}
.priority-card.p-critical .p-label{color:var(--status-critical);}
.priority-card.p-critical.selected{border-color:var(--status-critical);background:var(--status-critical-bg);}
.priority-card.p-high.selected   {border-color:var(--status-high);background:var(--status-high-bg);}
.priority-card.p-medium.selected {border-color:var(--status-medium);background:var(--status-medium-bg);}
.priority-card .p-sub{font-size:10px;color:var(--text-tertiary);margin-top:2px;}

/* Form footer */
.submit-footer{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:18px;padding-top:14px;border-top:1px solid var(--border-default);
}

/* Review summary */
.review-section{margin-bottom:16px;}
.review-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border-default);}
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 16px;}
.review-field{display:flex;flex-direction:column;gap:2px;}
.review-field.full{grid-column:1/-1;}
.review-field .rf-label{font-size:10.5px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;}
.review-field .rf-value{font-size:13px;color:var(--text-primary);font-weight:500;}
.review-field .rf-value.empty{color:var(--text-tertiary);font-style:italic;}

/* Photo capture section */
.sf-photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sf-photo-btn{
  padding:12px 10px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;
  justify-content:center;gap:6px;transition:opacity .15s;
  -webkit-tap-highlight-color:transparent;
}
.sf-photo-btn:active{opacity:.8;}
.sf-camera-btn{background:var(--brand-navy);}
.sf-upload-btn{background:#5a6a7a;}
.sf-photo-previews{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.sf-photo-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border-default);}
.sf-photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.sf-photo-remove{
  position:absolute;top:3px;right:3px;background:rgba(214,60,60,.85);
  border:none;border-radius:50%;width:20px;height:20px;color:#fff;
  cursor:pointer;font-size:.65rem;font-weight:700;display:grid;place-items:center;
}
.sf-file-thumb{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#f0f4f8;
  gap:4px;padding:6px;box-sizing:border-box;font-size:0.5rem;
  text-align:center;color:#555;word-break:break-all;overflow:hidden;
}

/* Success state */
.submit-success{text-align:center;padding:28px 0;}
.submit-success .success-icon{width:48px;height:48px;border-radius:50%;background:var(--status-success-bg);display:grid;place-items:center;margin:0 auto 14px;color:var(--status-success);}
.submit-success h3{font-size:18px;font-weight:700;margin:0 0 8px;}
.submit-success .ticket-no{display:inline-block;padding:6px 16px;background:var(--bg-subtle);border-radius:6px;font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--brand-navy);margin-bottom:14px;cursor:pointer;}
.submit-success .s-sub{font-size:13px;color:var(--text-secondary);}

/* Live preview card */
.submit-preview-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
.preview-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border-default);}
.preview-hdr-title{font-size:13px;font-weight:700;color:var(--text-primary);}
.preview-hdr-sub{font-size:11px;color:var(--text-tertiary);}
.preview-body{padding:14px;}

/* Heads-up panel */
.submit-headsup{background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:8px;padding:12px 14px;}
.headsup-tag{display:inline-block;background:var(--brand-navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-bottom:7px;}
.headsup-body{font-size:12.5px;color:var(--text-secondary);line-height:1.5;}

/* Shared btn classes */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:34px;border-radius:6px;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.btn-primary:hover{background:var(--brand-navy-soft);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:var(--border-default);}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary);}
</style>

<script>
// ── Module state ──────────────────────────────────────────────────────────────
var _sfData      = null;
var _sfStep      = 1;
var _sfPriority  = 'MEDIUM';
var _sfEquipCode = '';
var _sfEquipSpec = '';
var _sfAggTypes_ = null;  // aggregated eType→items after cross-group dept scan
var _sfPhotos_   = [];    // { data, mimeType, ext, name }

window.PAGES = window.PAGES || {};

PAGES['submit'] = function(container) {
  _sfStep = 1; _sfPriority = 'MEDIUM'; _sfEquipCode = ''; _sfEquipSpec = ''; _sfPhotos_ = [];
  container.innerHTML = _buildSubmitHTML_();
  if (_sfData) {
    _sfPopulate_(_sfData);
  } else {
    fetch(WORKER_URL + '/api/submit/form-data', {
      headers: { 'X-User-Email': USER ? USER.email : '' }
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        _sfData = d;
        _sfPopulate_(d);
        _sfUpdatePreview_();
      })
      .catch(function(e) {
        container.innerHTML =
          '<div style="padding:32px;color:var(--status-critical);">Failed to load form: ' +
          esc(String(e.message || e)) + '</div>';
      });
  }
  _sfUpdatePreview_();
};

// ── HTML builder ──────────────────────────────────────────────────────────────

function _buildSubmitHTML_() {
  // Page header: title + step dots
  var header =
    '<div class="submit-page-hdr">' +
      '<div>' +
        '<div class="submit-page-title">New Maintenance Ticket</div>' +
        '<div class="submit-page-sub" id="sf-step-sub">FRM-030-001 · Step 1 of 3 — Select Equipment</div>' +
      '</div>' +
      '<div class="submit-steps" id="submit-steps">' +
        '<div class="step-item">' +
          '<div class="step-circle active" id="step-circle-1">1</div>' +
          '<span class="step-label active" id="step-label-1">Equipment</span>' +
        '</div>' +
        '<div class="step-connector" id="step-conn-1"></div>' +
        '<div class="step-item">' +
          '<div class="step-circle pending" id="step-circle-2">2</div>' +
          '<span class="step-label" id="step-label-2">Details</span>' +
        '</div>' +
        '<div class="step-connector" id="step-conn-2"></div>' +
        '<div class="step-item">' +
          '<div class="step-circle pending" id="step-circle-3">3</div>' +
          '<span class="step-label" id="step-label-3">Review</span>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Step 1 — Equipment
  var step1 =
    '<div id="submit-step-1">' +
      '<div class="submit-card">' +
        '<div class="submit-card-title">Select Equipment</div>' +
        '<div class="submit-card-sub">Choose the department and specific equipment that needs attention.</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Department <span class="req">*</span></label>' +
            '<select class="form-select" id="sf-dept" onchange="_sfCascadeDept_()"><option value="">— Select department —</option></select>' +
          '</div>' +
        '</div>' +
        '<div class="form-row cols-2">' +
          '<div class="form-group">' +
            '<label class="form-label">Equipment Type <span class="req">*</span></label>' +
            '<select class="form-select" id="sf-etype" disabled onchange="_sfCascadeEtype_()"><option value="">— Select type —</option></select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Specific Equipment</label>' +
            '<select class="form-select" id="sf-equip" disabled onchange="_sfCascadeEquip_()"><option value="">— Select equipment —</option></select>' +
          '</div>' +
        '</div>' +
        '<div id="sf-equip-msg" style="display:none;margin-top:-4px;margin-bottom:8px;padding:8px 12px;background:var(--status-info-bg);border:1px solid var(--status-info);border-radius:6px;font-size:12px;color:var(--status-info);line-height:1.4;"></div>' +
        '<div id="sf-etype-manual-wrapper" style="display:none;margin-top:-4px;margin-bottom:8px;">' +
          '<div class="form-group">' +
            '<label class="form-label">Equipment / Area Description <span class="req">*</span></label>' +
            '<input type="text" class="form-input" id="sf-etype-manual" placeholder="e.g. Panel B circuit 12, Roof HVAC unit, Building A lighting…" oninput="_sfUpdatePreview_()" />' +
            '<span class="form-hint" style="display:block;margin-top:3px;">No equipment found in the registry for this department. Describe the equipment or area being worked on.</span>' +
          '</div>' +
        '</div>' +
        '<div id="sf-routing-banner" style="display:none;margin-top:4px;margin-bottom:8px;padding:7px 12px;background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:6px;font-size:11.5px;color:var(--text-secondary);"></div>' +
        '<div class="form-row cols-2">' +
          '<div class="form-group">' +
            '<label class="form-label">Building / Zone</label>' +
            '<select class="form-select" id="sf-zone" onchange="_sfUpdatePreview_()"><option value="">— Select zone —</option></select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Line #</label>' +
            '<input type="text" class="form-input" id="sf-line" placeholder="e.g. L-04" oninput="_sfUpdatePreview_()">' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="submit-footer">' +
        '<div></div>' +
        '<button class="btn btn-primary" onclick="submitStep1Next()">' +
          'Next — Ticket Details ' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';

  // Step 2 — Ticket Details
  var step2 =
    '<div id="submit-step-2" style="display:none;">' +
      '<div class="submit-card">' +
        '<div class="submit-card-title">Ticket Details</div>' +
        '<div class="submit-card-sub">Set priority, describe the issue, and capture downtime impact.</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Priority <span class="req">*</span></label>' +
            '<div class="priority-grid" id="sf-priority-grid">' +
              '<div class="priority-card p-low"      id="pcard-LOW"      onclick="selectPriority(\'LOW\')"><div class="p-label">LOW</div><div class="p-sub">Scheduled</div></div>' +
              '<div class="priority-card p-medium selected" id="pcard-MEDIUM"   onclick="selectPriority(\'MEDIUM\')"><div class="p-label">MEDIUM</div><div class="p-sub">Soon</div></div>' +
              '<div class="priority-card p-high"     id="pcard-HIGH"     onclick="selectPriority(\'HIGH\')"><div class="p-label">HIGH</div><div class="p-sub">Urgent</div></div>' +
              '<div class="priority-card p-critical" id="pcard-CRITICAL" onclick="selectPriority(\'CRITICAL\')"><div class="p-label">CRITICAL</div><div class="p-sub">Immediate</div></div>' +
            '</div>' +
            '<div class="form-hint" id="critical-hint" style="display:none;color:var(--status-critical);font-weight:600;margin-top:6px;">⚠ Critical tickets bypass the waiting queue and go directly to Open.</div>' +
          '</div>' +
        '</div>' +
        '<div class="form-row cols-2">' +
          '<div class="form-group">' +
            '<label class="form-label">Problem Type <span class="req">*</span></label>' +
            '<select class="form-select" id="sf-probtype" onchange="_sfUpdatePreview_()"><option value="">— Select type —</option></select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Downtime Type</label>' +
            '<select class="form-select" id="sf-downtime" onchange="_sfUpdatePreview_()">' +
              '<option value="UNPLANNED">UNPLANNED</option><option value="PLANNED">PLANNED</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Problem Description <span class="req">*</span></label>' +
            '<textarea class="form-textarea" id="sf-desc" placeholder="Describe the problem in detail…" rows="3" oninput="_sfUpdatePreview_()"></textarea>' +
          '</div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Observations <span style="font-weight:400;color:var(--text-tertiary)">(optional)</span></label>' +
            '<textarea class="form-textarea" id="sf-obs" placeholder="Any additional observations or context…" rows="2"></textarea>' +
          '</div>' +
        '</div>' +
        '<div class="form-row cols-2">' +
          '<div class="form-group">' +
            '<label class="form-label">Added By <span class="req">*</span></label>' +
            '<select class="form-select" id="sf-addedby" onchange="_sfUpdatePreview_()"></select>' +
          '</div>' +
          '<div class="form-group" style="justify-content:flex-end;padding-top:18px;">' +
            '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:500;">' +
              '<input type="checkbox" id="sf-parts" style="width:15px;height:15px;cursor:pointer;"> Parts Required' +
            '</label>' +
          '</div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Photos <span style="font-weight:400;color:var(--text-tertiary)">(optional — up to 6)</span></label>' +
            '<div class="sf-photo-btns">' +
              '<button type="button" class="sf-photo-btn sf-camera-btn" onclick="_sfOpenCamera_()">' +
                '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>' +
                ' Take Photo' +
              '</button>' +
              '<button type="button" class="sf-photo-btn sf-upload-btn" onclick="_sfOpenUpload_()">' +
                '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>' +
                ' Upload File' +
              '</button>' +
            '</div>' +
            '<input type="file" accept="image/*" capture="environment" id="sf-fileInput" style="display:none" onchange="_sfHandleFileCapture_(this)"/>' +
            '<input type="file" accept="image/*,application/pdf" multiple id="sf-uploadInput" style="display:none" onchange="_sfHandleFileCapture_(this)"/>' +
            '<div class="sf-photo-previews" id="sf-photoPreviews"></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="submit-footer">' +
        '<button class="btn btn-ghost" onclick="submitGoStep(1)">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Back' +
        '</button>' +
        '<button class="btn btn-primary" onclick="submitStep2Next()">' +
          'Review &amp; Submit <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';

  // Step 3 — Review
  var step3 =
    '<div id="submit-step-3" style="display:none;">' +
      '<div class="submit-card" id="submit-review-card"></div>' +
      '<div class="submit-footer">' +
        '<button class="btn btn-ghost" onclick="submitGoStep(2)">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Back' +
        '</button>' +
        '<button class="btn btn-primary" id="submit-btn" onclick="submitTicket()">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Submit Ticket' +
        '</button>' +
      '</div>' +
    '</div>';

  // Right column: live preview + heads-up
  var preview =
    '<div class="submit-preview-card">' +
      '<div class="preview-hdr">' +
        '<span class="preview-hdr-title">Live Preview</span>' +
        '<span class="preview-hdr-sub">as it will appear in queue</span>' +
      '</div>' +
      '<div class="preview-body" id="sf-preview-body">' +
        '<div style="color:var(--text-tertiary);font-size:12px;">Fill in the form to see a preview of this ticket.</div>' +
      '</div>' +
    '</div>';

  var headsup =
    '<div class="submit-headsup">' +
      '<div class="headsup-tag">Heads Up</div>' +
      '<div class="headsup-body" id="sf-headsup-text">Select specific equipment above to see recent ticket context.</div>' +
    '</div>';

  return (
    header +
    '<div class="submit-layout">' +
      '<div class="submit-left">' + step1 + step2 + step3 + '</div>' +
      '<div class="submit-right">' + preview + headsup + '</div>' +
    '</div>'
  );
}

// ── Form population ───────────────────────────────────────────────────────────

function _sfPopulate_(d) {
  var deptSel = document.getElementById('sf-dept');
  if (!deptSel) return;

  // Departments
  deptSel.innerHTML = '<option value="">— Select department —</option>';
  (d.departments || []).forEach(function(dept) {
    var opt = document.createElement('option');
    opt.value = dept; opt.textContent = dept;
    if (d.userOwnedDepts && d.userOwnedDepts.length > 0 && dept === d.userOwnedDepts[0]) opt.selected = true;
    deptSel.appendChild(opt);
  });

  // Building / Zone
  var zoneSel = document.getElementById('sf-zone');
  if (zoneSel) {
    zoneSel.innerHTML = '<option value="">— Select zone —</option>';
    (d.buildingZones || []).forEach(function(z) {
      var opt = document.createElement('option'); opt.value = z; opt.textContent = z;
      zoneSel.appendChild(opt);
    });
  }

  // Problem types
  var ptSel = document.getElementById('sf-probtype');
  if (ptSel) {
    ptSel.innerHTML = '<option value="">— Select type —</option>';
    (d.problemTypes || []).forEach(function(pt) {
      var opt = document.createElement('option'); opt.value = pt; opt.textContent = pt;
      ptSel.appendChild(opt);
    });
  }

  // Added by — current user first
  var abSel = document.getElementById('sf-addedby');
  if (abSel) {
    abSel.innerHTML = '';
    var currentUser = d.userDisplayName || (typeof USER !== 'undefined' ? USER.displayName : '');
    var people = currentUser
      ? [currentUser].concat((d.peopleList || []).filter(function(p) {
          return p.toLowerCase().trim() !== currentUser.toLowerCase().trim();
        }))
      : (d.peopleList || []);
    people.forEach(function(p) {
      var opt = document.createElement('option'); opt.value = p; opt.textContent = p;
      abSel.appendChild(opt);
    });
  }

  // A7: Lock priority grid for non-managers — techs cannot change priority
  if (!d.userIsManager) {
    var grid = document.getElementById('sf-priority-grid');
    if (grid) {
      var cards = grid.querySelectorAll('.priority-card');
      for (var ci = 0; ci < cards.length; ci++) {
        cards[ci].style.cursor        = 'default';
        cards[ci].style.pointerEvents = 'none';
        cards[ci].style.opacity       = '0.65';
      }
      var lockNote = document.createElement('div');
      lockNote.className = 'form-hint';
      lockNote.style.marginTop = '6px';
      lockNote.textContent = 'Priority is assigned by your manager. Default: MEDIUM.';
      grid.parentNode.appendChild(lockNote);
    }
  }

  // Wire problem type change to routing banner update
  var ptSel2 = document.getElementById('sf-probtype');
  if (ptSel2) {
    var origChange = ptSel2.onchange;
    ptSel2.onchange = function() { if (origChange) origChange(); _sfUpdateRoutingBanner_(); _sfUpdatePreview_(); };
  }

  // Pre-trigger cascade if a dept was pre-selected
  if (deptSel.value) _sfCascadeDept_();
}

// ── Cascade helpers — use _sfData directly to avoid closure issues ────────────

// Returns the canonical dept for a raw name using the server-side deptMapping.
function getDeptGroupClient_(dept) {
  if (!_sfData || !_sfData.deptMapping) return String(dept || '').toUpperCase().trim();
  var d = String(dept || '').toUpperCase().trim();
  return _sfData.deptMapping[d] || d;
}

function _sfCascadeDept_() {
  var hier = _sfData && _sfData.equipHierarchy;
  var dept = document.getElementById('sf-dept');
  var eSel = document.getElementById('sf-etype');
  var eqSel= document.getElementById('sf-equip');
  var msg  = document.getElementById('sf-equip-msg');
  if (!dept || !eSel || !eqSel) return;

  var dv = dept.value;
  eSel.innerHTML  = '<option value="">— Select type —</option>';
  eqSel.innerHTML = '<option value="">— Select equipment —</option>';
  eqSel.disabled  = true;
  _sfAggTypes_    = null;
  _sfEquipCode    = ''; _sfEquipSpec = '';
  if (msg) msg.style.display = 'none';
  var manualWrapper = document.getElementById('sf-etype-manual-wrapper');
  var manualInput   = document.getElementById('sf-etype-manual');
  if (manualWrapper) { manualWrapper.style.display = 'none'; }
  if (manualInput)   { manualInput.value = ''; }
  _sfUpdateRoutingBanner_();

  if (!dv) { eSel.disabled = true; _sfUpdatePreview_(); return; }

  // A2+A3: cross-group scan — aggregate all hierarchy keys that map to the
  // same canonical dept (handles legacy Sage names like "METAL" → "METALS")
  var aggTypes = {};
  if (hier) {
    var canonDv = getDeptGroupClient_(dv);
    Object.keys(hier).forEach(function(k) {
      if (getDeptGroupClient_(k) === canonDv) {
        Object.keys(hier[k]).forEach(function(eType) {
          if (!aggTypes[eType]) aggTypes[eType] = [];
          hier[k][eType].forEach(function(item) { aggTypes[eType].push(item); });
        });
      }
    });
  }

  if (!Object.keys(aggTypes).length) {
    eSel.disabled = true;
    // ELECTRICAL and FACILITIES often work on infrastructure with no equipment register entries.
    // Show a free-text fallback input instead of blocking ticket creation for these depts.
    var isNoEquipDept = (dv === 'ELECTRICAL' || dv === 'FACILITIES');
    if (isNoEquipDept && manualWrapper) {
      if (msg) {
        msg.innerHTML =
          '<strong>' + esc(dv) + '</strong> has no equipment in the registry. ' +
          'Enter a description of the equipment or area below to continue.';
        msg.style.display = '';
      }
      manualWrapper.style.display = '';
    } else {
      if (msg) {
        msg.innerHTML =
          '<strong>No equipment data for ' + esc(dv) + '.</strong> ' +
          'Ask your administrator to run <em>Refresh Equipment Cache</em> in Settings, ' +
          'or verify that the equipment register contains entries for this department.';
        msg.style.display = '';
      }
    }
    _sfUpdatePreview_(); return;
  }

  _sfAggTypes_ = aggTypes;
  eSel.disabled = false;
  Object.keys(aggTypes).sort().forEach(function(eType) {
    var opt = document.createElement('option');
    opt.value = eType; opt.textContent = eType;
    eSel.appendChild(opt);
  });
  _sfUpdatePreview_();
}

function _sfCascadeEtype_() {
  var eSel = document.getElementById('sf-etype');
  var eqSel= document.getElementById('sf-equip');
  if (!eSel || !eqSel) return;

  var tv = eSel.value;
  eqSel.innerHTML = '<option value="">— Select equipment —</option>';
  _sfEquipCode = ''; _sfEquipSpec = '';

  if (!tv || !_sfAggTypes_ || !_sfAggTypes_[tv]) {
    eqSel.disabled = true; _sfUpdatePreview_(); return;
  }
  eqSel.disabled = false;
  _sfAggTypes_[tv].forEach(function(e) {
    var opt = document.createElement('option');
    opt.value = e.code || e.specific;
    opt.textContent = e.specific + (e.code ? ' (' + e.code + ')' : '');
    opt.setAttribute('data-code',     e.code     || '');
    opt.setAttribute('data-specific', e.specific || '');
    eqSel.appendChild(opt);
  });
  _sfUpdatePreview_();
}

function _sfCascadeEquip_() {
  var eqSel = document.getElementById('sf-equip');
  if (!eqSel) return;
  var sel = eqSel.options[eqSel.selectedIndex];
  if (sel && sel.value) {
    _sfEquipCode = sel.getAttribute('data-code')     || sel.value;
    _sfEquipSpec = sel.getAttribute('data-specific') || sel.textContent;
  } else {
    _sfEquipCode = ''; _sfEquipSpec = '';
  }
  _sfUpdatePreview_();
  _sfUpdateHeadsUp_();
}

// ── Routing banner (A6) ───────────────────────────────────────────────────────

function _sfUpdateRoutingBanner_() {
  var banner = document.getElementById('sf-routing-banner');
  if (!banner || !_sfData) return;
  var dept = (document.getElementById('sf-dept') || {}).value || '';
  if (!dept) { banner.style.display = 'none'; return; }
  var pt      = (document.getElementById('sf-probtype') || {}).value || '';
  var tracker = _sfComputeTracker_(dept, pt);
  banner.innerHTML = 'Routing: ticket will be sent to <strong>' + esc(tracker) + '</strong>';
  banner.style.display = '';
}

function _sfComputeTracker_(dept, problemType) {
  if (!_sfData) return dept;
  var rules   = _sfData.routingRules  || [];
  var deptMap = _sfData.deptMapping   || {};
  var d  = String(dept        || '').toUpperCase().trim();
  var dg = deptMap[d] || d;
  var pt = String(problemType || '').toUpperCase().trim();
  for (var i = 0; i < rules.length; i++) {
    var rule = rules[i];
    var kw   = String(rule.keyword || '').toUpperCase().trim();
    if (!kw) continue;
    var matchOn  = String(rule.matchOn || '').toUpperCase();
    var haystack = matchOn === 'EQUIP_DESC' ? '' : pt;
    if (haystack.indexOf(kw) > -1) return String(rule.routeTo || dg);
  }
  return dg;
}

// ── Photo capture ────────────────────────────────────────────────────────────

function _sfOpenCamera_() {
  if (_sfPhotos_.length >= 6) { showToast('Maximum 6 photos allowed.', 'error'); return; }
  document.getElementById('sf-fileInput').click();
}
function _sfOpenUpload_() {
  if (_sfPhotos_.length >= 6) { showToast('Maximum 6 photos allowed.', 'error'); return; }
  document.getElementById('sf-uploadInput').click();
}
function _sfHandleFileCapture_(input) {
  if (!input.files || !input.files.length) return;
  var files = Array.from(input.files);
  var remaining = 6 - _sfPhotos_.length;
  if (files.length > remaining) showToast('Max 6 photos — only ' + remaining + ' added.', 'error');
  files.slice(0, remaining).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var fileExt = (file.name.split('.').pop() || 'jpg').toLowerCase();
      if (file.type.startsWith('image/') && file.type !== 'image/svg+xml') {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var MAX = 1600;
          var scale = Math.min(1, MAX / Math.max(img.width, img.height));
          canvas.width  = Math.round(img.width  * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          var mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
          var ext  = mime === 'image/png' ? 'png' : 'jpg';
          _sfPhotos_.push({ data: canvas.toDataURL(mime, 0.82), mimeType: mime, ext: ext, name: file.name });
          _sfRenderPhotoPreviews_();
        };
        img.onerror = function() {
          _sfPhotos_.push({ data: e.target.result, mimeType: file.type, ext: fileExt, name: file.name });
          _sfRenderPhotoPreviews_();
        };
        img.src = e.target.result;
      } else {
        _sfPhotos_.push({ data: e.target.result, mimeType: file.type, ext: fileExt, name: file.name });
        _sfRenderPhotoPreviews_();
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}
function _sfRemovePhoto_(idx) {
  _sfPhotos_.splice(idx, 1);
  _sfRenderPhotoPreviews_();
}
function _sfRenderPhotoPreviews_() {
  var el = document.getElementById('sf-photoPreviews');
  if (!el) return;
  el.innerHTML = _sfPhotos_.map(function(p, i) {
    var isImage = p.mimeType && p.mimeType.startsWith('image/');
    var inner = isImage
      ? '<img src="' + p.data + '" alt="photo ' + (i+1) + '">'
      : '<div class="sf-file-thumb"><span>📄</span><span>' + esc(p.name || 'file') + '</span></div>';
    return '<div class="sf-photo-thumb">' + inner +
      '<button type="button" class="sf-photo-remove" onclick="_sfRemovePhoto_(' + i + ')">✕</button></div>';
  }).join('');
}

function _sfUpdatePhotoPreview_() {
  var inp  = document.getElementById('sf-photo');

  if (!inp || !link) return;

// ── Heads-up panel ────────────────────────────────────────────────────────────

function _sfUpdateHeadsUp_() {
  var el = document.getElementById('sf-headsup-text');
  if (!el) return;
  if (!_sfEquipCode) {
    el.innerHTML = 'Select specific equipment above to see recent ticket context.';
    return;
  }
  el.innerHTML = '<span style="color:var(--text-tertiary);">Loading history for ' + esc(_sfEquipCode) + '…</span>';
  var code = _sfEquipCode;
  fetch(WORKER_URL + '/api/submit/equip-stats?equipCode=' + encodeURIComponent(code), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
    .then(function(r) { return r.json(); })
    .then(function(stats) {
      var el2 = document.getElementById('sf-headsup-text');
      if (!el2) return;
      if (!stats || stats.count60d === 0) {
        el2.innerHTML = 'No tickets found for <strong>' + esc(code) + '</strong> in the last 60 days.';
        return;
      }
      var msg = 'Equipment <strong>' + esc(code) + '</strong> has had <strong>' +
        stats.count60d + ' ticket' + (stats.count60d !== 1 ? 's' : '') + '</strong> in the past 60 days.';
      if (stats.topProbType) msg += ' Most common issue: <strong>' + esc(stats.topProbType) + '</strong>.';
      if (stats.count60d >= 3) msg += ' Consider a parallel preventive ticket if the root cause is unresolved.';
      el2.innerHTML = msg;
    })
    .catch(function() {
      var el2 = document.getElementById('sf-headsup-text');
      if (el2) el2.innerHTML = 'Could not load equipment ticket history.';
    });
}

// ── Step navigation ───────────────────────────────────────────────────────────

var _SF_STEP_NAMES_ = { 1: 'Select Equipment', 2: 'Ticket Details', 3: 'Review & Submit' };

function submitGoStep(n) {
  _sfStep = n;
  [1, 2, 3].forEach(function(i) {
    var el     = document.getElementById('submit-step-' + i);
    var circle = document.getElementById('step-circle-' + i);
    var label  = document.getElementById('step-label-' + i);
    var conn   = document.getElementById('step-conn-' + i);
    if (el)     el.style.display = i === n ? '' : 'none';
    if (circle) { circle.className = 'step-circle ' + (i < n ? 'done' : i === n ? 'active' : 'pending'); circle.textContent = i < n ? '✓' : String(i); }
    if (label)  label.className   = 'step-label' + (i < n ? ' done' : i === n ? ' active' : '');
    if (conn)   conn.className    = 'step-connector' + (i < n ? ' done' : '');
  });
  var sub = document.getElementById('sf-step-sub');
  if (sub) sub.textContent = 'FRM-030-001 · Step ' + n + ' of 3 — ' + (_SF_STEP_NAMES_[n] || '');
}

function submitStep1Next() {
  var dept  = (document.getElementById('sf-dept')  || {}).value || '';
  var eType = (document.getElementById('sf-etype') || {}).value || '';
  // For ELECTRICAL / FACILITIES with no cache: read free-text fallback
  var manualWrapper = document.getElementById('sf-etype-manual-wrapper');
  var manualInput   = document.getElementById('sf-etype-manual');
  var usingManual   = manualWrapper && manualWrapper.style.display !== 'none';
  if (usingManual) {
    eType = (manualInput && manualInput.value.trim()) || '';
  }
  if (!dept)  { showToast('Please select a department', 'error'); return; }
  if (!eType) {
    showToast(usingManual
      ? 'Please enter an equipment or area description'
      : 'Please select an equipment type', 'error');
    return;
  }
  _sfCascadeEquip_();
  submitGoStep(2);
}

function submitStep2Next() {
  var desc = ((document.getElementById('sf-desc') || {}).value || '').trim();
  if (!desc)         { showToast('Problem description is required', 'error'); return; }
  if (desc.length < 10) { showToast('Description must be at least 10 characters', 'error'); return; }
  if (!((document.getElementById('sf-probtype') || {}).value || '')) { showToast('Please select a problem type', 'error'); return; }
  renderReview();
  submitGoStep(3);
}

function _rf_(label, value, raw, full) {

  return '<div class="review-field' + (full ? ' full' : '') + '"><span class="rf-label">' + esc(label) + '</span>' + vHtml + '</div>';
}

function _priColor_(p) {

// ── Submission ────────────────────────────────────────────────────────────────

function submitTicket() {
  var btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

  function val(id) { return ((document.getElementById(id) || {}).value || ''); }

  var mw = document.getElementById('sf-etype-manual-wrapper');
  var mi = document.getElementById('sf-etype-manual');
  var resolvedEtype = (mw && mw.style.display !== 'none' && mi && mi.value.trim())
    ? mi.value.trim()
    : val('sf-etype');

  var payload = {
    dept:          val('sf-dept'),
    equipType:     resolvedEtype,
    equipCode:     _sfEquipCode,
    specificEquip: _sfEquipSpec || resolvedEtype,
    equipDesc:     _sfEquipSpec || resolvedEtype,
    buildingZone:  val('sf-zone'),
    lineNo:        val('sf-line').trim(),
    priority:      _sfPriority,
    problemType:   val('sf-probtype'),
    downtimeType:  val('sf-downtime'),
    description:   val('sf-desc').trim(),
    problemDesc:   val('sf-desc').trim(),
    observations:  val('sf-obs').trim(),
    addedBy:       val('sf-addedby'),
    partsNeeded:   !!((document.getElementById('sf-parts') || {}).checked)
  };

  if (_sfPhotos_.length === 0) {
    _sfDoSubmit_(payload, btn);
    return;
  }

  // Photos present: reserve ticket ID first so filenames include it
  if (btn) btn.textContent = 'Preparing…';
  fetch(WORKER_URL + '/api/submit/reserve-id?dept=' + encodeURIComponent(payload.dept), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (!r.ticketNo) throw new Error(r.error || 'Failed to reserve ticket ID');
      payload.ticketNo = r.ticketNo;
      _sfUploadPhotos_(payload, _sfPhotos_.slice(), 0, [], btn);
    })
    .catch(function(err) {
      showToast('Could not prepare ticket: ' + esc(String(err.message || err)), 'error', 7000);
      if (btn) { btn.disabled = false; btn.textContent = 'Submit Ticket'; }
    });
}

function _sfUploadPhotos_(payload, photoList, index, links, btn) {
  if (index >= photoList.length) {
    payload.photoLinks = links;
    _sfDoSubmit_(payload, btn);
    return;
  }
  if (btn) btn.textContent = 'Uploading ' + (index + 1) + ' of ' + photoList.length + '…';
  var photo = photoList[index];
  fetch(WORKER_URL + '/api/submit/upload-photo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify({
      ticketNo:   payload.ticketNo,
      photoIndex: index + 1,
      dataUrl:    photo.data,
      mimeType:   photo.mimeType,
      ext:        photo.ext
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (r && r.ok && r.url) {
        links.push(r.url);
      } else {
        showToast('Photo ' + (index + 1) + ' upload error: ' + (r && r.error ? r.error : 'unknown'), 'error', 5000);
        links.push('UPLOAD_FAILED');
      }
      _sfUploadPhotos_(payload, photoList, index + 1, links, btn);
    })
    .catch(function(err) {
      showToast('Photo ' + (index + 1) + ' network error: ' + esc(String(err.message || err)), 'error', 5000);
      links.push('NETWORK_ERROR');
      _sfUploadPhotos_(payload, photoList, index + 1, links, btn);
    });
}

function _sfDoSubmit_(payload, btn) {
  if (btn) btn.textContent = 'Saving ticket…';
  fetch(WORKER_URL + '/api/submit/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': USER ? USER.email : '' },
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) {
        showSuccessScreen(result.ticketNo, result.status, result.tracker);
      } else {
        showToast('Error: ' + (result.error || 'Unknown error'), 'error', 7000);
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Ticket'; }
      }
    })
    .catch(function(err) {
      showToast('Submission failed: ' + esc(String(err.message || err)), 'error', 7000);
      if (btn) { btn.disabled = false; btn.textContent = 'Submit Ticket'; }
    });
}

function showSuccessScreen(ticketNo, status, tracker) {
  var container = document.getElementById('page-submit');
  if (!container) return;
  var statusMsg = status === 'OPEN'
    ? 'Ticket is <strong>OPEN</strong> and added to the ' + esc(tracker || '') + ' tracker.'
    : 'Ticket is in the <strong>Waiting Queue</strong> pending manager review.';

  container.innerHTML =
    '<div style="max-width:520px;margin:40px auto;">' +
      '<div class="submit-card">' +
        '<div class="submit-success">' +
          '<div class="success-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>' +
          '<h3>Ticket Submitted</h3>' +
          '<div class="ticket-no" onclick="copyTicketNo(\'' + esc(ticketNo) + '\')" title="Click to copy">' + esc(ticketNo) + '</div>' +
          '<p class="s-sub">' + statusMsg + '</p>' +
          '<div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">' +
            '<button class="btn btn-primary" onclick="navigate(\'waiting\')">View Waiting Queue</button>' +
            '<button class="btn btn-ghost" onclick="submitAnotherTicket()">Submit Another</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  showToast(ticketNo + ' submitted', 'success');
}

function copyTicketNo(tn) {
  if (navigator.clipboard) navigator.clipboard.writeText(tn).then(function() { showToast('Copied: ' + tn); });
}

function submitAnotherTicket() {
  _sfStep = 1; _sfPriority = 'MEDIUM'; _sfEquipCode = ''; _sfEquipSpec = ''; _sfPhotos_ = [];
  var container = document.getElementById('page-submit');
  if (!container) { navigate('submit'); return; }
  container.innerHTML = _buildSubmitHTML_();
  if (_sfData) {
    _sfPopulate_(_sfData);
  } else {
    fetch(WORKER_URL + '/api/submit/form-data', {
      headers: { 'X-User-Email': USER ? USER.email : '' }
    })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.error) throw new Error(d.error); _sfData = d; _sfPopulate_(d); _sfUpdatePreview_(); })
      .catch(function(e) { showToast('Error reloading form: ' + esc(String(e.message || e)), 'error'); });
  }
  _sfUpdatePreview_();
}
</script>
