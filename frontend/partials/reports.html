<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Reports partial — categorized analytics + SQF export           ║ -->
<!-- ║  Registers PAGE: reports                                         ║ -->
<!-- ║  Sections are grouped into dropdown-selectable categories:      ║ -->
<!-- ║    Insights · Workload · Work Distribution · Compliance & Export ║ -->
<!-- ║  All sections draw from the single /api/reports/data payload.   ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Reports ─────────────────────────────────────────────────────────── */
.rpt-wrap{padding:20px 24px;}
.rpt-filter-select{height:32px;padding:0 8px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.rpt-filter-select:focus{border-color:var(--brand-navy);}
.rpt-filter-select.cat{font-weight:600;color:var(--brand-navy);border-color:var(--border-strong);}
.rpt-search{height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;width:200px;outline:none;color:var(--text-primary);}
.rpt-search:focus{border-color:var(--brand-navy);}
.rpt-btn{height:32px;padding:0 12px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:var(--text-secondary);}
.rpt-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
.rpt-btn.primary{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.rpt-btn.primary:hover{background:var(--brand-navy-soft);}
.rpt-meta{font-size:11px;color:var(--text-tertiary);margin-bottom:16px;font-family:var(--font-mono);}

/* Category section grouping */
.rpt-cat{display:none;}
.rpt-cat.active{display:block;}
.rpt-cat-head{font-size:13px;font-weight:700;color:var(--text-primary);margin:2px 0 12px;display:flex;align-items:center;gap:8px;}
.rpt-cat-head .rpt-cat-desc{font-size:11.5px;font-weight:400;color:var(--text-secondary);}

/* Summary grid */
.rpt-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px;}
.rpt-dept-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:14px;box-shadow:var(--shadow-sm);}
.rpt-dept-name{font-size:12px;font-weight:700;color:var(--brand-navy);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-default);}
.rpt-stat-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:2px 0;}
.rpt-stat-label{color:var(--text-secondary);}
.rpt-stat-val{font-weight:600;font-variant-numeric:tabular-nums;}
.rpt-stat-val.critical{color:var(--status-critical);}
.rpt-stat-val.warn{color:var(--status-warn);}
.rpt-stat-val.success{color:var(--status-success);}

/* Ticket table */
.rpt-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.rpt-section-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:var(--text-secondary);background:var(--bg-subtle);border-bottom:1px solid var(--border-default);text-transform:uppercase;letter-spacing:.04em;}
.rpt-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.rpt-table th{background:var(--bg-subtle);padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.rpt-table td{padding:9px 12px;border-bottom:1px solid var(--border-default);vertical-align:middle;}
.rpt-table tr:last-child td{border-bottom:0;}
.rpt-table tbody tr{cursor:pointer;}
.rpt-table tbody tr:hover{background:var(--bg-hover);}
.rpt-table .col-ticket{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);font-size:12px;}
.rpt-table .col-desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);}
.rpt-empty{padding:32px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}

/* Analytics panels */
.rpt-analytics-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:14px;box-shadow:var(--shadow-sm);}
.rpt-analytics-hdr{font-size:11px;font-weight:700;color:var(--brand-navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;justify-content:space-between;}
.rpt-analytics-hdr .rpt-legend{font-size:10px;font-weight:400;letter-spacing:0;color:var(--text-secondary);}
.rpt-pt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rpt-pt-label{font-size:11.5px;color:var(--text-secondary);width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.rpt-pt-bar-wrap{flex:1;height:10px;background:var(--bg-subtle);border-radius:4px;overflow:hidden;}
.rpt-pt-bar{height:100%;background:var(--brand-navy);border-radius:4px;opacity:.8;}
.rpt-pt-count{font-size:11px;font-weight:600;color:var(--text-primary);width:28px;text-align:right;flex-shrink:0;}
.rpt-analytics-loading{padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;}

/* EMRL search section */
.emrl-section{margin-top:4px;}
.emrl-section-hdr{font-size:12px;font-weight:700;color:var(--brand-navy);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:8px 8px 0 0;border-bottom:none;display:flex;align-items:center;justify-content:space-between;}
.emrl-section-hdr .emrl-badge{font-size:10px;background:var(--brand-navy);color:#fff;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:.04em;}
.emrl-filters{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding:12px 14px;background:var(--bg-surface);border:1px solid var(--border-default);border-bottom:none;}
.emrl-filter-group{display:flex;flex-direction:column;gap:3px;}
.emrl-filter-label{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;}
.emrl-filter-input{height:28px;padding:0 8px;border:1px solid var(--border-default);border-radius:5px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.emrl-filter-input:focus{border-color:var(--brand-navy);}
.emrl-search-btn{height:28px;padding:0 14px;background:var(--brand-navy);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;}
.emrl-search-btn:hover{background:var(--brand-navy-soft);}
.emrl-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:0 0 8px 8px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.emrl-table{width:100%;border-collapse:collapse;font-size:12px;}
.emrl-table th{background:var(--bg-subtle);padding:7px 10px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.emrl-table td{padding:8px 10px;border-bottom:1px solid var(--border-default);vertical-align:top;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.emrl-table tr:last-child td{border-bottom:0;}
.emrl-table .col-tn{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);white-space:nowrap;}
.emrl-table .col-capa-yes{color:var(--status-critical);font-weight:700;}
.emrl-table .col-capa-no{color:var(--status-success);}
.emrl-table .col-chk-done{color:var(--status-success);font-weight:600;}
.emrl-table .col-chk-pend{color:var(--status-warn);font-weight:600;}
.emrl-status{padding:14px;text-align:center;font-size:12px;color:var(--text-secondary);}

/* Print styles */
@media print {
  .page-head-actions,.rpt-btn,#sidebar,.topbar{display:none!important;}
  .rpt-wrap{padding:0;}
  .rpt-cat{display:block!important;}
  body{background:#fff;}
}
</style>

<script>
// ── Reports page ──────────────────────────────────────────────────────────────
window.PAGES = window.PAGES || {};

var _rptData_ = null;
var _rptCat_  = 'insights';   // active report category (persists across day changes)
var _rptFamily_ = 'ops';      // 'ops' (maintenance analytics + SQF) | 'cost' (cost reports)

PAGES['reports'] = function(c) { _loadReportPage_(c, 30); };

function _loadReportPage_(container, daysBack) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Building report…</span></div>';
  fetch(WORKER_URL + '/api/reports/data?daysBack=' + (daysBack || 30), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.error) {
      var msg = data.error;
      container.innerHTML = (msg.indexOf('Manager') >= 0 || msg.indexOf('required') >= 0)
        ? '<div class="rpt-empty">Reports are only available to managers.</div>'
        : '<div class="rpt-empty">Error loading report: ' + esc(msg) + '</div>';
      return;
    }
    _renderReport_(data, container);
  })
  .catch(function(err) {
    container.innerHTML = '<div class="rpt-empty">Error loading report: ' + esc(err.message || String(err)) + '</div>';
  });
}

// ── Report categories — a dropdown swaps which section group is visible ───────
var _RPT_CATS_ = [
  { id: 'insights',     label: 'Insights',            desc: 'Headline KPIs, predictive insights, recurring equipment, and activity trend.' },
  { id: 'workload',     label: 'Workload',            desc: 'Load by department and by technician across the reporting window.' },
  { id: 'distribution', label: 'Work Distribution',   desc: 'Where the work is — status, problem types, and equipment/building hotspots.' },
  { id: 'compliance',   label: 'Compliance & Exports', desc: 'SQF 13.2.8 compliance pack, repair-log search, and data exports.' }
];

function _renderReport_(data, container) {
  _rptData_ = data;
  var daysBack = data.daysBack || 30;

  container.innerHTML =
    '<div class="rpt-wrap">' +
    '<div class="page-head">' +
      '<div class="page-head-main">' +
        '<div class="crumbs"><span>Reports &amp; SQF</span><span class="sep">/</span><span class="cur">Reports</span></div>' +
        '<h1>Reports</h1>' +
        '<p class="sub">Operations analytics, SQF 13.2.8 compliance, and department cost reports. Choose a report family, then a section — the reporting window / date range applies across it.</p>' +
      '</div>' +
      '<div class="page-head-actions">' +
        '<select class="rpt-filter-select cat" id="rpt-family" onchange="_rptSetFamily_(this.value)">' +
          '<option value="ops"'  + (_rptFamily_ === 'ops'  ? ' selected' : '') + '>Operations &amp; SQF</option>' +
          '<option value="cost"' + (_rptFamily_ === 'cost' ? ' selected' : '') + '>Cost Reports</option>' +
        '</select>' +
        '<select class="rpt-filter-select" id="rpt-cat" onchange="_rptShowCat_(this.value)">' +
          _RPT_CATS_.map(function(c) {
            return '<option value="' + c.id + '"' + (c.id === _rptCat_ ? ' selected' : '') + '>' + esc(c.label) + '</option>';
          }).join('') +
        '</select>' +
        '<select class="rpt-filter-select" id="rpt-cost" onchange="_crShowView_(this.value)" style="display:none">' +
          _CR_VIEWS_.map(function(v) {
            return '<option value="' + v.id + '"' + (v.id === _crView_ ? ' selected' : '') + '>' + esc(v.label) + '</option>';
          }).join('') +
        '</select>' +
        '<select class="rpt-filter-select" id="rpt-days" onchange="_rptChangeDays_()">' +
          [30,60,90,180,365].map(function(d) {
            return '<option value="' + d + '"' + (d === daysBack ? ' selected' : '') + '>Last ' + d + ' days</option>';
          }).join('') +
        '</select>' +
        '<button class="rpt-btn" onclick="window.print()">🖨 Print</button>' +
        '<button class="rpt-btn" onclick="_rptExportActive_()">⬇ Active Tickets CSV</button>' +
      '</div>' +
    '</div>' +
    '<div class="rpt-meta" id="rpt-meta">Generated ' + esc(data.generatedAt) +
      ' · ' + data.tickets.length + ' ticket' + (data.tickets.length !== 1 ? 's' : '') + ' in window</div>' +
    '<div id="rpt-cats"></div>' +
    '<div id="rpt-cost-host"></div>' +
    '</div>';

  _rptRenderCats_(data);
  _rptShowCat_(_rptCat_);
  _rptApplyFamily_();   // apply the active family (shows cost reports if selected)
  // Trend SVG is emitted as static markup inside its category, so no post-step needed.
}

// Switch report family (Operations & SQF ↔ Cost Reports) — toggles which
// selectors and content hosts are visible in the Reports page.
function _rptSetFamily_(fam) { _rptFamily_ = fam; _rptApplyFamily_(); }

function _rptApplyFamily_() {
  var isCost = _rptFamily_ === 'cost';
  var show = function(id, on) { var el = document.getElementById(id); if (el) el.style.display = on ? '' : 'none'; };
  show('rpt-cat',  !isCost);
  show('rpt-days', !isCost);
  show('rpt-meta', !isCost);
  show('rpt-cats', !isCost);
  show('rpt-cost',      isCost);
  show('rpt-cost-host', isCost);
  if (isCost && typeof _crRenderInto_ === 'function') {
    _crRenderInto_(document.getElementById('rpt-cost-host'));
  }
}

// Keep the head cost-report dropdown in sync when a view is chosen elsewhere
// (e.g. clicking a department row in the Overview summary).
function _rptSyncCostView_(id) {
  var sel = document.getElementById('rpt-cost');
  if (sel) sel.value = id;
  _crShowView_(id);
}

// Build all four category groups; only the active one is shown by _rptShowCat_.
function _rptRenderCats_(data) {
  var host = document.getElementById('rpt-cats');
  if (!host) return;

  function cat(id, label, desc, body) {
    return '<div class="rpt-cat" data-cat="' + id + '">' +
      '<div class="rpt-cat-head">' + esc(label) +
        '<span class="rpt-cat-desc">' + esc(desc) + '</span></div>' +
      body + '</div>';
  }
  var meta = {};
  _RPT_CATS_.forEach(function(c) { meta[c.id] = c; });

  host.innerHTML =
    cat('insights',     meta.insights.label,     meta.insights.desc,
        _rptKpiBarHtml_(data) + _rptInsightsHtml_(data) + _rptHotspotsHtml_(data) + _rptTrendHtml_(data)) +
    cat('workload',     meta.workload.label,     meta.workload.desc,
        _rptDeptSummaryHtml_(data) + _rptTeamWorkloadHtml_(data)) +
    cat('distribution', meta.distribution.label, meta.distribution.desc,
        _rptStatusDistHtml_(data) + _rptProblemTypesHtml_(data) + _rptEquipHeatmapHtml_(data) + _rptBuildingHeatmapHtml_(data)) +
    cat('compliance',   meta.compliance.label,   meta.compliance.desc,
        _rptSqfPackHtml_(data) + _rptEmrlHtml_()) +
    '<div class="sqf-footer" style="margin-top:20px;"><span>FRM-030-001 · Maintenance Ticket</span><span>SQF 13.2.8 · Equipment Maintenance Repair Log</span><span class="grow">' + esc(window.COMPANY || 'CSC Maintenance') + '</span></div>';
}

function _rptShowCat_(cat) {
  _rptCat_ = cat;
  var els = document.querySelectorAll('#rpt-cats .rpt-cat');
  for (var i = 0; i < els.length; i++) {
    els[i].classList.toggle('active', els[i].getAttribute('data-cat') === cat);
  }
}

// Export every currently-active ticket (open + waiting + pending + on hold) as
// a CSV — the authoritative enumerated list of active ticket numbers.
function _rptExportActive_() {
  showToast('Building active-ticket export…', 'info');
  fetch(WORKER_URL + '/api/reports/active-tickets', {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res || res.error) { showToast((res && res.error) || 'Export failed', 'error'); return; }
      var rows = res.tickets || [];
      if (!rows.length) { showToast('No active tickets found', 'info'); return; }
      var cols = [
        ['ticketNo', 'Ticket #'], ['status', 'Status'], ['priority', 'Priority'],
        ['dept', 'Department'], ['equipCode', 'Equip Code'], ['specificEquip', 'Equipment'],
        ['problemType', 'Problem Type'], ['description', 'Description'],
        ['assignedTo', 'Assigned To'], ['dateOpened', 'Date Opened']
      ];
      function cell(v) {
        v = (v == null ? '' : String(v));
        return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
      }
      var csv = cols.map(function(c) { return cell(c[1]); }).join(',') + '\n' +
        rows.map(function(t) {
          return cols.map(function(c) { return cell(t[c[0]]); }).join(',');
        }).join('\n');

      var stamp = (res.generatedAt || new Date().toISOString().slice(0, 10)).replace(/[^\dA-Za-z-]/g, '-');
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url;
      a.download = 'active-tickets-' + stamp + '.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(rows.length + ' active tickets exported', 'success');
    })
    .catch(function(err) { showToast('Export failed: ' + (err.message || err), 'error'); });
}

function _rptStatRow_(label, val, cls) {
  return '<div class="rpt-stat-row">' +
    '<span class="rpt-stat-label">' + esc(label) + '</span>' +
    '<span class="rpt-stat-val ' + esc(cls) + '">' + esc(String(val)) + '</span>' +
  '</div>';
}

function _rptKpi_(val, label, accent, foot) {
  return '<div class="kpi' + (accent ? ' kpi-' + accent : '') + '">' +
    '<div class="kpi-accent"></div>' +
    '<div class="kpi-label">' + esc(label) + '</div>' +
    '<div class="kpi-value">' + val + '</div>' +
    (foot ? '<div class="kpi-foot">' + esc(foot) + '</div>' : '') +
  '</div>';
}

function _rptFunnelChip_(label, count, color) {
  return '<div style="display:flex;flex-direction:column;align-items:center;background:var(--bg-subtle);' +
    'border:1px solid var(--border-default);border-radius:8px;padding:10px 16px;min-width:80px;">' +
    '<div style="font-size:20px;font-weight:700;color:' + color + ';">' + count + '</div>' +
    '<div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;">' + esc(label) + '</div>' +
  '</div>';
}

/* ══════════════════════════════════════════════════════════════════════════
   Section builders — each returns an HTML string for one report card.
   All read straight from the /api/reports/data payload (field names unchanged).
   ══════════════════════════════════════════════════════════════════════════ */

// ── INSIGHTS ────────────────────────────────────────────────────────────────
// 8.1 Operations Health headline KPIs.
function _rptKpiBarHtml_(data) {
  var k = data.kpis || {};
  return '<div class="kpi-band" style="margin-bottom:14px;">' +
    _rptKpi_(k.totalOpen        || 0, 'Active Tickets',    k.totalOpen > 0 ? 'info' : '', '') +
    _rptKpi_(k.critical         || 0, 'Critical',          k.critical  > 0 ? 'critical' : '', '') +
    _rptKpi_(k.closedThisPeriod || 0, 'Closed (Period)',   'success', '') +
    _rptKpi_(k.tempFix          || 0, 'Temp Fixes Active', k.tempFix   > 0 ? 'warn' : '', '') +
    _rptKpi_(k.partsPending     || 0, 'Parts Pending',     k.partsPending > 0 ? 'warn' : '', '') +
    _rptKpi_(k.avgTimeToClose !== null && k.avgTimeToClose !== undefined ? k.avgTimeToClose + 'h' : '—',
             'Avg Time to Close', '', '') +
  '</div>';
}

// 8.10 Predictive Insights (derived client-side from the payload).
function _rptBuildInsights_(data) {
  var insights = [];
  var hs   = data.equipHotspots || [];
  var kpis = data.kpis || {};
  var tw   = data.teamWorkload || [];

  if (hs.length > 0 && hs[0].count >= 3) {
    insights.push({ icon: '🔁',
      title: 'Recurring Equipment: ' + (hs[0].specificEquip || hs[0].equipCode),
      body: hs[0].count + ' tickets on this equipment in the selected period. Consider scheduled PM inspection.' });
  }
  if (kpis.tempFix >= 3) {
    insights.push({ icon: '⚠️', title: kpis.tempFix + ' active temp fixes',
      body: 'Multiple temporary repairs are outstanding. Each should be inspected and resolved with a permanent fix.' });
  }
  if (kpis.critical >= 2) {
    insights.push({ icon: '🚨', title: kpis.critical + ' critical tickets open',
      body: 'Immediate escalation recommended. Critical tickets indicate potential line-down or safety risk.' });
  }
  if (kpis.partsPending >= 5) {
    insights.push({ icon: '🔩', title: kpis.partsPending + ' tickets waiting on parts',
      body: 'High parts backlog may indicate inventory gaps. Review recurring part requests for stocking decisions.' });
  }
  var overloaded = tw.filter(function(t) { return t.open >= 5; });
  if (overloaded.length > 0) {
    insights.push({ icon: '👥', title: 'Workload imbalance: ' + overloaded[0].name,
      body: overloaded[0].name + ' has ' + overloaded[0].open + ' open tickets. Consider rebalancing assignments.' });
  }
  return insights;
}

function _rptInsightsHtml_(data) {
  var insights = _rptBuildInsights_(data);
  if (insights.length === 0) {
    return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
      '<div class="rpt-analytics-hdr">8.10 Predictive Insights</div>' +
      '<div style="font-size:12px;color:var(--text-tertiary);padding:4px 0;">No insights flagged for this window — operations are within normal thresholds.</div>' +
    '</div>';
  }
  return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">8.10 Predictive Insights</div>' +
    insights.map(function(ins) {
      return '<div style="display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-default);">' +
        '<span style="font-size:16px;flex-shrink:0;">' + ins.icon + '</span>' +
        '<div><div style="font-size:12px;font-weight:600;color:var(--text-primary);">' + esc(ins.title) + '</div>' +
          '<div style="font-size:11.5px;color:var(--text-secondary);margin-top:2px;">' + esc(ins.body) + '</div></div>' +
      '</div>';
    }).join('') +
  '</div>';
}

// 8.3 Top recurring equipment (by ticket count).
function _rptHotspotsHtml_(data) {
  var hs = data.equipHotspots || [];
  if (hs.length === 0) return '';
  var hsMax = hs[0].count || 1;
  return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">8.3 Top Recurring Equipment<span class="rpt-legend">by ticket count</span></div>' +
    hs.slice(0, 8).map(function(h) {
      var lbl = (h.specificEquip || h.equipCode || '—') + (h.dept ? ' · ' + h.dept : '');
      var pct = Math.round(h.count / hsMax * 100);
      return '<div class="rpt-pt-row">' +
        '<div class="rpt-pt-label" title="' + esc(lbl) + '">' + esc(lbl) + '</div>' +
        '<div class="rpt-pt-bar-wrap"><div class="rpt-pt-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="rpt-pt-count">' + h.count + '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

// Activity trend — last 6 months (opened vs closed), emitted as static SVG.
function _rptTrendHtml_(data) {
  var d = data.trend;
  if (!d || !d.labels || d.labels.length === 0) return '';
  var n    = d.labels.length;
  var maxV = Math.max.apply(null, d.opened.concat(d.closed).concat([1]));
  var W = 560, H = 130, padL = 8, padR = 8, padB = 24, padT = 8;
  var slotW  = (W - padL - padR) / n;
  var barW   = Math.max(8, Math.floor(slotW * 0.38));
  var chartH = H - padT - padB;

  var rects = '';
  d.labels.forEach(function(label, i) {
    var cx = padL + (i + 0.5) * slotW;
    var oH = Math.max(2, Math.round((d.opened[i] / maxV) * chartH));
    var cH = Math.max(2, Math.round((d.closed[i] / maxV) * chartH));
    rects += '<rect x="' + (cx - barW - 2) + '" y="' + (padT + chartH - oH) + '" width="' + barW + '" height="' + oH + '" fill="var(--status-info)" opacity=".75" rx="2"/>';
    rects += '<rect x="' + (cx + 2)         + '" y="' + (padT + chartH - cH) + '" width="' + barW + '" height="' + cH + '" fill="var(--status-success)" opacity=".75" rx="2"/>';
    rects += '<text x="' + cx + '" y="' + (H - 6) + '" text-anchor="middle" font-size="9" fill="var(--text-tertiary)" font-family="var(--font-mono)">' + esc(label) + '</text>';
  });

  return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">Activity Trend — Last 6 Months' +
      '<span class="rpt-legend">' +
        '<span style="color:var(--status-info);">&#9632;</span> Opened &nbsp;' +
        '<span style="color:var(--status-success);">&#9632;</span> Closed' +
      '</span>' +
    '</div>' +
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block;">' + rects + '</svg>' +
  '</div>';
}

// ── WORKLOAD ──────────────────────────────────────────────────────────────
// Per-department summary cards.
function _rptDeptSummaryHtml_(data) {
  var summary = data.summary || [];
  if (summary.length === 0) {
    return '<div style="padding:12px 0;font-size:12.5px;color:var(--text-secondary);">No dept data for this window.</div>';
  }
  return '<div class="rpt-summary">' +
    summary.map(function(s) {
      return '<div class="rpt-dept-card">' +
        '<div class="rpt-dept-name">' + esc(s.dept) + '</div>' +
        _rptStatRow_('Open',        s.open,       '') +
        _rptStatRow_('Waiting',     s.waiting,    '') +
        _rptStatRow_('Closed',      s.closed,     'success') +
        _rptStatRow_('Critical',    s.critical,   s.critical > 0 ? 'critical' : '') +
        _rptStatRow_('Temp Fixes',  s.tempFix,    s.tempFix  > 0 ? 'warn'     : '') +
        _rptStatRow_('Labor Hours', s.totalHours, '') +
      '</div>';
    }).join('') +
  '</div>';
}

// 8.7 Team workload — per-technician.
function _rptTeamWorkloadHtml_(data) {

    return '<th style="text-align:center;padding:5px 8px;color:var(--text-secondary);font-size:10.5px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border-default);">' + t + '</th>';
  }
  return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">8.7 Team Workload</div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:12px;">' +
      '<thead><tr>' +
        '<th style="text-align:left;padding:5px 8px;color:var(--text-secondary);font-size:10.5px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border-default);">Tech</th>' +
        th('Open') + th('Closed') + th('Labor Hrs') + th('Avg Close') +
      '</tr></thead><tbody>' +
      tw.map(function(t) {
        return '<tr>' +
          '<td style="padding:5px 8px;font-weight:600;">' + esc(t.name) + '</td>' +
          '<td style="text-align:center;padding:5px 8px;' + (t.open > 5 ? 'color:var(--status-warn);font-weight:700;' : '') + '">' + t.open + '</td>' +
          '<td style="text-align:center;padding:5px 8px;color:var(--status-success);font-weight:600;">' + t.closed + '</td>' +
          '<td style="text-align:center;padding:5px 8px;">' + (t.totalHrs || 0) + '</td>' +
          '<td style="text-align:center;padding:5px 8px;color:var(--text-secondary);">' + (t.avgCloseHrs !== null && t.avgCloseHrs !== undefined ? t.avgCloseHrs + 'h' : '—') + '</td>' +
        '</tr>';
      }).join('') +
    '</tbody></table>' +
  '</div>';
}

// ── WORK DISTRIBUTION ───────────────────────────────────────────────────────
// Status distribution funnel.

      _rptFunnelChip_('Open',         f.open         || 0, 'var(--status-info)') +

      _rptFunnelChip_('Pend. Parts',  f.pendingParts || 0, '#D97706') +

// 8.5 Problem type frequency.
function _rptProblemTypesHtml_(data) {
  var pts = data.problemTypes || [];

  return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">8.5 Problem Type Frequency<span class="rpt-legend">top ' + Math.min(pts.length, 8) + ' types</span></div>' +
    pts.slice(0, 8).map(function(pt) {

      return '<div class="rpt-pt-row">' +
        '<div class="rpt-pt-label" title="' + esc(pt.type) + '">' + esc(pt.type) + '</div>' +
        '<div class="rpt-pt-bar-wrap"><div class="rpt-pt-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="rpt-pt-count">' + pt.count + '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

// 8.3 Equipment risk heatmap (dept × equip type).
function _rptEquipHeatmapHtml_(data) {
  var eh = data.equipHeatmap || { depts: [], types: [], matrix: {} };
  if (!eh.depts.length || !eh.types.length) return '';
  var ehTypes = eh.types.slice(0, 8);
  return '<div class="rpt-analytics-card" style="margin-bottom:14px;overflow-x:auto;">' +
    '<div class="rpt-analytics-hdr">8.3 Equipment Risk Heatmap <span class="rpt-legend">dept × equip type</span></div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;">' +
      '<thead><tr><th style="text-align:left;padding:4px 8px;color:var(--text-secondary);font-weight:600;"></th>' +
      ehTypes.map(function(t) {
        return '<th style="text-align:center;padding:4px 6px;color:var(--text-secondary);font-weight:600;font-size:10px;max-width:80px;word-break:break-word;">' + esc(t) + '</th>';
      }).join('') + '</tr></thead><tbody>' +
      eh.depts.map(function(d) {
        return '<tr><td style="padding:4px 8px;font-weight:600;font-size:11px;white-space:nowrap;color:var(--brand-navy);">' + esc(d) + '</td>' +
          ehTypes.map(function(t) {
            var v = eh.matrix[d + '||' + t] || 0;
            var opacity = v === 0 ? '.05' : Math.min(0.15 + v * 0.12, 0.95).toFixed(2);
            return '<td style="text-align:center;padding:4px 6px;background:rgba(21,101,192,' + opacity + ');border-radius:3px;">' +
              (v > 0 ? '<strong>' + v + '</strong>' : '') + '</td>';
          }).join('') + '</tr>';
      }).join('') +
    '</tbody></table>' +
  '</div>';
}

// 8.4 Building & zone hotspots.
function _rptBuildingHeatmapHtml_(data) {

  if (!bh.buildings.length) return '';

  return '<div class="rpt-analytics-card" style="margin-bottom:14px;overflow-x:auto;">' +
    '<div class="rpt-analytics-hdr">8.4 Building &amp; Zone Hotspots <span class="rpt-legend">ticket density</span></div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;">' +
      '<thead><tr><th style="text-align:left;padding:4px 8px;color:var(--text-secondary);font-weight:600;"></th>' +
      bzones.map(function(z) {
        return '<th style="text-align:center;padding:4px 8px;color:var(--text-secondary);font-weight:600;font-size:10px;">' + esc(z) + '</th>';
      }).join('') + '</tr></thead><tbody>' +
      bh.buildings.map(function(b) {
        return '<tr><td style="padding:4px 8px;font-weight:600;font-size:11px;white-space:nowrap;color:var(--brand-navy);">' + esc(b) + '</td>' +
          bzones.map(function(z) {
            var v = bh.matrix[b + '||' + z] || 0;
            var opacity = v === 0 ? '.05' : Math.min(0.15 + v * 0.14, 0.9).toFixed(2);
            return '<td style="text-align:center;padding:4px 8px;background:rgba(21,101,192,' + opacity + ');border-radius:3px;">' +
              (v > 0 ? '<strong>' + v + '</strong>' : '') + '</td>';
          }).join('') + '</tr>';
      }).join('') +
    '</tbody></table>' +

// ── COMPLIANCE & EXPORTS ──────────────────────────────────────────────────
// 8.9 SQF 13.2.8 compliance pack.
function _rptSqfPackHtml_(data) {
  var sqf = data.sqfPack || {};
  return '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">8.9 SQF 13.2.8 Compliance Pack</div>' +
    '<div class="kpi-band" style="grid-template-columns:repeat(4,1fr);margin-top:8px;">' +
      _rptKpi_(sqf.verifiedCount || 0, 'Verified Closed', 'success', 'in period') +
      _rptKpi_(sqf.totalClosed   || 0, 'Total Closed',    '',        'in period') +
      _rptKpi_(sqf.openCritical  || 0, 'Open Critical',   sqf.openCritical > 0 ? 'critical' : '', '') +
      _rptKpi_(sqf.avgCaDays !== null && sqf.avgCaDays !== undefined ? sqf.avgCaDays + 'd' : '—', 'Avg Days to Close', '', '') +
    '</div>' +

// SQF 13.2.8 Equipment Maintenance Repair Log — searchable record set.
function _rptEmrlHtml_() {
  return '<div class="emrl-section">' +
    '<div class="emrl-section-hdr">SQF 13.2.8 — Equipment Maintenance Repair Log ' +
      '<span class="emrl-badge">' + esc(docLabel('repairLog')) + '</span>' +
    '</div>' +
    '<div class="emrl-filters">' +
      '<div class="emrl-filter-group"><label class="emrl-filter-label">Ticket #</label>' +
        '<input class="emrl-filter-input" id="emrl-f-ticket" placeholder="MT-EL-..." style="width:130px"/></div>' +
      '<div class="emrl-filter-group"><label class="emrl-filter-label">Department</label>' +
        '<select class="emrl-filter-input" id="emrl-f-dept" style="width:140px">' +
          '<option value="">All</option>' +
          ['METAL','ELECTRICAL','PLASTIC','LITHO','PLASTIC DEC','QA','MACHINE SHOP','S/R','SALES','G&A'].map(function(d){
            return '<option value="' + d + '">' + d + '</option>';
          }).join('') +
        '</select></div>' +
      '<div class="emrl-filter-group"><label class="emrl-filter-label">From</label>' +
        '<input class="emrl-filter-input" id="emrl-f-from" type="date" style="width:130px"/></div>' +
      '<div class="emrl-filter-group"><label class="emrl-filter-label">To</label>' +
        '<input class="emrl-filter-input" id="emrl-f-to" type="date" style="width:130px"/></div>' +
      '<button class="emrl-search-btn" onclick="_emrlSearch_()">Search EMRL</button>' +
    '</div>' +
    '<div class="emrl-table-wrap">' +

      '<div id="emrl-results"></div>' +

}

function _rptChangeDays_() {
  var el = document.getElementById('rpt-days');
  if (!el) return;
  var container = document.getElementById('page-reports');
  if (container) _loadReportPage_(container, parseInt(el.value, 10));
}

// ── EMRL search ───────────────────────────────────────────────────────────────

function _emrlSearch_() {
  var statusEl  = document.getElementById('emrl-status');
  var resultsEl = document.getElementById('emrl-results');
  if (!statusEl || !resultsEl) return;

  var params = {
    ticketNo:  (document.getElementById('emrl-f-ticket') || {}).value || '',
    dept:      (document.getElementById('emrl-f-dept')   || {}).value || '',
    dateFrom:  (document.getElementById('emrl-f-from')   || {}).value || '',
    dateTo:    (document.getElementById('emrl-f-to')     || {}).value || ''
  };

  statusEl.textContent  = 'Loading…';
  resultsEl.innerHTML   = '';

  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  fetch(WORKER_URL + '/api/reports/emrl?' + qs, {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res && res.error) { statusEl.textContent = 'Error: ' + esc(res.error); return; }
    _emrlRender_(res, statusEl, resultsEl);
  })
  .catch(function(err) {
    statusEl.textContent = 'Error: ' + (err.message || String(err));
  });
}

function _emrlRender_(res, statusEl, resultsEl) {
  var recs = (res && res.records) ? res.records : [];
  if (recs.length === 0) {
    statusEl.textContent = 'No EMRL records found for those filters.';
    resultsEl.innerHTML  = '';
    return;
  }
  statusEl.textContent = '';
  var rows = recs.map(function(r) {
    var capaClass = r.capaRequired === 'YES' ? 'col-capa-yes' : 'col-capa-no';
    var chkClass  = r.clearanceChk === 'DONE' ? 'col-chk-done' : 'col-chk-pend';
    return '<tr>' +
      '<td class="col-tn">'  + esc(r.ticketNo)      + '</td>' +
      '<td>' + esc(r.dept)                           + '</td>' +
      '<td>' + esc(r.equipType)                      + '</td>' +
      '<td>' + esc(r.specificEquip)                  + '</td>' +
      '<td>' + esc(r.repairDate)                     + '</td>' +
      '<td>' + esc(r.assignedTo)                     + '</td>' +
      '<td title="' + esc(r.rootCause) + '">'        + esc(_truncate_(r.rootCause, 40))     + '</td>' +
      '<td title="' + esc(r.correctiveAct) + '">'    + esc(_truncate_(r.correctiveAct, 40)) + '</td>' +
      '<td title="' + esc(r.preventiveAct) + '">'    + esc(_truncate_(r.preventiveAct, 40)) + '</td>' +
      '<td title="' + esc(r.partsUsed) + '">'        + esc(_truncate_(r.partsUsed, 30))     + '</td>' +
      '<td class="' + capaClass + '">'               + esc(r.capaRequired)  + '</td>' +
      '<td class="' + chkClass  + '">'               + esc(r.clearanceChk)  + '</td>' +
      '<td>' + esc(r.hadTempFix)                     + '</td>' +
      '<td>' + esc(r.verifiedBy)                     + '</td>' +
    '</tr>';
  }).join('');

  resultsEl.innerHTML =
    '<table class="emrl-table">' +
      '<thead><tr>' +
        '<th>Ticket #</th><th>Dept</th><th>Equip Type</th><th>Equipment</th>' +
        '<th>Repair Date</th><th>Assigned To</th><th>Root Cause</th>' +
        '<th>Corrective Action</th><th>Preventive Action</th><th>Parts Used</th>' +
        '<th>CAPA</th><th>Clearance</th><th>Temp Fix</th><th>Verified By</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

function _truncate_(s, n) {
  if (!s) return '';
  return s.length > n ? s.substring(0, n) + '…' : s;
}
</script>
