<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Reports partial — ticket activity summary + SQF export         ║ -->
<!-- ║  Registers PAGE: reports                                         ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Reports ─────────────────────────────────────────────────────────── */
.rpt-wrap{padding:20px 24px;}
.rpt-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.rpt-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;}
.rpt-filter-select{height:30px;padding:0 8px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.rpt-search{height:30px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;width:200px;outline:none;color:var(--text-primary);}
.rpt-search:focus{border-color:var(--brand-navy);}
.rpt-btn{height:30px;padding:0 12px;border:1px solid var(--border-default);border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:var(--text-secondary);}
.rpt-btn.primary{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.rpt-btn.primary:hover{background:var(--brand-navy-soft);}
.rpt-meta{font-size:11px;color:var(--text-tertiary);margin-bottom:16px;}

/* Summary grid */
.rpt-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px;}
.rpt-dept-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:14px;box-shadow:var(--shadow-sm);}
.rpt-dept-name{font-size:12px;font-weight:700;color:var(--brand-navy);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-default);}
.rpt-stat-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:2px 0;}
.rpt-stat-label{color:var(--text-secondary);}
.rpt-stat-val{font-weight:600;font-variant-numeric:tabular-nums;}
.rpt-stat-val.critical{color:var(--status-critical);}
.rpt-stat-val.warn{color:var(--status-warn);}
.rpt-stat-val.success{color:var(--status-success);}

/* Ticket table */
.rpt-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.rpt-section-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:var(--text-secondary);background:var(--bg-subtle);border-bottom:1px solid var(--border-default);text-transform:uppercase;letter-spacing:.04em;}
.rpt-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.rpt-table th{background:var(--bg-subtle);padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.rpt-table td{padding:9px 12px;border-bottom:1px solid var(--border-default);vertical-align:middle;}
.rpt-table tr:last-child td{border-bottom:0;}
.rpt-table tbody tr{cursor:pointer;}
.rpt-table tbody tr:hover{background:var(--bg-hover);}
.rpt-table .col-ticket{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);font-size:12px;}
.rpt-table .col-desc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);}
.rpt-empty{padding:32px 24px;text-align:center;color:var(--text-secondary);font-size:13px;}

/* Analytics panels */
.rpt-analytics-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:14px;box-shadow:var(--shadow-sm);}
.rpt-analytics-hdr{font-size:11px;font-weight:700;color:var(--brand-navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;justify-content:space-between;}
.rpt-analytics-hdr .rpt-legend{font-size:10px;font-weight:400;letter-spacing:0;color:var(--text-secondary);}
.rpt-pt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rpt-pt-label{font-size:11.5px;color:var(--text-secondary);width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.rpt-pt-bar-wrap{flex:1;height:10px;background:var(--bg-subtle);border-radius:4px;overflow:hidden;}
.rpt-pt-bar{height:100%;background:var(--brand-navy);border-radius:4px;opacity:.8;}
.rpt-pt-count{font-size:11px;font-weight:600;color:var(--text-primary);width:28px;text-align:right;flex-shrink:0;}
.rpt-analytics-loading{padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;}

/* EMRL search section */
.emrl-section{margin-top:24px;}
.emrl-section-hdr{font-size:12px;font-weight:700;color:var(--brand-navy);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:8px 8px 0 0;border-bottom:none;display:flex;align-items:center;justify-content:space-between;}
.emrl-section-hdr .emrl-badge{font-size:10px;background:var(--brand-navy);color:#fff;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:.04em;}
.emrl-filters{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding:12px 14px;background:var(--bg-surface);border:1px solid var(--border-default);border-bottom:none;}
.emrl-filter-group{display:flex;flex-direction:column;gap:3px;}
.emrl-filter-label{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;}
.emrl-filter-input{height:28px;padding:0 8px;border:1px solid var(--border-default);border-radius:5px;font-size:12px;background:#fff;color:var(--text-primary);outline:none;}
.emrl-filter-input:focus{border-color:var(--brand-navy);}
.emrl-search-btn{height:28px;padding:0 14px;background:var(--brand-navy);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;}
.emrl-search-btn:hover{background:var(--brand-navy-soft);}
.emrl-table-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:0 0 8px 8px;overflow-x:auto;box-shadow:var(--shadow-sm);}
.emrl-table{width:100%;border-collapse:collapse;font-size:12px;}
.emrl-table th{background:var(--bg-subtle);padding:7px 10px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-default);white-space:nowrap;}
.emrl-table td{padding:8px 10px;border-bottom:1px solid var(--border-default);vertical-align:top;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.emrl-table tr:last-child td{border-bottom:0;}
.emrl-table .col-tn{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);white-space:nowrap;}
.emrl-table .col-capa-yes{color:var(--status-critical);font-weight:700;}
.emrl-table .col-capa-no{color:var(--status-success);}
.emrl-table .col-chk-done{color:var(--status-success);font-weight:600;}
.emrl-table .col-chk-pend{color:var(--status-warn);font-weight:600;}
.emrl-status{padding:14px;text-align:center;font-size:12px;color:var(--text-secondary);}

/* Print styles */
@media print {
  .rpt-toolbar,.rpt-btn,#sidebar,.topbar{display:none!important;}
  .rpt-wrap{padding:0;}
  body{background:#fff;}
}
</style>

<script>
// ── Reports page ──────────────────────────────────────────────────────────────
window.PAGES = window.PAGES || {};

var _rptData_   = null;
var _rptSearch_ = '';

PAGES['reports'] = function(c) { _loadReportPage_(c, 30); };

function _loadReportPage_(container, daysBack) {
  container.innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div><span>Building report…</span></div>';
  google.script.run
    .withSuccessHandler(function(data) { _renderReport_(data, container); })
    .withFailureHandler(function(err) {
      var msg = err.message || String(err);
      container.innerHTML = msg.indexOf('UNAUTHORIZED') >= 0 || msg.indexOf('Manager') >= 0
        ? '<div class="rpt-empty">Reports are only available to managers.</div>'
        : '<div class="rpt-empty">Error loading report: ' + esc(msg) + '</div>';
    })
    .getReportData({ daysBack: daysBack || 30 });
}

function _renderReport_(data, container) {
  _rptData_   = data;
  _rptSearch_ = '';
  var daysBack = data.daysBack || 30;

  container.innerHTML =
    '<div class="rpt-wrap">' +
    '<div class="rpt-toolbar">' +
      '<span class="rpt-title">Ticket Activity Report</span>' +
      '<select class="rpt-filter-select" id="rpt-days" onchange="_rptChangeDays_()">' +
        [30,60,90,180,365].map(function(d) {
          return '<option value="' + d + '"' + (d === daysBack ? ' selected' : '') + '>Last ' + d + ' days</option>';
        }).join('') +
      '</select>' +
      '<input class="rpt-search" id="rpt-search" placeholder="Search tickets…" oninput="_rptApply_()" />' +
      '<button class="rpt-btn" onclick="window.print()">🖨 Print / Export PDF</button>' +
    '</div>' +
    '<div class="rpt-meta" id="rpt-meta">Generated ' + esc(data.generatedAt) +
      ' &nbsp;·&nbsp; ' + data.tickets.length + ' ticket' + (data.tickets.length !== 1 ? 's' : '') + ' in window</div>' +

    // Dept summary cards
    (data.summary.length > 0
      ? '<div class="rpt-summary" id="rpt-summary">' +
          data.summary.map(function(s) {
            return '<div class="rpt-dept-card">' +
              '<div class="rpt-dept-name">' + esc(s.dept) + '</div>' +
              _rptStatRow_('Open',        s.open,        '') +
              _rptStatRow_('Waiting',     s.waiting,     '') +
              _rptStatRow_('Closed',      s.closed,      'success') +
              _rptStatRow_('Critical',    s.critical,    s.critical > 0 ? 'critical' : '') +
              _rptStatRow_('Temp Fixes',  s.tempFix,     s.tempFix  > 0 ? 'warn'     : '') +
              _rptStatRow_('Labor Hours', s.totalHours,  '') +
            '</div>';
          }).join('')
        + '</div>'
      : '<div style="padding:12px 0;font-size:12.5px;color:var(--text-secondary);">No dept data for this window.</div>') +

    // Analytics placeholders (populated after render)
    '<div id="rpt-analytics"></div>' +
    '<div id="rpt-trend"></div>' +

    // Ticket table
    '<div class="rpt-table-wrap">' +
      '<div class="rpt-section-hdr">Ticket Detail — <span id="rpt-cnt">' + data.tickets.length + ' tickets</span></div>' +
      '<table class="rpt-table">' +
        '<thead><tr>' +
          '<th>Ticket #</th><th>Priority</th><th>Status</th><th>Dept</th>' +
          '<th>Equipment</th><th>Description</th><th>Assigned</th>' +
          '<th>Opened</th><th>Closed</th><th>Hrs</th>' +
        '</tr></thead>' +
        '<tbody id="rpt-tbody"></tbody>' +
      '</table>' +
    '</div>' +

    // EMRL search panel
    '<div class="emrl-section">' +
      '<div class="emrl-section-hdr">SQF 13.2.8 — Equipment Maintenance Repair Log ' +
        '<span class="emrl-badge">FRM-030-002</span>' +
      '</div>' +
      '<div class="emrl-filters">' +
        '<div class="emrl-filter-group"><label class="emrl-filter-label">Ticket #</label>' +
          '<input class="emrl-filter-input" id="emrl-f-ticket" placeholder="MT-EL-..." style="width:130px"/></div>' +
        '<div class="emrl-filter-group"><label class="emrl-filter-label">Department</label>' +
          '<select class="emrl-filter-input" id="emrl-f-dept" style="width:140px">' +
            '<option value="">All</option>' +
            ['ELECTRICAL','MACHINE SHOP','FACILITIES','PLASTICS','METALS','LITHO'].map(function(d){
              return '<option value="' + d + '">' + d + '</option>';
            }).join('') +
          '</select></div>' +
        '<div class="emrl-filter-group"><label class="emrl-filter-label">From</label>' +
          '<input class="emrl-filter-input" id="emrl-f-from" type="date" style="width:130px"/></div>' +
        '<div class="emrl-filter-group"><label class="emrl-filter-label">To</label>' +
          '<input class="emrl-filter-input" id="emrl-f-to" type="date" style="width:130px"/></div>' +
        '<button class="emrl-search-btn" onclick="_emrlSearch_()">Search EMRL</button>' +
      '</div>' +
      '<div class="emrl-table-wrap">' +
        '<div id="emrl-status" class="emrl-status">Enter filters and click Search EMRL to load records.</div>' +
        '<div id="emrl-results"></div>' +
      '</div>' +
    '</div>' +

    '</div>';

  _rptRenderRows_(data.tickets);
  _rptAnalytics_(data.tickets);
}

function _rptStatRow_(label, val, cls) {
  return '<div class="rpt-stat-row">' +
    '<span class="rpt-stat-label">' + esc(label) + '</span>' +
    '<span class="rpt-stat-val ' + esc(cls) + '">' + esc(String(val)) + '</span>' +
  '</div>';
}

function _rptApply_() {
  var q = document.getElementById('rpt-search');
  _rptSearch_ = q ? q.value.toLowerCase() : '';
  if (!_rptData_) return;
  var filtered = _rptData_.tickets.filter(function(t) {
    if (!_rptSearch_) return true;
    var hay = (t.ticketNo + ' ' + t.dept + ' ' + t.specificEquip + ' ' +
               t.description + ' ' + t.assignedTo + ' ' + t.addedBy).toLowerCase();
    return hay.indexOf(_rptSearch_) >= 0;
  });
  _rptRenderRows_(filtered);
}

function _rptRenderRows_(list) {
  var tbody = document.getElementById('rpt-tbody');
  if (!tbody) return;
  var cntEl = document.getElementById('rpt-cnt');
  if (cntEl) cntEl.textContent = list.length + ' ticket' + (list.length !== 1 ? 's' : '');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="rpt-empty">No tickets match.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(t) {
    var priCls = 'pri-' + (t.priority || '');
    var staCls = 'stat-' + t.status.replace(/\s+/g, '-');
    return '<tr onclick="openTicketDetail(\'' + esc(t.ticketNo) + '\')">' +
      '<td class="col-ticket">' + esc(t.ticketNo) + '</td>' +
      '<td><span class="pri-badge ' + priCls + '">' + esc(t.priority || '—') + '</span></td>' +
      '<td><span class="stat-badge ' + staCls + '">' + esc(t.status) + '</span></td>' +
      '<td>' + esc(t.dept) + '</td>' +
      '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(t.specificEquip) + '</td>' +
      '<td class="col-desc" title="' + esc(t.description) + '">' + esc(t.description) + '</td>' +
      '<td>' + esc(t.assignedTo || '—') + '</td>' +
      '<td style="font-size:11.5px;color:var(--text-tertiary);">' + esc(t.dateOpened) + '</td>' +
      '<td style="font-size:11.5px;color:var(--text-tertiary);">' + esc(t.dateClosed || '—') + '</td>' +
      '<td style="font-size:11.5px;color:var(--text-secondary);">' + esc(String(t.actualHours || '—')) + '</td>' +
    '</tr>';
  }).join('');
}

function _rptAnalytics_(tickets) {
  var ptEl    = document.getElementById('rpt-analytics');
  var trendEl = document.getElementById('rpt-trend');

  // ── Problem type breakdown ──────────────────────────────────────────────
  if (ptEl) {
    var ptMap = {};
    tickets.forEach(function(t) {
      var pt = (t.problemType && t.problemType.trim()) || 'Unspecified';
      ptMap[pt] = (ptMap[pt] || 0) + 1;
    });
    var ptList = Object.keys(ptMap).map(function(k) { return { type: k, count: ptMap[k] }; });
    ptList.sort(function(a, b) { return b.count - a.count; });
    var ptMax = ptList.length > 0 ? ptList[0].count : 1;

    // Compute summary KPIs from tickets
    var closed   = tickets.filter(function(t) { return t.status === 'CLOSED'; }).length;
    var open     = tickets.filter(function(t) { return !['CLOSED','VOIDED'].includes(t.status); }).length;
    var critical = tickets.filter(function(t) { return t.priority === 'CRITICAL'; }).length;
    var tfActive = tickets.filter(function(t) { return !!t.tempFixFlag; }).length;
    var totHrs   = tickets.reduce(function(s, t) { return s + (parseFloat(t.actualHours) || 0); }, 0);

    ptEl.innerHTML =
      // Ops health KPI band
      '<div class="kpi-band" style="grid-template-columns:repeat(5,1fr);margin-bottom:14px;">' +
        _rptKpi_(tickets.length, 'Total Tickets',    '', '') +
        _rptKpi_(closed,  'Closed',     'success', closed  > 0 ? 'in period'          : '') +
        _rptKpi_(open,    'Active',     open > 0 ? 'info' : '', '') +
        _rptKpi_(critical,'Critical',   critical > 0 ? 'critical' : '', '') +
        _rptKpi_(totHrs.toFixed(1), 'Labor Hours', '', 'total across period') +
      '</div>' +
      // Problem type bar chart
      (ptList.length > 0
        ? '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
            '<div class="rpt-analytics-hdr">Problem Type Breakdown' +
              '<span class="rpt-legend">top ' + Math.min(ptList.length, 8) + ' of ' + ptList.length + ' types</span>' +
            '</div>' +
            ptList.slice(0, 8).map(function(pt) {
              var pct = Math.round((pt.count / ptMax) * 100);
              return '<div class="rpt-pt-row">' +
                '<div class="rpt-pt-label" title="' + esc(pt.type) + '">' + esc(pt.type) + '</div>' +
                '<div class="rpt-pt-bar-wrap"><div class="rpt-pt-bar" style="width:' + pct + '%"></div></div>' +
                '<div class="rpt-pt-count">' + pt.count + '</div>' +
              '</div>';
            }).join('') +
          '</div>'
        : '');
  }

  // ── Activity trend chart (async) ────────────────────────────────────────
  if (trendEl) {
    trendEl.innerHTML = '<div class="rpt-analytics-card"><div class="rpt-analytics-loading">Loading trend…</div></div>';
    google.script.run
      .withSuccessHandler(function(d) { _rptRenderTrend_(d, trendEl); })
      .withFailureHandler(function()  { trendEl.innerHTML = ''; })
      .getDashboardTrend(6);
  }
}

function _rptKpi_(val, label, accent, foot) {
  return '<div class="kpi' + (accent ? ' kpi-' + accent : '') + '">' +
    '<div class="kpi-accent"></div>' +
    '<div class="kpi-label">' + esc(label) + '</div>' +
    '<div class="kpi-value">' + val + '</div>' +
    (foot ? '<div class="kpi-foot">' + esc(foot) + '</div>' : '') +
  '</div>';
}

function _rptRenderTrend_(d, el) {
  if (!d || !d.labels || d.labels.length === 0) { el.innerHTML = ''; return; }
  var n    = d.labels.length;
  var maxV = Math.max.apply(null, d.opened.concat(d.closed).concat([1]));
  var W = 560, H = 130, padL = 8, padR = 8, padB = 24, padT = 8;
  var slotW  = (W - padL - padR) / n;
  var barW   = Math.max(8, Math.floor(slotW * 0.38));
  var chartH = H - padT - padB;

  var rects = '';
  d.labels.forEach(function(label, i) {
    var cx = padL + (i + 0.5) * slotW;
    var oH = Math.max(2, Math.round((d.opened[i] / maxV) * chartH));
    var cH = Math.max(2, Math.round((d.closed[i] / maxV) * chartH));
    rects += '<rect x="' + (cx - barW - 2) + '" y="' + (padT + chartH - oH) + '" width="' + barW + '" height="' + oH + '" fill="var(--status-info)" opacity=".75" rx="2"/>';
    rects += '<rect x="' + (cx + 2)         + '" y="' + (padT + chartH - cH) + '" width="' + barW + '" height="' + cH + '" fill="var(--status-success)" opacity=".75" rx="2"/>';
    rects += '<text x="' + cx + '" y="' + (H - 6) + '" text-anchor="middle" font-size="9" fill="var(--text-tertiary)" font-family="var(--font-mono)">' + esc(label) + '</text>';
  });

  el.innerHTML = '<div class="rpt-analytics-card" style="margin-bottom:14px;">' +
    '<div class="rpt-analytics-hdr">Activity Trend — Last 6 Months' +
      '<span class="rpt-legend">' +
        '<span style="color:var(--status-info);">&#9632;</span> Opened &nbsp;' +
        '<span style="color:var(--status-success);">&#9632;</span> Closed' +
      '</span>' +
    '</div>' +
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block;">' +
      rects +
    '</svg>' +
  '</div>';
}

function _rptChangeDays_() {
  var el = document.getElementById('rpt-days');
  if (!el) return;
  var container = document.getElementById('page-reports');
  if (container) _loadReportPage_(container, parseInt(el.value, 10));
}

// ── EMRL search ───────────────────────────────────────────────────────────────

function _emrlSearch_() {
  var statusEl  = document.getElementById('emrl-status');
  var resultsEl = document.getElementById('emrl-results');
  if (!statusEl || !resultsEl) return;

  var params = {
    ticketNo:  (document.getElementById('emrl-f-ticket') || {}).value || '',
    dept:      (document.getElementById('emrl-f-dept')   || {}).value || '',
    dateFrom:  (document.getElementById('emrl-f-from')   || {}).value || '',
    dateTo:    (document.getElementById('emrl-f-to')     || {}).value || ''
  };

  statusEl.textContent  = 'Loading…';
  resultsEl.innerHTML   = '';

  google.script.run
    .withSuccessHandler(function(res) { _emrlRender_(res, statusEl, resultsEl); })
    .withFailureHandler(function(err) {
      statusEl.textContent = 'Error: ' + (err.message || String(err));
    })
    .getEMRLData(params);
}

function _emrlRender_(res, statusEl, resultsEl) {
  var recs = (res && res.records) ? res.records : [];
  if (recs.length === 0) {
    statusEl.textContent = 'No EMRL records found for those filters.';
    resultsEl.innerHTML  = '';
    return;
  }
  statusEl.textContent = '';
  var rows = recs.map(function(r) {
    var capaClass = r.capaRequired === 'YES' ? 'col-capa-yes' : 'col-capa-no';
    var chkClass  = r.clearanceChk === 'DONE' ? 'col-chk-done' : 'col-chk-pend';
    return '<tr>' +
      '<td class="col-tn">'  + esc(r.ticketNo)      + '</td>' +
      '<td>' + esc(r.dept)                           + '</td>' +
      '<td>' + esc(r.equipType)                      + '</td>' +
      '<td>' + esc(r.specificEquip)                  + '</td>' +
      '<td>' + esc(r.repairDate)                     + '</td>' +
      '<td>' + esc(r.assignedTo)                     + '</td>' +
      '<td title="' + esc(r.rootCause) + '">'        + esc(_truncate_(r.rootCause, 40))     + '</td>' +
      '<td title="' + esc(r.correctiveAct) + '">'    + esc(_truncate_(r.correctiveAct, 40)) + '</td>' +
      '<td title="' + esc(r.preventiveAct) + '">'    + esc(_truncate_(r.preventiveAct, 40)) + '</td>' +
      '<td title="' + esc(r.partsUsed) + '">'        + esc(_truncate_(r.partsUsed, 30))     + '</td>' +
      '<td class="' + capaClass + '">'               + esc(r.capaRequired)  + '</td>' +
      '<td class="' + chkClass  + '">'               + esc(r.clearanceChk)  + '</td>' +
      '<td>' + esc(r.hadTempFix)                     + '</td>' +
      '<td>' + esc(r.verifiedBy)                     + '</td>' +
    '</tr>';
  }).join('');

  resultsEl.innerHTML =
    '<table class="emrl-table">' +
      '<thead><tr>' +
        '<th>Ticket #</th><th>Dept</th><th>Equip Type</th><th>Equipment</th>' +
        '<th>Repair Date</th><th>Assigned To</th><th>Root Cause</th>' +
        '<th>Corrective Action</th><th>Preventive Action</th><th>Parts Used</th>' +
        '<th>CAPA</th><th>Clearance</th><th>Temp Fix</th><th>Verified By</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

function _truncate_(s, n) {
  if (!s) return '';
  return s.length > n ? s.substring(0, n) + '…' : s;
}
</script>
