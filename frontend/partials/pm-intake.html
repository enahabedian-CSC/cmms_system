<!-- ║  PM Intake partial — data-entry form for new Preventive          ║ -->
<!-- ║  Maintenance SCHEDULE DEFINITIONS.  Registers PAGE: pm-intake     ║ -->
<!-- ║  (nav id "pm-intake", title "New PM Entry").                    ║ -->
<!-- ║                                                                  ║ -->
<!-- ║  ARCHITECTURE                                                    ║ -->
<!-- ║  The whole form is driven by the PM_INTAKE_CONFIG object below.  ║ -->
<!-- ║  To add / rename / re-order a field or change a dropdown's       ║ -->
<!-- ║  options, edit that ONE object — the markup, validation, live    ║ -->
<!-- ║  summary and submit payload all derive from it. Field types:     ║ -->
<!-- ║    text | select | number | textarea | auto | list | tasklist    ║ -->
<!-- ║    list      → repeatable single-value rows  → string[]          ║ -->
<!-- ║    tasklist  → repeatable {task, CHK-ref} rows → {t,ref}[]        ║ -->
<!-- ║                                                                  ║ -->
<!-- ║  BACKEND CONTRACT                                                 ║ -->
<!-- ║  On submit we POST JSON to  WORKER_URL + '/api/pm/schedules/add' ║ -->
<!-- ║  with header  X-User-Email.  Body carries every user field       ║ -->
<!-- ║  (arrays for the list/tasklist fields).  The Worker assigns the  ║ -->
<!-- ║  PM ID, Next Due, Status and timestamps and returns              ║ -->
<!-- ║  { ok:true, pmId, timestamp, nextDue, status }.                 ║ -->
<!-- ║  The record lands on the 'PM Schedules' tab, which the PM        ║ -->
<!-- ║  Master view (PAGE 'pm') reads back via GET /api/pm/schedules.  ║ -->
<!-- ║  See handlePmScheduleAdd() in cloudflare-worker/worker.js.       ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->

/* ── PM Intake ───────────────────────────────────────────────────────── */
.pmi-wrap{padding:20px 24px;max-width:1180px;}
.pmi-hdr{margin-bottom:16px;}

.pmi-section-note{font-size:11px;color:var(--text-tertiary);margin-left:auto;}

/* Field grid */
.pmi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
.pmi-grid .pmi-span2{grid-column:1 / -1;}
@media (max-width:560px){.pmi-grid{grid-template-columns:1fr;}}
.pmi-group{display:flex;flex-direction:column;gap:4px;min-width:0;}
.pmi-label{font-size:12px;font-weight:600;color:var(--text-primary);}
.pmi-label .pmi-req{color:var(--status-critical);margin-left:2px;}
.pmi-label .pmi-opt{font-weight:400;color:var(--text-tertiary);margin-left:4px;font-size:11px;}
.pmi-input,.pmi-select,.pmi-textarea{height:34px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:13px;color:var(--text-primary);background:#fff;outline:none;width:100%;box-sizing:border-box;transition:border-color .15s,box-shadow .15s;}

.pmi-input.pmi-invalid,.pmi-select.pmi-invalid,.pmi-textarea.pmi-invalid{border-color:var(--status-critical);box-shadow:0 0 0 3px rgba(214,60,60,.08);}
.pmi-hint{font-size:11px;color:var(--text-tertiary);}
.pmi-err{font-size:11px;color:var(--status-critical);font-weight:600;display:none;}

// Renders the <optgroup>/<option> markup for a task-library <select>,
// filtered to `dept` first (grouped by freq, e.g. "Weekly"), then every other
// department's groups below a divider (labeled "METAL — Weekly") so a task
// can still be borrowed across departments. Falls back to showing everything
// flat (no dept grouping) if `dept` is blank/unrecognized. Shared with
// pm-master.html's schedule-edit mode.
window._pmTaskLibOptionsHtml_ = function(dept) {
  var lib = window.PM_TASK_LIBRARY_ || [];
  function optgroup(label, items) {
    return '<optgroup label="' + esc(label) + '">' + items.map(function(t) {
      return '<option value="' + esc(t) + '">' + esc(t) + '</option>';
    }).join('') + '</optgroup>';
  }
  if (!dept) return lib.map(function(g) { return optgroup(g.freq, g.items); }).join('');

  var mine = lib.filter(function(g) { return g.dept === dept; });
  var others = lib.filter(function(g) { return g.dept !== dept; });
  var html = mine.map(function(g) { return optgroup(g.freq, g.items); }).join('');
  if (others.length) {
    html += '<optgroup label="── Other Departments ──" disabled></optgroup>' +
      others.map(function(g) { return optgroup(g.dept + ' — ' + g.freq, g.items); }).join('');
  }
  return html;
};

// Auto-generate a checklist reference so data-entry people never have to know
// or type the CHK- scheme themselves. Format mirrors the existing convention
// (CHK-030-<asset suffix>-<seq>, e.g. CHK-030-354-02) — 030 is the Maintenance
// procedure series, the middle segment is the asset's numeric suffix (e.g.
// "003-354" → "354"), and seq is this task's position among referenced tasks
// on the schedule. Always editable afterward — this is a starting value, not
// a lock.
window._pmGenChkRef_ = function(assetCode, seq) {
  var parts  = String(assetCode || '').trim().split('-');
  var suffix = (parts.length > 1 ? parts[parts.length - 1] : parts[0]) || '000';
  suffix = suffix.replace(/[^A-Za-z0-9]/g, '') || '000';
  return 'CHK-030-' + suffix + '-' + String(seq).padStart(2, '0');
};

// Runtime state
var _pmiState_   = {};   // key -> value (string, or array for list/tasklist)
var _pmiEquip_   = [];   // [{code, specific, dept}] for asset autocomplete
var _pmiSubmitting_ = false;

// Ordered list of every field key, following section order.
function _pmiOrderedKeys_() {
  var cfg = window.PM_INTAKE_CONFIG, out = [];
  cfg.sections.forEach(function(s) { s.keys.forEach(function(k) { out.push(k); }); });
  return out;
}
function _pmiField_(key) { return window.PM_INTAKE_CONFIG.fields[key]; }
function _pmiIsUserField_(key) { return _pmiField_(key).type !== 'auto'; }
function _pmiIsCollection_(key) { var t = _pmiField_(key).type; return t === 'list' || t === 'tasklist'; }

// Is this field required *right now* (accounts for conditional requiredWhen)?
function _pmiIsRequired_(key) {
  var f = _pmiField_(key);
  if (f.requiredWhen) {
    for (var dep in f.requiredWhen) { if (_pmiState_[dep] !== f.requiredWhen[dep]) return false; }
    return true;
  }
  return f.required === true;
}

// ── Page entry point ─────────────────────────────────────────────────────────
PAGES['pm-intake'] = function(container) { _pmiRender_(container); _pmiLoadAssets_(); };

function _pmiRender_(container) {
  // (Re)initialise state from defaults every time the form is rendered fresh.
  _pmiState_ = {};
  _pmiOrderedKeys_().forEach(function(k) {
    var f = _pmiField_(k);
    if (f.type === 'list')          _pmiState_[k] = [''];
    else if (f.type === 'tasklist') _pmiState_[k] = [{ t: '', ref: '' }];
    else                            _pmiState_[k] = f.defaultValue || '';
  });

  // One-shot prefill from "Duplicate" on an existing schedule (see
  // pm-master.html _pmDuplicateSched_). Only user-editable keys are copied —
  // auto fields (PM ID, Next Due) stay assigned-on-submit as usual.
  if (window._PMI_PREFILL_) {
    Object.keys(window._PMI_PREFILL_).forEach(function(k) {
      if (_pmiField_(k) && _pmiIsUserField_(k)) _pmiState_[k] = window._PMI_PREFILL_[k];
    });
    window._PMI_PREFILL_ = null;
  }

  var cfg = window.PM_INTAKE_CONFIG;
  var html =
    '<div class="pmi-wrap">' +
      '<div class="pmi-hdr">' +
        '<div class="pmi-hdr-title">New PM Entry</div>' +
        '<div class="pmi-hdr-sub">Define a preventive-maintenance schedule. The PM ID, next-due date and status are assigned automatically; the definition lands on the <strong>PM Schedules</strong> tab and appears immediately in the PM Master view.</div>' +
        '<div class="pmi-hdr-code">' + esc(cfg.formCode) + '</div>' +
      '</div>' +
      '<div class="pmi-banner" id="pmi-banner"></div>' +
      _pmiDatalists_() +
      '<div class="pmi-shell">' +
        '<div class="pmi-form">' + cfg.sections.map(_pmiSectionHTML_).join('') + '</div>' +
        _pmiRailHTML_() +
      '</div>' +
    '</div>';

  container.innerHTML = html;
  _pmiSyncPriority_();
  _pmiUpdateSummary_();
}

function _pmiDatalists_() {
  var opts = _pmiEquip_.map(function(e) {
    var lbl = e.specific ? (e.code + ' — ' + e.specific) : e.code;
    return '<option value="' + esc(e.code) + '">' + esc(lbl) + '</option>';
  }).join('');
  return '<datalist id="pmi-dl-assets">' + opts + '</datalist>';
}

function _pmiSectionHTML_(section) {
  var body = section.keys.map(_pmiFieldHTML_).join('');
  return '' +
    '<div class="pmi-section">' +
      '<div class="pmi-section-hdr">' +
        '<div class="pmi-step-num">' + section.num + '</div>' +
        '<div class="pmi-section-title">' + esc(section.title) + '</div>' +
        (section.note ? '<div class="pmi-section-note">' + esc(section.note) + '</div>' : '') +
      '</div>' +
      '<div class="pmi-grid">' + body + '</div>' +
    '</div>';
}

function _pmiFieldHTML_(key) {
  var f = _pmiField_(key);
  var span = (f.span2 || f.type === 'list' || f.type === 'tasklist') ? ' pmi-span2' : '';
  var reqMark;
  if (f.type === 'auto') reqMark = '';
  else if (_pmiIsRequired_(key) || f.requiredWhen) reqMark = '<span class="pmi-req">*</span>';
  else reqMark = '<span class="pmi-opt">(optional)</span>';
  var control = _pmiControlHTML_(key, f);

  return '' +
    '<div class="pmi-group' + span + '">' +
      '<label class="pmi-label" for="pmi-' + key + '">' + esc(f.label) + ' ' + reqMark + '</label>' +
      control +
      (f.hint ? '<div class="pmi-hint">' + esc(f.hint) + '</div>' : '') +
      '<div class="pmi-err" id="pmi-err-' + key + '"></div>' +
    '</div>';
}

function _pmiControlHTML_(key, f) {
  if (f.type === 'auto') {
    return '<div class="pmi-auto"><span class="pmi-auto-dot"></span>' +
      '<span>' + esc(f.autoText || 'Auto-assigned') + '</span></div>';
  }
  if (f.type === 'select') {
    var opts = '<option value="">— Select —</option>' + f.options.map(function(o) {
      var sel = (_pmiState_[key] === o) ? ' selected' : '';
      var lbl = (f.optionLabels && f.optionLabels[o]) ? f.optionLabels[o] : o;
      return '<option value="' + esc(o) + '"' + sel + '>' + esc(lbl) + '</option>';
    }).join('');
    return '<select class="pmi-select" id="pmi-' + key + '" onchange="_pmiOnInput_(\'' + key + '\')">' + opts + '</select>';
  }
  if (f.type === 'textarea') {
    return '<textarea class="pmi-textarea" id="pmi-' + key + '" rows="3" placeholder="' + esc(f.placeholder || '') + '" ' +
      'oninput="_pmiOnInput_(\'' + key + '\')">' + esc(_pmiState_[key] || '') + '</textarea>';
  }
  if (f.type === 'number') {
    return '<div class="pmi-num-wrap">' +
        '<input type="number" class="pmi-input" id="pmi-' + key + '" inputmode="decimal" ' +
          (f.min != null ? 'min="' + f.min + '" ' : '') +
          (f.step != null ? 'step="' + f.step + '" ' : '') +
          'placeholder="' + esc(f.placeholder || '') + '" value="' + esc(_pmiState_[key] || '') + '" ' +
          'oninput="_pmiOnInput_(\'' + key + '\')">' +
        (f.unit ? '<span class="pmi-num-unit">' + esc(f.unit) + '</span>' : '') +
      '</div>';
  }
  if (f.type === 'list')     return '<div class="pmi-listwrap" id="pmi-listwrap-' + key + '">' + _pmiListInner_(key) + '</div>';
  if (f.type === 'tasklist') return '<div class="pmi-listwrap" id="pmi-listwrap-' + key + '">' + _pmiTaskInner_(key) + '</div>';

  // text (with optional datalist)
  var dl = f.datalist ? ' list="pmi-dl-' + esc(f.datalist) + '"' : '';
  return '<input type="text" class="pmi-input" id="pmi-' + key + '"' + dl + ' placeholder="' + esc(f.placeholder || '') + '" ' +
    'value="' + esc(_pmiState_[key] || '') + '" oninput="_pmiOnInput_(\'' + key + '\')">';
}

/* ── Repeatable list field ─────────────────────────────────────────────────── */
function _pmiListInner_(key) {
  var f = _pmiField_(key);
  var arr = _pmiState_[key] || [];
  var rows = arr.map(function(val, i) {
    return '<div class="pmi-listrow">' +
      '<input type="text" class="pmi-input" placeholder="' + esc(f.placeholder || '') + '" value="' + esc(val) + '" ' +
        'oninput="_pmiListSet_(\'' + key + '\',' + i + ',this.value)">' +
      '<button type="button" class="pmi-rm" title="Remove" onclick="_pmiListRemove_(\'' + key + '\',' + i + ')">&times;</button>' +
    '</div>';
  }).join('');
  return rows + '<button type="button" class="pmi-add" onclick="_pmiListAdd_(\'' + key + '\')">+ Add ' + esc(f.label) + '</button>';
}
function _pmiRerenderList_(key) {
  var wrap = document.getElementById('pmi-listwrap-' + key);
  if (wrap) wrap.innerHTML = _pmiField_(key).type === 'tasklist' ? _pmiTaskInner_(key) : _pmiListInner_(key);
}
function _pmiListSet_(key, i, val) { _pmiState_[key][i] = val; _pmiUpdateSummary_(); }
function _pmiListAdd_(key) { _pmiState_[key].push(''); _pmiRerenderList_(key); _pmiFocusLast_(key); _pmiClearErr_(key); }
function _pmiListRemove_(key, i) {
  _pmiState_[key].splice(i, 1);
  if (!_pmiState_[key].length) _pmiState_[key].push('');
  _pmiRerenderList_(key); _pmiUpdateSummary_();
}

/* ── Repeatable task list (text + CHK ref) ─────────────────────────────────── */
function _pmiTaskInner_(key) {
  var f = _pmiField_(key);
  var arr = _pmiState_[key] || [];
  var rows = arr.map(function(t, i) {
    return '<div class="pmi-listrow">' +
      '<input type="text" class="pmi-input" placeholder="' + esc(f.placeholder || 'Task step') + '" value="' + esc(t.t || '') + '" ' +
        'oninput="_pmiTaskSet_(\'' + key + '\',' + i + ',\'t\',this.value)">' +
      '<input type="text" class="pmi-input pmi-tref" placeholder="CHK ref" value="' + esc(t.ref || '') + '" ' +
        'oninput="_pmiTaskSet_(\'' + key + '\',' + i + ',\'ref\',this.value)">' +
      '<button type="button" class="pmi-rm" title="Remove" onclick="_pmiListRemove_(\'' + key + '\',' + i + ')">&times;</button>' +
    '</div>';
  }).join('');
  var libPicker = f.taskLibrary ? _pmiTaskLibPicker_(key) : '';
  return libPicker + rows + '<button type="button" class="pmi-add" onclick="_pmiTaskAdd_(\'' + key + '\')">+ Add task</button>';
}
function _pmiTaskLibPicker_(key) {
  return '<div class="pmi-listrow">' +
    '<select class="pmi-select" id="pmi-tasklib-' + key + '" onchange="_pmiTaskLibAdd_(\'' + key + '\',this)">' +
      '<option value="">+ Add from task library&#8230;</option>' +
      (window._pmTaskLibOptionsHtml_ ? window._pmTaskLibOptionsHtml_(_pmiState_.department) : '') +
    '</select>' +
  '</div>';
}
// Re-render just the task-library picker's <option>s when department changes
// (via the select or via asset autofill) — leaves already-added task rows untouched.
function _pmiRefreshTaskLibPickers_() {
  _pmiOrderedKeys_().forEach(function(key) {
    if (_pmiField_(key).type !== 'tasklist' || !_pmiField_(key).taskLibrary) return;
    var sel = document.getElementById('pmi-tasklib-' + key);
    if (sel && window._pmTaskLibOptionsHtml_) {
      sel.innerHTML = '<option value="">+ Add from task library&#8230;</option>' + window._pmTaskLibOptionsHtml_(_pmiState_.department);
    }
  });
}
function _pmiTaskLibAdd_(key, sel) {
  var text = sel.value;
  if (!text) return;
  var arr = _pmiState_[key];
  if (arr.length === 1 && !arr[0].t && !arr[0].ref) arr.length = 0; // drop the pristine blank row
  var seq = arr.filter(function(t) { return t.ref; }).length + 1;
  arr.push({ t: text, ref: window._pmGenChkRef_ ? window._pmGenChkRef_(_pmiState_.assetCode, seq) : '' });
  sel.value = '';
  _pmiRerenderList_(key); _pmiUpdateSummary_(); _pmiClearErr_(key);
}
function _pmiTaskSet_(key, i, which, val) { _pmiState_[key][i][which] = val; _pmiUpdateSummary_(); }
function _pmiTaskAdd_(key) {
  var arr = _pmiState_[key];
  var seq = arr.filter(function(t) { return t.ref; }).length + 1;
  arr.push({ t: '', ref: window._pmGenChkRef_ ? window._pmGenChkRef_(_pmiState_.assetCode, seq) : '' });
  _pmiRerenderList_(key); _pmiFocusLast_(key); _pmiClearErr_(key);
}

function _pmiFocusLast_(key) {
  var wrap = document.getElementById('pmi-listwrap-' + key);
  if (!wrap) return;
  var inputs = wrap.querySelectorAll('.pmi-listrow .pmi-input');
  var target = _pmiField_(key).type === 'tasklist' ? inputs[inputs.length - 2] : inputs[inputs.length - 1];
  if (target && target.focus) try { target.focus(); } catch (e) {}
}

function _pmiRailHTML_() {
  var rows = _pmiOrderedKeys_().map(function(k) {
    var f = _pmiField_(k);
    if (f.type === 'auto') return '';
    return '<div class="pmi-srow"><span class="pmi-skey">' + esc(f.label) + '</span>' +
      '<span class="pmi-sval pmi-empty" id="pmi-sum-' + k + '">—</span></div>';
  }).join('');

  return '' +
    '<div class="pmi-rail">' +
      '<div class="pmi-summary">' +
        '<div class="pmi-summary-hdr"><span>Review</span>' +
          '<span class="pmi-summary-count" id="pmi-sum-count">0 / 0</span></div>' +
        '<div class="pmi-progress"><div class="pmi-progress-fill" id="pmi-progress"></div></div>' +
        '<div class="pmi-summary-body">' + rows + '</div>' +
        '<div class="pmi-actions">' +
          '<button class="pmi-btn pmi-btn-primary" id="pmi-submit" onclick="_pmiSubmit_()">Save PM Schedule</button>' +
          '<button class="pmi-btn pmi-btn-ghost" onclick="_pmiResetConfirm_()">Clear Form</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

// ── Asset autocomplete ─────────────────────────────────────────────────────────
function _pmiLoadAssets_() {
  if (typeof WORKER_URL === 'undefined' || !WORKER_URL) return;
  fetch(WORKER_URL + '/api/equip/inventory', {
    headers: { 'X-User-Email': (typeof USER !== 'undefined' && USER ? USER.email : '') }
  })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(j) {
      if (!j || !j.equipment) return;
      _pmiEquip_ = j.equipment.map(function(e) { return { code: e.code, specific: e.specific, dept: (e.dept || '').toUpperCase() }; });
      var dl = document.getElementById('pmi-dl-assets');
      if (dl) dl.innerHTML = _pmiEquip_.map(function(e) {
        var lbl = e.specific ? (e.code + ' — ' + e.specific) : e.code;
        return '<option value="' + esc(e.code) + '">' + esc(lbl) + '</option>';
      }).join('');
    })
    .catch(function() { /* autocomplete is a convenience; manual entry still works */ });
}

// When the asset code matches a known register entry, auto-fill name + dept.
function _pmiAutofillAsset_() {
  var code = (_pmiState_.assetCode || '').trim();
  if (!code) return;
  var match = _pmiEquip_.filter(function(e) { return e.code.toLowerCase() === code.toLowerCase(); })[0];
  if (!match) return;
  if (match.specific) { _pmiState_.assetName = match.specific; var an = document.getElementById('pmi-assetName'); if (an) an.value = match.specific; _pmiClearErr_('assetName'); }
  if (match.dept)     { _pmiState_.department = match.dept;   var dp = document.getElementById('pmi-department'); if (dp) dp.value = match.dept; _pmiClearErr_('department'); }
  _pmiRefreshTaskLibPickers_();
}

// ── Input handling + live summary ────────────────────────────────────────────
function _pmiClearErr_(key) {
  var el = document.getElementById('pmi-' + key); if (el) el.classList.remove('pmi-invalid');
  var errEl = document.getElementById('pmi-err-' + key); if (errEl) errEl.classList.remove('show');
}
function _pmiOnInput_(key) {
  var el = document.getElementById('pmi-' + key);
  if (el) _pmiState_[key] = el.value;
  _pmiClearErr_(key);
  if (key === 'assetCode') _pmiAutofillAsset_();
  if (key === 'priorityMode') _pmiSyncPriority_();
  if (key === 'department') _pmiRefreshTaskLibPickers_();
  _pmiUpdateSummary_();
}

// Enable/disable the manual Priority field based on the Priority Source.
function _pmiSyncPriority_() {
  var explicit = _pmiState_.priorityMode === 'explicit';
  var sel = document.getElementById('pmi-priority');
  if (sel) sel.disabled = !explicit;
  var grp = sel ? sel.closest('.pmi-group') : null;
  var lbl = grp ? grp.querySelector('.pmi-label') : null;
  if (lbl) {
    var mark = lbl.querySelector('.pmi-req, .pmi-opt');
    if (mark) { mark.className = explicit ? 'pmi-req' : 'pmi-opt'; mark.textContent = explicit ? '*' : '(auto)'; }
  }
}

function _pmiSummaryValue_(k) {
  var f = _pmiField_(k);
  if (f.type === 'list') {
    var n = (_pmiState_[k] || []).filter(function(v) { return String(v).trim(); }).length;
    return n ? (n + ' item' + (n !== 1 ? 's' : '')) : '';
  }
  if (f.type === 'tasklist') {
    var n2 = (_pmiState_[k] || []).filter(function(t) { return String(t.t || '').trim(); }).length;
    return n2 ? (n2 + ' task' + (n2 !== 1 ? 's' : '')) : '';
  }
  var val = (_pmiState_[k] || '').trim();
  if (!val) return '';
  if (k === 'priority' && _pmiState_.priorityMode !== 'explicit') return '';
  if (k === 'priorityMode') return (f.optionLabels && f.optionLabels[val]) ? f.optionLabels[val] : val;
  if (f.unit) return val + ' ' + f.unit;
  return val;
}

function _pmiUpdateSummary_() {
  var userKeys = _pmiOrderedKeys_().filter(_pmiIsUserField_);
  var filled = 0, requiredCount = 0;

  userKeys.forEach(function(k) {
    var cell = document.getElementById('pmi-sum-' + k);
    var val = _pmiSummaryValue_(k);
    if (cell) {
      if (val) {
        cell.innerHTML = (k === 'priority') ? '<span class="pmi-pri pmi-pri-' + esc(val) + '">' + esc(val) + '</span>' : esc(val);
        cell.classList.remove('pmi-empty');
      } else { cell.textContent = '—'; cell.classList.add('pmi-empty'); }
    }
    if (_pmiIsRequired_(k)) { requiredCount++; if (val) filled++; }
  });

  var countEl = document.getElementById('pmi-sum-count');
  if (countEl) countEl.textContent = filled + ' / ' + requiredCount;
  var fillEl = document.getElementById('pmi-progress');
  if (fillEl) fillEl.style.width = (requiredCount ? Math.round(filled / requiredCount * 100) : 0) + '%';
}

// ── Validation ───────────────────────────────────────────────────────────────
// Returns the key of the first invalid field, marking all invalid ones. null = OK.
function _pmiValidate_() {
  var firstBad = null;
  _pmiOrderedKeys_().filter(_pmiIsUserField_).forEach(function(k) {
    var f = _pmiField_(k);
    var msg = '';

    if (_pmiIsCollection_(k)) {
      if (_pmiIsRequired_(k)) {
        var items = f.type === 'tasklist'
          ? (_pmiState_[k] || []).filter(function(t) { return String(t.t || '').trim(); })
          : (_pmiState_[k] || []).filter(function(v) { return String(v).trim(); });
        if (!items.length) msg = 'Add at least one ' + (f.type === 'tasklist' ? 'task' : 'item') + '.';
      }
    } else {
      var val = (_pmiState_[k] || '').trim();
      if (_pmiIsRequired_(k) && !val) msg = f.label + ' is required.';
      else if (val && f.type === 'number') {
        var n = Number(val);
        if (isNaN(n)) msg = 'Enter a number.';
        else if (f.min != null && n < f.min) msg = 'Must be at least ' + f.min + '.';
      } else if (val && f.minLength && val.length < f.minLength) {
        msg = 'Please enter at least ' + f.minLength + ' characters.';
      }
    }

    var el = document.getElementById('pmi-' + k);
    var errEl = document.getElementById('pmi-err-' + k);
    if (msg) {
      if (el) el.classList.add('pmi-invalid');
      if (errEl) { errEl.textContent = msg; errEl.classList.add('show'); }
      if (!firstBad) firstBad = k;
    } else { _pmiClearErr_(k); }
  });
  return firstBad;
}

// ── Submit ───────────────────────────────────────────────────────────────────
function _pmiBuildPayload_() {
  var payload = {};
  _pmiOrderedKeys_().filter(_pmiIsUserField_).forEach(function(k) {
    var f = _pmiField_(k);
    if (f.type === 'list') {
      payload[k] = (_pmiState_[k] || []).map(function(v) { return String(v).trim(); }).filter(Boolean);
    } else if (f.type === 'tasklist') {
      payload[k] = (_pmiState_[k] || [])
        .map(function(t) { return { t: String(t.t || '').trim(), ref: String(t.ref || '').trim() }; })
        .filter(function(t) { return t.t; });
    } else {
      payload[k] = (_pmiState_[k] || '').trim();
    }
  });
  // Interval-derived priority is left blank so the backend derives it.
  if (payload.priorityMode !== 'explicit') payload.priority = '';
  return payload;
}

function _pmiSubmit_() {
  if (_pmiSubmitting_) return;

  var bad = _pmiValidate_();
  if (bad) {
    showToast('Please complete the highlighted fields.', 'error');
    var el = document.getElementById('pmi-' + bad);
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (el && el.focus) try { el.focus({ preventScroll: true }); } catch (e) { el.focus(); }
    return;
  }

  var payload = _pmiBuildPayload_();
  var btn = document.getElementById('pmi-submit');
  _pmiSubmitting_ = true;
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  fetch(WORKER_URL + window.PM_INTAKE_CONFIG.addEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-User-Email': (typeof USER !== 'undefined' && USER ? USER.email : '') },
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, status: r.status, body: j }; }); })
    .then(function(res) {
      _pmiSubmitting_ = false;
      if (btn) { btn.disabled = false; btn.textContent = 'Save PM Schedule'; }

      if (res.body && res.body.ok) {
        _pmiSuccess_(res.body.pmId || '(assigned)', res.body.timestamp || '', res.body.nextDue || '');
        return;
      }
      if (res.status === 404) {
        _pmiShowBanner_('The PM schedules endpoint isn’t live yet. Your entry is validated and ready — once <code>/api/pm/schedules/add</code> is deployed, save will write straight to the PM Schedules tab.');
      }
      showToast('Error: ' + esc((res.body && res.body.error) || ('HTTP ' + res.status)), 'error', 7000);
    })
    .catch(function(err) {
      _pmiSubmitting_ = false;
      if (btn) { btn.disabled = false; btn.textContent = 'Save PM Schedule'; }
      showToast('Save failed: ' + esc(String(err.message || err)), 'error', 7000);
    });
}

function _pmiShowBanner_(msgHtml) {
  var b = document.getElementById('pmi-banner');
  if (!b) return;
  b.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div>' + msgHtml + '</div>';
  b.classList.add('show');
}

function _pmiSuccess_(pmId, timestamp, nextDue) {
  var container = document.getElementById('page-pm-intake');
  if (!container) return;
  var sub = 'Written to the PM Schedules tab' + (timestamp ? ' on ' + esc(timestamp) : '') + '.' +
    (nextDue ? ' Next due ' + esc(nextDue) + '.' : '');
  container.innerHTML =
    '<div class="pmi-wrap">' +
      '<div class="pmi-done">' +
        '<div class="pmi-done-check">' +
          '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +
        '</div>' +
        '<div class="pmi-done-title">PM schedule saved</div>' +
        '<div class="pmi-done-sub">' + sub + '</div>' +
        '<div class="pmi-done-id" title="Copy PM ID" onclick="_pmiCopy_(\'' + esc(pmId) + '\')">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
          esc(pmId) +
        '</div>' +
        '<div class="pmi-done-actions">' +
          '<button class="pmi-btn pmi-btn-primary" style="padding:0 18px;" onclick="_pmiRenderReset_()">Log Another PM</button>' +
          '<button class="pmi-btn pmi-btn-ghost" style="padding:0 16px;" onclick="navigate(\'pm\')">Go to PM Schedules</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function _pmiRenderReset_() {
  var container = document.getElementById('page-pm-intake');
  if (container) _pmiRender_(container);
}

function _pmiResetConfirm_() {
  var container = document.getElementById('page-pm-intake');
  if (container) { _pmiRender_(container); showToast('Form cleared.'); }
}

function _pmiCopy_(txt) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() { showToast('Copied: ' + txt); });
  }
}
</script>
