<!-- ╔══════════════════════════════════════════════════════════════════╗ -->
<!-- ║  Cost Reports module — department labor & material cost analytics ║ -->
<!-- ║  Rendered INSIDE the Reports page as a separate "family" (an      ║ -->
<!-- ║  adjacent dropdown), not as its own nav page. Exposes:            ║ -->
<!-- ║    _CR_VIEWS_        — [{id,label}] for the report selector       ║ -->
<!-- ║    _crRenderInto_(el)— mount the cost report into a host element  ║ -->
<!-- ║    _crShowView_(id)  — switch the active report view              ║ -->
<!-- ║  Every number comes from GET /api/reports/cost-data, which the    ║ -->
<!-- ║  Worker computes live from the raw DATA Hours / DATA Material     ║ -->
<!-- ║  logs (see the architecture notes above handleCostData in         ║ -->
<!-- ║  worker.js, and docs/COST_REPORTS_DATA_SOURCES.md).                ║ -->
<!-- ╚══════════════════════════════════════════════════════════════════╝ -->
<style>
/* ── Cost Reports ──────────────────────────────────────────────────────── */
.cr-controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow-sm);margin-bottom:16px;}
.cr-ctl{display:flex;flex-direction:column;gap:4px;}
.cr-ctl-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);}
.cr-input{height:32px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font-size:12.5px;background:#fff;color:var(--text-primary);outline:none;}
.cr-input:focus{border-color:var(--brand-navy);}
.cr-daterange{display:flex;align-items:flex-end;gap:10px;padding:8px 12px;border:1.5px solid var(--brand-navy);border-radius:8px;background:var(--status-info-bg);}
.cr-daterange .cr-ctl-label{color:var(--brand-navy);}
.cr-presets{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.cr-preset{height:24px;padding:0 10px;border:1px solid var(--border-default);border-radius:13px;background:#fff;font-size:11px;color:var(--text-secondary);cursor:pointer;}
.cr-preset:hover{background:var(--bg-hover);color:var(--text-primary);}
.cr-preset.active{background:var(--brand-navy);color:#fff;border-color:var(--brand-navy);}
.cr-grow{flex:1;}
.cr-charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
@media (max-width:900px){.cr-charts{grid-template-columns:1fr;}}
.cr-td-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
.cr-td-asset{font-family:var(--font-mono);font-weight:600;color:var(--brand-navy);}
.cr-empty{padding:28px;text-align:center;color:var(--text-secondary);font-size:13px;}
.cr-local-note{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);margin:-6px 0 14px;}
.cr-scroll{max-height:480px;overflow:auto;}
.cr-section-row td{background:var(--bg-subtle);font-weight:700;color:var(--brand-navy);}
</style>

<script>
/* ══════════════════════════════════════════════════════════════════════════
   COST REPORTS — renders GET /api/reports/cost-data's pre-aggregated totals.

   Response shape (see handleCostData in worker.js for the full architecture
   notes on why it's organized this way):
     {
       overview:   [{ id, label, hours, labor, material, total }, ...] — 9
                   non-overlapping whole-company buckets (Plant Maintenance's
                   own categories) — this total IS the company total.
       machineShop:[{ section, lines:[{label,hours,labor,material,total}] }]
                   — cross-department view of where the Machine Shop crew's
                   labor + material went, by department. NOT additive with
                   the 'machine-shop' overview bucket — that bucket is only
                   jobs 500-502 (the crew's own unattributed time); this is
                   the full picture of ALL their logged hours company-wide.
       drilldowns: {
         'plastic-manuf': { plasticMfg:[...], injectionMold:[...] },
         'trucks-lifts':  { forklift:[...] },
         'buildings':     { cscBuilding:[...] },
       }
     }
   ══════════════════════════════════════════════════════════════════════════ */

// Client-side mirror of the Worker's overview bucket ids/labels, for the view
// selector and generic bucket rendering. Job-code lists live only in
// worker.js — the frontend never needs them, it just displays totals.
var _CR_BUCKETS_ = [
  { id: 'plastic-manuf',  label: 'Plastic Manufacturing' },
  { id: 'metal-manuf',    label: 'Metal Manufacturing' },
  { id: 'trucks-lifts',   label: 'Trucks, Lifts & Autos' },
  { id: 'metal-deco',     label: 'Metal Decorating' },
  { id: 'plastic-deco',   label: 'Plastic Decorating' },
  { id: 'machine-shop',   label: 'Machine Shop' },
  { id: 'buildings',      label: 'Buildings' },
  { id: 'support-equip',  label: 'Support Equipment' },
  { id: 'customer-equip', label: 'Customer Equipment' },
];
function _crBucket_(id) {
  for (var i = 0; i < _CR_BUCKETS_.length; i++) if (_CR_BUCKETS_[i].id === id) return _CR_BUCKETS_[i];
  return null;
}

// Report selector options (Overview first, then one per bucket).
var _CR_VIEWS_ = [{ id: 'overview', label: 'Overview — All Departments' }]
  .concat(_CR_BUCKETS_.map(function(b) { return { id: b.id, label: b.label }; }));

// ── Kept for the separate, still-provisional "Add Cost Entry" page ─────────
// (cost-entry.html) — that page saves manual entries to localStorage only
// ("syncs to the DB later" per its own header) and is independent of the
// live report below, which is fully server-computed from raw sheet data.
var _CR_DEPTS_ = [
  { id: 'machine-shop',   label: 'Machine Shop',      rate: 28.39, assetLabel: 'Machine ID' },
  { id: 'plastic-mfg',    label: 'Plastic Mfg',       rate: 28.39, assetLabel: 'Machine' },
  { id: 'injection-mold', label: 'Injection Mold',    rate: 28.39, assetLabel: 'Mold' },
  { id: 'plant-maint',    label: 'Plant Maintenance', rate: 28.39, assetLabel: 'System' },
  { id: 'forklift',       label: 'Forklift',          rate: 28.39, assetLabel: 'Unit' },
  { id: 'csc-building',   label: 'CSC Building',      rate: 28.39, assetLabel: 'Area / System' },
];
var _CR_LS_KEY_ = 'cmms_cost_entries_v1';
function _crLoadLocal_() {
  try {
    var raw = window.localStorage ? window.localStorage.getItem(_CR_LS_KEY_) : null;
    var arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function _crAddEntry_(rec) {
  var local = _crLoadLocal_();
  local.push(rec);
  try { if (window.localStorage) window.localStorage.setItem(_CR_LS_KEY_, JSON.stringify(local)); } catch (e) {}
  return rec;
}

// ── State ─────────────────────────────────────────────────────────────────
var _crData_    = null;        // { overview, machineShop, drilldowns } from the Worker
var _crRoot_    = null;        // host element inside the Reports page
var _crView_    = 'overview';  // 'overview' | <bucket id>
var _crStart_   = null;        // 'YYYY-MM-DD' or null (all time)
var _crEnd_     = null;
var _crPreset_  = 'all';

// ── Helpers ────────────────────────────────────────────────────────────────
function _crPad_(n) { return (n < 10 ? '0' : '') + n; }
function _crIso_(d) { return d.getFullYear() + '-' + _crPad_(d.getMonth() + 1) + '-' + _crPad_(d.getDate()); }
function _crMoney_(n, dec) {
  return '$' + Number(n || 0).toLocaleString('en-US',
    { minimumFractionDigits: dec == null ? 0 : dec, maximumFractionDigits: dec == null ? 0 : dec });
}
function _crNum_(n) { return Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 1 }); }

// ── Init / mount ────────────────────────────────────────────────────────────
// Entry point called by the Reports page when the Cost family is selected.
// Fetches the live aggregate from the Worker on first load / range change;
// re-renders from the cached _crData_ on view switches within the same range.
function _crRenderInto_(host) {
  _crRoot_ = host;
  if (_crData_) { _crRenderBody_(); return; }
  _crFetch_();
}
function _crFetch_() {
  var host = _crRoot_;
  if (!host) return;
  host.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><span>Loading cost data…</span></div>';
  var qs = [];
  if (_crStart_) qs.push('dateFrom=' + encodeURIComponent(_crStart_));
  if (_crEnd_)   qs.push('dateTo='   + encodeURIComponent(_crEnd_));
  fetch(WORKER_URL + '/api/reports/cost-data' + (qs.length ? '?' + qs.join('&') : ''), {
    headers: { 'X-User-Email': USER ? USER.email : '' }
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res || res.error) {
        host.innerHTML = '<div class="cr-empty">Error loading cost data: ' + esc((res && res.error) || 'Unknown error') + '</div>';
        return;
      }
      _crData_ = res;
      _crRenderBody_();
    })
    .catch(function(err) {
      host.innerHTML = '<div class="cr-empty">Error loading cost data: ' + esc(err.message || String(err)) + '</div>';
    });
}
function _crShowView_(v) { _crView_ = v; _crRenderBody_(); }

// ── Controls (date range only — everything else is server-computed) ────────
function _crControlsHtml_() {
  var presets = [
    { id: 'all', label: 'All time' }, { id: '30', label: 'Last 30 days' },
    { id: '90', label: 'Last 90 days' }, { id: 'ytd', label: 'Year to date' }
  ];
  return '<div class="cr-controls">' +
    '<div class="cr-daterange">' +
      '<div class="cr-ctl"><label class="cr-ctl-label">From</label>' +
        '<input type="date" class="cr-input" value="' + esc(_crStart_ || '') + '" onchange="_crSetRange_(\'start\', this.value)"/></div>' +
      '<div class="cr-ctl"><label class="cr-ctl-label">To</label>' +
        '<input type="date" class="cr-input" value="' + esc(_crEnd_ || '') + '" onchange="_crSetRange_(\'end\', this.value)"/></div>' +
    '</div>' +
    '<div class="cr-ctl"><label class="cr-ctl-label">Quick range</label>' +
      '<div class="cr-presets">' + presets.map(function(p) {
        return '<button class="cr-preset' + (p.id === _crPreset_ ? ' active' : '') + '" onclick="_crPresetRange_(\'' + p.id + '\')">' + esc(p.label) + '</button>';
      }).join('') + '</div></div>' +
    '<div class="cr-grow"></div>' +
    '<div class="cr-ctl"><label class="cr-ctl-label">&nbsp;</label>' +
      '<button class="rpt-btn" onclick="navigate(\'cost-entry\')">＋ Add Cost Entry</button></div>' +
  '</div>';
}
function _crSetRange_(which, v) {
  if (which === 'start') _crStart_ = v || null; else _crEnd_ = v || null;
  _crPreset_ = 'custom'; _crData_ = null; _crFetch_();
}
function _crPresetRange_(id) {
  _crPreset_ = id;
  if (id === 'all') { _crStart_ = null; _crEnd_ = null; }
  else if (id === 'ytd') { var now = new Date(); _crStart_ = now.getFullYear() + '-01-01'; _crEnd_ = _crIso_(now); }
  else {
    var days = parseInt(id, 10);
    var end = new Date();
    var s = new Date(end.getTime()); s.setDate(s.getDate() - days);
    _crStart_ = _crIso_(s); _crEnd_ = _crIso_(end);
  }
  _crData_ = null; _crFetch_();
}

// ── Shared KPI / bar-chart builders ─────────────────────────────────────────
function _crKpi_(val, label, accent, foot) {
  return '<div class="kpi' + (accent ? ' kpi-' + accent : '') + '">' +
    '<div class="kpi-accent"></div>' +
    '<div class="kpi-label">' + esc(label) + '</div>' +
    '<div class="kpi-value">' + val + '</div>' +
    (foot ? '<div class="kpi-foot">' + esc(foot) + '</div>' : '') +
  '</div>';
}
function _crBarCard_(title, legend, rows) {
  var max = rows.reduce(function(m, b) { return Math.max(m, b.value); }, 1);
  return '<div class="rpt-analytics-card">' +
    '<div class="rpt-analytics-hdr">' + esc(title) + (legend ? '<span class="rpt-legend">' + esc(legend) + '</span>' : '') + '</div>' +
    (rows.length ? rows.map(function(b) {
      var pct = Math.round(b.value / max * 100);
      return '<div class="rpt-pt-row">' +
        '<div class="rpt-pt-label" title="' + esc(b.label) + '">' + esc(b.label) + '</div>' +
        '<div class="rpt-pt-bar-wrap"><div class="rpt-pt-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="rpt-pt-count" style="width:auto;min-width:56px;">' + esc(b.disp) + '</div>' +
      '</div>';
    }).join('') : '<div style="font-size:12px;color:var(--text-tertiary);padding:6px 0;">No data.</div>') +
  '</div>';
}

// ── Body render (dispatch on view) ───────────────────────────────────────────
function _crRenderBody_() {
  if (!_crRoot_ || !_crData_) return;
  var body = _crView_ === 'overview' ? _crOverviewHtml_() : _crBucketHtml_(_crView_);
  _crRoot_.innerHTML = _crControlsHtml_() +
    '<div class="cr-local-note">Live data computed from David\'s Costs 2024 spreadsheet (raw DATA Hours + DATA Material logs) — every figure is hours × the shop rate ($28.39/hr) plus a matching material sum, filtered by job# and date.</div>' +
    body;
}

// ── Overview — the 9 whole-company buckets ───────────────────────────────────
function _crOverviewHtml_() {
  var rows = _crData_.overview || [];
  var totalHours = 0, totalLabor = 0, totalMat = 0, totalCost = 0;
  rows.forEach(function(b) { totalHours += b.hours; totalLabor += b.labor; totalMat += b.material; totalCost += b.total; });
  var top = rows.slice().sort(function(a, b) { return b.total - a.total; })[0];

  var kpis = '<div class="kpi-band" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:16px;">' +
    _crKpi_(_crMoney_(totalCost), 'Total Cost — All Departments', 'info', '') +
    _crKpi_(_crMoney_(totalLabor), 'Total Labor Cost', '', _crNum_(totalHours) + ' hrs') +
    _crKpi_(_crMoney_(totalMat), 'Total Material Cost', 'warn', '') +
    _crKpi_(top ? esc(top.label) : '—', 'Top Category', 'success', top ? _crMoney_(top.total) : '') +
  '</div>';

  var charts = '<div class="cr-charts">' +
    _crBarCard_('Total Cost by Category', 'labor + material',
      rows.slice().sort(function(a, b) { return b.total - a.total; })
        .map(function(b) { return { label: b.label, value: b.total, disp: _crMoney_(b.total) }; })) +
    _crBarCard_('Labor Hours by Category', '', rows.slice().sort(function(a, b) { return b.hours - a.hours; })
      .map(function(b) { return { label: b.label, value: b.hours, disp: _crNum_(b.hours) + ' h' }; })) +
  '</div>';

  var hasDrilldown = { 'plastic-manuf': 1, 'trucks-lifts': 1, 'buildings': 1, 'machine-shop': 1 };
  var table = '<div class="rpt-table-wrap">' +
    '<div class="rpt-section-hdr">Category Summary</div>' +
    '<table class="rpt-table"><thead><tr>' +
      '<th>Category</th><th class="cr-td-num">Labor Hrs</th>' +
      '<th class="cr-td-num">Labor Cost</th><th class="cr-td-num">Material Cost</th><th class="cr-td-num">Total Cost</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(b) {
      return '<tr onclick="_crShowViewSync_(\'' + b.id + '\')" style="cursor:pointer;">' +
        '<td style="font-weight:600;color:var(--brand-navy);">' + esc(b.label) + (hasDrilldown[b.id] ? ' ›' : '') + '</td>' +
        '<td class="cr-td-num">' + _crNum_(b.hours) + '</td>' +
        '<td class="cr-td-num">' + esc(_crMoney_(b.labor)) + '</td>' +
        '<td class="cr-td-num">' + esc(_crMoney_(b.material)) + '</td>' +
        '<td class="cr-td-num" style="font-weight:600;">' + esc(_crMoney_(b.total)) + '</td>' +
      '</tr>';
    }).join('') +
    '<tr style="background:var(--bg-subtle);font-weight:700;">' +
      '<td>All Departments</td>' +
      '<td class="cr-td-num">' + _crNum_(totalHours) + '</td>' +
      '<td class="cr-td-num">' + esc(_crMoney_(totalLabor)) + '</td>' +
      '<td class="cr-td-num">' + esc(_crMoney_(totalMat)) + '</td>' +
      '<td class="cr-td-num">' + esc(_crMoney_(totalCost)) + '</td>' +
    '</tr>' +
    '</tbody></table></div>';

  return kpis + charts + table;
}

// Row-click helper — drill into a category and keep the head dropdown in sync.
function _crShowViewSync_(id) {
  if (typeof _rptSyncCostView_ === 'function') _rptSyncCostView_(id);
  else _crShowView_(id);
}

// ── Generic asset-table renderer, shared by the 4 drill-down views ─────────
function _crAssetTable_(title, rows, idCol) {
  if (!rows.length) return '';
  return '<div class="rpt-table-wrap">' +
    '<div class="rpt-section-hdr">' + esc(title) + ' — ' + rows.length + ' item' + (rows.length === 1 ? '' : 's') + '</div>' +
    '<div class="cr-scroll"><table class="rpt-table"><thead><tr>' +
      (idCol ? '<th>' + esc(idCol) + '</th>' : '') + '<th>Label</th>' +
      '<th class="cr-td-num">Hours</th><th class="cr-td-num">Labor $</th>' +
      '<th class="cr-td-num">Material $</th><th class="cr-td-num">Total $</th>' +
    '</tr></thead><tbody>' +
    rows.slice().sort(function(a, b) { return b.total - a.total; }).map(function(r) {
      return '<tr>' +
        (idCol ? '<td class="cr-td-asset">' + esc(r.id != null ? r.id : (r.job != null ? r.job : '')) + '</td>' : '') +
        '<td>' + esc(r.label) + (r.dept ? ' <span style="color:var(--text-tertiary);font-size:11px;">(' + esc(r.dept) + ')</span>' : '') + '</td>' +
        '<td class="cr-td-num">' + _crNum_(r.hours) + '</td>' +
        '<td class="cr-td-num">' + esc(_crMoney_(r.labor, 2)) + '</td>' +
        '<td class="cr-td-num">' + esc(_crMoney_(r.material, 2)) + '</td>' +
        '<td class="cr-td-num" style="font-weight:600;">' + esc(_crMoney_(r.total, 2)) + '</td>' +
      '</tr>';
    }).join('') +
    '</tbody></table></div></div>';
}

// ── Bucket view — the selected category's own KPIs, plus any drill-down ─────
function _crBucketHtml_(id) {
  var bucket = _crBucket_(id);
  var row = (_crData_.overview || []).filter(function(b) { return b.id === id; })[0];
  if (!bucket || !row) return '<div class="rpt-table-wrap"><div class="cr-empty">Unknown category.</div></div>';

  var kpis = '<div class="kpi-band" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:16px;">' +
    _crKpi_(_crMoney_(row.total), 'Total Cost', 'info', '') +
    _crKpi_(_crMoney_(row.labor), 'Labor Cost', '', _crNum_(row.hours) + ' hrs') +
    _crKpi_(_crMoney_(row.material), 'Material Cost', 'warn', '') +
    _crKpi_(_crMoney_(row.hours ? row.total / row.hours : 0, 2), 'Cost / Hour', 'success', 'blended') +
  '</div>';

  var dd = (_crData_.drilldowns || {})[id];
  var detail = '';
  if (id === 'plastic-manuf' && dd) {
    detail = _crAssetTable_('Plastic Mfg — by Machine', dd.plasticMfg || [], null) +
             _crAssetTable_('Injection Mold — by Mold', dd.injectionMold || [], 'Job #');
  } else if (id === 'trucks-lifts' && dd) {
    detail = _crAssetTable_('Forklift Fleet — by Unit', dd.forklift || [], 'Unit #');
  } else if (id === 'buildings' && dd) {
    detail = _crAssetTable_('CSC Buildings — by Building', dd.cscBuilding || [], null);
  } else if (id === 'machine-shop') {
    detail = _crMachineShopHtml_();
  } else {
    detail = '<div class="rpt-table-wrap"><div class="cr-empty">No per-asset breakdown is available for ' + esc(bucket.label) + ' yet — only the category total above.</div></div>';
  }

  return kpis + detail;
}

// ── Machine Shop — cross-department view of where the crew's time went ─────
// Deliberately separate from the KPI tiles above (which are jobs 500-502
// only, the crew's own unattributed time) — this table is the full picture
// of ALL of the Machine Shop's logged hours + cost, broken down by which
// department's equipment they serviced. The two totals are NOT meant to add
// up to the same number; see the architecture note above handleCostData.
function _crMachineShopHtml_() {
  var sections = _crData_.machineShop || [];
  var grandTotal = 0;
  sections.forEach(function(s) { s.lines.forEach(function(l) { grandTotal += l.total; }); });
  var rowsHtml = sections.map(function(s) {
    var sectionTotal = s.lines.reduce(function(sum, l) { return sum + l.total; }, 0);
    return '<tr class="cr-section-row"><td colspan="4">' + esc(s.section) + '</td>' +
      '<td class="cr-td-num">' + esc(_crMoney_(sectionTotal)) + '</td></tr>' +
      s.lines.map(function(l) {
        return '<tr>' +
          '<td style="padding-left:22px;">' + esc(l.label) + '</td>' +
          '<td class="cr-td-num">' + _crNum_(l.hours) + '</td>' +
          '<td class="cr-td-num">' + esc(_crMoney_(l.labor)) + '</td>' +
          '<td class="cr-td-num">' + esc(_crMoney_(l.material)) + '</td>' +
          '<td class="cr-td-num" style="font-weight:600;">' + esc(_crMoney_(l.total)) + '</td>' +
        '</tr>';
      }).join('');
  }).join('');
  return '<div class="cr-local-note">This is where all of the Machine Shop\'s logged time (and its matching material cost) went, department by department — not just the jobs the crew logs against itself. Total across every department: ' + esc(_crMoney_(grandTotal)) + '.</div>' +
    '<div class="rpt-table-wrap"><div class="cr-scroll"><table class="rpt-table"><thead><tr>' +
    '<th>Department / Line</th><th class="cr-td-num">Hours</th><th class="cr-td-num">Labor $</th>' +
    '<th class="cr-td-num">Material $</th><th class="cr-td-num">Total $</th>' +
    '</tr></thead><tbody>' + rowsHtml + '</tbody></table></div></div>';
}
</script>
