name = "cmms-worker"
main = "worker.js"
compatibility_date = "2025-01-01"

# ── Required secrets ──────────────────────────────────────────────────────────
# Set each with:  wrangler secret put <NAME>
#
#   SPREADSHEET_ID        — The ID from your Google Sheets URL
#                           (the long string between /d/ and /edit)
#   GOOGLE_SA_EMAIL       — "client_email" from the service account JSON key file
#   GOOGLE_SA_PRIVATE_KEY — "private_key" from the service account JSON key file
#                           (paste the full PEM block including -----BEGIN/END-----)
#   ALLOWED_ORIGIN        — CORS origin for your GitHub Pages site
#                           e.g. https://your-org.github.io
#   PHOTO_FOLDER_ID       — Google Drive folder ID for ticket photo uploads
#                           (share the folder with the service account email)
#   COST_SPREADSHEET_ID   — David's external "Costs 2024" spreadsheet ID (raw
#                           labor/material log, one tab per department). Must be
#                           shared with the service account email as a Viewer.
#
# ── Optional vars ─────────────────────────────────────────────────────────────
[vars]
APP_VERSION = "4.10"

# ── Scheduled trigger ──────────────────────────────────────────────────────────
# Daily PM auto-generate (runPmAutoGenerate in worker.js): creates the PM
# ticket — and surfaces its "parts that may need ordering" on the Parts Needed
# board — for every schedule whose Ticket Lead Time has arrived, instead of
# relying on a manager to remember to click "Generate PM ticket now".
# 12:00 UTC ≈ early morning Eastern, so new tickets/parts are waiting at the
# start of the workday.
[triggers]
crons = ["0 12 * * *"]
