<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:Arial,sans-serif;background:#1A1A1A;color:#E0E0E0;font-size:14px;display:flex;flex-direction:column}
 
/* HEADER */
.hdr{background:#111;border-bottom:3px solid #FFD700;padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.hdr-logo{width:36px;height:36px;background:#FFD700;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#111;flex-shrink:0}
.hdr-title{font-size:18px;font-weight:bold;color:#FFD700;letter-spacing:.5px}
.hdr-sub{font-size:11px;color:#888;margin-top:2px}
 
/* FILTER BAR */
.filter-bar{background:#222;border-bottom:1px solid #3C3C3C;padding:10px 24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.filter-bar label{font-size:10px;font-weight:bold;color:#FFD700;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.filter-sel{background:#1A1A1A;color:#E0E0E0;border:1.5px solid #3C3C3C;border-radius:5px;padding:7px 12px;font-family:Arial;font-size:13px;min-width:180px}
.filter-sel:focus{outline:none;border-color:#FFD700}
.filter-div{width:1px;height:28px;background:#3C3C3C;flex-shrink:0}
.btn-refresh{padding:7px 18px;background:#FFD700;color:#111;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;font-family:Arial}
.btn-refresh:hover{background:#FFC107}
 
/* STAT STRIP */
.stat-strip{display:flex;gap:1px;background:#3C3C3C;flex-shrink:0}
.stat-box{flex:1;background:#222;padding:10px 16px;text-align:center}
.stat-num{font-size:26px;font-weight:bold;color:#FFD700;line-height:1}
.stat-num.red{color:#EF5350}.stat-num.orange{color:#FFA726}.stat-num.blue{color:#64B5F6}.stat-num.green{color:#66BB6A}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-top:3px}
 
/* MAIN BODY */
.main-body{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:16px}
 
/* SECTION */
.section-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-radius:6px;margin-bottom:8px;
}
.section-hdr.assigned{background:#2A2A1A;border-left:4px solid #FFD700}
.section-hdr.unassigned{background:#1A2A1A;border-left:4px solid #EF5350}
.section-hdr-title{font-size:14px;font-weight:bold}
.section-hdr.assigned .section-hdr-title{color:#FFD700}
.section-hdr.unassigned .section-hdr-title{color:#EF5350}
.section-hdr-count{font-size:12px;color:#888}
 
/* TICKET TABLE */
.tkt-table{width:100%;border-collapse:collapse;font-size:13px}
.tkt-table thead tr{background:#2A2A2A}
.tkt-table thead th{
  padding:10px 12px;font-size:11px;font-weight:bold;
  text-transform:uppercase;letter-spacing:.6px;color:#FFD700;
  text-align:left;border-bottom:2px solid #FFD700;white-space:nowrap;
}
.tkt-table tbody tr{border-bottom:1px solid #2A2A2A;transition:background .1s}
.tkt-table tbody tr:hover{background:#2A2A2A}
.tkt-table tbody tr.crit-row{background:#2D1010}
.tkt-table tbody tr.crit-row:hover{background:#3A1515}
.tkt-table tbody tr.high-row{background:#2D1D05}
.tkt-table td{padding:10px 12px;vertical-align:middle}
 
/* PRIORITY BADGE */
.pbadge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:bold}
.p-critical{background:#4A0000;color:#EF5350;border:1px solid #C62828}
.p-high{background:#3D2000;color:#FFA726;border:1px solid #E65100}
.p-medium{background:#2A2A00;color:#FFF176;border:1px solid #F57F17}
.p-low{background:#0D2D0D;color:#66BB6A;border:1px solid #2E7D32}
 
/* STATUS BADGE */
.sbadge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:bold}
.s-open{background:#0D2137;color:#64B5F6}
.s-pending{background:#1A0D2A;color:#CE93D8}
.s-hold{background:#1A1A00;color:#FFF176}
.s-waiting{background:#2A2A2A;color:#FFD700}
 
/* SOURCE BADGE */
.src-ext{background:#0D2137;color:#64B5F6;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:bold}
.src-int{background:#2A2A2A;color:#888;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:bold}
 
/* DEPT DOT */
.dept-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px}
 
/* ACTION BUTTONS */
.act-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-act{padding:5px 12px;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;font-family:Arial;transition:all .13s}
.btn-update{background:#3C3C3C;color:#FFD700;border:1px solid #FFD700}.btn-update:hover{background:#FFD700;color:#111}
.btn-report{background:#0D2D0D;color:#66BB6A;border:1px solid #2E7D32}.btn-report:hover{background:#2E7D32;color:#fff}
.btn-pick{background:#1565C0;color:#fff}.btn-pick:hover{background:#1976D2}
 
/* TECH GROUP */
.tech-group{background:#222;border-radius:8px;overflow:hidden;border:1px solid #3C3C3C;margin-bottom:16px}
.tech-group-hdr{background:#2A2A2A;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #3C3C3C}
.tech-avatar{width:34px;height:34px;border-radius:50%;background:#3C3C3C;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#FFD700;flex-shrink:0}
.tech-name{font-size:14px;font-weight:bold;color:#E0E0E0}
.tech-stats{display:flex;gap:8px;margin-left:auto}
.tech-stat-badge{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:12px}
.t-total{background:#2A2A2A;color:#FFD700;border:1px solid #3C3C3C}
.t-crit{background:#4A0000;color:#EF5350}
.t-hrs{background:#0D2137;color:#64B5F6}
 
/* AGE INDICATOR */
.age-ok{color:#66BB6A;font-weight:bold}
.age-warn{color:#FFA726;font-weight:bold}
.age-crit{color:#EF5350;font-weight:bold}
 
/* EMPTY STATE */
.empty-state{padding:32px;text-align:center;color:#555;font-size:14px;font-style:italic}
 
/* FOOTER */
.footer{flex-shrink:0;background:#111;border-top:1px solid #3C3C3C;padding:8px 24px;display:flex;align-items:center;gap:10px}
.footer-info{font-size:11px;color:#555}
 
/* SCROLLBAR */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#1A1A1A}
::-webkit-scrollbar-thumb{background:#3C3C3C;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#FFD700}
</style>
</head>
<body>
 
<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">⚡</div>
  <div style="flex:1">
    <div class="hdr-title">TECH WORK BOARD</div>
    <div class="hdr-sub" id="companyInfo">Container Supply Co. — Garden Grove, CA</div>
  </div>
  <div style="font-size:11px;color:#555" id="refreshInfo"></div>
</div>
 
<!-- FILTER BAR -->
<div class="filter-bar">
  <label>Filter by Tech</label>
  <select class="filter-sel" id="filterTech" onchange="applyFilters()">
    <option value="ALL">All Technicians</option>
  </select>
  <div class="filter-div"></div>
  <label>Filter by Dept</label>
  <select class="filter-sel" id="filterDept" onchange="applyFilters()">
    <option value="ALL">All Departments</option>
  </select>
  <div class="filter-div"></div>
  <label>Show Status</label>
  <select class="filter-sel" id="filterStatus" onchange="applyFilters()">
    <option value="ALL">All Active</option>
    <option value="OPEN">Open Only</option>
    <option value="PENDING PARTS">Pending Parts</option>
    <option value="ON HOLD">On Hold</option>
    <option value="WAITING">Waiting</option>
  </select>
  <div class="filter-div"></div>
  <label>Problem Type</label>
  <select class="filter-sel" id="filterProbType" onchange="applyFilters()">
    <option value="ALL">All Types</option>
  </select>
  <button class="btn-refresh" onclick="loadData()" style="margin-left:auto">🔄 Refresh</button>
</div>
 
<!-- STAT STRIP -->
<div class="stat-strip">
  <div class="stat-box"><div class="stat-num" id="sTot">0</div><div class="stat-lbl">Active Tickets</div></div>
  <div class="stat-box"><div class="stat-num red" id="sCrit">0</div><div class="stat-lbl">Critical</div></div>
  <div class="stat-box"><div class="stat-num orange" id="sHigh">0</div><div class="stat-lbl">High</div></div>
  <div class="stat-box"><div class="stat-num" id="sOpen">0</div><div class="stat-lbl">Open</div></div>
  <div class="stat-box"><div class="stat-num blue" id="sPending">0</div><div class="stat-lbl">Pending Parts</div></div>
  <div class="stat-box"><div class="stat-num red" id="sUnassigned">0</div><div class="stat-lbl">Unassigned</div></div>
  <div class="stat-box"><div class="stat-num green" id="sComplete">0</div><div class="stat-lbl">Completed Today</div></div>
</div>
 
<!-- MAIN BODY -->
<div class="main-body" id="mainBody">
  <div class="empty-state">Loading tickets…</div>
</div>
 
<!-- FOOTER -->
<div class="footer">
  <div class="footer-info" id="footerInfo">Select your name in the Filter by Tech dropdown, then click Pick Ticket to assign yourself.</div>
  <div style="margin-left:auto;font-size:11px;color:#555" id="footerTime"></div>
</div>
 
<script>
var ALL_TICKETS=[];
var DEPT_COLORS={'001':'#1565C0','003':'#6A1B9A','004':'#2E7D32','006':'#7B1FA2','007':'#37474F','008':'#E65100','009':'#455A64','030':'#558B2F','031':'#4E342E'};
 
window.onload=loadData;
 
function loadData(){
  document.getElementById('mainBody').innerHTML='<div class="empty-state">Loading tickets…</div>';
  document.getElementById('refreshInfo').textContent='';
  google.script.run
    .withSuccessHandler(initBoard)
    .withFailureHandler(function(e){
      document.getElementById('mainBody').innerHTML='<div class="empty-state">Error loading: '+escHtml(e.message)+'</div>';
    })
    .getTechWorkBoardData();
}
 
function initBoard(d){
  document.getElementById('companyInfo').textContent=(d.companyName||'')+(d.location?' — '+d.location:'');
  document.getElementById('refreshInfo').textContent='Last refreshed: '+new Date().toLocaleTimeString();
  document.getElementById('footerTime').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
 
  ALL_TICKETS=d.tickets||[];
 
  // Populate filters
  var techSel=document.getElementById('filterTech');
  var deptSel=document.getElementById('filterDept');
  var probSel=document.getElementById('filterProbType');
 
  // Clear and repopulate
  while(techSel.options.length>1)techSel.remove(1);
  while(deptSel.options.length>1)deptSel.remove(1);
  while(probSel.options.length>1)probSel.remove(1);
 
  var techs={},depts={},probs={};
  ALL_TICKETS.forEach(function(t){
    if(t.assignedTo)techs[t.assignedTo]=true;
    if(t.dept)depts[t.dept]=true;
    if(t.problemType)probs[t.problemType]=true;
  });
 
  Object.keys(techs).sort().forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;techSel.appendChild(o);});
  Object.keys(depts).sort().forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;deptSel.appendChild(o);});
  Object.keys(probs).sort().forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;probSel.appendChild(o);});
 
  applyFilters();
}
 
function applyFilters(){
  var fTech  =document.getElementById('filterTech').value;
  var fDept  =document.getElementById('filterDept').value;
  var fStatus=document.getElementById('filterStatus').value;
  var fProb  =document.getElementById('filterProbType').value;
  var today  =new Date();today.setHours(0,0,0,0);
 
  var active=ALL_TICKETS.filter(function(t){
    var s=String(t.status||'').toUpperCase();
    if(s==='CLOSED'||s==='COMPLETE')return false;
    if(fDept!=='ALL'&&t.dept!==fDept)return false;
    if(fStatus!=='ALL'&&s!==fStatus)return false;
    if(fProb!=='ALL'&&t.problemType!==fProb)return false;
    return true;
  });
 
  var assigned  =active.filter(function(t){return t.assignedTo&&t.assignedTo.trim()&&(fTech==='ALL'||t.assignedTo===fTech);});
  var unassigned=active.filter(function(t){return !t.assignedTo||!t.assignedTo.trim();});
 
  // Sort priority
  var pOrd={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};
  function sortPri(a,b){return(pOrd[a.priority]||3)-(pOrd[b.priority]||3);}
  assigned.sort(sortPri);unassigned.sort(sortPri);
 
  // Stats
  document.getElementById('sTot').textContent=active.length;
  document.getElementById('sCrit').textContent=active.filter(function(t){return t.priority==='CRITICAL';}).length;
  document.getElementById('sHigh').textContent=active.filter(function(t){return t.priority==='HIGH';}).length;
  document.getElementById('sOpen').textContent=active.filter(function(t){return String(t.status||'').toUpperCase()==='OPEN';}).length;
  document.getElementById('sPending').textContent=active.filter(function(t){return String(t.status||'').toUpperCase()==='PENDING PARTS';}).length;
  document.getElementById('sUnassigned').textContent=unassigned.length;
  document.getElementById('sComplete').textContent=ALL_TICKETS.filter(function(t){return String(t.status||'').toUpperCase()==='COMPLETE';}).length;
 
  var body=document.getElementById('mainBody');
  body.innerHTML='';
 
  if(fTech==='ALL'){
    // Group by technician
    var groups={};
    assigned.forEach(function(t){
      var who=t.assignedTo||'Unassigned';
      if(!groups[who])groups[who]=[];
      groups[who].push(t);
    });
    Object.keys(groups).sort().forEach(function(tech){
      body.appendChild(renderTechGroup(tech,groups[tech],today));
    });
  } else {
    // Single tech view
    if(assigned.length>0){
      var hdr=document.createElement('div');
      hdr.className='section-hdr assigned';
      hdr.innerHTML='<div class="section-hdr-title">📋 '+escHtml(fTech)+'\'s Tickets</div><div class="section-hdr-count">'+assigned.length+' ticket'+(assigned.length!==1?'s':'')+'</div>';
      body.appendChild(hdr);
      body.appendChild(renderTable(assigned,true,today));
    } else {
      body.innerHTML='<div class="empty-state">No tickets assigned to '+escHtml(fTech)+'.</div>';
    }
  }
 
  // Unassigned pool
  if(unassigned.length>0){
    var uhdr=document.createElement('div');
    uhdr.className='section-hdr unassigned';
    uhdr.innerHTML='<div class="section-hdr-title">📥 Unassigned Pool — Pick a Ticket</div><div class="section-hdr-count">'+unassigned.length+' ticket'+(unassigned.length!==1?'s':'')+' waiting</div>';
    body.appendChild(uhdr);
    body.appendChild(renderTable(unassigned,false,today));
  }
 
  if(body.innerHTML===''){
    body.innerHTML='<div class="empty-state">No active tickets match the current filters.</div>';
  }
}
 
function renderTechGroup(tech,tickets,today){
  var wrap=document.createElement('div');
  wrap.className='tech-group';
 
  var parts=tech.trim().split(/\s+/);
  var ini=((parts[0][0]||'')+(parts[1]?parts[1][0]:'')).toUpperCase();
  var critCt=tickets.filter(function(t){return t.priority==='CRITICAL';}).length;
  var totalHrs=tickets.reduce(function(s,t){return s+(parseFloat(t.estHours)||0);},0);
 
  var hdr=document.createElement('div');
  hdr.className='tech-group-hdr';
  hdr.innerHTML=
    '<div class="tech-avatar">'+escHtml(ini)+'</div>'+
    '<div class="tech-name">'+escHtml(tech)+'</div>'+
    '<div class="tech-stats">'+
      '<span class="tech-stat-badge t-total">'+tickets.length+' ticket'+(tickets.length!==1?'s':'')+'</span>'+
      (critCt>0?'<span class="tech-stat-badge t-crit">'+critCt+' Critical</span>':'')+
      (totalHrs>0?'<span class="tech-stat-badge t-hrs">~'+totalHrs.toFixed(1)+' hrs</span>':'')+
    '</div>';
  wrap.appendChild(hdr);
  wrap.appendChild(renderTable(tickets,true,today));
  return wrap;
}
 
function renderTable(tickets,isAssigned,today){
  var wrap=document.createElement('div');
  wrap.style.overflowX='auto';
 
  var cols=isAssigned
    ?['Ticket #','Priority','Status','Dept','Equipment','Line #','Problem Type','Description','Est Hrs','Age','Actions']
    :['Ticket #','Priority','Dept','Equipment','Line #','Problem Type','Description','Est Hrs','Submitted','Source','Pick'];
 
  var headRow='<tr>'+cols.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr>';
  var bodyRows='';
 
  tickets.forEach(function(t){
    var p=(t.priority||'MEDIUM').toLowerCase();
    var s=String(t.status||'OPEN').toLowerCase().replace(/\s+/g,'-');
    var deptColor=DEPT_COLORS[t.deptCode]||'#616161';
    var age='—';
    var ageCls='';
    if(t.dateOpened){
      var dO=new Date(t.dateOpened);
      if(!isNaN(dO)){
        var days=Math.floor((today-dO)/86400000);
        age=days+'d';
        ageCls=days>14?'age-crit':days>7?'age-warn':'age-ok';
      }
    }
    var src=t.source==='EXTERNAL'?'<span class="src-ext">Ext</span>':'<span class="src-int">Int</span>';
 
    if(isAssigned){
      bodyRows+='<tr class="'+(p==='critical'?'crit-row':p==='high'?'high-row':'')+'">' +
        '<td style="font-weight:bold;font-family:monospace;font-size:12px;color:#FFD700">'+escHtml(t.ticketNo||'—')+'<br>'+src+'</td>'+
        '<td><span class="pbadge p-'+p+'">'+(t.priority||'—')+'</span></td>'+
        '<td><span class="sbadge s-'+s.split('-')[0]+'">'+(t.status||'—')+'</span></td>'+
        '<td><span class="dept-dot" style="background:'+deptColor+'"></span>'+escHtml(t.dept||'—')+'</td>'+
        '<td style="font-size:12px">'+escHtml(t.specificEquip||t.equipType||'—')+'<br><span style="font-size:10px;color:#555">'+escHtml(t.equipCode||'')+'</span></td>'+
        '<td style="font-size:12px">'+escHtml(t.line||'—')+'</td>'+
        '<td style="font-size:12px">'+escHtml(t.problemType||'—')+'</td>'+
        '<td style="font-size:12px;color:#9E9E9E">'+escHtml((t.description||'').substring(0,55))+'</td>'+
        '<td style="text-align:center;font-size:13px">'+escHtml(String(t.estHours||'—'))+'</td>'+
        '<td class="'+ageCls+'" style="text-align:center">'+age+'</td>'+
        '<td><div class="act-btns">'+
          '<button class="btn-act btn-update" onclick="doUpdate(\''+escHtml(t.ticketNo)+'\')">✏️ Update</button>'+
          '<button class="btn-act btn-report" onclick="doReport(\''+escHtml(t.ticketNo)+'\')">📝 Report</button>'+
        '</div></td>'+
      '</tr>';
    } else {
      bodyRows+='<tr class="'+(p==='critical'?'crit-row':p==='high'?'high-row':'')+'">' +
        '<td style="font-weight:bold;font-family:monospace;font-size:12px;color:#FFD700">'+escHtml(t.ticketNo||'—')+'</td>'+
        '<td><span class="pbadge p-'+p+'">'+(t.priority||'—')+'</span></td>'+
        '<td><span class="dept-dot" style="background:'+deptColor+'"></span>'+escHtml(t.dept||'—')+'</td>'+
        '<td style="font-size:12px">'+escHtml(t.specificEquip||t.equipType||'—')+'</td>'+
        '<td style="font-size:12px">'+escHtml(t.line||'—')+'</td>'+
        '<td style="font-size:12px">'+escHtml(t.problemType||'—')+'</td>'+
        '<td style="font-size:12px;color:#9E9E9E">'+escHtml((t.description||'').substring(0,55))+'</td>'+
        '<td style="text-align:center">'+escHtml(String(t.estHours||'—'))+'</td>'+
        '<td style="font-size:11px;font-family:monospace">'+escHtml(t.dateOpened||'—')+'</td>'+
        '<td>'+src+'</td>'+
        '<td><button class="btn-act btn-pick" onclick="pickTicket(\''+escHtml(t.ticketNo)+'\')">✋ Pick</button></td>'+
      '</tr>';
    }
  });
 
  wrap.innerHTML='<table class="tkt-table"><thead>'+headRow+'</thead><tbody>'+bodyRows+'</tbody></table>';
  return wrap;
}
 
function doUpdate(ticketNo){google.script.run.showUpdateTicket();}
function doReport(ticketNo){google.script.run.showServiceReport();}
 
function pickTicket(ticketNo){
  var sel=document.getElementById('filterTech');
  if(sel.value==='ALL'){
    alert('Please select YOUR name in the "Filter by Tech" dropdown first, then pick a ticket.');
    return;
  }
  if(!confirm('Assign ticket '+ticketNo+' to '+sel.value+'?\n\nThis will set you as the assigned technician.'))return;
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){loadData();}
      else{alert('Error: '+r.error);}
    })
    .withFailureHandler(function(e){alert('Error: '+e.message);})
    .assignTicketToTech({ticketNo:ticketNo,tech:sel.value});
}
 
function escHtml(v){
  var d=document.createElement('span');d.textContent=String(v||'');return d.innerHTML;
}
</script>
</body>
</html>
